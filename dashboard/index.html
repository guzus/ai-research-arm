<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>AI Research — ara</title>
    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-BQJ66RGXES"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-BQJ66RGXES');
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Source+Serif+4:ital,opsz,wght@0,8..60,300;0,8..60,400;0,8..60,500;0,8..60,600;0,8..60,700;1,8..60,400;1,8..60,500&display=swap" rel="stylesheet">
  </head>
  <body>
    <div class="app">
      <header class="header">
        <div class="header-top">
          <div class="brand">
            <h1 class="brand-title">ai-research-arm</h1>
          </div>
          <div class="header-actions">
            <div class="language-switch" id="languageSwitch" aria-label="Article language">
              <button class="language-btn active" type="button" data-language="en" title="Show English">EN</button>
              <button class="language-btn" type="button" data-language="ko" title="Show Korean when available">한국어</button>
            </div>
            <a class="header-link" href="https://github.com/guzus/ai-research-arm" target="_blank" rel="noopener">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"/></svg>
              <span class="header-link-label">guzus/ai-research-arm</span>
            </a>
          </div>
        </div>
        <nav class="tabs" id="tabs">
          <button class="tab active" data-tab="today">Today</button>
          <button class="tab" data-tab="twitter">Twitter</button>
          <button class="tab" data-tab="models">Model Timeline</button>
          <button class="tab" data-tab="research">Research</button>
        </nav>
        <div class="calendar" id="calendar"></div>
        <div class="controls">
          <div class="search-box">
            <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
            <input type="text" class="search-input" id="searchInput" placeholder="Search content... (/)">
            <span class="search-count" id="searchCount" aria-live="polite"></span>
          </div>
          <a
            class="request-btn"
            href="https://github.com/guzus/ai-research-arm/issues/new?labels=gen-research&title=%5BResearch%5D%20&body=%23%23%20Research%20request%0A%0ATopic%3A%20%0A%0AContext%3A%20%0A%0ATags%3A%20%0A%0Abackend%3A%20claude"
            target="_blank"
            rel="noopener noreferrer"
            aria-label="Submit a research request on GitHub"
            title="Submit a research request on GitHub"
          >
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
            <span>Request research</span>
          </a>
          <button class="icon-btn refresh-btn" id="refreshBtn" title="Refresh (R)" aria-label="Refresh">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 4v6h-6M1 20v-6h6"/><path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/></svg>
          </button>
        </div>
      </header>
      <div id="content"></div>
      <footer class="site-footer">
        <a class="footer-link" href="https://x.com/uncanny_guzus" target="_blank" rel="noopener noreferrer">
          x.com/uncanny_guzus
        </a>
      </footer>
    </div>
    <aside class="ara-toc" id="researchToc" hidden aria-label="Article contents">
      <h2 class="ara-toc-title">Contents</h2>
      <ol class="ara-toc-list" id="researchTocList"></ol>
    </aside>
    <div class="section-nav" id="sectionNav">
      <button class="section-nav-btn" id="navUp" title="Previous section (↑)">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 15l-6-6-6 6"/></svg>
      </button>
      <span class="section-nav-counter" id="navCounter"></span>
      <button class="section-nav-btn" id="navDown" title="Next section (↓)">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg>
      </button>
    </div>
    <div class="shortcut-guide" id="shortcutGuide">
      <button class="shortcut-toggle" id="shortcutToggle" title="Keyboard shortcuts (?)">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z"/><path d="M9.09 9a3 3 0 015.83 1c0 2-3 3-3 3"/><circle cx="12" cy="17" r=".5" fill="currentColor"/></svg>
      </button>
      <div class="shortcut-panel" id="shortcutPanel">
        <div class="shortcut-title">Keyboard Shortcuts</div>
        <div class="shortcut-row"><kbd>↑</kbd><kbd>↓</kbd><span>Navigate sections</span></div>
        <div class="shortcut-row"><kbd>[</kbd><kbd>]</kbd><span>Previous / next day</span></div>
        <div class="shortcut-row"><kbd>T</kbd><span>Jump to today</span></div>
        <div class="shortcut-row"><kbd>/</kbd><span>Focus search</span></div>
        <div class="shortcut-row"><kbd>R</kbd><span>Refresh</span></div>
        <div class="shortcut-row"><kbd>?</kbd><span>Toggle this guide</span></div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
