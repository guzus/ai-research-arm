name: Setup Claude sandbox
description: Configure Linux dependencies and CI-safe settings for Claude Code's Bash sandbox.

runs:
  using: composite
  steps:
    - name: Configure sandbox dependencies and settings
      if: runner.os == 'Linux'
      shell: bash
      run: |
        set -euo pipefail
        missing=()
        command -v bwrap >/dev/null 2>&1 || missing+=(bubblewrap)
        command -v socat >/dev/null 2>&1 || missing+=(socat)

        if [ "${#missing[@]}" -gt 0 ]; then
          if ! command -v apt-get >/dev/null 2>&1; then
            echo "::error::Claude sandbox dependencies missing: ${missing[*]}, and apt-get is unavailable."
            exit 1
          fi
          sudo apt-get update -qq
          sudo apt-get install -y -qq "${missing[@]}"
        fi

        # Ubuntu 24.04+ can block unprivileged user namespaces via AppArmor.
        # Older kernels do not expose this sysctl, so guard the write.
        if [ -f /proc/sys/kernel/apparmor_restrict_unprivileged_userns ] && command -v sudo >/dev/null 2>&1; then
          sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0
        fi

        # The production gunux runner is a native host with working user, PID,
        # mount, and network namespaces. Keep strong isolation explicit so a
        # stale user-level setting from an earlier run cannot weaken it.
        mkdir -p "$HOME/.claude"
        python3 - <<'PY'
        import json
        import os
        from pathlib import Path

        settings_path = Path(os.environ["HOME"]) / ".claude" / "settings.json"
        try:
            settings = json.loads(settings_path.read_text()) if settings_path.exists() else {}
        except json.JSONDecodeError as exc:
            raise SystemExit(f"Invalid Claude settings JSON at {settings_path}: {exc}") from exc

        sandbox = settings.setdefault("sandbox", {})
        sandbox["enableWeakerNestedSandbox"] = False

        tmp_path = settings_path.with_suffix(".json.tmp")
        tmp_path.write_text(json.dumps(settings, indent=2, sort_keys=True) + "\n")
        tmp_path.replace(settings_path)
        PY

        # Exercise the mount shape that failed in production. /var/run is a
        # symlink to /run on Ubuntu and is not a valid bwrap tmpfs target; the
        # project policy masks the canonical /run directory instead.
        bwrap \
          --ro-bind / / \
          --dev /dev \
          --unshare-net \
          --unshare-pid \
          --proc /proc \
          --tmpfs /run \
          -- /bin/true

        echo "bubblewrap: $(bwrap --version)"
        echo "socat: $(socat -V 2>&1 | head -1)"
        python3 - <<'PY'
        import json
        import os
        from pathlib import Path

        settings = json.loads((Path(os.environ["HOME"]) / ".claude" / "settings.json").read_text())
        enabled = settings.get("sandbox", {}).get("enableWeakerNestedSandbox")
        print(f"claude sandbox weaker nested mode: {enabled}")
        PY
