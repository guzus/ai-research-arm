name: ARA agent run
description: Run a Claude-Code-compatible agent through native Claude, Fireworks, or Z.ai and optionally require committed output.

inputs:
  lane:
    description: Lane key in data/agent-backends.json (the routing SSOT). The lane's backend is resolved at runtime, so editing that file re-routes the lane with no workflow change.
    required: false
    default: ""
  backend:
    description: Explicit backend override (claude, fireworks-glm-5p2, zai-glm-5p2, fireworks-deepseek-v4-flash, glm-5p2, deepseek-v4-flash). Bypasses the lane lookup. CI BANS explicit backends in committed workflows (build_backend_matrix.py cross-check) — this input exists only for manual/emergency composite invocation outside CI-checked workflows.
    required: false
    default: ""
  claude-code-oauth-token:
    description: Claude Code OAuth token. Required by claude-code-action, even for Fireworks-routed runs.
    required: true
  fireworks-api-key:
    description: Fireworks API key for Fireworks-routed backends.
    required: false
    default: ""
  zai-api-key:
    description: Z.ai Coding Plan API key for Z.ai-routed Claude Code runs.
    required: false
    default: ""
  fireworks-fallback:
    description: Fallback policy. claude (default) = walk the ordered fallback.chain from data/agent-backends.json when the requested provider is unavailable; none = strict, the requested backend is the only candidate.
    required: false
    default: claude
  claude-args:
    description: Arguments passed to claude-code-action.
    required: true
  prompt:
    description: Prompt passed to claude-code-action.
    required: true
  expected-paths:
    description: Optional newline-delimited git pathspecs that must change between pre-run HEAD and post-run HEAD.
    required: false
    default: ""
  allowed-paths:
    description: Optional newline-delimited git pathspecs that are allowed to change between pre-run HEAD and post-run HEAD. Defaults to expected-paths.
    required: false
    default: ""
  label:
    description: Human-readable label for logs and output guard annotations.
    required: false
    default: agent run
  allowed-bots:
    description: Optional allowed_bots value for claude-code-action.
    required: false
    default: ""
  native-model:
    description: Override for the model served when the effective backend is native Claude (direct requests and Fireworks fallback). Empty = the global fallback.native_model from data/agent-backends.json. The claude-args `--model opus` alias resolves to this.
    required: false
    default: ""

outputs:
  pre-sha:
    description: HEAD before the agent ran.
    value: ${{ steps.pre.outputs.sha }}
  post-sha:
    description: HEAD after the agent ran.
    value: ${{ steps.post.outputs.sha }}
  backend:
    description: Normalized requested backend selector.
    value: ${{ steps.select.outputs.requested-backend }}
  effective-backend:
    description: Backend actually used after walking the SSOT fallback chain.
    value: ${{ steps.select.outputs.backend }}
  used-fallback:
    description: "true when the requested backend was unavailable and a chain candidate was selected"
    value: ${{ steps.select.outputs.used-fallback }}
  model-id:
    description: Provider model id of the EFFECTIVE backend (empty on the native path — see native-model resolution).
    value: ${{ steps.select.outputs.model-id }}
  native-model:
    description: Resolved native Claude model (what the `--model opus` alias serves on the native path — the native-model input, else the SSOT's global fallback.native_model).
    value: ${{ steps.select.outputs.native-model }}
  execution-file:
    description: Path to the Claude Code execution transcript JSON reported by whichever provider step ran (empty when the run step failed before reporting one). Callers that need it after a later agent-run call in the same job must copy it immediately — the underlying action reuses the same RUNNER_TEMP path.
    value: ${{ steps.run-claude.outputs.execution_file || steps.run-claude-bots.outputs.execution_file || steps.run-fireworks.outputs.execution_file || steps.run-fireworks-bots.outputs.execution_file || steps.run-zai.outputs.execution_file || steps.run-zai-bots.outputs.execution_file }}
  changed:
    description: "true when expected-paths were provided and changed"
    value: ${{ steps.guard.outputs.changed }}
  changed-files:
    description: Newline-delimited changed files under expected paths.
    value: ${{ steps.guard.outputs.changed-files }}
  diff-in-scope:
    description: "true when every committed changed file is under allowed paths"
    value: ${{ steps.scope.outputs.in-scope }}
  violating-files:
    description: Newline-delimited committed changed files outside allowed paths.
    value: ${{ steps.scope.outputs.violating-files }}

runs:
  using: composite
  steps:
    - name: Capture pre-run HEAD
      id: pre
      shell: bash
      run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

    # Routing SSOT: scripts/select_backend.py resolves the lane's backend
    # from data/agent-backends.json, probes the requested provider, and on
    # unavailability walks the ordered fallback.chain — first available
    # candidate wins. Strict lanes / fireworks-fallback=none skip the chain.
    # No input at all is a hard error — never a silent default.
    - name: Select backend (SSOT lane + ordered fallback chain)
      id: select
      shell: bash
      env:
        LANE: ${{ inputs.lane }}
        BACKEND_OVERRIDE: ${{ inputs.backend }}
        NATIVE_MODEL_OVERRIDE: ${{ inputs.native-model }}
        FALLBACK_POLICY: ${{ inputs.fireworks-fallback }}
        FIREWORKS_API_KEY: ${{ inputs.fireworks-api-key }}
        ZAI_API_KEY: ${{ inputs.zai-api-key }}
      run: |
        set -euo pipefail
        args=(--github-output "$GITHUB_OUTPUT" --fallback-policy "${FALLBACK_POLICY:-claude}")
        if [ -n "$BACKEND_OVERRIDE" ]; then
          if [ -n "$LANE" ]; then
            echo "::notice::agent-run lane '$LANE' overridden by explicit backend '$BACKEND_OVERRIDE'"
          fi
          args+=(--backend "$BACKEND_OVERRIDE")
        elif [ -n "$LANE" ]; then
          args+=(--lane "$LANE")
        else
          echo "::error::agent-run requires a 'lane' (see data/agent-backends.json) or an explicit 'backend' input."
          exit 1
        fi
        if [ -n "$NATIVE_MODEL_OVERRIDE" ]; then
          args+=(--native-model-override "$NATIVE_MODEL_OVERRIDE")
        fi
        python3 scripts/select_backend.py "${args[@]}"

    - name: Setup Claude sandbox
      uses: ./.github/actions/setup-claude-sandbox

    # Native-Claude runs (requested backend=claude or Fireworks fallback)
    # serve the resolved native model (native-model input, else the SSOT's
    # global fallback.native_model): the workflows' `--model opus` alias is
    # remapped the same way the Fireworks steps below remap it to the
    # profile model. Haiku alias is left alone so cheap subagent calls
    # stay cheap.
    - name: Run agent with Claude
      id: run-claude
      if: steps.select.outputs.provider == 'claude' && inputs.allowed-bots == ''
      uses: anthropics/claude-code-action@v1
      env:
        ANTHROPIC_MODEL: ${{ steps.select.outputs.native-model }}
        ANTHROPIC_DEFAULT_OPUS_MODEL: ${{ steps.select.outputs.native-model }}
        ARA_AGENT_BACKEND: claude
        ARA_AGENT_MODEL_ID: ${{ steps.select.outputs.native-model }}
      with:
        claude_code_oauth_token: ${{ inputs.claude-code-oauth-token }}
        claude_args: ${{ inputs.claude-args }}
        prompt: ${{ inputs.prompt }}

    - name: Run agent with Claude
      id: run-claude-bots
      if: steps.select.outputs.provider == 'claude' && inputs.allowed-bots != ''
      uses: anthropics/claude-code-action@v1
      env:
        ANTHROPIC_MODEL: ${{ steps.select.outputs.native-model }}
        ANTHROPIC_DEFAULT_OPUS_MODEL: ${{ steps.select.outputs.native-model }}
        ARA_AGENT_BACKEND: claude
        ARA_AGENT_MODEL_ID: ${{ steps.select.outputs.native-model }}
      with:
        claude_code_oauth_token: ${{ inputs.claude-code-oauth-token }}
        allowed_bots: ${{ inputs.allowed-bots }}
        claude_args: ${{ inputs.claude-args }}
        prompt: ${{ inputs.prompt }}

    - name: Run agent with Fireworks
      id: run-fireworks
      if: steps.select.outputs.provider == 'fireworks' && inputs.allowed-bots == ''
      uses: anthropics/claude-code-action@v1
      env:
        ANTHROPIC_BASE_URL: https://api.fireworks.ai/inference
        ANTHROPIC_API_KEY: ${{ inputs.fireworks-api-key }}
        ANTHROPIC_AUTH_TOKEN: ${{ inputs.fireworks-api-key }}
        ANTHROPIC_MODEL: ${{ steps.select.outputs.model-id }}
        ANTHROPIC_DEFAULT_OPUS_MODEL: ${{ steps.select.outputs.model-id }}
        ANTHROPIC_DEFAULT_SONNET_MODEL: ${{ steps.select.outputs.model-id }}
        ANTHROPIC_DEFAULT_HAIKU_MODEL: ${{ steps.select.outputs.model-id }}
        CLAUDE_CODE_SUBAGENT_MODEL: ${{ steps.select.outputs.model-id }}
        CLAUDE_CODE_EFFORT_LEVEL: max
        ARA_AGENT_BACKEND: ${{ steps.select.outputs.backend }}
        ARA_AGENT_MODEL_ID: ${{ steps.select.outputs.model-id }}
      with:
        claude_code_oauth_token: ${{ inputs.claude-code-oauth-token }}
        claude_args: ${{ inputs.claude-args }}
        prompt: ${{ inputs.prompt }}

    - name: Run agent with Fireworks
      id: run-fireworks-bots
      if: steps.select.outputs.provider == 'fireworks' && inputs.allowed-bots != ''
      uses: anthropics/claude-code-action@v1
      env:
        ANTHROPIC_BASE_URL: https://api.fireworks.ai/inference
        ANTHROPIC_API_KEY: ${{ inputs.fireworks-api-key }}
        ANTHROPIC_AUTH_TOKEN: ${{ inputs.fireworks-api-key }}
        ANTHROPIC_MODEL: ${{ steps.select.outputs.model-id }}
        ANTHROPIC_DEFAULT_OPUS_MODEL: ${{ steps.select.outputs.model-id }}
        ANTHROPIC_DEFAULT_SONNET_MODEL: ${{ steps.select.outputs.model-id }}
        ANTHROPIC_DEFAULT_HAIKU_MODEL: ${{ steps.select.outputs.model-id }}
        CLAUDE_CODE_SUBAGENT_MODEL: ${{ steps.select.outputs.model-id }}
        CLAUDE_CODE_EFFORT_LEVEL: max
        ARA_AGENT_BACKEND: ${{ steps.select.outputs.backend }}
        ARA_AGENT_MODEL_ID: ${{ steps.select.outputs.model-id }}
      with:
        claude_code_oauth_token: ${{ inputs.claude-code-oauth-token }}
        allowed_bots: ${{ inputs.allowed-bots }}
        claude_args: ${{ inputs.claude-args }}
        prompt: ${{ inputs.prompt }}

    - name: Run agent with Z.ai
      id: run-zai
      if: steps.select.outputs.provider == 'zai' && inputs.allowed-bots == ''
      uses: anthropics/claude-code-action@v1
      env:
        ANTHROPIC_BASE_URL: https://api.z.ai/api/anthropic
        ANTHROPIC_AUTH_TOKEN: ${{ inputs.zai-api-key }}
        ANTHROPIC_MODEL: ${{ steps.select.outputs.model-id }}
        ANTHROPIC_DEFAULT_OPUS_MODEL: ${{ steps.select.outputs.model-id }}
        ANTHROPIC_DEFAULT_SONNET_MODEL: ${{ steps.select.outputs.model-id }}
        ANTHROPIC_DEFAULT_HAIKU_MODEL: ${{ steps.select.outputs.model-id }}
        CLAUDE_CODE_SUBAGENT_MODEL: ${{ steps.select.outputs.model-id }}
        CLAUDE_CODE_EFFORT_LEVEL: max
        CLAUDE_CODE_AUTO_COMPACT_WINDOW: "1000000"
        API_TIMEOUT_MS: "3000000"
        ARA_AGENT_BACKEND: ${{ steps.select.outputs.backend }}
        ARA_AGENT_MODEL_ID: ${{ steps.select.outputs.model-id }}
      with:
        claude_code_oauth_token: ${{ inputs.claude-code-oauth-token }}
        claude_args: ${{ inputs.claude-args }}
        prompt: ${{ inputs.prompt }}

    - name: Run agent with Z.ai
      id: run-zai-bots
      if: steps.select.outputs.provider == 'zai' && inputs.allowed-bots != ''
      uses: anthropics/claude-code-action@v1
      env:
        ANTHROPIC_BASE_URL: https://api.z.ai/api/anthropic
        ANTHROPIC_AUTH_TOKEN: ${{ inputs.zai-api-key }}
        ANTHROPIC_MODEL: ${{ steps.select.outputs.model-id }}
        ANTHROPIC_DEFAULT_OPUS_MODEL: ${{ steps.select.outputs.model-id }}
        ANTHROPIC_DEFAULT_SONNET_MODEL: ${{ steps.select.outputs.model-id }}
        ANTHROPIC_DEFAULT_HAIKU_MODEL: ${{ steps.select.outputs.model-id }}
        CLAUDE_CODE_SUBAGENT_MODEL: ${{ steps.select.outputs.model-id }}
        CLAUDE_CODE_EFFORT_LEVEL: max
        CLAUDE_CODE_AUTO_COMPACT_WINDOW: "1000000"
        API_TIMEOUT_MS: "3000000"
        ARA_AGENT_BACKEND: ${{ steps.select.outputs.backend }}
        ARA_AGENT_MODEL_ID: ${{ steps.select.outputs.model-id }}
      with:
        claude_code_oauth_token: ${{ inputs.claude-code-oauth-token }}
        allowed_bots: ${{ inputs.allowed-bots }}
        claude_args: ${{ inputs.claude-args }}
        prompt: ${{ inputs.prompt }}

    - name: Clean sandbox probe
      shell: bash
      run: rm -f .tmp-sandbox-probe.txt

    - name: Commit expected-path changes
      if: inputs.expected-paths != ''
      shell: bash
      env:
        EXPECTED_PATHS: ${{ inputs.expected-paths }}
        ALLOWED_PATHS: ${{ inputs.allowed-paths }}
        LABEL: ${{ inputs.label }}
        PRE_SHA: ${{ steps.pre.outputs.sha }}
      run: |
        set -euo pipefail

        paths="$ALLOWED_PATHS"
        if [ -z "$paths" ]; then
          paths="$EXPECTED_PATHS"
        fi

        pathspecs=()
        while IFS= read -r pathspec; do
          pathspec="${pathspec#"${pathspec%%[![:space:]]*}"}"
          pathspec="${pathspec%"${pathspec##*[![:space:]]}"}"
          [ -z "$pathspec" ] && continue
          pathspecs+=("$pathspec")
        done <<< "$paths"

        if [ "${#pathspecs[@]}" -eq 0 ]; then
          exit 0
        fi

        # Research outputs are public artifacts, never hidden scratch files.
        # Reject diagnostic probes before staging so a failed sandbox check
        # cannot satisfy the output contract or be auto-merged as lane data.
        hidden_outputs=()
        add_hidden_output() {
          local candidate="$1"
          local existing
          for existing in "${hidden_outputs[@]}"; do
            [ "$existing" = "$candidate" ] && return
          done
          hidden_outputs+=("$candidate")
        }
        inspect_output_path() {
          local candidate="$1"
          local component
          local components=()
          IFS='/' read -r -a components <<< "$candidate"
          for component in "${components[@]}"; do
            if [[ "$component" == .* ]]; then
              add_hidden_output "$candidate"
              return
            fi
          done
        }
        while IFS= read -r -d '' candidate; do
          inspect_output_path "$candidate"
        done < <(
          {
            git ls-files --others --modified --exclude-standard -z -- "${pathspecs[@]}"
            git diff --name-only -z "${PRE_SHA}..HEAD" -- "${pathspecs[@]}"
          }
        )
        if [ "${#hidden_outputs[@]}" -gt 0 ]; then
          echo "::error::${LABEL} produced hidden diagnostic file(s); refusing to commit them:"
          printf '  - %s\n' "${hidden_outputs[@]}"
          exit 1
        fi

        git add -- "${pathspecs[@]}"
        if git diff --cached --quiet -- "${pathspecs[@]}"; then
          echo "${LABEL} left no uncommitted changes under allowed output path(s)."
          exit 0
        fi

        git commit -m "${LABEL} output"

    - name: Capture post-run HEAD
      id: post
      shell: bash
      run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

    - name: Resolve allowed diff paths
      id: allowed
      if: inputs.expected-paths != ''
      shell: bash
      env:
        EXPECTED_PATHS: ${{ inputs.expected-paths }}
        ALLOWED_PATHS: ${{ inputs.allowed-paths }}
      run: |
        set -euo pipefail
        paths="$ALLOWED_PATHS"
        if [ -z "$paths" ]; then
          paths="$EXPECTED_PATHS"
        fi
        {
          echo "paths<<__ALLOWED_PATHS__"
          echo "$paths"
          echo "__ALLOWED_PATHS__"
        } >> "$GITHUB_OUTPUT"

    - name: Require committed output
      id: guard
      if: inputs.expected-paths != ''
      uses: ./.github/actions/require-output
      with:
        base-sha: ${{ steps.pre.outputs.sha }}
        expected-paths: ${{ inputs.expected-paths }}
        label: ${{ inputs.label }}

    - name: Require committed diff scope
      id: scope
      if: inputs.expected-paths != ''
      uses: ./.github/actions/require-diff-scope
      with:
        base-sha: ${{ steps.pre.outputs.sha }}
        allowed-paths: ${{ steps.allowed.outputs.paths }}
        label: ${{ inputs.label }}
