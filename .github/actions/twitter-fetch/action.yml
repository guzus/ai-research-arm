name: Twitter fetch (bird CLI + birdy multi-fetch)
description: >
  Install bird CLI + birdy, fetch the unified Twitter snapshot (handles +
  searches + news) via birdy multi-fetch into /tmp/bird/, optionally
  pre-filter zero-engagement noise from search results, and (optionally)
  build an aggregated /tmp/bird/all.json. Shared across the Twitter
  backend tiers (claude, deepseek-claude-code, deepseek-pi, fireworks-pi) — the per-tier
  workflow controls behavior via the inputs below.

inputs:
  bird_auth_token:
    description: BIRD_AUTH_TOKEN secret value (for birdy stateless auth).
    required: true
  bird_ct0:
    description: BIRD_CT0 secret value (for birdy stateless auth).
    required: true
  github_token:
    description: GITHUB_TOKEN (used only to follow GitHub release redirects).
    required: true
  concurrency:
    description: birdy multi-fetch internal parallelism. 8 is the historical claude default, 6 is the historical deepseek default.
    required: false
    default: '8'
  pre_filter:
    description: >
      Drop search-*.json tweets with zero engagement older than 30min.
      Historically only the deepseek-claude-code tier enabled this — leave 'false'
      to preserve verbatim behavior for other tiers.
    required: false
    default: 'false'
  aggregate:
    description: >
      Write a single /tmp/bird/all.json with {accounts, searches, news, meta}
      so the LLM can read 1 file instead of ~70. Purely additive — per-id
      files are still written. Historically only the claude tier enabled
      this.
    required: false
    default: 'false'
  free_disk:
    description: Run the self-hosted-runner disk-cleanup step first (claude tier had a more aggressive version).
    required: false
    default: 'true'

runs:
  using: composite
  steps:
    - name: Free disk space on runner
      if: ${{ inputs.free_disk == 'true' }}
      shell: bash
      run: |
        # The self-hosted runner can fill up if old workflow workdirs / apt
        # caches accumulate. Cheap, safe cleanup before the rest of the
        # steps download anything. Best-effort — never fails the job.
        echo "Disk before:"
        df -h / 2>&1 | tail -2
        sudo apt-get clean -y >/dev/null 2>&1 || true
        sudo rm -rf /var/log/journal/* 2>/dev/null || true
        sudo find /tmp -mindepth 1 -maxdepth 1 -mtime +1 -exec rm -rf {} + 2>/dev/null || true
        # Old runner _diag logs (have crashed a previous run with "No space left on device")
        sudo find /opt/actions-runner -name "_diag" -type d -exec sh -c 'find "$1" -name "*.log" -mtime +1 -delete' _ {} \; 2>/dev/null || true
        sudo journalctl --vacuum-time=2d >/dev/null 2>&1 || true
        echo "Disk after:"
        df -h / 2>&1 | tail -2

    - name: Install bird CLI
      # pinned 2026-05-17 (matches PR #41 dep-pinning); bump manually
      shell: bash
      run: npm install -g @steipete/bird@0.8.0

    - name: Install birdy from GitHub release
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github_token }}
      run: |
        # Download pre-built birdy binary from the latest release — avoids
        # needing Go toolchain (~150MB) on the self-hosted runner. The
        # v0.9.0+ release includes the `multi-fetch` command.
        set -e

        OS=$(uname -s | tr '[:upper:]' '[:lower:]')
        ARCH=$(uname -m)
        case "$ARCH" in
          x86_64|amd64) ARCH=amd64 ;;
          arm64|aarch64) ARCH=arm64 ;;
        esac
        ASSET="birdy_${OS}_${ARCH}.tar.gz"

        TMPDIR=$(mktemp -d)
        trap 'rm -rf "$TMPDIR"' EXIT

        # Public repo, no auth needed — but use gh if available for redirect handling
        curl -fsSL "https://github.com/guzus/birdy/releases/latest/download/${ASSET}" -o "$TMPDIR/$ASSET"
        tar -xzf "$TMPDIR/$ASSET" -C "$TMPDIR"

        BIN="$TMPDIR/birdy"
        [ -f "$BIN" ] || BIN="$TMPDIR/birdy_${OS}_${ARCH}"
        if [ ! -f "$BIN" ]; then
          echo "Could not find birdy binary in release tarball"
          ls "$TMPDIR" >&2
          exit 1
        fi

        INSTALL_DIR="$HOME/.local/bin"
        mkdir -p "$INSTALL_DIR"
        install -m 755 "$BIN" "$INSTALL_DIR/birdy"
        echo "$INSTALL_DIR" >> "$GITHUB_PATH"
        export PATH="$INSTALL_DIR:$PATH"

        birdy version 2>&1 | head -3 || echo "(birdy installed)"

    - name: Fetch tweets, searches, and news via birdy multi-fetch
      shell: bash
      env:
        # birdy's stateless account injection — no ~/.config/birdy file
        # needed in CI. The store auto-loads BIRDY_ACCOUNTS on Open().
        BIRDY_ACCOUNTS: '[{"name":"ci","auth_token":"${{ inputs.bird_auth_token }}","ct0":"${{ inputs.bird_ct0 }}"}]'
        FETCH_CONCURRENCY: ${{ inputs.concurrency }}
      run: |
        mkdir -p /tmp/bird

        # ── Unified handle list (superset across all three tiers) ───────
        # AI Labs & Company accounts. Includes AIatMeta (real Meta AI
        # account; @MetaAI is largely inactive) and ClaudeDevs (official
        # Anthropic developer announcements) — added 2026-05-01 in the
        # claude tier. We keep them on all tiers now that the workflows
        # are unified.
        labs="OpenAI AnthropicAI GoogleAI GoogleDeepMind MistralAI MetaAI AIatMeta CohereAI AI21Labs StabilityAI HuggingFace NVIDIAAIDev ClaudeDevs"

        # Hyperscalers — top execs and key insiders. Includes
        # ilyasut, alexandr_wang, OriolVinyalsML, woj_zaremba (claude-tier
        # 2026-05-01 additions).
        hyperscalers="elonmusk sama demishassabis OfficialLoganK alexalbert__ DrJimFan tszzl ilyasut alexandr_wang OriolVinyalsML woj_zaremba"

        # Others — researchers, analysts, specialists, media. Includes
        # jeremyphoward, soumithchintala, giffmana, arankomatsuzaki,
        # percyliang, JonathanRoss321, hendrycks (claude-tier 2026-05-01
        # additions from anchor-following discovery).
        others="karpathy iruletheworldmo AndrewCurran_ fi56622380 jukan05 vitrupo dejavucoder jiratickets SemiAnalysis_ benthompson theinformation GavinSBaker mark_k ns123abc kimmonismus _akhaliq simonw emollick testingcatalog rasbt skirano jackclarkSF ylecun hardmaru JeffDean AravSrinivas deedydas swyx TheAITimeline levelsio steipete mckaywrigley nutlope rauchg amasad geoffreylitt jxnlco danshipper andreasklinger nikitabier tibo_maker marclou shl dharmesh jeremyphoward soumithchintala giffmana arankomatsuzaki percyliang JonathanRoss321 hendrycks"

        # Build the manifest via Python (avoids jq's multi-line quoting
        # issues inside YAML literal blocks): 50+ user-tweets ops + 7
        # keyword searches + news. All ops run in parallel inside one Go
        # process via birdy multi-fetch.
        export HANDLES="$labs $hyperscalers $others"
        export FETCH_CONCURRENCY
        python3 -c '
        import json, os
        handles = os.environ["HANDLES"].split()
        concurrency = int(os.environ.get("FETCH_CONCURRENCY", "8"))
        ops = [
            {"id": h, "args": ["user-tweets", "@" + h, "-n", "20", "--json", "--plain"]}
            for h in handles if h
        ] + [
            {"id": "search-ai",         "args": ["search", "AI announcement OR new model release OR GPT OR Claude OR Gemini OR Llama", "-n", "50", "--json", "--plain"]},
            {"id": "search-extra",      "args": ["search", "AI breakthrough OR AI launch OR AI update OR foundation model", "-n", "30", "--json", "--plain"]},
            {"id": "search-research",   "args": ["search", "AI paper OR machine learning research OR new benchmark OR state of the art SOTA", "-n", "30", "--json", "--plain"]},
            {"id": "search-infra",      "args": ["search", "AI chip OR GPU cluster OR AI infrastructure OR NVIDIA H100 OR TPU", "-n", "20", "--json", "--plain"]},
            {"id": "search-policy",     "args": ["search", "AI regulation OR AI safety OR AI policy OR AI governance OR AI alignment", "-n", "20", "--json", "--plain"]},
            {"id": "search-business",   "args": ["search", "AI startup funding OR AI acquisition OR AI valuation OR AI partnership", "-n", "20", "--json", "--plain"]},
            {"id": "search-opensource", "args": ["search", "open source AI OR open weights OR AI API OR AI developer tools", "-n", "20", "--json", "--plain"]},
            {"id": "news",              "args": ["news", "--ai-only", "-n", "40", "--json", "--plain"]},
        ]
        with open("/tmp/manifest.json", "w") as f:
            json.dump({"operations": ops, "concurrency": concurrency}, f)
        print(f"Built manifest: {len(ops)} ops, concurrency={concurrency}")
        '

        echo "Manifest: $(jq '.operations | length' /tmp/manifest.json) ops, concurrency=$(jq '.concurrency' /tmp/manifest.json)"

        # Single CLI invocation, parallel internally. birdy writes
        # /tmp/bird/<id>.json for each op (and '[]' on op-level failure
        # so downstream LLMs that read empty arrays still work).
        birdy multi-fetch --manifest /tmp/manifest.json --output-dir /tmp/bird

    - name: Pre-filter search JSON to drop low-signal tweets
      if: ${{ inputs.pre_filter == 'true' }}
      shell: bash
      run: |
        # v3 engagement-floor filter with the CORRECT bird CLI field names
        # (verified via diagnostic dump in run 24981373124):
        #   likeCount, retweetCount, replyCount  (camelCase, not snake_case)
        #   createdAt format: "Mon Apr 27 07:09:16 +0000 2026" (legacy Twitter,
        #     NOT ISO 8601 — needs strptime "%a %b %d %H:%M:%S %z %Y")
        #
        # TZ=UTC is required: jq's mktime treats broken-down time as local-time
        # by default, which produced a +9h skew on KST runners and would silently
        # misclassify recency on any non-UTC runner.
        #
        # Filter rule: drop a search-*.json tweet only when ALL of:
        #   - likeCount = 0, retweetCount = 0, replyCount = 0
        #   - createdAt parses to a time at least 30 minutes ago
        #     (or createdAt is missing/unparseable — treat as old)
        # Recency grace keeps fresh tweets that haven't accumulated engagement.
        # news.json is left alone — it's trending topics, schema differs.
        # Per-account JSON files (curated handles) also pass through raw.

        export TZ=UTC
        CUTOFF_EPOCH=$(date -u -d '30 minutes ago' +%s)

        # One-line schema sanity check (protects against future bird upgrades
        # that rename fields again).
        first_search=$(ls /tmp/bird/search-*.json 2>/dev/null | head -1)
        if [ -n "$first_search" ]; then
          sample_keys=$(jq -r '.[0] // {} | keys | join(",")' "$first_search" 2>/dev/null)
          echo "Schema check ($first_search): $sample_keys"
        fi

        total_before=0
        total_after=0

        for f in /tmp/bird/search-*.json; do
          [ -f "$f" ] || continue

          before=$(jq 'length' "$f" 2>/dev/null || echo 0)
          total_before=$((total_before + before))

          tmp="${f}.filtered"

          if jq --argjson cutoff "$CUTOFF_EPOCH" '
            [
              .[] | select(
                (
                  ((.likeCount // 0) == 0)
                  and ((.retweetCount // 0) == 0)
                  and ((.replyCount // 0) == 0)
                  and (
                    (.createdAt // "" |
                      if . == "" then 0
                      else (try (strptime("%a %b %d %H:%M:%S %z %Y") | mktime) catch 0)
                      end
                    ) < $cutoff
                  )
                ) | not
              )
            ]
          ' "$f" > "$tmp" 2>/dev/null && [ -s "$tmp" ]; then
            after=$(jq 'length' "$tmp")
            total_after=$((total_after + after))
            mv "$tmp" "$f"
            printf "  %-30s %3d → %3d  (-%d)\n" "$(basename "$f")" "$before" "$after" "$((before - after))"
          else
            rm -f "$tmp"
            printf "  %-30s filter failed, kept original (%d)\n" "$(basename "$f")" "$before"
            total_after=$((total_after + before))
          fi
        done

        if [ "$total_before" -gt 0 ]; then
          pct=$(( (total_before - total_after) * 100 / total_before ))
        else
          pct=0
        fi
        echo ""
        echo "Pre-filter summary: $total_before → $total_after tweets (-${pct}%)"

    - name: Aggregate bird JSONs into a single all.json
      if: ${{ inputs.aggregate == 'true' }}
      shell: bash
      run: |
        # Claude was doing 70 sequential Read tool calls (one per /tmp/bird/*.json),
        # each turn paying ~300ms round-trip. Consolidating into one structured
        # file with provenance reduces reads to 1, saving ~15-20s per run plus
        # cutting the total turn count.
        #
        # Purely additive: per-id files are kept in place for follow-up
        # inspection. Output schema:
        #   {
        #     "accounts":  {"OpenAI": [...], "sama": [...], ...},
        #     "searches":  {"ai": [...], "extra": [...], "news": [...], ...},
        #     "news":      [...],
        #     "meta":      {"total_tweets": N, "non_empty_accounts": M, "generated_at": "..."}
        #   }
        python3 -c '
        import json
        from pathlib import Path
        from datetime import datetime, timezone

        bird = Path("/tmp/bird")
        accounts, searches, news = {}, {}, []
        total = 0
        non_empty_accounts = 0

        for f in sorted(bird.glob("*.json")):
            if f.name in ("all.json", "manifest.json"):
                continue
            try:
                data = json.loads(f.read_text() or "[]")
            except Exception:
                continue
            name = f.stem
            if name == "news":
                news = data if isinstance(data, list) else []
                total += len(news)
            elif name.startswith("search-"):
                key = name.removeprefix("search-")
                searches[key] = data if isinstance(data, list) else []
                total += len(searches[key])
            else:
                arr = data if isinstance(data, list) else []
                accounts[name] = arr
                total += len(arr)
                if arr:
                    non_empty_accounts += 1

        out = {
            "accounts": accounts,
            "searches": searches,
            "news": news,
            "meta": {
                "total_tweets": total,
                "non_empty_accounts": non_empty_accounts,
                "monitored_accounts": len(accounts),
                "search_categories": len(searches),
                "trending_news_items": len(news),
                "generated_at": datetime.now(timezone.utc).isoformat(),
            },
        }
        (bird / "all.json").write_text(json.dumps(out, separators=(",", ":")))
        print(f"Aggregated: {len(accounts)} accounts ({non_empty_accounts} non-empty), "
              f"{len(searches)} searches, {len(news)} news items, "
              f"{total} tweets total")
        '
        echo "all.json size: $(wc -c < /tmp/bird/all.json) bytes"
