name: Hooker workflow telemetry
description: Publish a compact GitHub Actions status event to Hooker.

inputs:
  topic:
    description: Hooker topic to publish into.
    required: false
    default: ara-telemetry
  status:
    description: Final job or workflow status.
    required: false
    default: unknown
  title:
    description: Optional message title.
    required: false
    default: ""
  text:
    description: Optional additional message text.
    required: false
    default: ""
  tags:
    description: Comma-separated extra tags.
    required: false
    default: ""
  priority:
    description: Hooker priority, 1-5. Defaults from status.
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Publish telemetry
      shell: bash
      env:
        HOOKER_TOPIC: ${{ inputs.topic }}
        TELEMETRY_STATUS: ${{ inputs.status }}
        TELEMETRY_TITLE: ${{ inputs.title }}
        TELEMETRY_TEXT: ${{ inputs.text }}
        TELEMETRY_TAGS: ${{ inputs.tags }}
        TELEMETRY_PRIORITY: ${{ inputs.priority }}
      run: |
        set -euo pipefail
        token="${HOOKER_TOKEN:-${HOOKER_API_KEY:-}}"
        if [ -z "${token}" ]; then
          echo "Hooker telemetry skipped: HOOKER_TOKEN/HOOKER_API_KEY is not configured"
          exit 0
        fi
        hooker_url="${HOOKER_URL:-https://hooker.guzus.xyz}"
        hooker_topic="${HOOKER_TOPIC:-ara-telemetry}"
        payload_dir="${RUNNER_TEMP:-${TMPDIR:-/tmp}}"
        export HOOKER_PAYLOAD_PATH="$payload_dir/hooker-workflow-telemetry.json"
        export HOOKER_IDEMPOTENCY_PATH="$payload_dir/hooker-workflow-telemetry.idempotency"

        if ! python3 - <<'PY'
        import json
        import os
        from pathlib import Path

        def env(name: str, default: str = "") -> str:
            return os.environ.get(name, default).strip()

        status = env("TELEMETRY_STATUS", "unknown")
        workflow = env("GITHUB_WORKFLOW", "GitHub Actions")
        job = env("GITHUB_JOB", "")
        run_id = env("GITHUB_RUN_ID", "")
        run_attempt = env("GITHUB_RUN_ATTEMPT", "")
        repo = env("GITHUB_REPOSITORY", "")
        server = env("GITHUB_SERVER_URL", "https://github.com").rstrip("/")
        run_url = f"{server}/{repo}/actions/runs/{run_id}" if repo and run_id else ""
        priority = env("TELEMETRY_PRIORITY")
        if not priority:
            priority = "3" if status == "success" else "5"

        tags = ["ara", "workflow", status]
        tags.extend(t.strip() for t in env("TELEMETRY_TAGS").split(",") if t.strip())
        tags.append(env("GITHUB_EVENT_NAME", "event"))

        title = env("TELEMETRY_TITLE") or f"{workflow}: {status}"
        text_lines = [
            f"Status: {status}",
            f"Workflow: {workflow}",
            f"Job: {job or '(single job)'}",
            f"Event: {env('GITHUB_EVENT_NAME')}",
            f"Ref: {env('GITHUB_REF_NAME') or env('GITHUB_REF')}",
            f"SHA: {env('GITHUB_SHA')}",
            f"Actor: {env('GITHUB_ACTOR')}",
            f"Run: {run_url}",
        ]
        extra_text = env("TELEMETRY_TEXT")
        if extra_text:
            text_lines.extend(["", extra_text])

        payload = {
            "status": status,
            "workflow": workflow,
            "job": job,
            "event": env("GITHUB_EVENT_NAME"),
            "repository": repo,
            "ref": env("GITHUB_REF"),
            "ref_name": env("GITHUB_REF_NAME"),
            "sha": env("GITHUB_SHA"),
            "actor": env("GITHUB_ACTOR"),
            "run_id": run_id,
            "run_attempt": run_attempt,
            "run_url": run_url,
            "topic": env("HOOKER_TOPIC", "ara-telemetry"),
        }
        body = {
            "title": title,
            "text": "\n".join(text_lines),
            "priority": int(priority),
            "tags": sorted(set(t for t in tags if t)),
            "parse_mode": "HTML",
            "payload": payload,
        }
        if run_url:
            body["reply_markup"] = {"inline_keyboard": [[{"text": "GitHub run", "url": run_url}]]}

        Path(env("HOOKER_PAYLOAD_PATH")).write_text(json.dumps(body))
        Path(env("HOOKER_IDEMPOTENCY_PATH")).write_text(
            f"ara-telemetry-{run_id}-{run_attempt}-{job}-{status}"
        )
        PY
        then
          echo "::warning::Hooker telemetry payload build failed; skipping"
          exit 0
        fi

        if ! curl -sS --fail-with-body -X POST "${hooker_url%/}/publish/$hooker_topic" \
          -H "Authorization: Bearer $token" \
          -H "Content-Type: application/json" \
          -H "Idempotency-Key: $(cat "$HOOKER_IDEMPOTENCY_PATH")" \
          --data-binary "@$HOOKER_PAYLOAD_PATH"; then
          echo "::warning::Hooker telemetry publish failed; continuing"
        fi
