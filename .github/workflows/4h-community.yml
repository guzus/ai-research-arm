name: Community AI Digest (HN + Reddit)

on:
  schedule:
    # Run every 4 hours
    - cron: '0 */4 * * *'
  workflow_dispatch:

jobs:
  community-digest:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get current datetime
        id: datetime
        run: |
          echo "date=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT
          echo "timestamp=$(date +'%Y-%m-%d %H:%M UTC')" >> $GITHUB_OUTPUT

      - name: Create MCP Config
        run: |
          cat > /tmp/mcp-config.json << 'EOF'
          {
            "mcpServers": {
              "hackernews": {
                "command": "npx",
                "args": ["-y", "mcp-hackernews"]
              }
            }
          }
          EOF

      - name: Fetch Community AI Discussions
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: |
            --mcp-config /tmp/mcp-config.json
            --allowedTools "Read,Write,Edit,Bash(git:*),WebSearch,mcp__hackernews__*"
          prompt: |
            You are a community AI news curator. Gather TOP AI discussions from Hacker News and Reddit.

            TIMESTAMP: ${{ steps.datetime.outputs.timestamp }}
            DATE: ${{ steps.datetime.outputs.date }}

            ## TASK 1: Hacker News

            Use the Hacker News MCP tools AND WebSearch to find AI stories:
            - Top stories filtered for AI/ML/LLM
            - "site:news.ycombinator.com AI LLM" (recent)
            - "site:news.ycombinator.com Claude GPT Gemini"

            Write to: research/community/${{ steps.datetime.outputs.date }}-hn.md

            FORMAT:
            # Hacker News AI Digest - ${{ steps.datetime.outputs.date }}

            ## ${{ steps.datetime.outputs.timestamp }}

            ### Top Stories
            | Title | Points | Comments | Link |
            |-------|--------|----------|------|

            ### Notable Discussions
            - [Title]: Key insight - [link]

            ## TASK 2: Reddit

            Use WebSearch to find Reddit AI discussions:
            - "site:reddit.com/r/MachineLearning"
            - "site:reddit.com/r/LocalLLaMA"
            - "site:reddit.com/r/artificial"

            Write to: research/community/${{ steps.datetime.outputs.date }}-reddit.md

            FORMAT:
            # Reddit AI Digest - ${{ steps.datetime.outputs.date }}

            ## ${{ steps.datetime.outputs.timestamp }}

            ### r/MachineLearning
            - [Title] - [insight] - [link]

            ### r/LocalLLaMA
            - [Title] - [insight] - [link]

            ### Other Notable
            - [Title] from r/[subreddit] - [link]

            ## FILTERS

            INCLUDE: Model releases, benchmarks, research papers, tools, funding, policy
            SKIP: Memes, beginner questions, old reposts, low-engagement (<10 points)

            ## COMMIT

            After writing both files:
            git add research/community/
            git commit -m "Community digest ${{ steps.datetime.outputs.timestamp }}"

      - name: Push changes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git
          git push || echo "Nothing to push"
