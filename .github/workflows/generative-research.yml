      # Identify the file THIS run produced by diffing HEAD against the
      # snapshot we took before the action. This rejects the "newest file in
      # the directory" heuristic, which would silently attribute the fixture
      # or a previous run's article to a failed run.
      - name: Identify generated file
        id: outfile
        if: always()
        env:
          PRE_SHA: ${{ steps.pre.outputs.sha }}
        run: |
          set -euo pipefail
          HEAD_SHA=$(git rev-parse HEAD)
          if [ "$HEAD_SHA" = "$PRE_SHA" ]; then
            echo "Writer did not commit — no new article in this run."
            echo "has_file=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          NEW_FILES=$(git diff --name-only --diff-filter=A "$PRE_SHA..HEAD" -- 'research/generative/*.html' || true)
          if [ -z "$NEW_FILES" ]; then
            echo "Writer committed but added no research/generative HTML file."
            echo "has_file=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          FILENAME=$(basename "$(printf '%s\n' "$NEW_FILES" | head -n1)")
          echo "file=$FILENAME" >> "$GITHUB_OUTPUT"
          echo "has_file=true" >> "$GITHUB_OUTPUT"
          echo "Generated: research/generative/$FILENAME"

      # The writer commits inside the action sandbox. Publishing is a
      # separate step so we keep push perms in this workflow and don't
      # depend on the action's git wiring. Fail loudly on rebase conflicts
      # (which can happen even with concurrency:false if a label event and
      # a workflow_dispatch race across the queue boundary) and on push
      # rejections (auth / non-fast-forward).
      - name: Push changes
        id: push
        if: steps.outfile.outputs.has_file == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git"

          # Concurrent gen-research / twitter / other writers can land on
          # main while this job runs. Retry the fetch+rebase+push loop a
          # few times; each iteration auto-merges the JSON-array index
          # files (research/generative/index.json and any other research
          # */*.json catalogs) by union-on-slug, since two parallel runs
          # always append different entries to the same array.
          #
          # Only research/generative/index.json is recognised for auto-
          # merge — any other conflicted path aborts with a clear error.

          merge_index_json() {
            local path="$1"
            echo "Auto-merging $path (union by slug)"
            local ours theirs
            ours=$(mktemp); theirs=$(mktemp)
            git show ":2:$path" > "$ours"
            git show ":3:$path" > "$theirs"
            jq -s '
              (.[0] + .[1])
              | unique_by(.slug)
              | sort_by(.created_at)
            ' "$ours" "$theirs" > "$path"
            rm -f "$ours" "$theirs"
            git add "$path"
          }

          ATTEMPTS=0
          MAX_ATTEMPTS=5
          while [ "$ATTEMPTS" -lt "$MAX_ATTEMPTS" ]; do
            ATTEMPTS=$((ATTEMPTS + 1))
            echo "::group::push attempt $ATTEMPTS / $MAX_ATTEMPTS"

            git fetch origin main

            if git rebase origin/main; then
              :
            else
              # rebase paused on conflicts. The only path we know how to
              # safely auto-resolve is research/generative/index.json.
              CONFLICTED=$(git diff --name-only --diff-filter=U | sort -u)
              echo "Conflicted paths:"
              echo "$CONFLICTED"
              if [ "$CONFLICTED" = "research/generative/index.json" ]; then
                merge_index_json "research/generative/index.json"
                if ! git -c core.editor=true rebase --continue; then
                  echo "::error::rebase --continue failed even after JSON merge"
                  git rebase --abort 2>/dev/null || true
                  exit 1
                fi
              else
                echo "::error::Unhandleable conflict on path(s) above"
                git rebase --abort 2>/dev/null || true
                exit 1
              fi
            fi

            if git push origin HEAD:main; then
              echo "::endgroup::"
              echo "Pushed successfully on attempt $ATTEMPTS"
              echo "pushed=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi

            echo "::endgroup::"
            echo "Push rejected (main moved during attempt $ATTEMPTS); retrying"
            sleep $((2 * ATTEMPTS))
          done

          echo "::error::Failed to push after $MAX_ATTEMPTS attempts"
          exit 1

      - name: Post results to issue
        if: always() && github.event_name == 'issues'
        uses: actions/github-script@v7
        env:
          HAS_FILE: ${{ steps.outfile.outputs.has_file }}
          FILE_NAME: ${{ steps.outfile.outputs.file }}
          PUSHED: ${{ steps.push.outputs.pushed }}
          BACKEND: ${{ steps.params.outputs.backend }}
        with:
          script: |
            const hasFile = process.env.HAS_FILE === 'true';
            const pushed = process.env.PUSHED === 'true';
            const filename = process.env.FILE_NAME || '';
            const backend = process.env.BACKEND || '';
            const issueNumber = context.issue.number;
            const repoUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}`;

            let body;
            if (hasFile && pushed && filename) {
              const blobUrl = `${repoUrl}/blob/main/research/generative/${filename}`;
              body = `## 🧪 Generative research complete\n\n` +
                     `Backend: \`${backend}\`\n` +
                     `File: [\`${filename}\`](${blobUrl})\n\n` +
                     `The article will also appear on the dashboard once the deploy workflow runs.`;
            } else if (hasFile && !pushed) {
              body = `## 🧪 Generative research drafted, but push failed\n\n` +
                     `Backend: \`${backend}\`\n` +
                     `File: \`${filename}\` (local to the runner, not published)\n\n` +
                     `Likely cause: a rebase conflict or auth issue. Check the workflow logs and re-run.`;
            } else {
              body = `## 🧪 Generative research finished without a new file\n\n` +
                     `The action did not produce an HTML article in \`research/generative/\`. Check the workflow logs for details.`;
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: body
            });

      - name: Send Telegram notification
        if: success() && steps.outfile.outputs.has_file == 'true' && steps.push.outputs.pushed == 'true'
        continue-on-error: true
        uses: appleboy/telegram-action@221e6b684967abe813051ee4a37dd61770a83ad3
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          format: markdown
          message: |
            🧪 *Generative Research Published*

            📝 Topic: ${{ steps.params.outputs.topic }}
            🤖 Backend: ${{ steps.params.outputs.backend }}

            📄 [View on GitHub](https://github.com/${{ github.repository }}/blob/main/research/generative/${{ steps.outfile.outputs.file }})
