name: Generative Research

# Generative research workflow. Produces a single <article> HTML fragment via
# scripts/write_generative_research.py for the dashboard's "research" tab.
#
# Two entry points:
#   1. Issue labeled `gen-research` — title is the topic, body is the prompt.
#   2. workflow_dispatch — topic/slug/backend/tags are explicit inputs.
#
# Two backends, mutually exclusive at runtime:
#   * claude   — anthropics/claude-code-action@v1 with OAuth (model claude-opus-4-7).
#   * deepseek — same action, but redirected to DeepSeek's Anthropic-compatible
#                endpoint via ANTHROPIC_BASE_URL/ANTHROPIC_AUTH_TOKEN (model
#                deepseek-v4-pro). Mirrors hourly-twitter-deepseek-agentic.yml.
#
# The Python writer commits internally; this workflow only pushes.
#
# SECURITY: Issue title/body are passed through env: into bash, never
# interpolated directly into `run:` blocks. This avoids the classic GitHub
# Actions script-injection class. The action's `prompt:` field receives the
# values as inputs, not as shell, so direct ${{ }} interpolation there is
# string-only.

on:
  issues:
    types: [labeled]
  workflow_dispatch:
    inputs:
      topic:
        description: 'Research topic (required)'
        required: true
        type: string
      slug:
        description: 'URL slug override (optional; defaults to slugified topic)'
        required: false
        type: string
      backend:
        description: 'Which model/backend to run'
        required: false
        default: deepseek-v4-pro
        type: choice
        options:
          - deepseek-v4-pro
          - claude
          - deepseek
      tags:
        description: 'Comma-separated tags (optional)'
        required: false
        type: string

# Per-topic concurrency. Each unique topic gets its own group so a new
# dispatch for a DIFFERENT topic does not cancel a pending run for some
# other topic. GitHub Actions only keeps ONE pending run per concurrency
# group — using a global `generative-research` group would mean every
# new dispatch silently bumps the queue and erases ~30 min of work.
#
# Re-dispatching the SAME topic still collapses to one pending run
# (intentional dedup — usually a duplicate click).
#
# Concurrent in-progress runs are now safe at the data layer: the Push
# step does a union-by-slug merge on research/generative/index.json
# inside a 5-attempt retry loop, so two writers landing simultaneously
# no longer race on the shared JSON array.
concurrency:
  group: generative-research-${{ github.event.inputs.topic || github.event.issue.number || github.run_id }}
  cancel-in-progress: false

jobs:
  generative-research:
    # Run on workflow_dispatch unconditionally; on issues only when the
    # `gen-research` label is added. Without this guard, every label event
    # would queue a job. Mirrors research-issue.yml's pattern, but extended
    # to cover the workflow_dispatch path (where github.event.label is null).
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'issues' && github.event.label.name == 'gen-research')
    runs-on: [self-hosted, Linux]
    permissions:
      contents: write
      issues: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get current date
        id: date
        run: |
          echo "date=$(date +'%Y-%m-%d')" >> "$GITHUB_OUTPUT"
          echo "timestamp=$(date +'%Y-%m-%d-%H%M%S')" >> "$GITHUB_OUTPUT"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      # Derive a unified set of parameters regardless of trigger source.
      # We pass issue title/body through `env:` so embedded backticks, quotes,
      # dollar signs, and newlines do not break the bash parser or enable
      # workflow injection.
      - name: Derive parameters
        id: params
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_TOPIC: ${{ github.event.inputs.topic }}
          INPUT_SLUG: ${{ github.event.inputs.slug }}
          INPUT_BACKEND: ${{ github.event.inputs.backend }}
          INPUT_TAGS: ${{ github.event.inputs.tags }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          set -euo pipefail

          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            TOPIC="$INPUT_TOPIC"
            SLUG="$INPUT_SLUG"
            BACKEND="${INPUT_BACKEND:-deepseek-v4-pro}"
            TAGS="$INPUT_TAGS"
            SOURCE="workflow_dispatch"
            PROMPT="$TOPIC"
          else
            TOPIC="$ISSUE_TITLE"
            SLUG=""
            BACKEND="deepseek-v4-pro"
            TAGS=""
            SOURCE="issue"
            # Default PROMPT to the title; if the body has substantive content
            # (anything beyond the optional `backend:` directive), use the body
            # as the deep research brief. Previously the body was thrown away —
            # users would write a paragraph of context and it was silently
            # ignored.
            PROMPT="$TOPIC"
            if [ -n "${ISSUE_BODY:-}" ]; then
              CANDIDATE=$(printf '%s\n' "$ISSUE_BODY" \
                | grep -iE '^[[:space:]]*backend[[:space:]]*:[[:space:]]*(claude|claude-opus-4-7|deepseek|deepseek-v4-pro)[[:space:]]*$' \
                | head -n1 \
                | sed -E 's/^[[:space:]]*[Bb][Aa][Cc][Kk][Ee][Nn][Dd][[:space:]]*:[[:space:]]*//' \
                | tr -d '[:space:]' \
                | tr '[:upper:]' '[:lower:]' || true)
              case "$CANDIDATE" in
                claude-opus-4-7) CANDIDATE="claude" ;;
                deepseek) CANDIDATE="deepseek-v4-pro" ;;
              esac
              if [ "$CANDIDATE" = "claude" ] || [ "$CANDIDATE" = "deepseek-v4-pro" ]; then
                BACKEND="$CANDIDATE"
              fi
              # Strip the backend: directive line out, keep the rest as the brief.
              CLEAN_BODY=$(printf '%s\n' "$ISSUE_BODY" \
                | grep -ivE '^[[:space:]]*backend[[:space:]]*:[[:space:]]*(claude|claude-opus-4-7|deepseek|deepseek-v4-pro)[[:space:]]*$' \
                | sed -E 's/[[:space:]]+$//' \
                || true)
              # Substantive = any non-whitespace remains after the strip.
              if printf '%s' "$CLEAN_BODY" | grep -q '[^[:space:]]'; then
                PROMPT="$CLEAN_BODY"
              fi
            fi
          fi

          if [ -z "${TOPIC:-}" ]; then
            echo "missing required topic" >&2
            exit 1
          fi

          case "$BACKEND" in
            deepseek) BACKEND="deepseek-v4-pro" ;;
            claude-opus-4-7) BACKEND="claude" ;;
          esac
          if [ "$BACKEND" != "claude" ] && [ "$BACKEND" != "deepseek-v4-pro" ]; then
            echo "unsupported backend/model: $BACKEND" >&2
            exit 1
          fi

          # Echo into outputs. Use heredoc-style block delimiters for fields
          # that may contain special characters.
          {
            echo "topic<<__END_TOPIC__"
            printf '%s\n' "$TOPIC"
            echo "__END_TOPIC__"
            echo "slug=$SLUG"
            echo "backend=$BACKEND"
            echo "tags=$TAGS"
            echo "source=$SOURCE"
            echo "prompt<<__END_PROMPT__"
            printf '%s\n' "$PROMPT"
            echo "__END_PROMPT__"
          } >> "$GITHUB_OUTPUT"

          echo "Resolved params:"
          echo "  topic   = $TOPIC"
          echo "  slug    = ${SLUG:-(derived)}"
          echo "  backend = $BACKEND"
          echo "  tags    = ${TAGS:-(none)}"
          echo "  source  = $SOURCE"

      # Verify the writer's required output directory exists. The writer
      # raises SystemExit if research/generative/ is missing, so failing
      # fast here gives a clearer error than a generic action failure.
      # Also verify the depth-tooling helper scripts are present.
      - name: Verify writer prerequisites
        run: |
          if [ ! -d research/generative ]; then
            echo "research/generative/ is missing — writer will refuse to run" >&2
            exit 1
          fi
          for s in scripts/write_generative_research.py scripts/research_search.py scripts/prior_context.py; do
            if [ ! -f "$s" ]; then
              echo "$s not found" >&2
              exit 1
            fi
          done
          echo "Writer prerequisites OK."

      # Ensure depth tooling is on the runner. The agent uses pdftotext to
      # ingest PDFs (10-Ks, S-1s, papers) and curl to fetch them; both are
      # standard, but the self-hosted runner image isn't guaranteed to have
      # poppler-utils. This step is idempotent — installs only if missing.
      - name: Ensure depth tooling
        run: |
          set -euo pipefail
          MISSING=""
          command -v curl >/dev/null 2>&1 || MISSING="$MISSING curl"
          command -v pdftotext >/dev/null 2>&1 || MISSING="$MISSING poppler-utils"
          if [ -n "$MISSING" ]; then
            echo "Installing:$MISSING"
            if command -v apt-get >/dev/null 2>&1; then
              sudo apt-get update -qq
              # Map our names to apt packages
              for pkg in $MISSING; do
                case "$pkg" in
                  poppler-utils) sudo apt-get install -y -qq poppler-utils ;;
                  curl) sudo apt-get install -y -qq curl ;;
                esac
              done
            else
              echo "WARN: apt-get not available; cannot auto-install$MISSING" >&2
              # Don't hard-fail — the agent can still produce output, just without PDFs
            fi
          fi
          echo "curl:      $(command -v curl || echo MISSING) $(curl --version 2>/dev/null | head -1)"
          echo "pdftotext: $(command -v pdftotext || echo MISSING) $(pdftotext -v 2>&1 | head -1)"
          # yfinance for scripts/stock_prices.py. Yahoo's chart API blocks
          # bare-urllib clients; yfinance handles the crumb-cookie dance and
          # retries, which is the difference between working and 429ing from
          # the runner. --break-system-packages is required because the
          # runner's Python ships with PEP-668 enabled — even --user installs
          # are blocked otherwise. Safe here because this runner is dedicated
          # to this workflow; we're not contending with a host package manager.
          if ! python3 -c "import yfinance" 2>/dev/null; then
            echo "Installing yfinance"
            python3 -m pip install --quiet --user --upgrade --break-system-packages yfinance \
              || echo "WARN: pip install yfinance failed; stock_prices.py will fall back to urllib/stooq" >&2
          fi
          python3 -c "import yfinance; print('yfinance:', yfinance.__version__)" 2>&1 || true
          # PyYAML for scripts/compile_ara.py (the .ara.md frontmatter +
          # block-body parser). Without it the compiler can't run and the
          # writer falls back to its raw-HTML path, which means
          # section-writer agents must hand-write HTML — the whole point
          # of the DSL is undone. Hard-fail if install fails.
          if ! python3 -c "import yaml" 2>/dev/null; then
            echo "Installing PyYAML"
            python3 -m pip install --quiet --user --upgrade --break-system-packages pyyaml \
              || { echo "ERROR: pip install pyyaml failed; compile_ara cannot run"; exit 1; }
          fi
          python3 -c "import yaml; print('yaml:', yaml.__version__)" 2>&1 || true

      # Snapshot HEAD before the model runs so we can later identify the file
      # THIS run produced (rather than guessing by `ls -t`, which would point
      # at a previous run's article — or the fixture — when the writer never
      # committed).
      - name: Capture pre-action HEAD
        id: pre
        run: |
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      # Acknowledge the user on the issue path so they know the job started.
      # The workflow_dispatch path has no comment surface; skip.
      - name: Acknowledge research request
        if: github.event_name == 'issues'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: '🧪 **Generative research started**\n\nI\'m drafting an article on this topic. The result will be published to the dashboard and linked back here when ready.'
            });

      # ---- Claude backend ---------------------------------------------------
      # OAuth-authenticated against native Anthropic. The writer records
      # --model claude-opus-4-7 (the actual served model), not the CLI's
      # --model opus alias.
      # Hard wall-clock cap on the model step. The runner already lost
      # comms once when the action ran ~19m on the un-capped concurrent
      # fan-out version of the prompt; pacing fixed that, but a stuck
      # runner is much worse than a missed article, so hard-cap here.
      - name: Run Generative Research (Claude)
        if: steps.params.outputs.backend == 'claude'
        id: gen-claude
        timeout-minutes: 45
        uses: anthropics/claude-code-action@v1
        env:
          GEN_TOPIC: ${{ steps.params.outputs.topic }}
          GEN_SLUG: ${{ steps.params.outputs.slug }}
          GEN_TAGS: ${{ steps.params.outputs.tags }}
          GEN_SOURCE: ${{ steps.params.outputs.source }}
          GEN_PROMPT: ${{ steps.params.outputs.prompt }}
          # birdy auth — bird and bird-fast read these cookies to call
          # X/Twitter as a primary source. Same secrets used by the
          # hourly-twitter workflow.
          AUTH_TOKEN: ${{ secrets.BIRD_AUTH_TOKEN }}
          CT0: ${{ secrets.BIRD_CT0 }}
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: |
            --model opus --max-turns 240 --allowedTools "Read,Write,Edit,Bash(git:*),Bash(python3:*),Bash(cat:*),Bash(ls:*),Bash(printenv:*),Bash(curl:*),Bash(pdftotext:*),Bash(bird:*),Bash(bird-fast:*),Bash(jq:*),WebSearch,WebFetch,Task,TodoWrite"
          prompt: |
            You are a deep-research analyst writing a COMPREHENSIVE,
            analyst-grade HTML article on the topic supplied by the user.
            Reason from first principles — challenge weak claims rather
            than echo them. Depth is measured by GROUNDED CLAIMS, not by
            word count. Lean toward maximum depth: more primary sources,
            more cited quantitative claims, more independent counter-
            arguments. The user has explicitly opted into long runs.

            The topic and originating prompt are available as the
            environment variables $GEN_TOPIC and $GEN_PROMPT. Read them
            with `printenv GEN_TOPIC` / `printenv GEN_PROMPT` first. If
            $GEN_PROMPT is substantially longer than $GEN_TOPIC, treat the
            prompt as the user's detailed brief (questions, sources to
            prefer, framing) and let it shape your research plan.

            TOOLBELT — beyond Read/Write/WebSearch/WebFetch, you have:
              - `python3 scripts/prior_context.py "$GEN_TOPIC"` — lists
                related past articles already in this repo (slugs, titles,
                file paths). Run this FIRST so you don't redo their work.
              - `python3 scripts/research_search.py SOURCE "query"` —
                primary-source search. SOURCE = arxiv | edgar | crossref
                | semanticscholar | github. Returns structured plain text
                you can read directly. Use this BEFORE WebSearch when the
                topic clearly has academic / SEC / GitHub footprints.
              - `curl -sL <url> -o /tmp/x.pdf && pdftotext /tmp/x.pdf -
                | head -c 60000` — read PDFs (10-Ks, S-1s, papers,
                whitepapers). The pdftotext binary is pre-installed.
              - `bird search "<query>" --json --plain | jq ...` and
                `bird user-tweets <handle> --json --plain | jq ...` —
                X/Twitter as a primary source via the bird CLI. A tweet
                from a NAMED PRINCIPAL (founder, official corporate
                account, lead engineer of the named project) counts as
                PRIMARY in the evidence packet schema. The runner is
                already authenticated via AUTH_TOKEN / CT0 cookies set in
                this step's env. Always fall back gracefully:
                `... || echo "[]"`. Use for breaking-news topics where
                X is the first-party channel (model launches, TGE
                announcements, IR posts cross-posted to X, etc.).
              - `python3 scripts/stock_prices.py <ticker[,ticker...]>
                --range 1y --interval 1mo --format kv` — fetches
                close-price time series from Yahoo Finance (yfinance
                handles auth; no API key). Output is plain text
                designed to paste DIRECTLY into a :::line-chart
                directive: copy the `ticker_X:` rows into the body of
                a `:::line-chart(title=..., y-unit=$)` block (the
                tool's stdout shows the exact format). Ranges:
                1d 5d 1mo 3mo 6mo 1y 2y 5y 10y ytd max. Intervals:
                1d 1wk 1mo etc. Up to 4 tickers per chart. Falls back
                gracefully: exit 1 prints the error to stderr, your
                section keeps going without the chart.
              - `python3 scripts/check_generative_research.py
                /tmp/gen-research.ara.md` — COMPILE-CHECK the article.
                Accepts `.ara.md` (compiles DSL, then validates the
                resulting HTML) or `.html` (validates directly). Runs
                the same rules the writer enforces at commit time:
                DSL grammar, tag allowlist, ara-* class exact-match
                against COMPONENTS.md, size cap. Exit 0 = valid; exit
                1 = errors printed to stderr with suggestions (e.g.
                "unknown directive :::sources at line 42" or "did you
                mean ara-stat-value"). Use as a tight loop: write,
                check, fix, re-check, only then commit. Deterministic
                — the compiler/validator tells you exactly what's
                wrong instead of you having to remember the spec.

            PROCESS — non-negotiable, in order:

            0. RESEARCH PLAN + PRIOR-COVERAGE CHECK.
                  a. Run `python3 scripts/prior_context.py "$GEN_TOPIC"`
                     and Read any high-overlap article files it returns.
                     Note what's already covered so you don't duplicate.
                  b. Read `ARA_DSL.md` at repo root (the source
                     language you'll be writing) AND `COMPONENTS.md`
                     (the visual primitives the DSL compiles to).
                     The compiler/writer ENFORCE an exact-match
                     ara-* allowlist parsed from COMPONENTS.md plus
                     a fixed set of `:::directive` names parsed from
                     the compiler — anything outside both vocabularies
                     is REJECTED with suggestions. Also Read the visual
                     reference article (slug: `components`) to see
                     every primitive rendered.
                  c. Write a short internal plan (just hold it in
                     context, do not save to disk):
                       - 10–18 specific answerable questions
                       - For each question, what counts as PRIMARY evidence
                         (paper, filing, IR page, spec, first-party blog)
                       - 3–5 disconfirming questions ("what would falsify
                         the popular narrative")
                       - For each question, the likely DATA SHAPE
                         (time series / distribution / ranking /
                         comparison / ratio / chronology) so the
                         section writer can pick the right ara-*
                         visualization primitive instead of defaulting
                         to ara-table or prose.

            1. EVIDENCE COLLECTION IN WAVES. Use the Task tool to
               dispatch sub-agents (subagent_type: general-purpose) IN
               WAVES OF NO MORE THAN 8 AT A TIME. After each wave
               completes, dispatch the next wave. Total target: 16–32
               sub-agents across 2–4 waves. The self-hosted runner OOMs
               above ~10 concurrent Task tool calls — strict cap.
               Send each wave's dispatches in a single message so its
               sub-agents run concurrently, then await results before
               the next wave.

               Each sub-agent prompt MUST: (a) name a domain-expert
               framing (e.g. "you are a senior equity analyst",
               "chip architect", "monetary economist"), (b) instruct
               first-principles reasoning, (c) require WebSearch + WebFetch
               on PRIMARY sources AND tell them to use
               `python3 scripts/research_search.py SOURCE "query"` for
               arxiv/edgar/crossref/semanticscholar/github when relevant,
               AND tell them they CAN use
               `curl + pdftotext` for PDF sources,
               AND tell them they CAN use `bird search "<query>" --json --plain`
               or `bird user-tweets <handle> --json --plain` to pull
               X/Twitter primary sources (a tweet from a named principal
               counts as PRIMARY; AUTH_TOKEN / CT0 cookies are already in
               env), (d) cap output at ~10 evidence packets.

               Sub-agents MUST return STRUCTURED EVIDENCE PACKETS, not
               prose summaries. Each packet:

                 - claim: <the factual assertion in one sentence>
                 - source_url: <URL the agent actually fetched>
                 - source_type: primary | secondary | commentary
                   (primary = SEC filing / company IR / academic paper /
                    spec sheet / first-party docs;
                    secondary = mainstream press citing primaries;
                    commentary = blogs, opinion, sell-side notes)
                 - date: <YYYY-MM-DD when published or claim was made>
                 - figure: <the exact number, name, or date the claim
                   turns on>
                 - excerpt: <verbatim quote, <40 words>
                 - confidence: 1 (rumour) … 5 (multiple primary sources)
                 - caveat: <what would weaken or contradict the claim>
                 - shape: one of {single-fact, time-series, ranking,
                   breakdown, paired-delta, cross-entity-categorical,
                   pictogram, key-value, chronology, quote}. Tag the
                   SHAPE OF THE DATA THIS CLAIM CAN COMPOSE INTO when
                   combined with sibling packets — not the claim's
                   topic. Examples:
                     - "Q1 2026 revenue was $751M"           → single-fact
                     - "BE close: $24, $37, $52, $84, $132, …" → time-series
                     - "Top 5 by share: Korea 36%, …"         → ranking
                     - "China 40%, US 25%, Europe 20%, other 15%" → breakdown
                     - "From $15 in 2018 to $303 in 2026"     → paired-delta
                     - "Moncler / LVMH x China/US/Eur exposure" → cross-entity-categorical
                     - "Founded 2001, HQ San Jose, …"          → key-value
                     - "Nadella: 'biggest issue is power…'"    → quote
                   The stitcher uses this in step 4.5 to route packets
                   to the right viz primitive instead of leaving every
                   writer to recognize the shape from prose.

            2. BUILD A LEDGER in your context. Dedupe by source_url. Drop
               packets with confidence < 2 unless they're the only signal
               on a non-trivial question. Group packets by which planning
               question they answer.

            3. SPOT-CHECK. WebFetch or `curl+pdftotext` yourself on the
               5–8 most load-bearing primary sources to confirm the
               headline numbers exist on the pages agents cited.

            4. OUTLINE + BUCKET BY SHAPE. Decide the article's 5–10
               numbered `## ` sections with a one-line thesis per
               section. Map ledger packets to sections (each packet
               routes to ≥1 section). THEN, for each section, walk its
               packets and identify SHAPE BUNDLES — groups of 2+
               packets that share a shape and could compose into one
               viz primitive. Concrete rules:

                 - 3+ `breakdown` packets summing to ~one whole       → :::donut
                 - 3+ `ranking` packets, same metric                  → :::rank-list
                 - 3+ `time-series` points on same metric (or use the
                   `stock_prices.py` output)                          → :::line-chart
                 - 5+ `time-series` points inline in prose             → {sparkline:...}
                 - 1 `paired-delta` packet                            → :::compare or :::slope
                 - 3+ `paired-delta` packets, same dimension          → :::slope
                 - 2+ `cross-entity-categorical` packets,
                   matching axis lists                                → :::stack-rows
                 - 3+ `key-value` packets, single subject             → :::kv
                 - 1+ `chronology` packets, dated                     → :::timeline
                 - 1 `pictogram` packet (count of N identical units)  → :::iso
                 - any standalone `quote` packet                      → :::quote
                 - 4–8 `single-fact` packets that share a frame
                   (e.g. all six are "headline KPIs for this company") → :::stats

               Write this routing as a SECTION ROUTING TABLE before
               dispatching writers:

                 Section 02 (Speed as the moat):
                   - :::stats: packets [4, 8, 11] (headline KPIs)
                   - :::line-chart: packets [12, 14] (BE close TTM)
                   - :::compare: packets [9, 10] (BE vs PJM lead time)
                   - prose body: packets [5, 6, 7, 13, 15]

               The point is to remove ALL viz-shape-recognition work
               from the section writers — they get told what to emit
               for each bundle. The remaining packets are free-prose.

            4.5. SECTION WRITERS IN WAVES. Use the Task tool to dispatch
                ONE writer sub-agent per H3 section, IN WAVES OF NO MORE
                THAN 4 AT A TIME (so 5–10 writers across 2–3 waves).
                Same OOM cap as step 1 — strict. Each writer prompt
                MUST include:
                  - the full outline (so each writer knows what the OTHER
                    sections are covering and avoids duplication)
                  - this section's number, thesis, and the relevant
                    subset of ledger packets
                  - this section's SECTION ROUTING TABLE from step 4
                    — i.e. EXPLICIT instructions for what to emit:
                      "EMIT `:::stats` from packets [4, 8, 11].
                       EMIT `:::line-chart` from packets [12, 14]
                       (use the x:/ticker_X: format).
                       EMIT `:::compare` from packets [9, 10].
                       The remaining packets [5, 6, 7, 13, 15] are
                       free-prose."
                    The writer's job is to FILL IN these blocks with
                    the packet data — they do NOT decide which viz
                    primitive to use. Cognitive load of "recognize the
                    shape" lives in the orchestrator, not the writer.
                  - the per-section contract (below)
                  - a 600–1100-word target for THIS section
                  - an instruction to `Read ARA_DSL.md` (the source
                    language) and `COMPONENTS.md` (the visual
                    primitives) at the repo root first
                  - the COMPONENT VOCABULARY block (below) — as a
                    reference, not a menu they must navigate
                  - an EXPLICIT note that they CAN fetch live stock-
                    price series via:
                      `python3 scripts/stock_prices.py <ticker[,ticker...]> \
                        --range 1y --interval 1mo --format kv`
                    (Yahoo Finance via yfinance, no API key, up to 4
                    tickers per chart). The stdout shows the x: and
                    ticker_X: rows ready to paste into a
                    `:::line-chart(title=..., y-unit=$)` block body.
                    If Yahoo errors, the script exits 1 — fall back to
                    prose with no chart.
                Each writer returns ONLY their section as DSL — start
                with `## N. Section title` and emit paragraphs,
                `:::directives` (from the routing table), blockquotes,
                etc. as documented in ARA_DSL.md. NO frontmatter, NO
                `:::references` block, NO raw HTML. You stitch.

            5. STITCH. Compose the final `.ara.md` source:
                  - YAML frontmatter (`eyebrow`, `title`, `deck`,
                    `lede`, and optional `stats:` grid) wrapped in
                    `---` fences
                  - section writers' DSL output, concatenated in order
                  - a final "what could break the thesis" /
                    counter-arguments `## ` section (you write this
                    yourself from the ledger)
                  - a `:::references` block at the very bottom listing
                    every cited source as `{id: N, title: ..., url: ...,
                    source: ..., date: ...}`
               Normalize voice in a quick pass. Every substantive
               factual claim MUST be followed by a `[^N]` (or
               `[^1,2,3]` for multi-cite) where N matches the matching
               `id:` in the `:::references` block. The compiler
               renders `[^N]` as the visual ara-cite superscript — do
               NOT write raw `<sup><a class="ara-cite">` HTML.

            6. VERIFIER PASS. Use the Task tool to dispatch ONE more
               sub-agent. Pass it the draft `.ara.md` body AND the
               `:::references` block. Instruct it to:
                  - read every `[^N]` in the draft and pair it with
                    the matching `:::references` entry
                  - fetch each cited URL (WebFetch or curl+pdftotext)
                  - emit a STRUCTURED findings table only (not a
                    rewritten article):

                      claim_id | section | support_status (supported |
                        weak | unsupported) | cited_source | problem |
                        required_fix

                  - additionally flag any factual claim WITHOUT a cite

            7. BOUNDED REVISION. Address ONLY the verifier's findings.
               Each unsupported claim must be either: (a) replaced with
               a supported variant from the ledger, (b) demoted by
               wrapping in `==unverified: ...==` (which compiles to
               `<mark class="ara-mark">`), or (c) deleted. Do NOT
               generically expand or pad. ONE revision pass maximum.

            QUALITY TARGETS — these, not word count, are the bar:
               - Research questions answered: ≥ 85% of your plan
               - Substantive factual claims with cite: ≥ 90%
               - Primary-source share among cited sources: ≥ 50%
                 (when primary sources exist for the topic)
               - Evidence density: ≥ 12 cited claims per 1,000 words
               - Quantitative density: ≥ 2 concrete numbers/dates/named
                 entities per H3 numbered section
               - Counter-argument: ≥ 1 serious counterclaim or "what
                 would falsify this" per major thesis
               - References: ≥ 20 distinct source URLs in the numbered
                 references list
               - Visualization diversity: ≥ 3 distinct visualization
                 primitives across the article — pick from ara-bars,
                 ara-stack-bar, ara-stack-rows, ara-sparkline,
                 ara-line-chart, ara-donut, ara-slope, ara-compare,
                 ara-rank-list, ara-iso, ara-timeline, ara-kv. (ara-table
                 and ara-callout do NOT count toward this target —
                 they're the safe defaults; the bar is whether you used
                 the design system as designed.)
               - Word count: 4500–7000 as a GUARDRAIL only

            COMPONENT VOCABULARY (the compiler dispatches `:::directive`
            names against a fixed table; the writer also enforces an
            exact-match ara-* allowlist parsed from COMPONENTS.md for
            the `:::raw` escape hatch — invented classes there are
            rejected with suggestions; read ARA_DSL.md for syntax and
            COMPONENTS.md for what each primitive looks like):

               Visualization directives — pick BY DATA SHAPE:
                 Time series           → :::line-chart (full SVG, up
                                         to 4 series), {sparkline:...}
                                         (inline mini-trend)
                 Distribution          → :::donut, :::stack-bar
                                         (+ legend=true),
                                         :::stack-rows (multi-row
                                         Bloomberg-style)
                 Ranking               → :::rank-list (proportional
                                         fills built-in)
                 Position in range     → :::compare (three cards:
                                         lowest / highest / subject)
                 Ratios                → :::iso (pictogram count
                                         like "1950: 🚶×17");
                                         use `unit:` on a :::stats
                                         item for big-number suffix
                 Before / after delta  → :::slope (two-period)
                 Chronology            → :::timeline
                 Key/value facts       → :::kv
                 Bars                  → :::bars (one row per labeled
                                         proportional bar)

               Content blocks: :::callout(kind=info|success|warn|danger,
                 label=...), :::quote(attr=...), :::figure(src, alt,
                 caption), and markdown tables (`| a | b |`) — prefix
                 a row's first cell with `*` to mark it as the subject
                 (ara-row-highlight).
               Headings: `## N. Title` (numbered section with ara-h2-num
                 chip auto-extracted from the `N.`/`N -`/`N —` prefix),
                 `### subhead`, `#### minor`, `---` for ara-divider.
               Title block (frontmatter): eyebrow, title, deck, lede,
                 and optional stats grid.
               Inline: `[^N]` for ara-cite, `==text==` for ara-mark,
                 `{accent}text{/}` for ara-accent, `{tag}cdn{/}` for
                 ara-tag, `{flag:green|yellow|red}` for ara-flag,
                 `{sparkline:1,2,3}` for inline trend.

               Anti-patterns — REJECT in your own draft:
                 - "the top 5 are…" as a markdown list  → use :::rank-list
                 - "the breakdown is X%/Y%/Z%" in prose → use :::donut
                                                          or :::stack-bar
                 - a time series described in prose     → embed
                                                          {sparkline:...}
                                                          or :::line-chart
                 - before/after numbers in prose        → use :::slope
                 - key facts as a markdown list         → use :::kv

            PER-SECTION CONTRACT (replaces mechanical density rules):
            each `## ` numbered section must contain:
               - 1 section-thesis sentence
               - 3–6 sourced factual claims (each with `[^N]` cite)
               - ≥ 1 quantitative datapoint where one exists
               - ≥ 1 counterpoint or "what would weaken this" line
               - 1 sentence on why this matters
               If the section's data shape calls for a visualization
               (time series / distribution / ranking / comparison /
               ratio / chronology), USE the matching `:::directive`
               from the COMPONENT VOCABULARY block above. Do NOT
               default to a markdown table or prose for visualizable
               data. Use `:::callout` sparingly: thesis break, risk
               flag, or source caveat only — not for cosmetic density.

            VALIDATION (the compiler + writer are the source of truth
            — see step 7.5 below for the loop). The compile pipeline
            enforces:
               - Source is a valid `.ara.md`: YAML frontmatter with
                 at least `title:`, then markdown body with `## `
                 headings and `:::directives` from the fixed grammar
                 in ARA_DSL.md.
               - The compiler dispatches `:::name(...)` against its
                 fixed table; unknown names error with a list of
                 valid directives.
               - After compile, the writer runs validate_body: every
                 `class=` must be an exact-match ara-* class in
                 COMPONENTS.md (only relevant if you used `:::raw`),
                 allowed tags only, no `style=`/`on*=`/`javascript:`,
                 body under 200 KB.
               You do NOT need to mentally validate against this list.
               Write the body using the COMPONENT VOCABULARY guidance,
               then run the compile-check (step 7.5). If it fails, the
               error tells you exactly what to fix.

            7.5. COMPILE CHECK (deterministic; before commit).
                 a. Write the draft `.ara.md` to /tmp/gen-research.ara.md.
                 b. Run with design gates active (corpus audit shows
                    real articles emit 0–3 viz primitives and 5–10
                    callouts; we hold this run to ≥ 3 viz + ≤ 5
                    callouts and warn on percentages-without-viz):

                      python3 scripts/check_generative_research.py \
                        /tmp/gen-research.ara.md \
                        --diversity-min 3 --callout-max 5 \
                        --strict-shape

                 c. Exit 0 → proceed to step 8. Soft warnings printed
                    on stderr are advisory — read them and consider
                    whether the flagged section would read better
                    with a viz, but they don't block.
                    Exit 1 → the stderr lists every DSL grammar
                    error, invalid class/tag, OR design-gate
                    violation. Fix the body in-place and re-run.
                    Iterate until clean. Do NOT proceed to commit
                    until exit 0. Common design fixes when the gate
                    fails on diversity:
                      - 4+ percentage shares of one whole in prose
                        → `:::donut` with `{label, value}` items
                      - "the top N are…" list in prose
                        → `:::rank-list` with `pct` proportional fill
                      - paired before/after numbers in prose
                        → `:::compare` (one pair) or `:::slope` (3+ pairs)
                      - chronology of dated events in prose
                        → `:::timeline` with `{date, headline, body}`
                      - 4+ headline KPIs presented as separate
                        sentences → `:::stats` grid
                 d. This loop is cheap — token cost is just reading
                    short error messages. Lean on it instead of
                    self-validating against the rule list in prose.

            8. SAVE. Write the final (already-clean) `.ara.md` to:
                  /tmp/gen-research.ara.md

            9. COMMIT via the writer (Bash). Pass originating values via
               the pre-set env vars:

                  python3 scripts/write_generative_research.py \
                    --topic "$GEN_TOPIC" \
                    --slug "$GEN_SLUG" \
                    --tags "$GEN_TAGS" \
                    --source "$GEN_SOURCE" \
                    --prompt "$GEN_PROMPT" \
                    --model claude-opus-4-7 \
                    --html-body /tmp/gen-research.ara.md

               If $GEN_SLUG is empty, OMIT the --slug flag entirely (do
               NOT pass --slug ""):
                  python3 scripts/write_generative_research.py \
                    --topic "$GEN_TOPIC" \
                    --tags "$GEN_TAGS" \
                    --source "$GEN_SOURCE" \
                    --prompt "$GEN_PROMPT" \
                    --model claude-opus-4-7 \
                    --html-body /tmp/gen-research.ara.md

            CONSTRAINTS:
            - The writer COMMITS internally. Do NOT run `git commit`.
            - Do NOT run `git push`. A later workflow step publishes.
            - Do not modify files outside /tmp and what the writer touches.
            - If validation fails, fix the HTML and retry the same Bash
              invocation; do not work around the validator.

      # ---- DeepSeek backend -------------------------------------------------
      # claude-code-action redirected to DeepSeek's Anthropic-compatible
      # endpoint. Mirrors the env-var shape in
      # hourly-twitter-deepseek-agentic.yml. The OAuth input is required by
      # the action schema but ignored by the CLI when ANTHROPIC_BASE_URL is set.
      # The writer records --model deepseek-v4-pro (the served model).
      - name: Run Generative Research (DeepSeek V4 Pro, attempt 1)
        if: steps.params.outputs.backend == 'deepseek-v4-pro'
        id: gen-deepseek
        continue-on-error: true
        timeout-minutes: 90
        uses: anthropics/claude-code-action@v1
        env: &deepseek_v4_pro_env
          # Redirect Claude Code CLI to DeepSeek's Anthropic-compatible endpoint.
          # See https://api-docs.deepseek.com/guides/coding_agents
          ANTHROPIC_BASE_URL: https://api.deepseek.com/anthropic
          ANTHROPIC_AUTH_TOKEN: ${{ secrets.DEEPSEEK_API_KEY }}
          ANTHROPIC_MODEL: deepseek-v4-pro
          ANTHROPIC_DEFAULT_OPUS_MODEL: deepseek-v4-pro
          ANTHROPIC_DEFAULT_SONNET_MODEL: deepseek-v4-pro
          ANTHROPIC_DEFAULT_HAIKU_MODEL: deepseek-v4-flash
          CLAUDE_CODE_SUBAGENT_MODEL: deepseek-v4-flash
          CLAUDE_CODE_EFFORT_LEVEL: max
          GEN_TOPIC: ${{ steps.params.outputs.topic }}
          GEN_SLUG: ${{ steps.params.outputs.slug }}
          GEN_TAGS: ${{ steps.params.outputs.tags }}
          GEN_SOURCE: ${{ steps.params.outputs.source }}
          GEN_PROMPT: ${{ steps.params.outputs.prompt }}
          # birdy auth — bird and bird-fast read these cookies to call
          # X/Twitter as a primary source. Same secrets used by the
          # hourly-twitter workflow.
          AUTH_TOKEN: ${{ secrets.BIRD_AUTH_TOKEN }}
          CT0: ${{ secrets.BIRD_CT0 }}
        with: &deepseek_v4_pro_with
          # Required by the action input schema; superseded at runtime by
          # ANTHROPIC_AUTH_TOKEN because ANTHROPIC_BASE_URL is set.
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: |
            --model opus --max-turns 240 --allowedTools "Read,Write,Edit,Bash(git:*),Bash(python3:*),Bash(cat:*),Bash(ls:*),Bash(printenv:*),Bash(curl:*),Bash(pdftotext:*),Bash(bird:*),Bash(bird-fast:*),Bash(jq:*),WebSearch,WebFetch,Task,TodoWrite"
          prompt: |
            You are a deep-research analyst running on DeepSeek v4 Pro,
            writing a COMPREHENSIVE, analyst-grade HTML article on the
            topic supplied by the user. Reason from first principles —
            challenge weak claims rather than echo them. Depth is measured
            by GROUNDED CLAIMS, not by word count. Lean toward maximum
            depth: more primary sources, more cited quantitative claims,
            more independent counter-arguments. The user has explicitly
            opted into long runs.

            The topic and originating prompt are available as the
            environment variables $GEN_TOPIC and $GEN_PROMPT. Read them
            with `printenv GEN_TOPIC` / `printenv GEN_PROMPT` first. If
            $GEN_PROMPT is substantially longer than $GEN_TOPIC, treat the
            prompt as the user's detailed brief (questions, sources to
            prefer, framing) and let it shape your research plan.

            RECOVERY MODE. This workflow may retry DeepSeek once if the
            Anthropic-compatible socket drops before the writer commits an
            article. At the start, check whether /tmp/gen-research.ara.md
            already exists from a prior failed attempt. If it exists, read it,
            run the compile check from step 7.5, repair only validator or
            obvious completion gaps, then proceed directly to the writer
            commit step. Do not restart research from scratch when a valid or
            nearly-valid draft is already present.

            TOOLBELT — beyond Read/Write/WebSearch/WebFetch, you have:
              - `python3 scripts/prior_context.py "$GEN_TOPIC"` — lists
                related past articles already in this repo (slugs, titles,
                file paths). Run this FIRST so you don't redo their work.
              - `python3 scripts/research_search.py SOURCE "query"` —
                primary-source search. SOURCE = arxiv | edgar | crossref
                | semanticscholar | github. Returns structured plain text
                you can read directly. Use this BEFORE WebSearch when the
                topic clearly has academic / SEC / GitHub footprints.
              - `curl -sL <url> -o /tmp/x.pdf && pdftotext /tmp/x.pdf -
                | head -c 60000` — read PDFs (10-Ks, S-1s, papers,
                whitepapers). The pdftotext binary is pre-installed.
              - `bird search "<query>" --json --plain | jq ...` and
                `bird user-tweets <handle> --json --plain | jq ...` —
                X/Twitter as a primary source via the bird CLI. A tweet
                from a NAMED PRINCIPAL (founder, official corporate
                account, lead engineer of the named project) counts as
                PRIMARY in the evidence packet schema. The runner is
                already authenticated via AUTH_TOKEN / CT0 cookies set in
                this step's env. Always fall back gracefully:
                `... || echo "[]"`. Use for breaking-news topics where
                X is the first-party channel (model launches, TGE
                announcements, IR posts cross-posted to X, etc.).
              - `python3 scripts/stock_prices.py <ticker[,ticker...]>
                --range 1y --interval 1mo --format kv` — fetches
                close-price time series from Yahoo Finance (yfinance
                handles auth; no API key). Output is plain text
                designed to paste DIRECTLY into a :::line-chart
                directive: copy the `ticker_X:` rows into the body of
                a `:::line-chart(title=..., y-unit=$)` block (the
                tool's stdout shows the exact format). Ranges:
                1d 5d 1mo 3mo 6mo 1y 2y 5y 10y ytd max. Intervals:
                1d 1wk 1mo etc. Up to 4 tickers per chart. Falls back
                gracefully: exit 1 prints the error to stderr, your
                section keeps going without the chart.
              - `python3 scripts/check_generative_research.py
                /tmp/gen-research.ara.md` — COMPILE-CHECK the article.
                Accepts `.ara.md` (compiles DSL, then validates the
                resulting HTML) or `.html` (validates directly). Runs
                the same rules the writer enforces at commit time:
                DSL grammar, tag allowlist, ara-* class exact-match
                against COMPONENTS.md, size cap. Exit 0 = valid; exit
                1 = errors printed to stderr with suggestions (e.g.
                "unknown directive :::sources at line 42" or "did you
                mean ara-stat-value"). Use as a tight loop: write,
                check, fix, re-check, only then commit. Deterministic
                — the compiler/validator tells you exactly what's
                wrong instead of you having to remember the spec.

            PROCESS — non-negotiable, in order:

            0. RESEARCH PLAN + PRIOR-COVERAGE CHECK.
                  a. Run `python3 scripts/prior_context.py "$GEN_TOPIC"`
                     and Read any high-overlap article files it returns.
                     Note what's already covered so you don't duplicate.
                  b. Read `ARA_DSL.md` at repo root (the source
                     language you'll be writing) AND `COMPONENTS.md`
                     (the visual primitives the DSL compiles to).
                     The compiler/writer ENFORCE an exact-match
                     ara-* allowlist parsed from COMPONENTS.md plus
                     a fixed set of `:::directive` names parsed from
                     the compiler — anything outside both vocabularies
                     is REJECTED with suggestions. Also Read the visual
                     reference article (slug: `components`) to see
                     every primitive rendered.
                  c. Write a short internal plan (just hold it in
                     context, do not save to disk):
                       - 10–18 specific answerable questions
                       - For each question, what counts as PRIMARY evidence
                         (paper, filing, IR page, spec, first-party blog)
                       - 3–5 disconfirming questions ("what would falsify
                         the popular narrative")
                       - For each question, the likely DATA SHAPE
                         (time series / distribution / ranking /
                         comparison / ratio / chronology) so the
                         section writer can pick the right ara-*
                         visualization primitive instead of defaulting
                         to ara-table or prose.

            1. EVIDENCE COLLECTION IN WAVES. Use the Task tool to
               dispatch sub-agents (subagent_type: general-purpose) IN
               WAVES OF NO MORE THAN 8 AT A TIME. After each wave
               completes, dispatch the next wave. Total target: 16–32
               sub-agents across 2–4 waves. The self-hosted runner OOMs
               above ~10 concurrent Task tool calls — strict cap.
               Send each wave's dispatches in a single message so its
               sub-agents run concurrently, then await results before
               the next wave.

               Each sub-agent prompt MUST: (a) name a domain-expert
               framing (e.g. "you are a senior equity analyst",
               "chip architect", "monetary economist"), (b) instruct
               first-principles reasoning, (c) require WebSearch + WebFetch
               on PRIMARY sources AND tell them to use
               `python3 scripts/research_search.py SOURCE "query"` for
               arxiv/edgar/crossref/semanticscholar/github when relevant,
               AND tell them they CAN use
               `curl + pdftotext` for PDF sources,
               AND tell them they CAN use `bird search "<query>" --json --plain`
               or `bird user-tweets <handle> --json --plain` to pull
               X/Twitter primary sources (a tweet from a named principal
               counts as PRIMARY; AUTH_TOKEN / CT0 cookies are already in
               env), (d) cap output at ~10 evidence packets.

               Sub-agents MUST return STRUCTURED EVIDENCE PACKETS, not
               prose summaries. Each packet:

                 - claim: <the factual assertion in one sentence>
                 - source_url: <URL the agent actually fetched>
                 - source_type: primary | secondary | commentary
                   (primary = SEC filing / company IR / academic paper /
                    spec sheet / first-party docs;
                    secondary = mainstream press citing primaries;
                    commentary = blogs, opinion, sell-side notes)
                 - date: <YYYY-MM-DD when published or claim was made>
                 - figure: <the exact number, name, or date the claim
                   turns on>
                 - excerpt: <verbatim quote, <40 words>
                 - confidence: 1 (rumour) … 5 (multiple primary sources)
                 - caveat: <what would weaken or contradict the claim>
                 - shape: one of {single-fact, time-series, ranking,
                   breakdown, paired-delta, cross-entity-categorical,
                   pictogram, key-value, chronology, quote}. Tag the
                   SHAPE OF THE DATA THIS CLAIM CAN COMPOSE INTO when
                   combined with sibling packets — not the claim's
                   topic. Examples:
                     - "Q1 2026 revenue was $751M"           → single-fact
                     - "BE close: $24, $37, $52, $84, $132, …" → time-series
                     - "Top 5 by share: Korea 36%, …"         → ranking
                     - "China 40%, US 25%, Europe 20%, other 15%" → breakdown
                     - "From $15 in 2018 to $303 in 2026"     → paired-delta
                     - "Moncler / LVMH x China/US/Eur exposure" → cross-entity-categorical
                     - "Founded 2001, HQ San Jose, …"          → key-value
                     - "Nadella: 'biggest issue is power…'"    → quote
                   The stitcher uses this in step 4.5 to route packets
                   to the right viz primitive instead of leaving every
                   writer to recognize the shape from prose.

            2. BUILD A LEDGER in your context. Dedupe by source_url. Drop
               packets with confidence < 2 unless they're the only signal
               on a non-trivial question. Group packets by which planning
               question they answer.

            3. SPOT-CHECK. WebFetch or `curl+pdftotext` yourself on the
               5–8 most load-bearing primary sources to confirm the
               headline numbers exist on the pages agents cited.

            4. OUTLINE + BUCKET BY SHAPE. Decide the article's 5–10
               numbered `## ` sections with a one-line thesis per
               section. Map ledger packets to sections (each packet
               routes to ≥1 section). THEN, for each section, walk its
               packets and identify SHAPE BUNDLES — groups of 2+
               packets that share a shape and could compose into one
               viz primitive. Concrete rules:

                 - 3+ `breakdown` packets summing to ~one whole       → :::donut
                 - 3+ `ranking` packets, same metric                  → :::rank-list
                 - 3+ `time-series` points on same metric (or use the
                   `stock_prices.py` output)                          → :::line-chart
                 - 5+ `time-series` points inline in prose             → {sparkline:...}
                 - 1 `paired-delta` packet                            → :::compare or :::slope
                 - 3+ `paired-delta` packets, same dimension          → :::slope
                 - 2+ `cross-entity-categorical` packets,
                   matching axis lists                                → :::stack-rows
                 - 3+ `key-value` packets, single subject             → :::kv
                 - 1+ `chronology` packets, dated                     → :::timeline
                 - 1 `pictogram` packet (count of N identical units)  → :::iso
                 - any standalone `quote` packet                      → :::quote
                 - 4–8 `single-fact` packets that share a frame
                   (e.g. all six are "headline KPIs for this company") → :::stats

               Write this routing as a SECTION ROUTING TABLE before
               dispatching writers:

                 Section 02 (Speed as the moat):
                   - :::stats: packets [4, 8, 11] (headline KPIs)
                   - :::line-chart: packets [12, 14] (BE close TTM)
                   - :::compare: packets [9, 10] (BE vs PJM lead time)
                   - prose body: packets [5, 6, 7, 13, 15]

               The point is to remove ALL viz-shape-recognition work
               from the section writers — they get told what to emit
               for each bundle. The remaining packets are free-prose.

            4.5. SECTION WRITERS IN WAVES. Use the Task tool to dispatch
                ONE writer sub-agent per H3 section, IN WAVES OF NO MORE
                THAN 4 AT A TIME (so 5–10 writers across 2–3 waves).
                Same OOM cap as step 1 — strict. Each writer prompt
                MUST include:
                  - the full outline (so each writer knows what the OTHER
                    sections are covering and avoids duplication)
                  - this section's number, thesis, and the relevant
                    subset of ledger packets
                  - this section's SECTION ROUTING TABLE from step 4
                    — i.e. EXPLICIT instructions for what to emit:
                      "EMIT `:::stats` from packets [4, 8, 11].
                       EMIT `:::line-chart` from packets [12, 14]
                       (use the x:/ticker_X: format).
                       EMIT `:::compare` from packets [9, 10].
                       The remaining packets [5, 6, 7, 13, 15] are
                       free-prose."
                    The writer's job is to FILL IN these blocks with
                    the packet data — they do NOT decide which viz
                    primitive to use. Cognitive load of "recognize the
                    shape" lives in the orchestrator, not the writer.
                  - the per-section contract (below)
                  - a 600–1100-word target for THIS section
                  - an instruction to `Read ARA_DSL.md` (the source
                    language) and `COMPONENTS.md` (the visual
                    primitives) at the repo root first
                  - the COMPONENT VOCABULARY block (below) — as a
                    reference, not a menu they must navigate
                  - an EXPLICIT note that they CAN fetch live stock-
                    price series via:
                      `python3 scripts/stock_prices.py <ticker[,ticker...]> \
                        --range 1y --interval 1mo --format kv`
                    (Yahoo Finance via yfinance, no API key, up to 4
                    tickers per chart). The stdout shows the x: and
                    ticker_X: rows ready to paste into a
                    `:::line-chart(title=..., y-unit=$)` block body.
                    If Yahoo errors, the script exits 1 — fall back to
                    prose with no chart.
                Each writer returns ONLY their section as DSL — start
                with `## N. Section title` and emit paragraphs,
                `:::directives` (from the routing table), blockquotes,
                etc. as documented in ARA_DSL.md. NO frontmatter, NO
                `:::references` block, NO raw HTML. You stitch.

            5. STITCH. Compose the final `.ara.md` source:
                  - YAML frontmatter (`eyebrow`, `title`, `deck`,
                    `lede`, and optional `stats:` grid) wrapped in
                    `---` fences
                  - section writers' DSL output, concatenated in order
                  - a final "what could break the thesis" /
                    counter-arguments `## ` section (you write this
                    yourself from the ledger)
                  - a `:::references` block at the very bottom listing
                    every cited source as `{id: N, title: ..., url: ...,
                    source: ..., date: ...}`
               Normalize voice in a quick pass. Every substantive
               factual claim MUST be followed by a `[^N]` (or
               `[^1,2,3]` for multi-cite) where N matches the matching
               `id:` in the `:::references` block. The compiler
               renders `[^N]` as the visual ara-cite superscript — do
               NOT write raw `<sup><a class="ara-cite">` HTML.

            6. VERIFIER PASS. Use the Task tool to dispatch ONE more
               sub-agent. Pass it the draft `.ara.md` body AND the
               `:::references` block. Instruct it to:
                  - read every `[^N]` in the draft and pair it with
                    the matching `:::references` entry
                  - fetch each cited URL (WebFetch or curl+pdftotext)
                  - emit a STRUCTURED findings table only (not a
                    rewritten article):

                      claim_id | section | support_status (supported |
                        weak | unsupported) | cited_source | problem |
                        required_fix

                  - additionally flag any factual claim WITHOUT a cite

            7. BOUNDED REVISION. Address ONLY the verifier's findings.
               Each unsupported claim must be either: (a) replaced with
               a supported variant from the ledger, (b) demoted by
               wrapping in `==unverified: ...==` (which compiles to
               `<mark class="ara-mark">`), or (c) deleted. Do NOT
               generically expand or pad. ONE revision pass maximum.

            QUALITY TARGETS — these, not word count, are the bar:
               - Research questions answered: ≥ 85% of your plan
               - Substantive factual claims with cite: ≥ 90%
               - Primary-source share among cited sources: ≥ 50%
                 (when primary sources exist for the topic)
               - Evidence density: ≥ 12 cited claims per 1,000 words
               - Quantitative density: ≥ 2 concrete numbers/dates/named
                 entities per H3 numbered section
               - Counter-argument: ≥ 1 serious counterclaim or "what
                 would falsify this" per major thesis
               - References: ≥ 20 distinct source URLs in the numbered
                 references list
               - Visualization diversity: ≥ 3 distinct visualization
                 primitives across the article — pick from ara-bars,
                 ara-stack-bar, ara-stack-rows, ara-sparkline,
                 ara-line-chart, ara-donut, ara-slope, ara-compare,
                 ara-rank-list, ara-iso, ara-timeline, ara-kv. (ara-table
                 and ara-callout do NOT count toward this target —
                 they're the safe defaults; the bar is whether you used
                 the design system as designed.)
               - Word count: 4500–7000 as a GUARDRAIL only

            COMPONENT VOCABULARY (the compiler dispatches `:::directive`
            names against a fixed table; the writer also enforces an
            exact-match ara-* allowlist parsed from COMPONENTS.md for
            the `:::raw` escape hatch — invented classes there are
            rejected with suggestions; read ARA_DSL.md for syntax and
            COMPONENTS.md for what each primitive looks like):

               Visualization directives — pick BY DATA SHAPE:
                 Time series           → :::line-chart (full SVG, up
                                         to 4 series), {sparkline:...}
                                         (inline mini-trend)
                 Distribution          → :::donut, :::stack-bar
                                         (+ legend=true),
                                         :::stack-rows (multi-row
                                         Bloomberg-style)
                 Ranking               → :::rank-list (proportional
                                         fills built-in)
                 Position in range     → :::compare (three cards:
                                         lowest / highest / subject)
                 Ratios                → :::iso (pictogram count
                                         like "1950: 🚶×17");
                                         use `unit:` on a :::stats
                                         item for big-number suffix
                 Before / after delta  → :::slope (two-period)
                 Chronology            → :::timeline
                 Key/value facts       → :::kv
                 Bars                  → :::bars (one row per labeled
                                         proportional bar)

               Content blocks: :::callout(kind=info|success|warn|danger,
                 label=...), :::quote(attr=...), :::figure(src, alt,
                 caption), and markdown tables (`| a | b |`) — prefix
                 a row's first cell with `*` to mark it as the subject
                 (ara-row-highlight).
               Headings: `## N. Title` (numbered section with ara-h2-num
                 chip auto-extracted from the `N.`/`N -`/`N —` prefix),
                 `### subhead`, `#### minor`, `---` for ara-divider.
               Title block (frontmatter): eyebrow, title, deck, lede,
                 and optional stats grid.
               Inline: `[^N]` for ara-cite, `==text==` for ara-mark,
                 `{accent}text{/}` for ara-accent, `{tag}cdn{/}` for
                 ara-tag, `{flag:green|yellow|red}` for ara-flag,
                 `{sparkline:1,2,3}` for inline trend.

               Anti-patterns — REJECT in your own draft:
                 - "the top 5 are…" as a markdown list  → use :::rank-list
                 - "the breakdown is X%/Y%/Z%" in prose → use :::donut
                                                          or :::stack-bar
                 - a time series described in prose     → embed
                                                          {sparkline:...}
                                                          or :::line-chart
                 - before/after numbers in prose        → use :::slope
                 - key facts as a markdown list         → use :::kv

            PER-SECTION CONTRACT (replaces mechanical density rules):
            each `## ` numbered section must contain:
               - 1 section-thesis sentence
               - 3–6 sourced factual claims (each with `[^N]` cite)
               - ≥ 1 quantitative datapoint where one exists
               - ≥ 1 counterpoint or "what would weaken this" line
               - 1 sentence on why this matters
               If the section's data shape calls for a visualization
               (time series / distribution / ranking / comparison /
               ratio / chronology), USE the matching `:::directive`
               from the COMPONENT VOCABULARY block above. Do NOT
               default to a markdown table or prose for visualizable
               data. Use `:::callout` sparingly: thesis break, risk
               flag, or source caveat only — not for cosmetic density.

            VALIDATION (the compiler + writer are the source of truth
            — see step 7.5 below for the loop). The compile pipeline
            enforces:
               - Source is a valid `.ara.md`: YAML frontmatter with
                 at least `title:`, then markdown body with `## `
                 headings and `:::directives` from the fixed grammar
                 in ARA_DSL.md.
               - The compiler dispatches `:::name(...)` against its
                 fixed table; unknown names error with a list of
                 valid directives.
               - After compile, the writer runs validate_body: every
                 `class=` must be an exact-match ara-* class in
                 COMPONENTS.md (only relevant if you used `:::raw`),
                 allowed tags only, no `style=`/`on*=`/`javascript:`,
                 body under 200 KB.
               You do NOT need to mentally validate against this list.
               Write the body using the COMPONENT VOCABULARY guidance,
               then run the compile-check (step 7.5). If it fails, the
               error tells you exactly what to fix.

            7.5. COMPILE CHECK (deterministic; before commit).
                 a. Write the draft `.ara.md` to /tmp/gen-research.ara.md.
                 b. Run with design gates active (corpus audit shows
                    real articles emit 0–3 viz primitives and 5–10
                    callouts; we hold this run to ≥ 3 viz + ≤ 5
                    callouts and warn on percentages-without-viz):

                      python3 scripts/check_generative_research.py \
                        /tmp/gen-research.ara.md \
                        --diversity-min 3 --callout-max 5 \
                        --strict-shape

                 c. Exit 0 → proceed to step 8. Soft warnings printed
                    on stderr are advisory — read them and consider
                    whether the flagged section would read better
                    with a viz, but they don't block.
                    Exit 1 → the stderr lists every DSL grammar
                    error, invalid class/tag, OR design-gate
                    violation. Fix the body in-place and re-run.
                    Iterate until clean. Do NOT proceed to commit
                    until exit 0. Common design fixes when the gate
                    fails on diversity:
                      - 4+ percentage shares of one whole in prose
                        → `:::donut` with `{label, value}` items
                      - "the top N are…" list in prose
                        → `:::rank-list` with `pct` proportional fill
                      - paired before/after numbers in prose
                        → `:::compare` (one pair) or `:::slope` (3+ pairs)
                      - chronology of dated events in prose
                        → `:::timeline` with `{date, headline, body}`
                      - 4+ headline KPIs presented as separate
                        sentences → `:::stats` grid
                 d. This loop is cheap — token cost is just reading
                    short error messages. Lean on it instead of
                    self-validating against the rule list in prose.

            8. SAVE. Write the final (already-clean) `.ara.md` to:
                  /tmp/gen-research.ara.md

            9. COMMIT via the writer (Bash). Pass originating values via
               the pre-set env vars:

                  python3 scripts/write_generative_research.py \
                    --topic "$GEN_TOPIC" \
                    --slug "$GEN_SLUG" \
                    --tags "$GEN_TAGS" \
                    --source "$GEN_SOURCE" \
                    --prompt "$GEN_PROMPT" \
                    --model deepseek-v4-pro \
                    --html-body /tmp/gen-research.ara.md

               If $GEN_SLUG is empty, OMIT the --slug flag entirely (do
               NOT pass --slug ""):
                  python3 scripts/write_generative_research.py \
                    --topic "$GEN_TOPIC" \
                    --tags "$GEN_TAGS" \
                    --source "$GEN_SOURCE" \
                    --prompt "$GEN_PROMPT" \
                    --model deepseek-v4-pro \
                    --html-body /tmp/gen-research.ara.md

            CONSTRAINTS:
            - The writer COMMITS internally. Do NOT run `git commit`.
            - Do NOT run `git push`. A later workflow step publishes.
            - Do not modify files outside /tmp and what the writer touches.
            - If validation fails, fix the HTML and retry the same Bash
              invocation; do not work around the validator.

      - name: Inspect DeepSeek attempt 1
        if: steps.params.outputs.backend == 'deepseek-v4-pro'
        id: deepseek-attempt-1
        env:
          PRE_SHA: ${{ steps.pre.outputs.sha }}
          OUTCOME: ${{ steps.gen-deepseek.outcome }}
        run: |
          set -euo pipefail
          HEAD_SHA=$(git rev-parse HEAD)
          HAS_FILE=false
          if [ "$HEAD_SHA" != "$PRE_SHA" ]; then
            NEW_FILES=$(git diff --name-only --diff-filter=A "$PRE_SHA..HEAD" -- 'research/generative/*.html' || true)
            if [ -n "$NEW_FILES" ]; then
              HAS_FILE=true
            fi
          fi

          RETRY=false
          if [ "$OUTCOME" = "failure" ] && [ "$HAS_FILE" != "true" ]; then
            RETRY=true
            echo "::warning::DeepSeek attempt 1 failed before producing an article; retrying once. This covers transient Anthropic-compatible API/socket drops."
            echo "Cleaning tracked and untracked repository artifacts from the failed attempt before retry."
            git reset --hard "$PRE_SHA"
            git clean -fd -- research/generative
          elif [ "$OUTCOME" = "failure" ]; then
            echo "::warning::DeepSeek attempt 1 reported failure, but an article commit exists; continuing to publish that output."
          else
            echo "DeepSeek attempt 1 outcome: $OUTCOME"
          fi

          {
            echo "outcome=$OUTCOME"
            echo "has_file=$HAS_FILE"
            echo "retry=$RETRY"
          } >> "$GITHUB_OUTPUT"

      - name: Run Generative Research (DeepSeek V4 Pro, retry)
        if: steps.deepseek-attempt-1.outputs.retry == 'true'
        id: gen-deepseek-retry
        continue-on-error: true
        timeout-minutes: 90
        uses: anthropics/claude-code-action@v1
        env: *deepseek_v4_pro_env
        with: *deepseek_v4_pro_with

      # Identify the file THIS run produced by diffing HEAD against the
      # snapshot we took before the action. This rejects the "newest file in
      # the directory" heuristic, which would silently attribute the fixture
      # or a previous run's article to a failed run.
      - name: Identify generated file
        id: outfile
        if: always()
        env:
          PRE_SHA: ${{ steps.pre.outputs.sha }}
        run: |
          set -euo pipefail
          HEAD_SHA=$(git rev-parse HEAD)
          if [ "$HEAD_SHA" = "$PRE_SHA" ]; then
            echo "Writer did not commit — no new article in this run."
            echo "has_file=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          NEW_FILES=$(git diff --name-only --diff-filter=A "$PRE_SHA..HEAD" -- 'research/generative/*.html' || true)
          if [ -z "$NEW_FILES" ]; then
            echo "Writer committed but added no research/generative HTML file."
            echo "has_file=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          FILENAME=$(basename "$(printf '%s\n' "$NEW_FILES" | head -n1)")
          echo "file=$FILENAME" >> "$GITHUB_OUTPUT"
          echo "has_file=true" >> "$GITHUB_OUTPUT"
          echo "Generated: research/generative/$FILENAME"

      # Per-run quality report — corpus-audit metrics on the article
      # this run produced. We can't see the agent's compile-check
      # iteration count from outside the Claude action, so this step
      # gives us the FINAL-STATE evidence: how many distinct viz
      # primitives, how many callouts, percentages-in-prose, cite
      # density, refs count. Lets us tell at a glance whether the
      # design gate produced the desired behavior or whether the
      # agent squeaked past with the bare minimum.
      - name: Article quality report
        if: always() && steps.outfile.outputs.has_file == 'true'
        env:
          FILE: ${{ steps.outfile.outputs.file }}
        run: |
          set -euo pipefail
          path="research/generative/$FILE"
          echo "=== Quality report for $path ==="
          python3 - "$path" <<'PY'
          import re, sys
          from collections import Counter
          from pathlib import Path
          p = Path(sys.argv[1])
          html = p.read_text()
          classes = re.findall(r'class="(ara-[a-z0-9-]+(?:--[a-z0-9-]+)?)', html)
          c = Counter(classes)
          VIZ = {"ara-line-chart","ara-donut","ara-slope","ara-stack-bar",
                 "ara-stack-rows","ara-bars","ara-rank-list","ara-compare",
                 "ara-iso","ara-sparkline","ara-timeline","ara-kv"}
          FALL = {"ara-table","ara-callout","ara-quote"}
          viz_used = sorted(k for k in c if k in VIZ)
          words = len(re.sub(r"<[^>]+>", " ", html).split())
          stripped = re.sub(
              r'<(span|div)[^>]*class="ara-(bar-value|stat-value|rank-value|compare-value)"[^>]*>.*?</\1>',
              " ", html, flags=re.DOTALL,
          )
          stripped = re.sub(r"<[^>]+>", " ", stripped)
          pct = len(re.findall(r"\b\d+(?:\.\d+)?\s?%", stripped))
          refs = len(re.findall(r'id="ref-\d+"', html))
          cites = c.get("ara-cite", 0)
          callouts = c.get("ara-callout", 0)
          fallback = sum(c.get(k, 0) for k in FALL)
          print(f"  bytes:                 {len(html):>7,}")
          print(f"  words (approx):        {words:>7,}")
          print(f"  distinct viz types:    {len(viz_used):>7}  ({', '.join(viz_used) or 'NONE'})")
          print(f"  viz total occurrences: {sum(c[k] for k in viz_used):>7}")
          print(f"  callouts:              {callouts:>7}")
          print(f"  fallback (table+call+quote): {fallback:>5}")
          print(f"  cites:                 {cites:>7}")
          print(f"  references:            {refs:>7}")
          print(f"  standalone % in prose: {pct:>7}")
          print()
          print("  gate eval at --diversity-min 3 --callout-max 5:")
          gd = "PASS" if len(viz_used) >= 3 else f"FAIL (need 3, have {len(viz_used)})"
          gc = "PASS" if callouts <= 5 else f"FAIL (max 5, have {callouts})"
          print(f"    diversity: {gd}")
          print(f"    callout:   {gc}")
          if pct >= 5 and not any(c.get(k, 0) for k in
              ("ara-donut","ara-stack-bar","ara-bars","ara-rank-list")):
              print(f"    WARN: {pct} % in prose but no distribution viz used.")
          PY

      # The writer commits inside the action sandbox. Publishing is a
      # separate step so we keep push perms in this workflow and don't
      # depend on the action's git wiring. Fail loudly on rebase conflicts
      # (which can happen even with concurrency:false if a label event and
      # a workflow_dispatch race across the queue boundary) and on push
      # rejections (auth / non-fast-forward).
      - name: Push changes
        id: push
        if: always() && steps.outfile.outputs.has_file == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git"

          # Concurrent gen-research / twitter / other writers can land on
          # main while this job runs. Retry the fetch+rebase+push loop a
          # few times; each iteration auto-merges the JSON-array index
          # files (research/generative/index.json and any other research
          # */*.json catalogs) by union-on-slug, since two parallel runs
          # always append different entries to the same array.
          #
          # Only research/generative/index.json is recognised for auto-
          # merge — any other conflicted path aborts with a clear error.

          merge_index_json() {
            local path="$1"
            echo "Auto-merging $path (union by slug)"
            local ours theirs
            ours=$(mktemp); theirs=$(mktemp)
            git show ":2:$path" > "$ours"
            git show ":3:$path" > "$theirs"
            jq -s '
              (.[0] + .[1])
              | unique_by(.slug)
              | sort_by(.created_at)
            ' "$ours" "$theirs" > "$path"
            rm -f "$ours" "$theirs"
            git add "$path"
          }

          ATTEMPTS=0
          MAX_ATTEMPTS=5
          while [ "$ATTEMPTS" -lt "$MAX_ATTEMPTS" ]; do
            ATTEMPTS=$((ATTEMPTS + 1))
            echo "::group::push attempt $ATTEMPTS / $MAX_ATTEMPTS"

            git fetch origin main

            if git rebase origin/main; then
              :
            else
              # rebase paused on conflicts. The only path we know how to
              # safely auto-resolve is research/generative/index.json.
              CONFLICTED=$(git diff --name-only --diff-filter=U | sort -u)
              echo "Conflicted paths:"
              echo "$CONFLICTED"
              if [ "$CONFLICTED" = "research/generative/index.json" ]; then
                merge_index_json "research/generative/index.json"
                if ! git -c core.editor=true rebase --continue; then
                  echo "::error::rebase --continue failed even after JSON merge"
                  git rebase --abort 2>/dev/null || true
                  exit 1
                fi
              else
                echo "::error::Unhandleable conflict on path(s) above"
                git rebase --abort 2>/dev/null || true
                exit 1
              fi
            fi

            if git push origin HEAD:main; then
              echo "::endgroup::"
              echo "Pushed successfully on attempt $ATTEMPTS"
              echo "pushed=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi

            echo "::endgroup::"
            echo "Push rejected (main moved during attempt $ATTEMPTS); retrying"
            sleep $((2 * ATTEMPTS))
          done

          echo "::error::Failed to push after $MAX_ATTEMPTS attempts"
          exit 1

      - name: Post results to issue
        if: always() && github.event_name == 'issues'
        uses: actions/github-script@v7
        env:
          HAS_FILE: ${{ steps.outfile.outputs.has_file }}
          FILE_NAME: ${{ steps.outfile.outputs.file }}
          PUSHED: ${{ steps.push.outputs.pushed }}
          BACKEND: ${{ steps.params.outputs.backend }}
        with:
          script: |
            const hasFile = process.env.HAS_FILE === 'true';
            const pushed = process.env.PUSHED === 'true';
            const filename = process.env.FILE_NAME || '';
            const backend = process.env.BACKEND || '';
            const issueNumber = context.issue.number;
            const repoUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}`;

            let body;
            if (hasFile && pushed && filename) {
              const blobUrl = `${repoUrl}/blob/main/research/generative/${filename}`;
              body = `## 🧪 Generative research complete\n\n` +
                     `Backend: \`${backend}\`\n` +
                     `File: [\`${filename}\`](${blobUrl})\n\n` +
                     `The article will also appear on the dashboard once the deploy workflow runs.`;
            } else if (hasFile && !pushed) {
              body = `## 🧪 Generative research drafted, but push failed\n\n` +
                     `Backend: \`${backend}\`\n` +
                     `File: \`${filename}\` (local to the runner, not published)\n\n` +
                     `Likely cause: a rebase conflict or auth issue. Check the workflow logs and re-run.`;
            } else {
              body = `## 🧪 Generative research finished without a new file\n\n` +
                     `The action did not produce an HTML article in \`research/generative/\`. Check the workflow logs for details.`;
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: body
            });

      - name: Fail DeepSeek run without article
        if: always() && steps.params.outputs.backend == 'deepseek-v4-pro' && steps.outfile.outputs.has_file != 'true'
        run: |
          echo "::error::DeepSeek did not produce an article after the retry policy."
          echo "Attempt 1 outcome: ${{ steps.gen-deepseek.outcome }}"
          echo "Retry outcome: ${{ steps.gen-deepseek-retry.outcome }}"
          exit 1

      - name: Send Telegram notification
        if: success() && steps.outfile.outputs.has_file == 'true' && steps.push.outputs.pushed == 'true'
        continue-on-error: true
        uses: appleboy/telegram-action@221e6b684967abe813051ee4a37dd61770a83ad3
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          format: markdown
          message: |
            🧪 *Generative Research Published*

            📝 Topic: ${{ steps.params.outputs.topic }}
            🤖 Backend: ${{ steps.params.outputs.backend }}

            📄 [View on GitHub](https://github.com/${{ github.repository }}/blob/main/research/generative/${{ steps.outfile.outputs.file }})
