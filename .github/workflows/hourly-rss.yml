name: Hourly RSS Official Announcements

on:
  schedule:
    # Run every hour
    - cron: '30 * * * *'
  workflow_dispatch:

concurrency:
  group: hourly-rss
  cancel-in-progress: true

jobs:
  rss-feed:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Get current datetime
        id: datetime
        run: |
          echo "date=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT
          echo "hour=$(date +'%H')" >> $GITHUB_OUTPUT
          echo "timestamp=$(date +'%Y-%m-%d %H:%M UTC')" >> $GITHUB_OUTPUT

      - name: Fetch RSS Feeds
        id: rss
        run: |
          mkdir -p /tmp/rss

          # OpenAI Blog RSS (news section)
          curl -sL "https://openai.com/news/rss.xml" \
            -H "User-Agent: Mozilla/5.0 (compatible; AIResearchBot/1.0)" \
            > /tmp/rss/openai.xml 2>/dev/null || echo "<rss></rss>" > /tmp/rss/openai.xml

          # Anthropic News RSS (via OpenRSS since no official feed)
          curl -sL "https://openrss.org/www.anthropic.com/news" \
            -H "User-Agent: Mozilla/5.0 (compatible; AIResearchBot/1.0)" \
            > /tmp/rss/anthropic.xml 2>/dev/null || echo "<rss></rss>" > /tmp/rss/anthropic.xml

          # Google AI Blog RSS (Atom feed)
          curl -sL "http://googleaiblog.blogspot.com/atom.xml" \
            -H "User-Agent: Mozilla/5.0 (compatible; AIResearchBot/1.0)" \
            > /tmp/rss/google_ai.xml 2>/dev/null || echo "<rss></rss>" > /tmp/rss/google_ai.xml

          # DeepMind Blog RSS (Google Research)
          curl -sL "https://research.google/blog/rss/" \
            -H "User-Agent: Mozilla/5.0 (compatible; AIResearchBot/1.0)" \
            > /tmp/rss/deepmind.xml 2>/dev/null || echo "<rss></rss>" > /tmp/rss/deepmind.xml

          # Meta AI Blog RSS
          curl -sL "https://ai.meta.com/blog/rss/" \
            -H "User-Agent: Mozilla/5.0 (compatible; AIResearchBot/1.0)" \
            > /tmp/rss/meta_ai.xml 2>/dev/null || echo "<rss></rss>" > /tmp/rss/meta_ai.xml

          # Hugging Face Blog RSS
          curl -sL "https://huggingface.co/blog/feed.xml" \
            -H "User-Agent: Mozilla/5.0 (compatible; AIResearchBot/1.0)" \
            > /tmp/rss/huggingface.xml 2>/dev/null || echo "<rss></rss>" > /tmp/rss/huggingface.xml

          # arXiv CS.AI RSS (recent submissions)
          curl -sL "https://export.arxiv.org/rss/cs.AI" \
            -H "User-Agent: Mozilla/5.0 (compatible; AIResearchBot/1.0)" \
            > /tmp/rss/arxiv_ai.xml 2>/dev/null || echo "<rss></rss>" > /tmp/rss/arxiv_ai.xml

          # arXiv CS.LG RSS (Machine Learning)
          curl -sL "https://export.arxiv.org/rss/cs.LG" \
            -H "User-Agent: Mozilla/5.0 (compatible; AIResearchBot/1.0)" \
            > /tmp/rss/arxiv_lg.xml 2>/dev/null || echo "<rss></rss>" > /tmp/rss/arxiv_lg.xml

          # TechCrunch AI RSS
          curl -sL "https://techcrunch.com/category/artificial-intelligence/feed/" \
            -H "User-Agent: Mozilla/5.0 (compatible; AIResearchBot/1.0)" \
            > /tmp/rss/techcrunch_ai.xml 2>/dev/null || echo "<rss></rss>" > /tmp/rss/techcrunch_ai.xml

          # The Verge AI RSS
          curl -sL "https://www.theverge.com/rss/ai-artificial-intelligence/index.xml" \
            -H "User-Agent: Mozilla/5.0 (compatible; AIResearchBot/1.0)" \
            > /tmp/rss/verge_ai.xml 2>/dev/null || echo "<rss></rss>" > /tmp/rss/verge_ai.xml

          # VentureBeat AI RSS
          curl -sL "https://venturebeat.com/category/ai/feed/" \
            -H "User-Agent: Mozilla/5.0 (compatible; AIResearchBot/1.0)" \
            > /tmp/rss/venturebeat_ai.xml 2>/dev/null || echo "<rss></rss>" > /tmp/rss/venturebeat_ai.xml

          echo "RSS feeds fetched successfully"
          ls -la /tmp/rss/

      - name: Process RSS Feeds with Claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: |
            --model haiku --allowedTools "Read,Write,Edit,Bash(git:*)"
          prompt: |
            You are an RSS feed processor for AI news. Extract NEW articles from official sources.

            TIMESTAMP: ${{ steps.datetime.outputs.timestamp }}
            DATE: ${{ steps.datetime.outputs.date }}

            ## SOURCE FILES

            Read these RSS/XML files from /tmp/rss/:

            **Official Company Blogs:**
            - openai.xml (OpenAI Blog)
            - anthropic.xml (Anthropic News)
            - google_ai.xml (Google AI Blog)
            - deepmind.xml (DeepMind Blog)
            - meta_ai.xml (Meta AI Blog)
            - huggingface.xml (Hugging Face Blog)

            **Research:**
            - arxiv_ai.xml (arXiv CS.AI)
            - arxiv_lg.xml (arXiv CS.LG/Machine Learning)

            **Tech News:**
            - techcrunch_ai.xml (TechCrunch AI)
            - verge_ai.xml (The Verge AI)
            - venturebeat_ai.xml (VentureBeat AI)

            RSS XML structure:
            - channel/item/title (article title)
            - channel/item/link (article URL)
            - channel/item/pubDate (publication date)
            - channel/item/description (summary)

            ## OUTPUT

            Write to: research/rss/${{ steps.datetime.outputs.date }}.md

            FORMAT (append new entries, don't duplicate):
            ```
            # Official AI News - ${{ steps.datetime.outputs.date }}

            ## ${{ steps.datetime.outputs.timestamp }} Update

            ### 🏢 Company Announcements

            #### OpenAI
            - [Title](url) - date
              > Brief summary

            #### Anthropic
            - [Title](url) - date

            #### Google/DeepMind
            - [Title](url) - date

            #### Meta AI
            - [Title](url) - date

            #### Hugging Face
            - [Title](url) - date

            ### 📰 Tech News

            #### TechCrunch
            - [Title](url) - date

            #### The Verge
            - [Title](url) - date

            #### VentureBeat
            - [Title](url) - date

            ### 📄 New arXiv Papers

            #### CS.AI
            - [Paper Title](arxiv_url)

            #### CS.LG
            - [Paper Title](arxiv_url)
            ```

            ## IMPORTANT

            1. Only include articles from the LAST 24 HOURS
            2. Check pubDate and skip old articles
            3. If file already exists, READ IT FIRST and only add NEW entries
            4. Don't duplicate existing entries
            5. If no new content, write "No new updates this hour"

            ## COMMIT

            After writing:
            git add research/rss/
            git commit -m "RSS update ${{ steps.datetime.outputs.timestamp }}" || echo "No changes"

      - name: Push changes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Retry loop: parallel ubuntu-latest writers can race on `main`.
          # The self-hosted runner serialized everything so this never
          # collided; ubuntu-latest does not. Without the retry, a
          # non-fast-forward push would be silently swallowed by `|| echo`,
          # losing the just-written research artifact. If Claude didn't
          # commit anything (no new content), HEAD == origin/main after
          # the rebase and `git push` is a no-op.
          git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git
          for i in 1 2 3 4 5; do
            git fetch origin main \
              && git pull --rebase origin main \
              && git push origin HEAD:main \
              && exit 0
            echo "Push attempt $i failed (likely race with another writer), retrying..."
            sleep $(( i * 5 + RANDOM % 5 ))
          done
          echo "Push failed after 5 retries" >&2
          exit 1

      - name: Publish Hooker workflow telemetry
        if: always()
        uses: ./.github/actions/hooker-telemetry
        with:
          status: ${{ job.status }}
        env:
          HOOKER_URL: ${{ secrets.HOOKER_URL }}
          HOOKER_TOKEN: ${{ secrets.HOOKER_TOKEN }}
