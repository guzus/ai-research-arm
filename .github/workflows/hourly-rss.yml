name: Hourly RSS Official Announcements

on:
  schedule:
    # Run every hour
    - cron: '30 * * * *'
  workflow_dispatch:

concurrency:
  group: hourly-rss
  cancel-in-progress: true

jobs:
  rss-feed:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Get current datetime
        id: datetime
        run: |
          echo "date=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT
          echo "hour=$(date +'%H')" >> $GITHUB_OUTPUT
          echo "timestamp=$(date +'%Y-%m-%d %H:%M UTC')" >> $GITHUB_OUTPUT

      - name: Fetch RSS Feeds
        id: rss
        run: |
          set -euo pipefail
          mkdir -p /tmp/rss

          # OpenAI Blog RSS (news section)
          curl -sL "https://openai.com/news/rss.xml" \
            -H "User-Agent: Mozilla/5.0 (compatible; AIResearchBot/1.0)" \
            > /tmp/rss/openai.xml 2>/dev/null || echo "<rss></rss>" > /tmp/rss/openai.xml

          # Anthropic News RSS (via OpenRSS since no official feed)
          curl -sL "https://openrss.org/www.anthropic.com/news" \
            -H "User-Agent: Mozilla/5.0 (compatible; AIResearchBot/1.0)" \
            > /tmp/rss/anthropic.xml 2>/dev/null || echo "<rss></rss>" > /tmp/rss/anthropic.xml

          # Google AI Blog RSS (Atom feed)
          curl -sL "http://googleaiblog.blogspot.com/atom.xml" \
            -H "User-Agent: Mozilla/5.0 (compatible; AIResearchBot/1.0)" \
            > /tmp/rss/google_ai.xml 2>/dev/null || echo "<rss></rss>" > /tmp/rss/google_ai.xml

          # DeepMind Blog RSS (Google Research)
          curl -sL "https://research.google/blog/rss/" \
            -H "User-Agent: Mozilla/5.0 (compatible; AIResearchBot/1.0)" \
            > /tmp/rss/deepmind.xml 2>/dev/null || echo "<rss></rss>" > /tmp/rss/deepmind.xml

          # Meta AI Blog RSS was removed on 2026-05-18 after returning 404.
          # Probe https://ai.meta.com/blog/rss/ before restoring it.

          # Hugging Face Blog RSS
          curl -sL "https://huggingface.co/blog/feed.xml" \
            -H "User-Agent: Mozilla/5.0 (compatible; AIResearchBot/1.0)" \
            > /tmp/rss/huggingface.xml 2>/dev/null || echo "<rss></rss>" > /tmp/rss/huggingface.xml

          # arXiv CS.AI RSS (recent submissions)
          curl -sL "https://export.arxiv.org/rss/cs.AI" \
            -H "User-Agent: Mozilla/5.0 (compatible; AIResearchBot/1.0)" \
            > /tmp/rss/arxiv_ai.xml 2>/dev/null || echo "<rss></rss>" > /tmp/rss/arxiv_ai.xml

          # arXiv CS.LG RSS (Machine Learning)
          curl -sL "https://export.arxiv.org/rss/cs.LG" \
            -H "User-Agent: Mozilla/5.0 (compatible; AIResearchBot/1.0)" \
            > /tmp/rss/arxiv_lg.xml 2>/dev/null || echo "<rss></rss>" > /tmp/rss/arxiv_lg.xml

          # TechCrunch AI RSS
          curl -sL "https://techcrunch.com/category/artificial-intelligence/feed/" \
            -H "User-Agent: Mozilla/5.0 (compatible; AIResearchBot/1.0)" \
            > /tmp/rss/techcrunch_ai.xml 2>/dev/null || echo "<rss></rss>" > /tmp/rss/techcrunch_ai.xml

          # The Verge AI RSS
          curl -sL "https://www.theverge.com/rss/ai-artificial-intelligence/index.xml" \
            -H "User-Agent: Mozilla/5.0 (compatible; AIResearchBot/1.0)" \
            > /tmp/rss/verge_ai.xml 2>/dev/null || echo "<rss></rss>" > /tmp/rss/verge_ai.xml

          # VentureBeat AI RSS
          curl -sL "https://venturebeat.com/category/ai/feed/" \
            -H "User-Agent: Mozilla/5.0 (compatible; AIResearchBot/1.0)" \
            > /tmp/rss/venturebeat_ai.xml 2>/dev/null || echo "<rss></rss>" > /tmp/rss/venturebeat_ai.xml

          # Ars Technica AI RSS (section feed; probed HTTP 200, fresh items)
          curl -sL "https://arstechnica.com/ai/feed/" \
            -H "User-Agent: Mozilla/5.0 (compatible; AIResearchBot/1.0)" \
            > /tmp/rss/arstechnica_ai.xml 2>/dev/null || echo "<rss></rss>" > /tmp/rss/arstechnica_ai.xml

          # MIT Technology Review — AI section. Long-form AI journalism the
          # daily-digest synthesizer cites; probed HTTP 200 with fresh items.
          curl -sL "https://www.technologyreview.com/topic/artificial-intelligence/feed/" \
            -H "User-Agent: Mozilla/5.0 (compatible; AIResearchBot/1.0)" \
            > /tmp/rss/mit_tech_review_ai.xml 2>/dev/null || echo "<rss></rss>" > /tmp/rss/mit_tech_review_ai.xml

          # The Decoder — AI-only news outlet (probed HTTP 200, fresh items)
          curl -sL "https://the-decoder.com/feed/" \
            -H "User-Agent: Mozilla/5.0 (compatible; AIResearchBot/1.0)" \
            > /tmp/rss/the_decoder.xml 2>/dev/null || echo "<rss></rss>" > /tmp/rss/the_decoder.xml

          # MarkTechPost — high-volume AI research/news aggregator surfacing new
          # papers, model releases, and open-source drops (probed HTTP 200).
          curl -sL "https://www.marktechpost.com/feed/" \
            -H "User-Agent: Mozilla/5.0 (compatible; AIResearchBot/1.0)" \
            > /tmp/rss/marktechpost.xml 2>/dev/null || echo "<rss></rss>" > /tmp/rss/marktechpost.xml

          # --- Expert / independent commentary (promoted from second-hand
          # Twitter/HN pickup to first-class RSS input). All probed HTTP 200
          # with entries dated within the last few days. NOTE: SemiAnalysis's
          # public feed (semianalysis.com/feed/) was deliberately NOT added —
          # it returns HTTP 200 but its newest item is from 2025-09-16 (the
          # public RSS is frozen behind their paywall), so the 24h freshness
          # filter would drop everything and only add a dead section.

          # Simon Willison's Weblog (Atom) — high-signal hands-on LLM coverage.
          # Atom uses entry/title/link[@href]/published, not item/.../pubDate.
          curl -sL "https://simonwillison.net/atom/everything/" \
            -H "User-Agent: Mozilla/5.0 (compatible; AIResearchBot/1.0)" \
            > /tmp/rss/simonwillison.xml 2>/dev/null || echo "<feed></feed>" > /tmp/rss/simonwillison.xml

          # Interconnects (Nathan Lambert) — open-model / post-training analysis.
          curl -sL "https://www.interconnects.ai/feed" \
            -H "User-Agent: Mozilla/5.0 (compatible; AIResearchBot/1.0)" \
            > /tmp/rss/interconnects.xml 2>/dev/null || echo "<rss></rss>" > /tmp/rss/interconnects.xml

          # Import AI (Jack Clark, Anthropic co-founder) — frontier-lab essays;
          # pairs with anthropic.xml for "what Anthropic is thinking" coverage.
          curl -sL "https://jack-clark.net/feed/" \
            -H "User-Agent: Mozilla/5.0 (compatible; AIResearchBot/1.0)" \
            > /tmp/rss/import_ai.xml 2>/dev/null || echo "<rss></rss>" > /tmp/rss/import_ai.xml

          # One Useful Thing (Ethan Mollick, Wharton) — applied-AI essays.
          curl -sL "https://www.oneusefulthing.org/feed" \
            -H "User-Agent: Mozilla/5.0 (compatible; AIResearchBot/1.0)" \
            > /tmp/rss/one_useful_thing.xml 2>/dev/null || echo "<rss></rss>" > /tmp/rss/one_useful_thing.xml

          echo "RSS feeds fetched successfully"
          ls -la /tmp/rss/

      - name: Process RSS Feeds with Claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: |
            --model haiku --allowedTools "Read,Write,Edit,Bash(git:*)"
          prompt: |
            You are an RSS feed processor for AI news. Extract NEW articles from official sources.

            TIMESTAMP: ${{ steps.datetime.outputs.timestamp }}
            DATE: ${{ steps.datetime.outputs.date }}

            ## SOURCE FILES

            Read these RSS/XML files from /tmp/rss/:

            **Official Company Blogs:**
            - openai.xml (OpenAI Blog)
            - anthropic.xml (Anthropic News)
            - google_ai.xml (Google AI Blog)
            - deepmind.xml (DeepMind Blog)
            - huggingface.xml (Hugging Face Blog)

            **Research:**
            - arxiv_ai.xml (arXiv CS.AI)
            - arxiv_lg.xml (arXiv CS.LG/Machine Learning)

            **Tech News:**
            - techcrunch_ai.xml (TechCrunch AI)
            - verge_ai.xml (The Verge AI)
            - venturebeat_ai.xml (VentureBeat AI)
            - arstechnica_ai.xml (Ars Technica AI)
            - mit_tech_review_ai.xml (MIT Technology Review — AI)
            - the_decoder.xml (The Decoder — AI-only outlet)
            - marktechpost.xml (MarkTechPost — AI research/news aggregator)

            **Expert / Independent Commentary:**
            - simonwillison.xml (Simon Willison's Weblog — Atom feed;
              hands-on LLM coverage. Atom uses entry/title/link[@href]/published
              instead of item/title/link/pubDate. Include only AI/LLM entries.)
            - interconnects.xml (Nathan Lambert — open-model / post-training)
            - import_ai.xml (Jack Clark / Anthropic — frontier-lab essays)
            - one_useful_thing.xml (Ethan Mollick — applied-AI essays)

            RSS XML structure:
            - channel/item/title (article title)
            - channel/item/link (article URL)
            - channel/item/pubDate (publication date)
            - channel/item/description (summary)
            Atom (simonwillison.xml) structure:
            - feed/entry/title, feed/entry/link[@href], feed/entry/published

            ## OUTPUT

            Write to: research/rss/${{ steps.datetime.outputs.date }}.md

            FORMAT (append new entries, don't duplicate):
            ```
            # Official AI News - ${{ steps.datetime.outputs.date }}

            ## ${{ steps.datetime.outputs.timestamp }} Update

            ### 🏢 Company Announcements

            #### OpenAI
            - [Title](url) - date
              > Brief summary

            #### Anthropic
            - [Title](url) - date

            #### Google/DeepMind
            - [Title](url) - date

            #### Hugging Face
            - [Title](url) - date

            ### 📰 Tech News

            #### TechCrunch
            - [Title](url) - date

            #### The Verge
            - [Title](url) - date

            #### VentureBeat
            - [Title](url) - date

            #### Ars Technica
            - [Title](url) - date

            #### MIT Technology Review
            - [Title](url) - date

            #### The Decoder
            - [Title](url) - date

            #### MarkTechPost
            - [Title](url) - date

            ### 🧠 Expert Commentary

            #### Simon Willison
            - [Title](url) - date
              > Brief summary

            #### Interconnects (Nathan Lambert)
            - [Title](url) - date

            #### Import AI (Jack Clark)
            - [Title](url) - date

            #### One Useful Thing (Ethan Mollick)
            - [Title](url) - date

            ### 📄 New arXiv Papers

            #### CS.AI
            - [Paper Title](arxiv_url)

            #### CS.LG
            - [Paper Title](arxiv_url)
            ```

            ## IMPORTANT

            1. Only include articles from the LAST 24 HOURS
            2. Check pubDate and skip old articles
            3. If file already exists, READ IT FIRST and only add NEW entries
            4. Don't duplicate existing entries
            5. If no new content, still create the daily file if needed and
               append this timestamped section:
               "## ${{ steps.datetime.outputs.timestamp }} Update"
               followed by "_No new updates this hour._"

            ## COMMIT

            After writing:
            git add research/rss/
            git commit -m "RSS update ${{ steps.datetime.outputs.timestamp }}" || echo "No changes"

      # Use the shared safe-push composite action (post-PR-#58 algorithm):
      # stash any leftover working-tree state before rebasing, so the
      # rebase cannot fail to start with "cannot rebase: You have unstaged
      # changes". See .github/actions/safe-push/action.yml.
      - name: Push changes
        uses: ./.github/actions/safe-push
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish Hooker workflow telemetry
        if: always()
        uses: ./.github/actions/hooker-telemetry
        with:
          status: ${{ job.status }}
        env:
          HOOKER_URL: ${{ secrets.HOOKER_URL }}
          HOOKER_TOKEN: ${{ secrets.HOOKER_TOKEN }}
