name: Hourly Twitter AI News

on:
  schedule:
    # Run every hour
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  twitter-news:
    runs-on: self-hosted
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get current datetime
        id: datetime
        run: |
          echo "date=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT
          echo "hour=$(date +'%H')" >> $GITHUB_OUTPUT
          echo "timestamp=$(date +'%Y-%m-%d %H:%M UTC')" >> $GITHUB_OUTPUT

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install bird CLI
        run: npm install -g @steipete/bird

      - name: Fetch tweets from monitored accounts
        env:
          AUTH_TOKEN: ${{ secrets.BIRD_AUTH_TOKEN }}
          CT0: ${{ secrets.BIRD_CT0 }}
        run: |
          mkdir -p /tmp/bird

          accounts="OpenAI sama AnthropicAI daboris GoogleAI GoogleDeepMind kaboris ylecun elaboris MistralAI MetaAI"
          for handle in $accounts; do
            echo "Fetching @${handle}..."
            bird user-tweets "@${handle}" -n 10 --json --plain > "/tmp/bird/${handle}.json" 2>/dev/null || echo "[]" > "/tmp/bird/${handle}.json"
          done

      - name: Search for AI news tweets
        env:
          AUTH_TOKEN: ${{ secrets.BIRD_AUTH_TOKEN }}
          CT0: ${{ secrets.BIRD_CT0 }}
        run: |
          bird search "AI announcement OR new model release OR GPT OR Claude OR Gemini" -n 30 --json --plain > /tmp/bird/search-ai.json 2>/dev/null || echo "[]" > /tmp/bird/search-ai.json
          bird search "AI breakthrough OR AI launch OR AI update" -n 20 --json --plain > /tmp/bird/search-extra.json 2>/dev/null || echo "[]" > /tmp/bird/search-extra.json

      - name: Fetch AI trending news
        env:
          AUTH_TOKEN: ${{ secrets.BIRD_AUTH_TOKEN }}
          CT0: ${{ secrets.BIRD_CT0 }}
        run: |
          bird news --ai-only -n 20 --json --plain > /tmp/bird/news.json 2>/dev/null || echo "[]" > /tmp/bird/news.json

      - name: Process tweets with Claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          model: claude-opus-4-5-20251101
          claude_args: |
            --allowedTools "Read,Write,Edit,Bash(git:*)"
          prompt: |
            You are a Twitter AI news monitor. Process raw tweet data fetched by the bird CLI
            and produce a concise hourly update.

            TIMESTAMP: ${{ steps.datetime.outputs.timestamp }}
            OUTPUT: research/twitter/${{ steps.datetime.outputs.date }}.md

            RAW DATA LOCATIONS (JSON files):
            - /tmp/bird/*.json — individual account tweets (OpenAI.json, sama.json, etc.)
            - /tmp/bird/search-ai.json — AI keyword search results
            - /tmp/bird/search-extra.json — additional AI search results
            - /tmp/bird/news.json — AI trending news from Twitter

            INSTRUCTIONS:
            1. Read all JSON files from /tmp/bird/
            2. Filter for SIGNIFICANT tweets from the last ~2 hours:
               - Product announcements, model releases, research papers
               - Major partnerships, funding, policy changes
               - Notable technical insights from key researchers
            3. De-duplicate across sources (same tweet may appear in account feed + search)
            4. Skip: retweets of old news, casual tweets, promotional content, engagement bait

            FORMAT: Append to the daily file (create if doesn't exist).
            If the file already exists, append the new section at the end.

            ## ${{ steps.datetime.outputs.hour }}:00 UTC

            ### Breaking
            - [Tweet summary] — @handle — https://x.com/handle/status/ID

            ### Announcements
            - [Tweet summary] — @handle — https://x.com/handle/status/ID

            ### Trending AI News
            - [Headline] — [description]

            If no significant updates found, write:
            ## ${{ steps.datetime.outputs.hour }}:00 UTC
            No significant updates this hour.

            After writing, commit:
            git add research/twitter/
            git commit -m "Twitter update ${{ steps.datetime.outputs.timestamp }}" || echo "No changes"

      - name: Push changes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git
          git pull --rebase || true
          git push || echo "Nothing to push"
