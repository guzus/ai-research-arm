name: Twitter AI News (matrix — claude / deepseek-agentic / deepseek-pi)

# Unified Twitter/X pipeline that fans out across three backend tiers:
#   - claude            (cron '7 */3 * * *', model: opus,             output → research/twitter/)
#   - deepseek-agentic  (cron '37 */6 * * *', model: deepseek-v4-pro,  output → research/twitter-deepseek/)
#   - deepseek-pi       (manual only,        model: deepseek-v4-pro via pi harness,
#                        output → research/twitter-deepseek-pi/)
#
# Routing rules:
#   - schedule trigger → backend resolved from github.event.schedule by the
#     matrix `include` list. Each cron only activates the matrix entry
#     whose `schedule` field matches, so the active matrix size is 1.
#   - workflow_dispatch → backend resolved from inputs.backend (default: claude).
#
# The three backends share:
#   - .github/actions/twitter-fetch          (bird + birdy multi-fetch + optional pre-filter + optional aggregate)
#   - .github/actions/birdy-daemon           (warm daemon + bird-fast wrapper, used by claude + deepseek-agentic)
#   - .github/actions/render-twitter-prompt  (substitute {{placeholders}} in prompts/twitter-analyst.md)
#   - prompts/twitter-analyst.md             (one prompt body with {{placeholders}} for tier-specific values)
#
# History (collapsed from three workflows in #PR-twitter-matrix):
#   - hourly-twitter.yml                       (Claude tier)
#   - hourly-twitter-deepseek-agentic.yml      (DeepSeek-via-Anthropic-shim tier)
#   - hourly-twitter-deepseek-pi.yml           (DeepSeek-via-pi-harness tier)
#
# Required secrets:
#   CLAUDE_CODE_OAUTH_TOKEN              — claude tier (also passed to deepseek-agentic but unused there)
#   DEEPSEEK_API_KEY                     — both deepseek tiers
#   BIRD_AUTH_TOKEN, BIRD_CT0            — all tiers
#   HOOKER_URL, HOOKER_TOKEN             — claude tier (headline-alert blast + telemetry)
#   TELEGRAM_BOT_TOKEN, TELEGRAM_CHAT_ID — deepseek tiers (per-cycle Telegram message)
#   VERCEL_DEPLOY_HOOK                   — optional, claude tier only

on:
  schedule:
    # claude tier: every 3 hours at minute 7.
    - cron: '7 */3 * * *'
    # deepseek-agentic tier: every 6 hours at minute 37. Offset 30min from
    # the nearest claude run so neither hits bird CLI at the same time.
    # Slots are 00:37, 06:37, 12:37, 18:37 UTC.
    - cron: '37 */6 * * *'
  workflow_dispatch:
    inputs:
      backend:
        description: Which backend tier to run.
        required: false
        default: claude
        type: choice
        options:
          - claude
          - deepseek-agentic
          - deepseek-pi
      dry_run:
        description: Claude tier only — render fixture, skip push/deploy/alerts.
        required: false
        default: false
        type: boolean

# Per-backend concurrency groups: each tier serializes against itself
# (cron-driven and manually-dispatched runs of the same backend land
# in the same group, so they queue/cancel against each other) but the
# three tiers can run in parallel when their schedules collide.
#
# For workflow_dispatch we read inputs.backend. For schedule we map
# the cron expression to a backend label inline — keeping the
# expression in one place so the dispatch-vs-cron mapping is obvious.
# `cancel-in-progress: false`: a running brief is preserved if a new
# cron fires (the writer would otherwise be killed mid-Hooker-batch).
concurrency:
  # Guard inputs.backend with an event-name check: in recent GHA,
  # inputs.* is populated with `default:` values across all event types,
  # so on a cron trigger `inputs.backend` would silently resolve to
  # 'claude' and collapse both cron tiers into the same concurrency
  # group. Reading inputs.backend ONLY when we're actually on a dispatch
  # trigger keeps the cron→backend mapping intact.
  group: hourly-twitter-${{ (github.event_name == 'workflow_dispatch' && inputs.backend) || (github.event.schedule == '7 */3 * * *' && 'claude') || (github.event.schedule == '37 */6 * * *' && 'deepseek-agentic') || 'unknown' }}
  cancel-in-progress: false

jobs:
  twitter:
    runs-on: [self-hosted, Linux]
    permissions:
      contents: write
      actions: write
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        include:
          # Trigger-vs-entry filtering happens INSIDE the first step
          # (the `Resolve backend` step's `skip` output) — `matrix.*`
          # is NOT available in `jobs.<job_id>.if` per
          # https://docs.github.com/en/actions/reference/contexts-reference
          # (only github/needs/vars/inputs are evaluated before the
          # matrix is expanded), so the filtering must run from inside a
          # step where steps.if can read matrix.event / matrix.schedule.
          # Wasted-job cost: each cron trigger creates 3 jobs and 2 of
          # them exit at step 1.
          - backend: claude
            event: schedule
            schedule: '7 */3 * * *'
          - backend: deepseek-agentic
            event: schedule
            schedule: '37 */6 * * *'
          # workflow_dispatch path — single entry, runtime-resolved.
          - backend: dispatch
            event: workflow_dispatch

    steps:
      # ── Resolve backend for this run + trigger gate ────────────────
      # 1. Decide whether this matrix entry matches the current trigger.
      #    If not, set skip=true and short-circuit every later step.
      # 2. If matched: when matrix.backend == 'dispatch' read inputs.backend;
      #    otherwise use matrix.backend directly. All later steps read
      #    steps.backend.outputs.name instead of matrix.backend.
      - name: Resolve backend
        id: backend
        env:
          EVENT_NAME: ${{ github.event_name }}
          MATRIX_EVENT: ${{ matrix.event }}
          MATRIX_SCHEDULE: ${{ matrix.schedule }}
          ACTUAL_SCHEDULE: ${{ github.event.schedule }}
          MATRIX_BACKEND: ${{ matrix.backend }}
          INPUT_BACKEND: ${{ inputs.backend }}
        run: |
          set -euo pipefail

          # Match this matrix entry against the current trigger.
          MATCH=false
          if [ "$EVENT_NAME" = "schedule" ] && [ "$MATRIX_EVENT" = "schedule" ] && [ "$MATRIX_SCHEDULE" = "$ACTUAL_SCHEDULE" ]; then
            MATCH=true
          elif [ "$EVENT_NAME" = "workflow_dispatch" ] && [ "$MATRIX_EVENT" = "workflow_dispatch" ]; then
            MATCH=true
          fi

          if [ "$MATCH" != "true" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Matrix entry skipped: event=$EVENT_NAME matrix.event=$MATRIX_EVENT matrix.schedule='${MATRIX_SCHEDULE}' actual.schedule='${ACTUAL_SCHEDULE}'"
            exit 0
          fi

          if [ "$MATRIX_BACKEND" = "dispatch" ]; then
            BACKEND="${INPUT_BACKEND:-claude}"
          else
            BACKEND="$MATRIX_BACKEND"
          fi
          case "$BACKEND" in
            claude|deepseek-agentic|deepseek-pi) ;;
            *) echo "::error::Unknown backend '$BACKEND'"; exit 1 ;;
          esac
          {
            echo "skip=false"
            echo "name=${BACKEND}"
          } >> "$GITHUB_OUTPUT"
          echo "Resolved backend: ${BACKEND}"

      - name: Checkout repository
        if: steps.backend.outputs.skip != 'true'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get current datetime
        if: steps.backend.outputs.skip != 'true'
        id: datetime
        run: |
          {
            echo "date=$(date +'%Y-%m-%d')"
            echo "hour=$(date +'%H')"
            echo "timestamp=$(date +'%Y-%m-%d %H:%M UTC')"
            echo "yesterday=$(date -u -d 'yesterday' +'%Y-%m-%d')"
          } >> "$GITHUB_OUTPUT"

      - name: Setup Node.js
        if: steps.backend.outputs.skip != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Free disk space on runner
        run: |
          # The self-hosted runner can fill up if old workflow workdirs / apt
          # caches accumulate. Previous run failed with "No space left on
          # device" while writing logs. Cheap, safe cleanup before the rest
          # of the steps download anything.
          echo "Disk before:"
          df -h / 2>&1 | tail -2
          sudo apt-get clean -y >/dev/null 2>&1 || true
          sudo rm -rf /var/log/journal/* 2>/dev/null || true
          sudo find /tmp -mindepth 1 -maxdepth 1 -mtime +1 -exec rm -rf {} + 2>/dev/null || true
          # Old runner _diag logs (this is what crashed last time)
          sudo find /opt/actions-runner -name "_diag" -type d -exec sh -c 'find "$1" -name "*.log" -mtime +1 -delete' _ {} \; 2>/dev/null || true
          echo "Disk after:"
          df -h / 2>&1 | tail -2

      # ── Per-backend constants ──────────────────────────────────────
      # Centralized routing table so downstream steps don't need case
      # statements. One write here = many reads later.
      # Note: bird CLI + birdy install moved into the twitter-fetch composite
      # action (used below). Pin lives there.
      - name: Compute backend constants
        if: steps.backend.outputs.skip != 'true'
        id: const
        env:
          BACKEND: ${{ steps.backend.outputs.name }}
          DATE: ${{ steps.datetime.outputs.date }}
          HOUR: ${{ steps.datetime.outputs.hour }}
        run: |
          set -euo pipefail
          case "$BACKEND" in
            claude)
              OUTPUT_DIR="research/twitter"
              SUMMARY_SLUG="twitter"
              TITLE_SUFFIX=""
              CYCLE_HOURS=3
              COMMIT_PREFIX="Twitter update"
              FETCH_CONCURRENCY=8
              PRE_FILTER=false
              AGGREGATE=true
              ENABLE_DAEMON=true
              BIRD_BUDGET=20
              CURL_BUDGET=4
              HARNESS_LABEL="the production Claude Twitter/X AI monitor"
              FEATURES="headlines,hooker-batch,auto-research,dry-run"
              ;;
            deepseek-agentic)
              OUTPUT_DIR="research/twitter-deepseek"
              SUMMARY_SLUG="twitter-deepseek"
              TITLE_SUFFIX=" (DeepSeek v4 Pro)"
              CYCLE_HOURS=6
              COMMIT_PREFIX="Twitter (DeepSeek) update"
              FETCH_CONCURRENCY=6
              PRE_FILTER=true
              AGGREGATE=false
              ENABLE_DAEMON=true
              BIRD_BUDGET=30
              CURL_BUDGET=5
              HARNESS_LABEL="on DeepSeek v4 Pro"
              FEATURES="telegram"
              ;;
            deepseek-pi)
              OUTPUT_DIR="research/twitter-deepseek-pi"
              SUMMARY_SLUG="twitter-deepseek-pi"
              TITLE_SUFFIX=" (pi + DeepSeek)"
              CYCLE_HOURS=6
              COMMIT_PREFIX="Twitter (pi+DeepSeek) update"
              FETCH_CONCURRENCY=6
              PRE_FILTER=false
              AGGREGATE=false
              ENABLE_DAEMON=false
              BIRD_BUDGET=5
              CURL_BUDGET=3
              HARNESS_LABEL="on DeepSeek v4 Pro under the pi coding agent harness"
              FEATURES="telegram"
              ;;
          esac
          {
            echo "output_dir=${OUTPUT_DIR}"
            echo "summary_slug=${SUMMARY_SLUG}"
            echo "title_suffix=${TITLE_SUFFIX}"
            echo "cycle_hours=${CYCLE_HOURS}"
            echo "commit_prefix=${COMMIT_PREFIX}"
            echo "fetch_concurrency=${FETCH_CONCURRENCY}"
            echo "pre_filter=${PRE_FILTER}"
            echo "aggregate=${AGGREGATE}"
            echo "enable_daemon=${ENABLE_DAEMON}"
            echo "bird_budget=${BIRD_BUDGET}"
            echo "curl_budget=${CURL_BUDGET}"
            echo "harness_label=${HARNESS_LABEL}"
            echo "features=${FEATURES}"
            echo "headlines_file=research/summaries/${DATE}-${SUMMARY_SLUG}-${HOUR}h-headlines.json"
            echo "summary_file=research/summaries/${DATE}-${SUMMARY_SLUG}-${HOUR}h-summary.txt"
          } >> "$GITHUB_OUTPUT"
          echo "Backend constants for ${BACKEND}:"
          grep -E '^[a-z_]+=' "$GITHUB_OUTPUT" | sed 's/^/  /'

      # ── Shared fetch (bird + birdy multi-fetch + optional helpers) ─
      - name: Fetch twitter snapshot
        if: steps.backend.outputs.skip != 'true'
        uses: ./.github/actions/twitter-fetch
        with:
          bird_auth_token: ${{ secrets.BIRD_AUTH_TOKEN }}
          bird_ct0: ${{ secrets.BIRD_CT0 }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          concurrency: ${{ steps.const.outputs.fetch_concurrency }}
          pre_filter: ${{ steps.const.outputs.pre_filter }}
          aggregate: ${{ steps.const.outputs.aggregate }}
          free_disk: 'true'

      # ── Start birdy daemon (claude + deepseek-agentic) ─────────────
      # pi tier skips this — its harness uses plain `bird` only.
      # claude tier also skips on dry_run.
      - name: Start birdy daemon
        if: >-
          steps.const.outputs.enable_daemon == 'true'
          && !(github.event_name == 'workflow_dispatch' && steps.backend.outputs.name == 'claude' && inputs.dry_run == true)
        uses: ./.github/actions/birdy-daemon
        with:
          bird_auth_token: ${{ secrets.BIRD_AUTH_TOKEN }}
          bird_ct0: ${{ secrets.BIRD_CT0 }}

      # ── Install pi-coding-agent (deepseek-pi only) ─────────────────
      - name: Install pi coding agent
        if: steps.backend.outputs.name == 'deepseek-pi'
        run: npm install -g @mariozechner/pi-coding-agent

      - name: Configure git identity (pi tier — no claude-code-action to do it)
        if: steps.backend.outputs.name == 'deepseek-pi'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      # ── Render the shared prompt with backend-specific placeholders ─
      # Emits two outputs: `rendered_path` (file path on disk, for pi) and
      # `prompt` (full multi-line string, for claude-code-action which has
      # no `prompt_file:` input).
      - name: Render twitter-analyst prompt
        if: steps.backend.outputs.skip != 'true'
        id: render
        uses: ./.github/actions/render-twitter-prompt
        with:
          backend: ${{ steps.backend.outputs.name }}
          output_dir: ${{ steps.const.outputs.output_dir }}
          summary_slug: ${{ steps.const.outputs.summary_slug }}
          title_suffix: ${{ steps.const.outputs.title_suffix }}
          cycle_hours: ${{ steps.const.outputs.cycle_hours }}
          commit_prefix: ${{ steps.const.outputs.commit_prefix }}
          bird_budget: ${{ steps.const.outputs.bird_budget }}
          curl_budget: ${{ steps.const.outputs.curl_budget }}
          harness_label: ${{ steps.const.outputs.harness_label }}
          features: ${{ steps.const.outputs.features }}
          date: ${{ steps.datetime.outputs.date }}
          hour: ${{ steps.datetime.outputs.hour }}
          timestamp: ${{ steps.datetime.outputs.timestamp }}
          yesterday: ${{ steps.datetime.outputs.yesterday }}

      # ── LLM step (one per backend) ─────────────────────────────────

      - name: Process tweets with Claude (claude tier)
        if: >-
          steps.backend.outputs.name == 'claude'
          && !(github.event_name == 'workflow_dispatch' && inputs.dry_run == true)
        uses: anthropics/claude-code-action@v1
        env:
          AUTH_TOKEN: ${{ secrets.BIRD_AUTH_TOKEN }}
          CT0: ${{ secrets.BIRD_CT0 }}
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: |
            --model opus --allowedTools "Read,Write,Edit,Bash(git:*),Bash(bird:*),Bash(bird-fast:*),Bash(curl:*),Bash(jq:*)"
          prompt: ${{ steps.render.outputs.prompt }}

      - name: Process tweets with DeepSeek v4 Pro (deepseek-agentic tier)
        if: steps.backend.outputs.name == 'deepseek-agentic'
        uses: anthropics/claude-code-action@v1
        env:
          # Redirect Claude Code CLI to DeepSeek's Anthropic-compatible endpoint.
          # See https://api-docs.deepseek.com/guides/coding_agents
          ANTHROPIC_BASE_URL: https://api.deepseek.com/anthropic
          ANTHROPIC_AUTH_TOKEN: ${{ secrets.DEEPSEEK_API_KEY }}
          ANTHROPIC_MODEL: deepseek-v4-pro
          ANTHROPIC_DEFAULT_OPUS_MODEL: deepseek-v4-pro
          ANTHROPIC_DEFAULT_SONNET_MODEL: deepseek-v4-pro
          ANTHROPIC_DEFAULT_HAIKU_MODEL: deepseek-v4-flash
          CLAUDE_CODE_SUBAGENT_MODEL: deepseek-v4-flash
          CLAUDE_CODE_EFFORT_LEVEL: max
          AUTH_TOKEN: ${{ secrets.BIRD_AUTH_TOKEN }}
          CT0: ${{ secrets.BIRD_CT0 }}
        with:
          # Required by the action but ignored when ANTHROPIC_AUTH_TOKEN is set.
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: |
            --model opus --allowedTools "Read,Write,Edit,Bash(git:*),Bash(bird:*),Bash(bird-fast:*),Bash(curl:*),Bash(jq:*)"
          prompt: ${{ steps.render.outputs.prompt }}

      - name: Process tweets with pi + DeepSeek (deepseek-pi tier)
        if: steps.backend.outputs.name == 'deepseek-pi'
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          AUTH_TOKEN: ${{ secrets.BIRD_AUTH_TOKEN }}
          CT0: ${{ secrets.BIRD_CT0 }}
        run: |
          # Mirrors the model used by the agentic tier.
          # Note: the [1m] suffix used in the Anthropic-shim path is NOT
          # accepted on DeepSeek's OpenAI-compatible endpoint (returns
          # `400 Model Not Exist`). 1M context is the default for v4-pro
          # there, so plain `deepseek-v4-pro` already gets the 1M variant.
          # Bash allowlist: pi's --tools is coarse (bash on/off). For this
          # experiment we accept full bash on the trusted self-hosted runner.
          pi -p "$(cat /tmp/prompt-rendered.md)" \
            --no-session \
            --thinking high \
            --tools read,write,edit,bash,grep,find,ls \
            --model deepseek/deepseek-v4-pro

      # ── Stop birdy daemon (always, if started) ─────────────────────
      - name: Stop birdy daemon
        if: always() && steps.const.outputs.enable_daemon == 'true'
        run: |
          if [ -f /tmp/birdy-daemon.pid ]; then
            PID=$(cat /tmp/birdy-daemon.pid)
            if kill -0 "$PID" 2>/dev/null; then
              echo "Stopping daemon PID $PID..."
              kill -TERM "$PID" 2>/dev/null || true
              for attempt in 1 2; do
                sleep 1
                kill -0 "$PID" 2>/dev/null || break
                echo "Waiting for daemon shutdown, attempt ${attempt}/2"
              done
              kill -KILL "$PID" 2>/dev/null || true
            fi
            rm -f /tmp/birdy-daemon.pid
          fi
          if [ -f /tmp/birdy-daemon.log ]; then
            echo "--- daemon log (last 20 lines) ---"
            tail -20 /tmp/birdy-daemon.log
          fi

      # ── claude-tier dry-run fixture (skips push) ───────────────────
      - name: Create dry-run headline fixture (claude tier only)
        if: >-
          steps.backend.outputs.name == 'claude'
          && github.event_name == 'workflow_dispatch'
          && inputs.dry_run == true
        env:
          DATE: ${{ steps.datetime.outputs.date }}
          HOUR: ${{ steps.datetime.outputs.hour }}
          TIMESTAMP: ${{ steps.datetime.outputs.timestamp }}
        run: |
          set -euo pipefail
          mkdir -p research/twitter research/summaries

          cat >> "research/twitter/${DATE}.md" <<EOF
          ## ${HOUR}:00 UTC

          Dry-run fixture for headline alert dedupe.
          EOF

          cat > "research/summaries/${DATE}-twitter-${HOUR}h-summary.txt" <<EOF
          Twitter/X AI Pulse - ${TIMESTAMP}

          Dry-run fixture.
          EOF

          cat > "research/summaries/${DATE}-twitter-${HOUR}h-headlines.json" <<'EOF'
          [
            {
              "headline": "OPENAI CODEX GOES FULL COMPUTER-USE — OPENS BROWSER, CLICKS THROUGH GITHUB AND CLOSES ISSUE WHEN RATE-LIMITED",
              "source": "@steipete",
              "url": "https://x.com/steipete/status/2049035044702843053",
              "category": "model"
            },
            {
              "headline": "DRY RUN ONLY — NEW SYNTHETIC ALERT SHOULD SURVIVE DEDUPE",
              "source": "@dryrun",
              "url": "https://x.com/dryrun/status/999999999999999999",
              "category": "opensource"
            }
          ]
          EOF

      # ── claude-tier headline alert prep ────────────────────────────
      - name: Prepare headline alerts for delivery (claude tier)
        if: steps.backend.outputs.name == 'claude'
        env:
          HEADLINES_FILE: ${{ steps.const.outputs.headlines_file }}
          FILTERED_FILE: /tmp/${{ steps.datetime.outputs.date }}-twitter-${{ steps.datetime.outputs.hour }}h-headlines-to-send.json
          HISTORY_FILE: research/summaries/twitter-announced-history.json
          TIMESTAMP: ${{ steps.datetime.outputs.timestamp }}
        run: |
          set -euo pipefail

          mkdir -p research/summaries

          [ -f "$HEADLINES_FILE" ] || echo '[]' > "$HEADLINES_FILE"
          [ -f "$HISTORY_FILE" ] || echo '[]' > "$HISTORY_FILE"

          # No `git pull --rebase` here: the only writer for
          # twitter-announced-history.json is this workflow's own
          # hooker-send step (later in this same job), and the per-backend
          # concurrency group guarantees no parallel instance for the
          # claude tier. The checked-out tree is already authoritative
          # for our dedupe input. Doing a pull here would also fail on
          # the self-hosted runner because this step has no GITHUB_TOKEN
          # in env and the actions/checkout extraheader doesn't reliably
          # survive mid-job.

          python3 scripts/dedupe_headline_alerts.py filter \
            --headlines-file "$HEADLINES_FILE" \
            --history-file "$HISTORY_FILE" \
            --filtered-file "$FILTERED_FILE" \
            --timestamp "$TIMESTAMP"

      # ── Push the markdown digest + summary (all tiers, not on dry-run) ──
      # Note on push semantics (codex [P2] fix): a `git push` exit-non-zero
      # is treated as a HARD FAILURE here. Previously this step swallowed
      # push errors (auth, non-fast-forward, network) and let downstream
      # Hooker/Telegram steps notify users about content that never
      # actually landed on main. `git push` exits 0 when there's nothing
      # to push, so the no-op case still leaves `pushed=false` without
      # erroring. Real push errors now propagate.
      - name: Push changes
        if: >-
          steps.backend.outputs.skip != 'true'
          && !(github.event_name == 'workflow_dispatch' && steps.backend.outputs.name == 'claude' && inputs.dry_run == true)
        id: push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git"

          # Other workflows commit to main on different paths between
          # our checkout and now; rebase so this push is fast-forward.
          # Token is already on the remote URL above so auth works.
          git pull --rebase || { git rebase --abort 2>/dev/null || true; exit 1; }

          # Capture HEAD before push so we can tell "no commits to push"
          # (model wrote nothing this cycle, pushed=false, step still
          # succeeds) from "push failed" (pushed=false, step errors).
          PRE_HEAD=$(git rev-parse HEAD)
          UPSTREAM_HEAD=$(git rev-parse '@{u}' 2>/dev/null || echo "")

          if [ "$PRE_HEAD" = "$UPSTREAM_HEAD" ]; then
            echo "pushed=false" >> "$GITHUB_OUTPUT"
            echo "Nothing to push — HEAD matches upstream"
            exit 0
          fi

          # Real push — failure is fatal (no false-positive notifications).
          git push
          echo "pushed=true" >> "$GITHUB_OUTPUT"

      # ── Vercel deploy hook (claude tier only) ──────────────────────
      # Vercel's GitHub App webhook should fire on bot pushes too, but
      # if VERCEL_DEPLOY_HOOK is present we belt-and-suspenders it.
      - name: Trigger Vercel deploy (claude tier)
        if: >-
          steps.backend.outputs.name == 'claude'
          && steps.push.outputs.pushed == 'true'
          && !(github.event_name == 'workflow_dispatch' && inputs.dry_run == true)
        env:
          VERCEL_DEPLOY_HOOK: ${{ secrets.VERCEL_DEPLOY_HOOK }}
        run: |
          if [ -n "$VERCEL_DEPLOY_HOOK" ]; then
            curl -fsSL -X POST "$VERCEL_DEPLOY_HOOK" && echo "Vercel deploy hook fired"
          else
            echo "VERCEL_DEPLOY_HOOK not set; relying on Vercel's GitHub auto-deploy"
          fi

      # ── claude-tier dry-run summary (instead of real alerts) ───────
      - name: Dry-run alert summary (claude tier)
        if: >-
          success()
          && steps.backend.outputs.name == 'claude'
          && github.event_name == 'workflow_dispatch'
          && inputs.dry_run == true
        env:
          DATE: ${{ steps.datetime.outputs.date }}
          HOUR: ${{ steps.datetime.outputs.hour }}
        run: |
          set -euo pipefail
          HEADLINES_FILE="/tmp/${DATE}-twitter-${HOUR}h-headlines-to-send.json"
          COUNT=$(jq 'length' "$HEADLINES_FILE" 2>/dev/null || echo 0)
          echo "Dry run: $COUNT headline alerts would be sent after dedupe."
          jq -r '.[]? | "- " + (.headline // "") + " [" + (.url // "") + "]"' "$HEADLINES_FILE" 2>/dev/null || true

      # ── claude-tier Hooker headline blast ──────────────────────────
      - name: Send headline alerts to Hooker (claude tier)
        if: >-
          success()
          && steps.backend.outputs.name == 'claude'
          && !(github.event_name == 'workflow_dispatch' && inputs.dry_run == true)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOOKER_URL: ${{ secrets.HOOKER_URL }}
          HOOKER_TOKEN: ${{ secrets.HOOKER_TOKEN }}
          # JSON array of {chat_id, thread_id?} routes. Each headline is
          # fanned out to every route in a single /send-batch call. A
          # headline counts as "delivered" (and gets recorded in the
          # dedupe ledger) if AT LEAST ONE route accepted it, so a
          # transient failure on one chat doesn't keep re-spamming the
          # working chat forever.
          HOOKER_ROUTES: |
            [
              {"chat_id": "-1003805075491", "thread_id": "5771"},
              {"chat_id": "-1003988951534"}
            ]
          DATE: ${{ steps.datetime.outputs.date }}
          HOUR: ${{ steps.datetime.outputs.hour }}
          HISTORY_FILE: research/summaries/twitter-announced-history.json
          ANNOUNCED_AT: ${{ steps.datetime.outputs.timestamp }}
        run: |
          # Bloomberg-style "Market News Feed" cadence: each headline is
          # fanned out to every chat in HOOKER_ROUTES via a single
          # /send-batch call. Hooker v0.2.0 enforces a per-chat-id mutex
          # so Telegram's 1-msg/sec same-chat limit is honored
          # automatically across the fan-out. Replaces the previous
          # N parallel /send POSTs.

          HEADLINES_FILE="/tmp/${DATE}-twitter-${HOUR}h-headlines-to-send.json"

          if [ ! -f "$HEADLINES_FILE" ]; then
            echo "No headlines file at $HEADLINES_FILE — skipping alerts"
            exit 0
          fi

          COUNT=$(jq 'length' "$HEADLINES_FILE" 2>/dev/null || echo 0)
          if [ "$COUNT" -lt 1 ]; then
            echo "No new headline alerts after dedupe — skipping alerts"
            exit 0
          fi

          if [ -z "$HOOKER_URL" ] || [ -z "$HOOKER_TOKEN" ]; then
            echo "Hooker credentials missing — skipping"
            exit 0
          fi

          NUM_ROUTES=$(echo "$HOOKER_ROUTES" | jq 'length')
          if [ "$NUM_ROUTES" -lt 1 ]; then
            echo "HOOKER_ROUTES is empty — skipping"
            exit 0
          fi

          echo "Sending $COUNT headline alerts × $NUM_ROUTES routes via /send-batch..."

          # Format goal (per user): no title, no tags, no @source line, no
          # raw URL — just the headline + a clickable "link" to the tweet.
          # Hooker server renders HTML, so parse_mode=HTML and the URL is
          # embedded as <a href="...">link</a>.
          #
          # Materialize the valid-message subset BEFORE building the batch
          # so result indices map 1:1 back to headline records when we
          # need to record only the delivered subset.
          VALID_FILE="/tmp/${DATE}-twitter-${HOUR}h-headlines-valid.json"
          jq '[ .[] | select((.headline // "") != "" and (.url // "") != "") ]' \
            "$HEADLINES_FILE" > "$VALID_FILE"

          VALID_COUNT=$(jq 'length' "$VALID_FILE")
          if [ "$VALID_COUNT" -lt 1 ]; then
            echo "No valid messages to send — skipping"
            exit 0
          fi

          # Cartesian product: each headline × each route. Result index i
          # maps back to headline (i / NUM_ROUTES | floor) and route
          # (i % NUM_ROUTES). message_thread_id is omitted entirely when a
          # route has no thread, since Telegram rejects empty/zero threads
          # on chats without forum topics.
          BATCH_PAYLOAD=$(jq \
            --argjson routes "$HOOKER_ROUTES" \
            '{
              messages: [
                .[] as $h |
                $routes[] as $r |
                ({
                  chat_id: $r.chat_id,
                  title: "",
                  text: ($h.headline + " <a href=\"" + $h.url + "\">link</a>"),
                  priority: 3,
                  tags: [],
                  parse_mode: "HTML"
                } | if ($r.thread_id // "") != "" then . + {message_thread_id: $r.thread_id} else . end)
              ]
            }' "$VALID_FILE")

          BATCH_SIZE=$(echo "$BATCH_PAYLOAD" | jq '.messages | length')
          echo "Batch size: $BATCH_SIZE messages ($VALID_COUNT headlines × $NUM_ROUTES routes)"

          RESP=$(curl -sS -w "\nHTTP_STATUS:%{http_code}" \
            -X POST "${HOOKER_URL}/send-batch" \
            -H "Authorization: Bearer ${HOOKER_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "$BATCH_PAYLOAD")

          HTTP=$(echo "$RESP" | grep -oE 'HTTP_STATUS:[0-9]+' | tail -1 | cut -d: -f2)
          BODY="${RESP%HTTP_STATUS:*}"

          echo "Hooker /send-batch HTTP $HTTP"
          echo "$BODY" | jq -c '{delivered, failed, results_count: (.results | length)}' 2>/dev/null || echo "$BODY" | head -3

          if [ "$HTTP" != "200" ]; then
            echo "Batch request failed — body:"
            echo "$BODY" | head -20
            exit 1
          fi

          # Record headlines where AT LEAST ONE route accepted delivery.
          # Group results by headline (index / NUM_ROUTES | floor); a
          # headline's chunk has NUM_ROUTES entries and we want any of
          # them to be ok. This avoids re-spamming working routes when
          # one chat has a transient issue, while still retrying truly
          # un-delivered headlines on the next cycle.
          DELIVERED_FILE="/tmp/${DATE}-twitter-${HOUR}h-headlines-delivered.json"
          echo "$BODY" | jq \
            --slurpfile h "$VALID_FILE" \
            --argjson num_routes "$NUM_ROUTES" \
            '
              ($h[0]) as $headlines |
              ([.results[] | select(.ok == true) | (.index / $num_routes | floor)] | unique) as $delivered_idx |
              [ $delivered_idx[] | $headlines[.] ]
            ' > "$DELIVERED_FILE"

          DELIVERED_COUNT=$(jq 'length' "$DELIVERED_FILE")
          FAILED=$(echo "$BODY" | jq -r '.failed // 0')

          if [ "$DELIVERED_COUNT" -gt 0 ]; then
            python3 scripts/dedupe_headline_alerts.py record-delivered \
              --delivered-file "$DELIVERED_FILE" \
              --history-file "$HISTORY_FILE" \
              --timestamp "$ANNOUNCED_AT"

            git add "$HISTORY_FILE"
            if git commit -m "Track delivered Twitter headline alerts ${ANNOUNCED_AT}"; then
              # Retry push in case another workflow committed concurrently.
              PUSHED=false
              for attempt in 1 2 3; do
                if git push; then
                  PUSHED=true
                  break
                fi
                echo "History push attempt $attempt failed; rebasing"
                if ! git pull --rebase; then
                  git rebase --abort 2>/dev/null || true
                  break
                fi
              done
              if [ "$PUSHED" != "true" ]; then
                echo "Failed to push delivered-alert history after retries"
                exit 1
              fi
            else
              echo "No delivered alert history changes"
            fi
          fi

          if [ "$FAILED" -gt 0 ]; then
            echo "--- Failed messages ---"
            echo "$BODY" | jq -r '.results[] | select(.ok == false) | "  ✗ index=\(.index) error=\(.error // "unknown")"' | head -10
            exit 1
          fi

          echo "Done — batch delivered (delivered=$DELIVERED_COUNT, failed=$FAILED)."

      # ── DeepSeek-tier Telegram notification ────────────────────────
      - name: Read summary for Telegram (deepseek tiers)
        id: summary
        if: contains(fromJSON('["deepseek-agentic","deepseek-pi"]'), steps.backend.outputs.name)
        env:
          SUMMARY_FILE: ${{ steps.const.outputs.summary_file }}
        run: |
          if [ -f "$SUMMARY_FILE" ]; then
            SUMMARY=$(head -c 800 "$SUMMARY_FILE")
            {
              echo "content<<EOF"
              echo "$SUMMARY"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          else
            echo "content=No Twitter summary available" >> "$GITHUB_OUTPUT"
          fi

      - name: Send Telegram notification (deepseek-agentic)
        if: success() && steps.backend.outputs.name == 'deepseek-agentic'
        continue-on-error: true
        uses: appleboy/telegram-action@221e6b684967abe813051ee4a37dd61770a83ad3
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          format: markdown
          message: |
            🐦🦌 *Twitter/X AI Pulse — DeepSeek v4 Pro Agentic*

            ${{ steps.summary.outputs.content }}

            📄 [Full Update on GitHub](https://github.com/${{ github.repository }}/blob/main/research/twitter-deepseek/${{ steps.datetime.outputs.date }}.md)

      - name: Send Telegram notification (deepseek-pi)
        if: success() && steps.backend.outputs.name == 'deepseek-pi'
        continue-on-error: true
        uses: appleboy/telegram-action@221e6b684967abe813051ee4a37dd61770a83ad3
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          format: markdown
          message: |
            🐦🥧 *Twitter/X AI Pulse — pi + DeepSeek (Experimental)*

            ${{ steps.summary.outputs.content }}

            📄 [Full Update on GitHub](https://github.com/${{ github.repository }}/blob/main/research/twitter-deepseek-pi/${{ steps.datetime.outputs.date }}.md)

      # ── claude-tier auto-research throttle + topic select + dispatch ─
      # Picks ONE high-signal topic from today's twitter pulse and
      # dispatches generative-research.yml on the self-hosted runner.
      # Throttled to ≤2 dispatches per rolling 24h AND ≥10h between
      # dispatches so this never runs away. Counts every workflow_dispatch
      # event against the budget — manual dispatches reduce the auto budget.
      # All three steps are best-effort: continue-on-error so a selector
      # failure can never break the twitter pipeline.

      - name: Auto-research throttle check (claude tier)
        id: autoresearch_throttle
        if: >-
          steps.backend.outputs.name == 'claude'
          && steps.push.outputs.pushed == 'true'
          && !(github.event_name == 'workflow_dispatch' && inputs.dry_run == true)
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          # Count workflow_dispatch runs of generative-research in last 24h.
          SINCE=$(date -u -d '24 hours ago' '+%Y-%m-%dT%H:%M:%SZ')
          RECENT=$(gh run list --workflow=generative-research.yml \
            --created ">${SINCE}" --limit 20 \
            --json event --jq '[.[] | select(.event == "workflow_dispatch")] | length' \
            2>/dev/null || echo 0)
          # Find the most recent workflow_dispatch.
          LAST_ISO=$(gh run list --workflow=generative-research.yml --limit 20 \
            --json createdAt,event \
            --jq '[.[] | select(.event == "workflow_dispatch")][0].createdAt // empty' \
            2>/dev/null || true)
          [ -z "$LAST_ISO" ] && LAST_ISO="1970-01-01T00:00:00Z"
          LAST_EPOCH=$(date -u -d "$LAST_ISO" +%s 2>/dev/null || echo 0)
          NOW_EPOCH=$(date -u +%s)
          HOURS_SINCE=$(( (NOW_EPOCH - LAST_EPOCH) / 3600 ))
          echo "Recent 24h dispatches: $RECENT (cap 2)"
          echo "Hours since last dispatch: $HOURS_SINCE (min 10)"
          if [ "$RECENT" -ge 2 ] || [ "$HOURS_SINCE" -lt 10 ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Auto-research throttled (recent=$RECENT, hours_since=$HOURS_SINCE)."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "Auto-research budget available — proceeding to topic selection."
          fi

      - name: Auto-research topic selection (claude tier)
        id: autoresearch_select
        if: >-
          steps.backend.outputs.name == 'claude'
          && steps.autoresearch_throttle.outputs.skip == 'false'
        continue-on-error: true
        uses: anthropics/claude-code-action@v1
        env:
          GEN_TOPIC_DATE: ${{ steps.datetime.outputs.date }}
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: |
            --model opus --max-turns 10 --allowedTools "Read,Bash(ls:*),Bash(cat:*),Bash(jq:*),Bash(date:*),Bash(printenv:*),Write"
          prompt: |
            You select AT MOST ONE topic from today's Twitter AI Pulse to
            dispatch to the generative-research deep pipeline (4500–7000
            word analyst-grade article). Reason from first principles —
            challenge weak claims rather than rubber-stamp them. Be
            conservative: skipping is the default, not the exception. If
            nothing meets the bar, output NO_TOPIC and stop. Better to
            skip than to dispatch a weak topic.

            Step 1 — read today's twitter file. Get the date from env:
              DATE=$(printenv GEN_TOPIC_DATE)
              cat "research/twitter/${DATE}.md"
            If that path doesn't exist, fall back to the most recent file:
              ls -t research/twitter/*.md | head -1
            Read it.

            Step 2 — read the generative research index to dedupe:
              cat research/generative/index.json | jq '.[-30:]'
            (last 30 entries — covers ~3 weeks of past research)

            Step 3 — pick ONE topic OR reject all. Hard bar for selection:
              - Concrete: named entity (person, model, company, paper) +
                specific verifiable claim + dated primary source
              - Primary-sourced inside the twitter file (the "Evidence"
                bullets cite a primary like an IR page, paper, official
                tweet from a named principal — not commentary)
              - Has a "Watch" list under the story (signals ongoing
                developments worth tracking)
              - Does NOT overlap with anything in the recent index
                (compare by topic / tags / title — be strict)
              - Substantive enough for a 4500–7000 word analyst piece
                (a one-tweet rumour does not qualify, even if dramatic)

            Step 4 — output. Use the Write tool to create
            /tmp/auto-topic.txt.
              - If a topic qualifies: write ONE LINE, ≤140 chars, no
                quotes, no markdown, no leading/trailing whitespace.
                Phrasing should be a researchable, specific topic, e.g.:
                  Nemotron 3 Ultra: NVIDIA's first ~500B model pretrained natively in NVFP4
                  Anthropic's $30B / $900B FT round: what the cap-table now signals about Series F dynamics
              - If NOTHING qualifies: write the literal string NO_TOPIC
                (uppercase, no punctuation, on a single line).

            That is the only output file. Do not commit, do not write
            anything else. The next workflow step parses
            /tmp/auto-topic.txt and dispatches.

      - name: Auto-research dispatch (claude tier)
        if: >-
          steps.backend.outputs.name == 'claude'
          && steps.autoresearch_throttle.outputs.skip == 'false'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          if [ ! -f /tmp/auto-topic.txt ]; then
            echo "::warning::Selector did not write /tmp/auto-topic.txt — skipping dispatch."
            exit 0
          fi
          # Defensive parse: strip CR/LF/quotes, cap length to 200 chars.
          TOPIC=$(head -c 400 /tmp/auto-topic.txt \
            | tr -d '\r\n' \
            | sed -E 's/^["[:space:]]+//; s/["[:space:]]+$//')
          TOPIC=${TOPIC:0:200}
          if [ -z "$TOPIC" ] || [ "$TOPIC" = "NO_TOPIC" ]; then
            echo "Selector returned NO_TOPIC — nothing to dispatch."
            exit 0
          fi
          echo "Dispatching generative-research for: $TOPIC"
          gh workflow run generative-research.yml \
            -f topic="$TOPIC" \
            -f backend=deepseek-v4-pro
          echo "::notice::Auto-dispatched generative-research: ${TOPIC}"

      # ── Hooker telemetry (all tiers, always) ───────────────────────
      # Telemetry runs on success/failure of the real-work jobs only —
      # skipped matrix entries (those that didn't match the trigger)
      # would otherwise produce noisy "ok"/"unknown" telemetry every
      # cycle. always() still fires for the genuine job's failure mode.
      - name: Publish Hooker workflow telemetry
        if: always() && steps.backend.outputs.skip != 'true'
        uses: ./.github/actions/hooker-telemetry
        with:
          status: ${{ job.status }}
        env:
          HOOKER_URL: ${{ secrets.HOOKER_URL }}
          HOOKER_TOKEN: ${{ secrets.HOOKER_TOKEN }}
