name: Twitter AI News (Every 3 Hours)

on:
  schedule:
    # Run every 3 hours at minute 7
    - cron: '7 */3 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Run without pushing, deploying, or sending Hooker alerts'
        required: false
        default: false
        type: boolean

concurrency:
  group: hourly-twitter-${{ github.ref }}
  cancel-in-progress: true

jobs:
  twitter-news:
    runs-on: [self-hosted, Linux]
    permissions:
      contents: write
      actions: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get current datetime
        id: datetime
        run: |
          echo "date=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT
          echo "hour=$(date +'%H')" >> $GITHUB_OUTPUT
          echo "timestamp=$(date +'%Y-%m-%d %H:%M UTC')" >> $GITHUB_OUTPUT

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Free disk space on runner
        run: |
          # The self-hosted runner can fill up if old workflow workdirs / apt
          # caches accumulate. Previous run failed with "No space left on
          # device" while writing logs. Cheap, safe cleanup before the rest
          # of the steps download anything.
          echo "Disk before:"
          df -h / 2>&1 | tail -2
          sudo apt-get clean -y >/dev/null 2>&1 || true
          sudo rm -rf /var/log/journal/* 2>/dev/null || true
          sudo find /tmp -mindepth 1 -maxdepth 1 -mtime +1 -exec rm -rf {} + 2>/dev/null || true
          # Old runner _diag logs (this is what crashed last time)
          sudo find /opt/actions-runner -name "_diag" -type d -exec sh -c 'find "$1" -name "*.log" -mtime +1 -delete' _ {} \; 2>/dev/null || true
          echo "Disk after:"
          df -h / 2>&1 | tail -2

      - name: Install bird CLI
        run: npm install -g @steipete/bird

      - name: Install birdy from GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Download pre-built birdy binary from the latest release —
          # avoids needing Go toolchain (~150MB) on the self-hosted runner.
          # The v0.9.0+ release includes the `multi-fetch` command.
          set -e

          OS=$(uname -s | tr '[:upper:]' '[:lower:]')
          ARCH=$(uname -m)
          case "$ARCH" in
            x86_64|amd64) ARCH=amd64 ;;
            arm64|aarch64) ARCH=arm64 ;;
          esac
          ASSET="birdy_${OS}_${ARCH}.tar.gz"

          TMPDIR=$(mktemp -d)
          trap 'rm -rf "$TMPDIR"' EXIT

          # Public repo, no auth needed — but use gh if available for redirect handling
          curl -fsSL "https://github.com/guzus/birdy/releases/latest/download/${ASSET}" -o "$TMPDIR/$ASSET"
          tar -xzf "$TMPDIR/$ASSET" -C "$TMPDIR"

          BIN="$TMPDIR/birdy"
          [ -f "$BIN" ] || BIN="$TMPDIR/birdy_${OS}_${ARCH}"
          if [ ! -f "$BIN" ]; then
            echo "Could not find birdy binary in release tarball"
            ls "$TMPDIR" >&2
            exit 1
          fi

          sudo install -m 755 "$BIN" /usr/local/bin/birdy
          birdy version 2>&1 | head -3 || echo "(birdy installed)"

      - name: Fetch tweets, searches, and news via birdy multi-fetch
        env:
          # birdy's stateless account injection — no ~/.config/birdy file
          # needed in CI. The store auto-loads BIRDY_ACCOUNTS on Open().
          BIRDY_ACCOUNTS: '[{"name":"ci","auth_token":"${{ secrets.BIRD_AUTH_TOKEN }}","ct0":"${{ secrets.BIRD_CT0 }}"}]'
        run: |
          mkdir -p /tmp/bird

          # AI Labs & Company accounts
          labs="OpenAI AnthropicAI GoogleAI GoogleDeepMind MistralAI MetaAI CohereAI AI21Labs StabilityAI HuggingFace NVIDIAAIDev"

          # Hyperscalers — top execs and key insiders
          hyperscalers="elonmusk sama demishassabis OfficialLoganK alexalbert__ DrJimFan tszzl"

          # Others — researchers, analysts, specialists, media
          others="karpathy iruletheworldmo AndrewCurran_ fi56622380 jukan05 vitrupo dejavucoder jiratickets SemiAnalysis_ benthompson theinformation GavinSBaker mark_k ns123abc kimmonismus _akhaliq simonw emollick testingcatalog rasbt skirano jackclarkSF ylecun hardmaru JeffDean AravSrinivas deedydas swyx TheAITimeline levelsio steipete mckaywrigley nutlope rauchg amasad geoffreylitt jxnlco danshipper andreasklinger nikitabier tibo_maker marclou shl dharmesh"

          # Build the manifest via Python (avoids jq's multi-line quoting
          # issues inside YAML literal blocks): 50+ user-tweets ops + 7
          # keyword searches + news. All ops run in parallel inside one Go
          # process via birdy multi-fetch.
          export HANDLES="$labs $hyperscalers $others"
          python3 -c '
          import json, os
          handles = os.environ["HANDLES"].split()
          ops = [
              {"id": h, "args": ["user-tweets", "@" + h, "-n", "20", "--json", "--plain"]}
              for h in handles if h
          ] + [
              {"id": "search-ai",         "args": ["search", "AI announcement OR new model release OR GPT OR Claude OR Gemini OR Llama", "-n", "50", "--json", "--plain"]},
              {"id": "search-extra",      "args": ["search", "AI breakthrough OR AI launch OR AI update OR foundation model", "-n", "30", "--json", "--plain"]},
              {"id": "search-research",   "args": ["search", "AI paper OR machine learning research OR new benchmark OR state of the art SOTA", "-n", "30", "--json", "--plain"]},
              {"id": "search-infra",      "args": ["search", "AI chip OR GPU cluster OR AI infrastructure OR NVIDIA H100 OR TPU", "-n", "20", "--json", "--plain"]},
              {"id": "search-policy",     "args": ["search", "AI regulation OR AI safety OR AI policy OR AI governance OR AI alignment", "-n", "20", "--json", "--plain"]},
              {"id": "search-business",   "args": ["search", "AI startup funding OR AI acquisition OR AI valuation OR AI partnership", "-n", "20", "--json", "--plain"]},
              {"id": "search-opensource", "args": ["search", "open source AI OR open weights OR AI API OR AI developer tools", "-n", "20", "--json", "--plain"]},
              {"id": "news",              "args": ["news", "--ai-only", "-n", "40", "--json", "--plain"]},
          ]
          with open("/tmp/manifest.json", "w") as f:
              json.dump({"operations": ops, "concurrency": 8}, f)
          print(f"Built manifest: {len(ops)} ops")
          '

          echo "Manifest: $(jq '.operations | length' /tmp/manifest.json) ops, concurrency=$(jq '.concurrency' /tmp/manifest.json)"

          # Single CLI invocation, parallel internally. birdy writes
          # /tmp/bird/<id>.json for each op (and '[]' on op-level failure
          # so downstream LLMs that read empty arrays still work).
          birdy multi-fetch --manifest /tmp/manifest.json --output-dir /tmp/bird

      - name: Aggregate bird JSONs into a single file (cuts Claude read overhead)
        run: |
          # Claude was doing 70 sequential Read tool calls (one per /tmp/bird/*.json),
          # each turn paying ~300ms round-trip. Consolidating into one structured
          # file with provenance reduces reads to 1, saving ~15-20s per run plus
          # cutting the total turn count.
          #
          # Output schema:
          #   {
          #     "accounts":  {"OpenAI": [...], "sama": [...], ...},
          #     "searches":  {"ai": [...], "extra": [...], "news": [...], ...},
          #     "news":      [...],
          #     "meta":      {"total_tweets": N, "non_empty_accounts": M, "generated_at": "..."}
          #   }
          python3 -c '
          import json
          from pathlib import Path
          from datetime import datetime, timezone

          bird = Path("/tmp/bird")
          accounts, searches, news = {}, {}, []
          total = 0
          non_empty_accounts = 0

          for f in sorted(bird.glob("*.json")):
              if f.name in ("all.json", "manifest.json"):
                  continue
              try:
                  data = json.loads(f.read_text() or "[]")
              except Exception:
                  continue
              name = f.stem
              if name == "news":
                  news = data if isinstance(data, list) else []
                  total += len(news)
              elif name.startswith("search-"):
                  key = name.removeprefix("search-")
                  searches[key] = data if isinstance(data, list) else []
                  total += len(searches[key])
              else:
                  arr = data if isinstance(data, list) else []
                  accounts[name] = arr
                  total += len(arr)
                  if arr:
                      non_empty_accounts += 1

          out = {
              "accounts": accounts,
              "searches": searches,
              "news": news,
              "meta": {
                  "total_tweets": total,
                  "non_empty_accounts": non_empty_accounts,
                  "monitored_accounts": len(accounts),
                  "search_categories": len(searches),
                  "trending_news_items": len(news),
                  "generated_at": datetime.now(timezone.utc).isoformat(),
              },
          }
          (bird / "all.json").write_text(json.dumps(out, separators=(",", ":")))
          print(f"Aggregated: {len(accounts)} accounts ({non_empty_accounts} non-empty), "
                f"{len(searches)} searches, {len(news)} news items, "
                f"{total} tweets total")
          '
          echo "all.json size: $(wc -c < /tmp/bird/all.json) bytes"

      - name: Process tweets with Claude
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.dry_run != true }}
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: |
            --model opus --allowedTools "Read,Write,Edit,Bash(git:*)"
          prompt: |
            You are a comprehensive Twitter/X AI news monitor. Process raw tweet data fetched by
            the bird CLI and produce a detailed update covering the full AI landscape.

            TIMESTAMP: ${{ steps.datetime.outputs.timestamp }}

            YOU WILL WRITE THREE OUTPUT FILES (all three are mandatory — do NOT skip the third):
            1. research/twitter/${{ steps.datetime.outputs.date }}.md (daily markdown digest, append section)
            2. research/summaries/${{ steps.datetime.outputs.date }}-twitter-${{ steps.datetime.outputs.hour }}h-summary.txt (Telegram-friendly text rollup)
            3. research/summaries/${{ steps.datetime.outputs.date }}-twitter-${{ steps.datetime.outputs.hour }}h-headlines.json (structured headline alerts — REQUIRED for downstream Telegram blast)

            All three exist in every cycle, including quiet ones. For a quiet cycle the
            JSON file is `[]` (empty array) but the file is still created.

            OUTPUT (markdown digest): research/twitter/${{ steps.datetime.outputs.date }}.md

            RAW DATA: a SINGLE consolidated file at `/tmp/bird/all.json` with this shape:
            {
              "accounts":  { "OpenAI": [...tweets], "sama": [...], ... },   // ~50 monitored handles
              "searches":  { "ai": [...], "extra": [...], "research": [...], "infra": [...], "policy": [...], "business": [...], "opensource": [...] },
              "news":      [...trending AI news headlines],
              "meta":      { "total_tweets": N, "non_empty_accounts": M, ... }
            }

            (Per-handle and per-search files also exist at /tmp/bird/<id>.json
            for backwards compat, but DO NOT read them individually — read
            `all.json` once. This is much faster than 70 sequential Read calls.)

            INSTRUCTIONS:
            1. Read `/tmp/bird/all.json` ONCE — that contains everything.
            2. Filter for SIGNIFICANT tweets from the last ~3 hours:
               - Product announcements, model releases, API changes
               - Research papers, benchmarks, technical breakthroughs
               - Major partnerships, funding rounds, acquisitions
               - Policy changes, regulation, safety developments
               - Infrastructure news (chips, compute, hardware)
               - Open source releases, developer tools, frameworks
               - Notable technical insights and opinions from key researchers
            3. De-duplicate across sources (same tweet may appear in account feed + search)
            4. Skip: retweets of old news, casual tweets, promotional content, engagement bait
            5. Include engagement metrics when notably high (viral tweets)

            FORMAT: Append to the daily file (create if doesn't exist).
            If the file already exists, append the new section at the end.

            ## ${{ steps.datetime.outputs.hour }}:00 UTC

            ### Breaking News
            - [Tweet summary] — @handle — https://x.com/handle/status/ID

            ### Model Releases & Product Updates
            - [Tweet summary] — @handle — https://x.com/handle/status/ID

            ### Research & Papers
            - [Tweet summary with paper title if applicable] — @handle — https://x.com/handle/status/ID

            ### Infrastructure & Hardware
            - [Tweet summary] — @handle — https://x.com/handle/status/ID

            ### Business & Funding
            - [Tweet summary] — @handle — https://x.com/handle/status/ID

            ### Policy, Safety & Regulation
            - [Tweet summary] — @handle — https://x.com/handle/status/ID

            ### Open Source & Developer Tools
            - [Tweet summary] — @handle — https://x.com/handle/status/ID

            ### Notable Opinions & Insights
            - [Tweet summary] — @handle — https://x.com/handle/status/ID

            ### Trending AI News
            - [Headline] — [description]

            Omit any section that has no items. If no significant updates found at all, write:
            ## ${{ steps.datetime.outputs.hour }}:00 UTC
            No significant updates this period.

            STEP 2 - WRITE TELEGRAM SUMMARY:
            After writing the Twitter update, also write a SHORT summary for Telegram notification.
            Use Write tool to create: research/summaries/${{ steps.datetime.outputs.date }}-twitter-${{ steps.datetime.outputs.hour }}h-summary.txt

            Format (plain text, max 800 chars):
            ```
            Twitter/X AI Pulse - ${{ steps.datetime.outputs.timestamp }}

            WHAT'S BUZZING:
            • [Top story 1]
            • [Top story 2]
            • [Top story 3]

            NOTABLE:
            • [Key insight or trend]

            Full update on GitHub.
            ```

            If no significant updates were found, write:
            ```
            Twitter/X AI Pulse - ${{ steps.datetime.outputs.timestamp }}

            Quiet period — no major AI updates on Twitter/X.
            ```

            STEP 3 — WRITE STRUCTURED HEADLINE ALERTS:
            Use the Write tool to also create:
            research/summaries/${{ steps.datetime.outputs.date }}-twitter-${{ steps.datetime.outputs.hour }}h-headlines.json

            This file is a JSON array of the TOP 3-7 alert-worthy stories from this cycle —
            the items most worth pushing to Telegram as Bloomberg-style "Market News Feed"
            alerts. Each entry is one punchy headline + source + URL.

            Schema (write nothing else, just the JSON array):
            ```
            [
              {
                "headline": "ANTHROPIC MYTHOS BREACHED — FIRST CONFIRMED EXFILTRATION OF GATED FRONTIER MODEL",
                "source": "@TheInformation",
                "url": "https://x.com/the_information/status/2048...",
                "category": "breaking"
              },
              {
                "headline": "DEEPSEEK V4 NOW 139× CHEAPER THAN GPT-5.5 ON CACHED INPUT",
                "source": "@DeepSeek",
                "url": "https://x.com/...",
                "category": "model"
              }
            ]
            ```

            Headline rules:
            - ALL CAPS, terminal-newsfeed voice, like Bloomberg/Punchbowl alerts
            - Maximum 140 characters per headline
            - One punchy fact per headline — no commentary, no engagement metrics
            - Spell out acronyms only when ambiguous; OK to keep "GPT-5.5", "TPU", "API"
            - Source = the @handle of the most authoritative tweet
            - URL = the actual tweet URL
            - category ∈ {breaking, model, research, infra, business, policy, opensource}

            Quantity rules:
            - 3 to 7 headlines per cycle. Tight cycles get 3-4, busy ones up to 7.
            - If fewer than 3 truly significant stories exist, write `[]` (empty array) —
              do NOT pad with low-value items just to hit the floor.
            - Skip recycled news, opinion-only takes, casual chatter.

            STEP 4 — Verify ALL THREE files exist before committing. If headlines.json
            is missing, go back and create it (even if just `[]`). Then commit:
            git add research/twitter/ research/summaries/
            git commit -m "Twitter update ${{ steps.datetime.outputs.timestamp }}" || echo "No changes"

            CRITICAL: A run without headlines.json blocks the downstream Telegram alert
            blast. ALWAYS write the JSON file, even if it's `[]`.

      - name: Create dry-run headline fixture
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run == true }}
        env:
          DATE: ${{ steps.datetime.outputs.date }}
          HOUR: ${{ steps.datetime.outputs.hour }}
          TIMESTAMP: ${{ steps.datetime.outputs.timestamp }}
        run: |
          set -euo pipefail
          mkdir -p research/twitter research/summaries

          cat >> "research/twitter/${DATE}.md" <<EOF
          ## ${HOUR}:00 UTC

          Dry-run fixture for headline alert dedupe.
          EOF

          cat > "research/summaries/${DATE}-twitter-${HOUR}h-summary.txt" <<EOF
          Twitter/X AI Pulse - ${TIMESTAMP}

          Dry-run fixture.
          EOF

          cat > "research/summaries/${DATE}-twitter-${HOUR}h-headlines.json" <<'EOF'
          [
            {
              "headline": "OPENAI CODEX GOES FULL COMPUTER-USE — OPENS BROWSER, CLICKS THROUGH GITHUB AND CLOSES ISSUE WHEN RATE-LIMITED",
              "source": "@steipete",
              "url": "https://x.com/steipete/status/2049035044702843053",
              "category": "model"
            },
            {
              "headline": "DRY RUN ONLY — NEW SYNTHETIC ALERT SHOULD SURVIVE DEDUPE",
              "source": "@dryrun",
              "url": "https://x.com/dryrun/status/999999999999999999",
              "category": "opensource"
            }
          ]
          EOF

      - name: Prepare headline alerts for delivery
        env:
          HEADLINES_FILE: research/summaries/${{ steps.datetime.outputs.date }}-twitter-${{ steps.datetime.outputs.hour }}h-headlines.json
          FILTERED_FILE: /tmp/${{ steps.datetime.outputs.date }}-twitter-${{ steps.datetime.outputs.hour }}h-headlines-to-send.json
          HISTORY_FILE: research/summaries/twitter-announced-history.json
          TIMESTAMP: ${{ steps.datetime.outputs.timestamp }}
          DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run == true }}
        run: |
          set -euo pipefail

          mkdir -p research/summaries

          [ -f "$HEADLINES_FILE" ] || echo '[]' > "$HEADLINES_FILE"
          [ -f "$HISTORY_FILE" ] || echo '[]' > "$HISTORY_FILE"

          # Rebase before filtering so the delivered-alert ledger is current.
          # Dry-run fixtures are intentionally uncommitted, so skip rebase there.
          if [ "$DRY_RUN" != "true" ]; then
            git pull --rebase
          fi

          python3 scripts/dedupe_headline_alerts.py filter \
            --headlines-file "$HEADLINES_FILE" \
            --history-file "$HISTORY_FILE" \
            --filtered-file "$FILTERED_FILE" \
            --timestamp "$TIMESTAMP"

      - name: Push changes
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.dry_run != true }}
        id: push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git
          git push
          echo "pushed=true" >> $GITHUB_OUTPUT

      # GITHUB_TOKEN pushes don't trigger other workflows, so explicitly trigger deploy
      - name: Trigger dashboard deploy
        if: ${{ steps.push.outputs.pushed == 'true' && (github.event_name != 'workflow_dispatch' || inputs.dry_run != true) }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl --fail-with-body --silent --show-error \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/deploy-dashboard.yml/dispatches" \
            -d '{"ref":"main"}'

      - name: Dry-run alert summary
        if: ${{ success() && github.event_name == 'workflow_dispatch' && inputs.dry_run == true }}
        env:
          DATE: ${{ steps.datetime.outputs.date }}
          HOUR: ${{ steps.datetime.outputs.hour }}
        run: |
          set -euo pipefail
          HEADLINES_FILE="/tmp/${DATE}-twitter-${HOUR}h-headlines-to-send.json"
          COUNT=$(jq 'length' "$HEADLINES_FILE" 2>/dev/null || echo 0)
          echo "Dry run: $COUNT headline alerts would be sent after dedupe."
          jq -r '.[]? | "- " + (.headline // "") + " [" + (.url // "") + "]"' "$HEADLINES_FILE" 2>/dev/null || true

      - name: Send headline alerts to Hooker (parallel, supergroup thread)
        if: ${{ success() && (github.event_name != 'workflow_dispatch' || inputs.dry_run != true) }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOOKER_URL: ${{ secrets.HOOKER_URL }}
          HOOKER_TOKEN: ${{ secrets.HOOKER_TOKEN }}
          # JSON array of {chat_id, thread_id?} routes. Each headline is
          # fanned out to every route in a single /send-batch call. A
          # headline counts as "delivered" (and gets recorded in the
          # dedupe ledger) if AT LEAST ONE route accepted it, so a
          # transient failure on one chat doesn't keep re-spamming the
          # working chat forever.
          HOOKER_ROUTES: |
            [
              {"chat_id": "-1003805075491", "thread_id": "5771"},
              {"chat_id": "-1003988951534"}
            ]
          DATE: ${{ steps.datetime.outputs.date }}
          HOUR: ${{ steps.datetime.outputs.hour }}
          HISTORY_FILE: research/summaries/twitter-announced-history.json
          ANNOUNCED_AT: ${{ steps.datetime.outputs.timestamp }}
        run: |
          # Bloomberg-style "Market News Feed" cadence: each headline is
          # fanned out to every chat in HOOKER_ROUTES via a single
          # /send-batch call. Hooker v0.2.0 enforces a per-chat-id mutex
          # so Telegram's 1-msg/sec same-chat limit is honored
          # automatically across the fan-out. Replaces the previous
          # N parallel /send POSTs.

          HEADLINES_FILE="/tmp/${DATE}-twitter-${HOUR}h-headlines-to-send.json"

          if [ ! -f "$HEADLINES_FILE" ]; then
            echo "No headlines file at $HEADLINES_FILE — skipping alerts"
            exit 0
          fi

          COUNT=$(jq 'length' "$HEADLINES_FILE" 2>/dev/null || echo 0)
          if [ "$COUNT" -lt 1 ]; then
            echo "No new headline alerts after dedupe — skipping alerts"
            exit 0
          fi

          if [ -z "$HOOKER_URL" ] || [ -z "$HOOKER_TOKEN" ]; then
            echo "Hooker credentials missing — skipping"
            exit 0
          fi

          NUM_ROUTES=$(echo "$HOOKER_ROUTES" | jq 'length')
          if [ "$NUM_ROUTES" -lt 1 ]; then
            echo "HOOKER_ROUTES is empty — skipping"
            exit 0
          fi

          echo "Sending $COUNT headline alerts × $NUM_ROUTES routes via /send-batch..."

          # Format goal (per user): no title, no tags, no @source line, no
          # raw URL — just the headline + a clickable "link" to the tweet.
          # Hooker server renders HTML, so parse_mode=HTML and the URL is
          # embedded as <a href="...">link</a>.
          #
          # Materialize the valid-message subset BEFORE building the batch
          # so result indices map 1:1 back to headline records when we
          # need to record only the delivered subset.
          VALID_FILE="/tmp/${DATE}-twitter-${HOUR}h-headlines-valid.json"
          jq '[ .[] | select((.headline // "") != "" and (.url // "") != "") ]' \
            "$HEADLINES_FILE" > "$VALID_FILE"

          VALID_COUNT=$(jq 'length' "$VALID_FILE")
          if [ "$VALID_COUNT" -lt 1 ]; then
            echo "No valid messages to send — skipping"
            exit 0
          fi

          # Cartesian product: each headline × each route. Result index i
          # maps back to headline (i / NUM_ROUTES | floor) and route
          # (i % NUM_ROUTES). message_thread_id is omitted entirely when a
          # route has no thread, since Telegram rejects empty/zero threads
          # on chats without forum topics.
          BATCH_PAYLOAD=$(jq \
            --argjson routes "$HOOKER_ROUTES" \
            '{
              messages: [
                .[] as $h |
                $routes[] as $r |
                ({
                  chat_id: $r.chat_id,
                  title: "",
                  text: ($h.headline + " <a href=\"" + $h.url + "\">link</a>"),
                  priority: 3,
                  tags: [],
                  parse_mode: "HTML"
                } | if ($r.thread_id // "") != "" then . + {message_thread_id: $r.thread_id} else . end)
              ]
            }' "$VALID_FILE")

          BATCH_SIZE=$(echo "$BATCH_PAYLOAD" | jq '.messages | length')
          echo "Batch size: $BATCH_SIZE messages ($VALID_COUNT headlines × $NUM_ROUTES routes)"

          RESP=$(curl -sS -w "\nHTTP_STATUS:%{http_code}" \
            -X POST "${HOOKER_URL}/send-batch" \
            -H "Authorization: Bearer ${HOOKER_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "$BATCH_PAYLOAD")

          HTTP=$(echo "$RESP" | grep -oE 'HTTP_STATUS:[0-9]+' | tail -1 | cut -d: -f2)
          BODY=$(echo "$RESP" | sed 's/HTTP_STATUS:[0-9]*$//')

          echo "Hooker /send-batch HTTP $HTTP"
          echo "$BODY" | jq -c '{delivered, failed, results_count: (.results | length)}' 2>/dev/null || echo "$BODY" | head -3

          if [ "$HTTP" != "200" ]; then
            echo "Batch request failed — body:"
            echo "$BODY" | head -20
            exit 1
          fi

          # Record headlines where AT LEAST ONE route accepted delivery.
          # Group results by headline (index / NUM_ROUTES | floor); a
          # headline's chunk has NUM_ROUTES entries and we want any of
          # them to be ok. This avoids re-spamming working routes when
          # one chat has a transient issue, while still retrying truly
          # un-delivered headlines on the next cycle.
          DELIVERED_FILE="/tmp/${DATE}-twitter-${HOUR}h-headlines-delivered.json"
          echo "$BODY" | jq \
            --slurpfile h "$VALID_FILE" \
            --argjson num_routes "$NUM_ROUTES" \
            '
              ($h[0]) as $headlines |
              ([.results[] | select(.ok == true) | (.index / $num_routes | floor)] | unique) as $delivered_idx |
              [ $delivered_idx[] | $headlines[.] ]
            ' > "$DELIVERED_FILE"

          DELIVERED_COUNT=$(jq 'length' "$DELIVERED_FILE")
          FAILED=$(echo "$BODY" | jq -r '.failed // 0')

          if [ "$DELIVERED_COUNT" -gt 0 ]; then
            python3 scripts/dedupe_headline_alerts.py record-delivered \
              --delivered-file "$DELIVERED_FILE" \
              --history-file "$HISTORY_FILE" \
              --timestamp "$ANNOUNCED_AT"

            git add "$HISTORY_FILE"
            if git commit -m "Track delivered Twitter headline alerts ${ANNOUNCED_AT}"; then
              # Retry push in case another workflow committed concurrently.
              PUSHED=false
              for attempt in 1 2 3; do
                if git push; then
                  PUSHED=true
                  break
                fi
                echo "History push attempt $attempt failed; rebasing"
                if ! git pull --rebase; then
                  git rebase --abort 2>/dev/null || true
                  break
                fi
              done
              if [ "$PUSHED" != "true" ]; then
                echo "Failed to push delivered-alert history after retries"
                exit 1
              fi
            else
              echo "No delivered alert history changes"
            fi
          fi

          if [ "$FAILED" -gt 0 ]; then
            echo "--- Failed messages ---"
            echo "$BODY" | jq -r '.results[] | select(.ok == false) | "  ✗ index=\(.index) error=\(.error // "unknown")"' | head -10
            exit 1
          fi

          echo "Done — batch delivered (delivered=$DELIVERED_COUNT, failed=$FAILED)."
