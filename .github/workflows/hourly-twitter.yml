name: Twitter AI News (matrix — claude / deepseek-claude-code / zai-glm-5p2 / deepseek-pi / fireworks-pi / opencode-kimi-k3)

# Unified Twitter/X pipeline that fans out across six backend tiers:
#   - claude            (cron '7 */3 * * *', primary tier, model routed by data/agent-backends.json,
#                        output → research/twitter/)
#   - deepseek-claude-code (cron '37 */6 * * *', model: deepseek-v4-flash via Fireworks, output → research/twitter-deepseek/)
#   - zai-glm-5p2      (manual only,        model: glm-5.2 via Z.ai Coding Plan,
#                        output → research/twitter-zai/)
#   - deepseek-pi       (manual only,        model: deepseek-v4-flash via Fireworks + pi harness,
#                        output → research/twitter-deepseek-pi/)
#   - fireworks-pi      (manual only,        model: Kimi K2.6 via Fireworks + pi,
#                        output → research/twitter-fireworks-pi/)
#
# Routing rules:
#   - schedule trigger → backend resolved from github.event.schedule by the
#     matrix `include` list. Each cron only activates the matrix entry
#     whose `schedule` field matches, so the active matrix size is 1.
#   - workflow_dispatch → backend resolved from inputs.backend (default: zai-glm-5p2).
#
# The backend tiers share:
#   - .github/actions/twitter-fetch          (Birdy multi-fetch + optional pre-filter + optional aggregate)
#   - .github/actions/birdy-daemon           (warm read-only Birdy daemon + birdy-fast wrapper)
#   - .github/actions/render-twitter-prompt  (substitute {{placeholders}} in prompts/twitter-analyst.md)
#   - prompts/twitter-analyst.md             (one prompt body with {{placeholders}} for tier-specific values)
#
# History (collapsed from earlier per-backend workflows in #PR-twitter-matrix):
#   - hourly-twitter.yml                   (Claude tier)
#   - legacy DeepSeek Claude Code tier     (DeepSeek via Anthropic-compatible shim)
#   - legacy DeepSeek pi tier              (DeepSeek via pi harness)
#
# Required secrets:
#   CLAUDE_CODE_OAUTH_TOKEN              — required by claude-code-action wrapper
#   FIREWORKS_API_KEY                    — comparison tiers and fallback-capable agent-run lanes
#   ZAI_API_KEY                          — preferred manual Z.ai GLM-5.2 Claude Code comparison tier
#   BIRDY_ACCOUNTS                       — optional multi-account rotation JSON; each account is forced read-only
#   BIRD_AUTH_TOKEN, BIRD_CT0            — fallback single-account cookies when BIRDY_ACCOUNTS is absent
#   HOOKER_URL, HOOKER_TOKEN             — primary tier (headline-alert blast + telemetry) and comparison tiers (per-cycle notification, relayed to Telegram)
#   VERCEL_DEPLOY_HOOK                   — optional, primary tier only

on:
  schedule:
    # claude tier: every 3 hours at minute 7.
    - cron: '7 */3 * * *'
    # deepseek-claude-code tier: every 6 hours at minute 37. Offset 30min from
    # the nearest claude run so neither hits Birdy at the same time.
    # Slots are 00:37, 06:37, 12:37, 18:37 UTC.
    - cron: '37 */6 * * *'
  workflow_dispatch:
    inputs:
      backend:
        description: Which backend tier to run.
        required: false
        default: zai-glm-5p2
        type: choice
        options:
          - zai-glm-5p2
          - claude
          - deepseek-claude-code
          - deepseek-pi
          - fireworks-pi
          - opencode-kimi-k3
      dry_run:
        description: Claude tier only — render fixture, skip push/deploy/alerts.
        required: false
        default: false
        type: boolean

# Per-backend concurrency groups: each tier serializes against itself
# (cron-driven and manually-dispatched runs of the same backend land
# in the same group, so they queue/cancel against each other) but the
# tiers can run in parallel when their schedules collide.
#
# For workflow_dispatch we read inputs.backend. For schedule we map
# the cron expression to a backend label inline — keeping the
# expression in one place so the dispatch-vs-cron mapping is obvious.
# `cancel-in-progress: false`: a running brief is preserved if a new
# cron fires (the writer would otherwise be killed mid-Hooker-batch).
concurrency:
  # Guard inputs.backend with an event-name check: in recent GHA,
  # inputs.* is populated with `default:` values across all event types,
  # so on a cron trigger `inputs.backend` would silently resolve to
  # 'claude' and collapse both cron tiers into the same concurrency
  # group. Reading inputs.backend ONLY when we're actually on a dispatch
  # trigger keeps the cron→backend mapping intact.
  group: hourly-twitter-${{ (github.event_name == 'workflow_dispatch' && inputs.backend) || (github.event.schedule == '7 */3 * * *' && 'claude') || (github.event.schedule == '37 */6 * * *' && 'deepseek-claude-code') || 'unknown' }}
  cancel-in-progress: false

jobs:
  twitter:
    runs-on: [self-hosted, Linux]
    # Per-matrix-leg cap (applies to each backend leg, not summed) so a hung
    # Birdy/agent step can't pin a Cloud Run worker for GitHub's 6h default.
    timeout-minutes: 60
    permissions:
      contents: write
      pull-requests: write
      actions: write
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        include:
          # Trigger-vs-entry filtering happens INSIDE the first step
          # (the `Resolve backend` step's `skip` output) — `matrix.*`
          # is NOT available in `jobs.<job_id>.if` per
          # https://docs.github.com/en/actions/reference/contexts-reference
          # (only github/needs/vars/inputs are evaluated before the
          # matrix is expanded), so the filtering must run from inside a
          # step where steps.if can read matrix.event / matrix.schedule.
          # Wasted-job cost: each cron trigger creates 3 jobs and 2 of
          # them exit at step 1.
          - backend: claude
            event: schedule
            schedule: '7 */3 * * *'
          - backend: deepseek-claude-code
            event: schedule
            schedule: '37 */6 * * *'
          # workflow_dispatch path — single entry, runtime-resolved.
          - backend: dispatch
            event: workflow_dispatch

    steps:
      # ── Resolve backend for this run + trigger gate ────────────────
      # 1. Decide whether this matrix entry matches the current trigger.
      #    If not, set skip=true and short-circuit every later step.
      # 2. If matched: when matrix.backend == 'dispatch' read inputs.backend;
      #    otherwise use matrix.backend directly. All later steps read
      #    steps.backend.outputs.name instead of matrix.backend.
      - name: Resolve backend
        id: backend
        env:
          EVENT_NAME: ${{ github.event_name }}
          MATRIX_EVENT: ${{ matrix.event }}
          MATRIX_SCHEDULE: ${{ matrix.schedule }}
          ACTUAL_SCHEDULE: ${{ github.event.schedule }}
          MATRIX_BACKEND: ${{ matrix.backend }}
          INPUT_BACKEND: ${{ inputs.backend }}
        run: |
          set -euo pipefail

          # Match this matrix entry against the current trigger.
          MATCH=false
          if [ "$EVENT_NAME" = "schedule" ] && [ "$MATRIX_EVENT" = "schedule" ] && [ "$MATRIX_SCHEDULE" = "$ACTUAL_SCHEDULE" ]; then
            MATCH=true
          elif [ "$EVENT_NAME" = "workflow_dispatch" ] && [ "$MATRIX_EVENT" = "workflow_dispatch" ]; then
            MATCH=true
          fi

          if [ "$MATCH" != "true" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Matrix entry skipped: event=$EVENT_NAME matrix.event=$MATRIX_EVENT matrix.schedule='${MATRIX_SCHEDULE}' actual.schedule='${ACTUAL_SCHEDULE}'"
            exit 0
          fi

          if [ "$MATRIX_BACKEND" = "dispatch" ]; then
            BACKEND="${INPUT_BACKEND:-zai-glm-5p2}"
          else
            BACKEND="$MATRIX_BACKEND"
          fi
          case "$BACKEND" in
            claude|deepseek-claude-code|zai-glm-5p2|deepseek-pi|fireworks-pi|opencode-kimi-k3) ;;
            *) echo "::error::Unknown backend '$BACKEND'"; exit 1 ;;
          esac
          {
            echo "skip=false"
            echo "name=${BACKEND}"
          } >> "$GITHUB_OUTPUT"
          echo "Resolved backend: ${BACKEND}"

      - name: Checkout repository
        if: steps.backend.outputs.skip != 'true'
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Get current datetime
        if: steps.backend.outputs.skip != 'true'
        id: datetime
        run: |
          {
            echo "date=$(date -u +'%Y-%m-%d')"
            echo "hour=$(date -u +'%H')"
            echo "timestamp=$(date -u +'%Y-%m-%d %H:%M:%S UTC')"
            echo "yesterday=$(date -u -d 'yesterday' +'%Y-%m-%d')"
          } >> "$GITHUB_OUTPUT"

      - name: Setup Node.js
        if: steps.backend.outputs.skip != 'true'
        uses: actions/setup-node@v7
        with:
          node-version: '22'

      - name: Setup uv
        if: steps.backend.outputs.skip != 'true'
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install Python dependencies
        if: steps.backend.outputs.skip != 'true'
        run: uv sync --frozen

      - name: Free disk space on runner
        run: |
          # The self-hosted runner can fill up if old workflow workdirs / apt
          # caches accumulate. Previous run failed with "No space left on
          # device" while writing logs. Cheap, safe cleanup before the rest
          # of the steps download anything.
          echo "Disk before:"
          df -h / 2>&1 | tail -2
          sudo apt-get clean -y >/dev/null 2>&1 || true
          sudo rm -rf /var/log/journal/* 2>/dev/null || true
          sudo find /tmp -mindepth 1 -maxdepth 1 -mtime +1 -exec rm -rf {} + 2>/dev/null || true
          # Old runner _diag logs (this is what crashed last time)
          sudo find /opt/actions-runner -name "_diag" -type d -exec sh -c 'find "$1" -name "*.log" -mtime +1 -delete' _ {} \; 2>/dev/null || true
          echo "Disk after:"
          df -h / 2>&1 | tail -2

      # ── Per-backend constants ──────────────────────────────────────
      # Centralized routing table so downstream steps don't need case
      # statements. One write here = many reads later.
      # Note: Birdy install moved into the twitter-fetch composite action
      # (used below). Pin/release selection lives there.
      - name: Compute backend constants
        if: steps.backend.outputs.skip != 'true'
        id: const
        env:
          BACKEND: ${{ steps.backend.outputs.name }}
          DATE: ${{ steps.datetime.outputs.date }}
          HOUR: ${{ steps.datetime.outputs.hour }}
        run: |
          set -euo pipefail
          case "$BACKEND" in
            claude)
              OUTPUT_DIR="research/twitter"
              SUMMARY_SLUG="twitter"
              TITLE_SUFFIX=""
              CYCLE_HOURS=3
              COMMIT_PREFIX="Twitter update"
              FETCH_CONCURRENCY=8
              PRE_FILTER=false
              AGGREGATE=true
              ENABLE_DAEMON=true
              BIRD_BUDGET=20
              CURL_BUDGET=4
              HARNESS_LABEL="the production Claude Twitter/X AI monitor"
              FEATURES="headlines,hooker-batch,auto-research,dry-run"
              ;;
            deepseek-claude-code)
              OUTPUT_DIR="research/twitter-deepseek"
              SUMMARY_SLUG="twitter-deepseek"
              TITLE_SUFFIX=" (DeepSeek v4 Flash · Fireworks)"
              CYCLE_HOURS=6
              COMMIT_PREFIX="Twitter (DeepSeek) update"
              FETCH_CONCURRENCY=6
              PRE_FILTER=true
              AGGREGATE=false
              ENABLE_DAEMON=true
              BIRD_BUDGET=30
              CURL_BUDGET=5
              HARNESS_LABEL="on DeepSeek v4 Flash via Fireworks"
              FEATURES="telegram"
              ;;
            zai-glm-5p2)
              OUTPUT_DIR="research/twitter-zai"
              SUMMARY_SLUG="twitter-zai"
              TITLE_SUFFIX=" (GLM-5.2 · Z.ai)"
              CYCLE_HOURS=6
              COMMIT_PREFIX="Twitter (Z.ai GLM-5.2) update"
              FETCH_CONCURRENCY=6
              PRE_FILTER=true
              AGGREGATE=false
              ENABLE_DAEMON=true
              BIRD_BUDGET=30
              CURL_BUDGET=5
              HARNESS_LABEL="on GLM-5.2 via Z.ai Coding Plan through Claude Code"
              FEATURES="telegram"
              ;;
            deepseek-pi)
              OUTPUT_DIR="research/twitter-deepseek-pi"
              SUMMARY_SLUG="twitter-deepseek-pi"
              TITLE_SUFFIX=" (pi + DeepSeek v4 Flash · Fireworks)"
              CYCLE_HOURS=6
              COMMIT_PREFIX="Twitter (pi+DeepSeek) update"
              FETCH_CONCURRENCY=6
              PRE_FILTER=false
              AGGREGATE=false
              ENABLE_DAEMON=true
              BIRD_BUDGET=5
              CURL_BUDGET=3
              HARNESS_LABEL="on DeepSeek v4 Flash via Fireworks under the pi coding agent harness"
              FEATURES="telegram"
              ;;
            fireworks-pi)
              OUTPUT_DIR="research/twitter-fireworks-pi"
              SUMMARY_SLUG="twitter-fireworks-pi"
              TITLE_SUFFIX=" (pi + Fireworks Kimi K2.6)"
              CYCLE_HOURS=6
              COMMIT_PREFIX="Twitter (pi+Fireworks) update"
              FETCH_CONCURRENCY=6
              PRE_FILTER=false
              AGGREGATE=false
              ENABLE_DAEMON=true
              BIRD_BUDGET=5
              CURL_BUDGET=3
              HARNESS_LABEL="on Kimi K2.6 through Fireworks under the pi coding agent harness"
              FEATURES="telegram"
              ;;
            opencode-kimi-k3)
              OUTPUT_DIR="research/twitter-opencode-kimi"
              SUMMARY_SLUG="twitter-opencode-kimi"
              TITLE_SUFFIX=" (opencode + Kimi K3)"
              CYCLE_HOURS=6
              COMMIT_PREFIX="Twitter (opencode+Kimi K3) update"
              FETCH_CONCURRENCY=6
              PRE_FILTER=false
              AGGREGATE=false
              ENABLE_DAEMON=true
              BIRD_BUDGET=5
              CURL_BUDGET=3
              HARNESS_LABEL="on Kimi K3 under the opencode agent harness"
              FEATURES="telegram"
              ;;
          esac
          {
            echo "output_dir=${OUTPUT_DIR}"
            echo "summary_slug=${SUMMARY_SLUG}"
            echo "title_suffix=${TITLE_SUFFIX}"
            echo "cycle_hours=${CYCLE_HOURS}"
            echo "commit_prefix=${COMMIT_PREFIX}"
            echo "fetch_concurrency=${FETCH_CONCURRENCY}"
            echo "pre_filter=${PRE_FILTER}"
            echo "aggregate=${AGGREGATE}"
            echo "enable_daemon=${ENABLE_DAEMON}"
            echo "bird_budget=${BIRD_BUDGET}"
            echo "curl_budget=${CURL_BUDGET}"
            echo "harness_label=${HARNESS_LABEL}"
            echo "features=${FEATURES}"
            echo "digest_file=${OUTPUT_DIR}/${DATE}.md"
            echo "status_file=${OUTPUT_DIR}/status/${DATE}-${HOUR}h.json"
            echo "headlines_file=research/summaries/${DATE}-${SUMMARY_SLUG}-${HOUR}h-headlines.json"
            echo "summary_file=research/summaries/${DATE}-${SUMMARY_SLUG}-${HOUR}h-summary.txt"
          } >> "$GITHUB_OUTPUT"
          echo "Backend constants for ${BACKEND}:"
          grep -E '^[a-z_]+=' "$GITHUB_OUTPUT" | sed 's/^/  /'

      - name: Prepare output directories
        if: steps.backend.outputs.skip != 'true'
        env:
          OUTPUT_DIR: ${{ steps.const.outputs.output_dir }}
        run: |
          set -euo pipefail
          mkdir -p "$OUTPUT_DIR/status" research/summaries

      # ── Shared fetch (Birdy multi-fetch + optional helpers) ────────
      - name: Fetch twitter snapshot
        if: steps.backend.outputs.skip != 'true'
        uses: ./.github/actions/twitter-fetch
        with:
          bird_auth_token: ${{ secrets.BIRD_AUTH_TOKEN }}
          bird_ct0: ${{ secrets.BIRD_CT0 }}
          birdy_accounts: ${{ secrets.BIRDY_ACCOUNTS }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          concurrency: ${{ steps.const.outputs.fetch_concurrency }}
          pre_filter: ${{ steps.const.outputs.pre_filter }}
          aggregate: ${{ steps.const.outputs.aggregate }}
          free_disk: 'true'

      # ── Start Birdy daemon (all tiers) ─────────────────────────────
      # The daemon enforces read-only mode even for pi's coarse bash tool.
      # claude tier also skips on dry_run.
      - name: Start birdy daemon
        if: >-
          steps.const.outputs.enable_daemon == 'true'
          && !(github.event_name == 'workflow_dispatch' && steps.backend.outputs.name == 'claude' && inputs.dry_run == true)
        uses: ./.github/actions/birdy-daemon
        with:
          bird_auth_token: ${{ secrets.BIRD_AUTH_TOKEN }}
          bird_ct0: ${{ secrets.BIRD_CT0 }}
          birdy_accounts: ${{ secrets.BIRDY_ACCOUNTS }}

      - name: Configure git identity (pi/opencode tiers — no claude-code-action to do it)
        if: contains(fromJSON('["deepseek-pi","fireworks-pi","opencode-kimi-k3"]'), steps.backend.outputs.name)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      # ── Render the shared prompt with backend-specific placeholders ─
      # Emits two outputs: `rendered_path` (file path on disk, for pi) and
      # `prompt` (full multi-line string, for claude-code-action which has
      # no `prompt_file:` input).
      - name: Render twitter-analyst prompt
        if: steps.backend.outputs.skip != 'true'
        id: render
        uses: ./.github/actions/render-twitter-prompt
        with:
          backend: ${{ steps.backend.outputs.name }}
          output_dir: ${{ steps.const.outputs.output_dir }}
          summary_slug: ${{ steps.const.outputs.summary_slug }}
          title_suffix: ${{ steps.const.outputs.title_suffix }}
          cycle_hours: ${{ steps.const.outputs.cycle_hours }}
          commit_prefix: ${{ steps.const.outputs.commit_prefix }}
          bird_budget: ${{ steps.const.outputs.bird_budget }}
          curl_budget: ${{ steps.const.outputs.curl_budget }}
          harness_label: ${{ steps.const.outputs.harness_label }}
          features: ${{ steps.const.outputs.features }}
          date: ${{ steps.datetime.outputs.date }}
          hour: ${{ steps.datetime.outputs.hour }}
          timestamp: ${{ steps.datetime.outputs.timestamp }}
          run_id: ${{ github.run_id }}
          run_attempt: ${{ github.run_attempt }}
          yesterday: ${{ steps.datetime.outputs.yesterday }}

      # ── LLM step (one per backend) ─────────────────────────────────

      - name: Capture Twitter output base
        if: steps.backend.outputs.skip != 'true'
        id: twitter-output-base
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Process tweets with Claude (primary tier)
        id: twitter-claude-agent
        continue-on-error: true
        if: >-
          steps.backend.outputs.name == 'claude'
          && !(github.event_name == 'workflow_dispatch' && inputs.dry_run == true)
        uses: ./.github/actions/agent-run
        env:
          BIRDY_READ_ONLY: "1"
          BIRDY_TOOL_LOG_PATH: ${{ github.workspace }}/.twitter-input/birdy-tool-log.jsonl
        with:
          lane: twitter-primary
          claude-code-oauth-token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          fireworks-api-key: ${{ secrets.FIREWORKS_API_KEY }}
          zai-api-key: ${{ secrets.ZAI_API_KEY }}
          claude-args: |
            --model opus --allowedTools "Read,Write,Edit,MultiEdit,Bash(git:*),Bash(birdy-fast:*),Bash(curl:*),Bash(jq:*),Bash(python3:*),Bash(python:*),Bash(node:*),Bash(ls:*),Bash(cat:*),Bash(head:*),Bash(test:*),Bash(wc:*),Bash(mkdir:*),Bash(sed:*),Bash(rg:*),Bash(printf:*),Bash(touch:*)"
          expected-paths: |
            ${{ steps.const.outputs.status_file }}
          allowed-paths: |
            research/twitter/
            research/summaries/
          label: Twitter primary Claude processor
          prompt: ${{ steps.render.outputs.prompt }}

      - name: Repair missing Twitter output with Claude (primary tier)
        id: twitter-claude-repair
        continue-on-error: true
        if: >-
          steps.backend.outputs.name == 'claude'
          && steps.twitter-claude-agent.outcome == 'failure'
          && !(github.event_name == 'workflow_dispatch' && inputs.dry_run == true)
        uses: ./.github/actions/agent-run
        env:
          BIRDY_READ_ONLY: "1"
          BIRDY_TOOL_LOG_PATH: ${{ github.workspace }}/.twitter-input/birdy-tool-log.jsonl
        with:
          lane: twitter-primary-repair
          claude-code-oauth-token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          fireworks-api-key: ${{ secrets.FIREWORKS_API_KEY }}
          zai-api-key: ${{ secrets.ZAI_API_KEY }}
          claude-args: |
            --model opus --max-turns 40 --allowedTools "Read,Write,Edit,MultiEdit,Bash(git:*),Bash(jq:*),Bash(python3:*),Bash(python:*),Bash(node:*),Bash(test:*),Bash(ls:*),Bash(cat:*),Bash(head:*),Bash(wc:*),Bash(mkdir:*),Bash(sed:*),Bash(rg:*),Bash(printf:*),Bash(touch:*)"
          expected-paths: |
            ${{ steps.const.outputs.status_file }}
          allowed-paths: |
            research/twitter/
            research/summaries/
          label: Twitter primary Claude repair writer
          prompt: |
            The primary Claude Twitter/X monitor returned without writing
            its required files. Repair that now using only local files.
            Reason from first principles: for each candidate tweet, decide
            whether the underlying event is actually AI-specific and
            publication-worthy, not merely viral or from an AI-adjacent
            account. Stress-test the premise that there is a story before
            writing it.

            CONTEXT
              DATE: ${{ steps.datetime.outputs.date }}
              HOUR: ${{ steps.datetime.outputs.hour }}
              TIMESTAMP: ${{ steps.datetime.outputs.timestamp }}
              DAILY FILE: ${{ steps.const.outputs.digest_file }}
              STATUS FILE: ${{ steps.const.outputs.status_file }}
              SUMMARY FILE: ${{ steps.const.outputs.summary_file }}
              HEADLINES FILE: ${{ steps.const.outputs.headlines_file }}
              RAW INPUT: .twitter-input/bird/all.json
              PRIOR DAY: research/twitter/${{ steps.datetime.outputs.yesterday }}.md

            HARD RULES
              - This is still the production Claude lane. Do not write a
                deterministic quick-hit dump.
              - Use tool calls to read the raw input and write the required
                run artifacts. Do not merely respond in chat.
              - If any tool call is denied, retry with an allowed tool
                immediately. The allowed local parse/write path includes
                Read, Write, Edit, jq, python3, cat, and git.
              - Before your final response, run `git status --short` and
                confirm the commit changes the status heartbeat for this run.
                Summary/headline/digest files may be byte-identical on a
                same-hour rerun; verify their existence and contract instead.
                If the contract is incomplete, continue repairing.
              - The public brief is AI-only. Exclude personal life updates,
                sports, generic politics, generic outrage, engagement-bait,
                and unrelated viral tweets unless the item materially changes
                the AI landscape.
              - If publishing and the daily file already has a section for
                `## ${{ steps.datetime.outputs.hour }}:00 UTC`, replace that
                same-hour section instead of appending a duplicate. If there
                is no publishable item, remove any same-hour filler section.
              - If there are fewer than three truly alert-worthy AI stories,
                write `[]` to the headlines JSON. Do not pad.
              - Public output is signal-only. When Quick hits exist, make the
                Cycle summary name those concrete developments. Never publish
                scan status, editorial-threshold language, or absence-of-news
                narration in the digest.
              - Generic AI hype (for example, "AI agents are the future" or
                "our AI changes everything") is not a Quick hit. Require a
                checkable release, price/funding change, research result,
                benchmark, incident, policy action, or equivalent event.

            OUTPUT CONTRACT
              1. If at least one concrete Top Story or Quick hit exists, write
                 or update `${{ steps.const.outputs.digest_file }}` with a
                 content-derived Cycle summary. Otherwise leave the daily file
                 without a same-hour section.
              2. Write `${{ steps.const.outputs.summary_file }}` as a concise,
                 concrete Telegram summary. When nothing is publishable, create
                 this as an empty file so no notification is emitted.
              3. Write `${{ steps.const.outputs.headlines_file }}` as a valid
                 JSON array; use `[]` when there are no alert-worthy stories.
              4. Always write `${{ steps.const.outputs.status_file }}` as:
                   {"schema_version":1,"date":"${{ steps.datetime.outputs.date }}","hour":"${{ steps.datetime.outputs.hour }}:00 UTC","generated_at":"${{ steps.datetime.outputs.timestamp }}","run_id":"${{ github.run_id }}","run_attempt":${{ github.run_attempt }},"status":"published","public_items":N}
                 Use `status: "no_update"` and `public_items: 0` only when the
                 public same-hour section is absent. Count `public_items` as
                 Top Story `twitter-story` cards plus linked bullets under
                 `### Quick hits`; it must equal the rendered count.
              5. Commit exactly those outputs:
                   git add "${{ steps.const.outputs.output_dir }}/" "${{ steps.const.outputs.summary_file }}" "${{ steps.const.outputs.headlines_file }}"
                   git commit -m "Twitter Claude repair ${{ steps.datetime.outputs.timestamp }}" || echo "No changes"

      - name: Validate or recover Claude primary output
        id: recover_claude
        if: >-
          steps.backend.outputs.name == 'claude'
          && (steps.twitter-claude-agent.outcome == 'success' || steps.twitter-claude-agent.outcome == 'failure')
          && !(github.event_name == 'workflow_dispatch' && inputs.dry_run == true)
        env:
          BASE_SHA: ${{ steps.twitter-output-base.outputs.sha }}
          DIGEST_FILE: ${{ steps.const.outputs.digest_file }}
          STATUS_FILE: ${{ steps.const.outputs.status_file }}
          SUMMARY_FILE: ${{ steps.const.outputs.summary_file }}
          HEADLINES_FILE: ${{ steps.const.outputs.headlines_file }}
          OUTPUT_DIR: ${{ steps.const.outputs.output_dir }}
          SUMMARY_SLUG: ${{ steps.const.outputs.summary_slug }}
          TITLE_SUFFIX: ${{ steps.const.outputs.title_suffix }}
          DATE: ${{ steps.datetime.outputs.date }}
          HOUR: ${{ steps.datetime.outputs.hour }}
          TIMESTAMP: ${{ steps.datetime.outputs.timestamp }}
          RUN_ID: ${{ github.run_id }}
          RUN_ATTEMPT: ${{ github.run_attempt }}
        run: |
          set -euo pipefail

          missing=0
          if git diff --quiet "${BASE_SHA}..HEAD" -- "$STATUS_FILE"; then
            echo "fallback-needed: $STATUS_FILE has no committed change since $BASE_SHA"
            missing=1
          fi
          if [ ! -f "$SUMMARY_FILE" ]; then
            echo "fallback-needed: summary file is missing"
            missing=1
          fi
          if [ ! -f "$HEADLINES_FILE" ] || ! jq -e 'type == "array"' "$HEADLINES_FILE" >/dev/null; then
            echo "fallback-needed: headline output is missing or invalid"
            missing=1
          fi

          if [ -f "$STATUS_FILE" ]; then
            if ! jq -e \
              --arg date "$DATE" \
              --arg hour "${HOUR}:00 UTC" \
              --arg generated_at "$TIMESTAMP" \
              --arg run_id "$RUN_ID" \
              --argjson run_attempt "$RUN_ATTEMPT" '
              .schema_version == 1
              and .date == $date
              and .hour == $hour
              and .generated_at == $generated_at
              and .run_id == $run_id
              and .run_attempt == $run_attempt
              and (.status == "published" or .status == "no_update")
              and (.public_items | type == "number" and . >= 0)
            ' "$STATUS_FILE" >/dev/null; then
              echo "fallback-needed: malformed cycle status"
              missing=1
            fi
            status=$(jq -r '.status // "invalid"' "$STATUS_FILE" 2>/dev/null || echo invalid)
            if jq -e '.recovery == true' "$STATUS_FILE" >/dev/null; then
              echo "fallback-needed: recovery status is reserved for the deterministic recovery path"
              missing=1
            elif [ "$status" = "published" ] && ! jq -e '.public_items > 0' "$STATUS_FILE" >/dev/null; then
              echo "fallback-needed: published status has no public items"
              missing=1
            elif [ "$status" = "published" ] && { [ ! -f "$DIGEST_FILE" ] \
              || ! rg -q "^## ${HOUR}:00 UTC$" "$DIGEST_FILE"; }; then
              echo "fallback-needed: published status has no public same-hour section"
              missing=1
            elif [ "$status" = "published" ] && [ ! -s "$SUMMARY_FILE" ]; then
              echo "fallback-needed: published status has no concrete summary"
              missing=1
            elif [ "$status" = "no_update" ] && ! jq -e '.public_items == 0' "$STATUS_FILE" >/dev/null; then
              echo "fallback-needed: no_update status reports public items"
              missing=1
            elif [ "$status" = "no_update" ] && [ -f "$DIGEST_FILE" ] \
              && rg -q "^## ${HOUR}:00 UTC$" "$DIGEST_FILE"; then
              echo "fallback-needed: no_update status still has a public same-hour section"
              missing=1
            elif [ "$status" = "no_update" ] && [ -s "$SUMMARY_FILE" ]; then
              echo "fallback-needed: no_update status has a reader summary"
              missing=1
            elif [ "$status" = "no_update" ] && ! jq -e 'length == 0' "$HEADLINES_FILE" >/dev/null; then
              echo "fallback-needed: no_update status has headline alerts"
              missing=1
            elif [ "$status" != "published" ] && [ "$status" != "no_update" ]; then
              echo "fallback-needed: invalid cycle status '$status'"
              missing=1
            fi
          fi

          if [ "$missing" -eq 0 ] && ! uv run python scripts/validate_twitter_public_output.py \
            --backend claude \
            --status-file "$STATUS_FILE" \
            --digest-file "$DIGEST_FILE" \
            --summary-file "$SUMMARY_FILE" \
            --headlines-file "$HEADLINES_FILE" \
            --date "$DATE" \
            --hour "$HOUR" \
            --generated-at "$TIMESTAMP" \
            --run-id "$RUN_ID" \
            --run-attempt "$RUN_ATTEMPT"; then
            echo "fallback-needed: agent output violates the signal-only public contract"
            missing=1
          fi

          if [ "$missing" -eq 0 ]; then
            echo "recovered=false" >> "$GITHUB_OUTPUT"
            echo "Claude repair already produced all required outputs; skipping deterministic fallback."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Recovery is fail-closed: discard every public-digest mutation from
          # the failed analyst attempt, including unexpected-hour edits.
          if git cat-file -e "${BASE_SHA}:${DIGEST_FILE}" 2>/dev/null; then
            git restore --source="$BASE_SHA" -- "$DIGEST_FILE"
          else
            rm -f "$DIGEST_FILE"
          fi

          uv run python scripts/deterministic_twitter_digest.py \
            --input-dir .twitter-input/bird \
            --out-dir "$OUTPUT_DIR" \
            --summaries-dir research/summaries \
            --date "$DATE" \
            --hour "$HOUR" \
            --timestamp "$TIMESTAMP" \
            --run-id "$RUN_ID" \
            --run-attempt "$RUN_ATTEMPT" \
            --title-suffix "$TITLE_SUFFIX" \
            --summary-slug "$SUMMARY_SLUG" \
            --status-file "$STATUS_FILE" \
            --headlines-file "$HEADLINES_FILE"

          git add "$OUTPUT_DIR/" "$SUMMARY_FILE" "$HEADLINES_FILE"
          git commit -m "Twitter deterministic fallback $TIMESTAMP" || echo "No deterministic fallback changes to commit"
          echo "recovered=true" >> "$GITHUB_OUTPUT"

      - name: Process tweets with DeepSeek v4 Flash via Fireworks (deepseek-claude-code tier)
        id: twitter-deepseek-agent
        continue-on-error: true
        if: steps.backend.outputs.name == 'deepseek-claude-code'
        uses: ./.github/actions/agent-run
        env:
          BIRDY_READ_ONLY: "1"
          BIRDY_TOOL_LOG_PATH: ${{ github.workspace }}/.twitter-input/birdy-tool-log.jsonl
        with:
          lane: twitter-deepseek
          claude-code-oauth-token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          fireworks-api-key: ${{ secrets.FIREWORKS_API_KEY }}
          zai-api-key: ${{ secrets.ZAI_API_KEY }}
          claude-args: |
            --model opus --allowedTools "Read,Write,Edit,Bash(git:*),Bash(birdy-fast:*),Bash(curl:*),Bash(jq:*)"
          expected-paths: |
            ${{ steps.const.outputs.status_file }}
          allowed-paths: |
            research/twitter-deepseek/
            research/summaries/
          label: Twitter DeepSeek comparison processor
          prompt: ${{ steps.render.outputs.prompt }}

      - name: Process tweets with GLM-5.2 via Z.ai (zai-glm-5p2 tier)
        id: twitter-zai-agent
        continue-on-error: true
        if: steps.backend.outputs.name == 'zai-glm-5p2'
        uses: ./.github/actions/agent-run
        env:
          BIRDY_READ_ONLY: "1"
          BIRDY_TOOL_LOG_PATH: ${{ github.workspace }}/.twitter-input/birdy-tool-log.jsonl
        with:
          lane: twitter-zai
          claude-code-oauth-token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          fireworks-api-key: ${{ secrets.FIREWORKS_API_KEY }}
          zai-api-key: ${{ secrets.ZAI_API_KEY }}
          # Parity with the primary claude tier (kept honest for manual
          # cross-model comparisons and the twitter-model-ab eval): same
          # allowedTools list as the "Process tweets with Claude" step above
          # and the same 40-turn budget the eval legs get.
          claude-args: |
            --model opus --max-turns 40 --allowedTools "Read,Write,Edit,MultiEdit,Bash(git:*),Bash(birdy-fast:*),Bash(curl:*),Bash(jq:*),Bash(python3:*),Bash(python:*),Bash(node:*),Bash(ls:*),Bash(cat:*),Bash(head:*),Bash(test:*),Bash(wc:*),Bash(mkdir:*),Bash(sed:*),Bash(rg:*),Bash(printf:*),Bash(touch:*)"
          expected-paths: |
            ${{ steps.const.outputs.status_file }}
          allowed-paths: |
            research/twitter-zai/
            research/summaries/
          label: Twitter Z.ai GLM-5.2 comparison processor
          prompt: ${{ steps.render.outputs.prompt }}

      - name: Process tweets with pi + DeepSeek v4 Flash via Fireworks (deepseek-pi tier)
        if: steps.backend.outputs.name == 'deepseek-pi'
        uses: ./.github/actions/run-pi-container
        with:
          prompt-file: /tmp/prompt-rendered.md
          provider: fireworks
          model: accounts/fireworks/models/deepseek-v4-flash
          fireworks-api-key: ${{ secrets.FIREWORKS_API_KEY }}
          bird-auth-token: ${{ secrets.BIRD_AUTH_TOKEN }}
          bird-ct0: ${{ secrets.BIRD_CT0 }}

      - name: Process tweets with pi + Fireworks (fireworks-pi tier)
        if: steps.backend.outputs.name == 'fireworks-pi'
        uses: ./.github/actions/run-pi-container
        with:
          prompt-file: /tmp/prompt-rendered.md
          provider: fireworks
          model: accounts/fireworks/models/kimi-k2p7
          fireworks-api-key: ${{ secrets.FIREWORKS_API_KEY }}
          bird-auth-token: ${{ secrets.BIRD_AUTH_TOKEN }}
          bird-ct0: ${{ secrets.BIRD_CT0 }}

      # opencode tier runs on the host like opencode-kimi-canary.yml (no
      # claude-code-action, no pi container): pinned CLI, checked-in
      # OPENCODE_CONFIG, env-var auth only — no `opencode auth login`, no
      # auth.json. Auth preference order matches the canary: OpenCode Go
      # subscription first, Moonshot pay-per-token second. STRICT comparison
      # tier: if the resolved Kimi route fails, this step fails — never
      # re-route to another model, so the artifacts stay attributable to
      # Kimi K3. The Birdy daemon (started above) enforces read-only X access
      # for opencode's coarse bash tool, same as the pi tiers.
      - name: Process tweets with opencode + Kimi K3 (opencode-kimi-k3 tier)
        if: steps.backend.outputs.name == 'opencode-kimi-k3'
        env:
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
          MOONSHOT_API_KEY: ${{ secrets.MOONSHOT_API_KEY }}
          OPENCODE_DISABLE_AUTOUPDATE: '1'
          OPENCODE_CONFIG: ${{ github.workspace }}/.github/opencode/opencode.json
          BIRDY_READ_ONLY: "1"
          BIRDY_TOOL_LOG_PATH: ${{ github.workspace }}/.twitter-input/birdy-tool-log.jsonl
          PROMPT_FILE: ${{ steps.render.outputs.rendered_path }}
        run: |
          set -euo pipefail
          # Same auth preference order as the canary; strict fail-fast.
          if [ -n "${OPENCODE_API_KEY:-}" ]; then
            model="opencode-go/kimi-k3"
          elif [ -n "${MOONSHOT_API_KEY:-}" ]; then
            model="moonshotai/kimi-k3"
          else
            echo "::error::No Kimi auth configured (OPENCODE_API_KEY or MOONSHOT_API_KEY)."
            exit 1
          fi
          echo "opencode model: $model"
          npm install -g opencode-ai@1.18.3
          opencode --version
          # 45m budget inside the 60m job cap leaves room for guards + push.
          timeout 45m opencode run -m "$model" --auto "$(cat "$PROMPT_FILE")"

      - name: Require Twitter producer diff scope
        if: >-
          contains(fromJSON('["claude","deepseek-claude-code","zai-glm-5p2","deepseek-pi","fireworks-pi","opencode-kimi-k3"]'), steps.backend.outputs.name)
          && !(steps.backend.outputs.name == 'claude' && github.event_name == 'workflow_dispatch' && inputs.dry_run == true)
        uses: ./.github/actions/require-diff-scope
        with:
          base-sha: ${{ steps.twitter-output-base.outputs.sha }}
          allowed-paths: |
            ${{ steps.const.outputs.digest_file }}
            ${{ steps.const.outputs.status_file }}
            ${{ steps.const.outputs.summary_file }}
            ${{ steps.const.outputs.headlines_file }}
          label: Twitter ${{ steps.backend.outputs.name }} producer

      - name: Require Twitter run heartbeat
        if: >-
          contains(fromJSON('["claude","deepseek-claude-code","zai-glm-5p2","deepseek-pi","fireworks-pi","opencode-kimi-k3"]'), steps.backend.outputs.name)
          && !(steps.backend.outputs.name == 'claude' && github.event_name == 'workflow_dispatch' && inputs.dry_run == true)
        uses: ./.github/actions/require-output
        with:
          base-sha: ${{ steps.twitter-output-base.outputs.sha }}
          expected-paths: |
            ${{ steps.const.outputs.status_file }}
          label: Twitter ${{ steps.backend.outputs.name }} run heartbeat

      - name: Validate Twitter signal-only public output
        if: >-
          contains(fromJSON('["claude","deepseek-claude-code","zai-glm-5p2","deepseek-pi","fireworks-pi","opencode-kimi-k3"]'), steps.backend.outputs.name)
          && !(steps.backend.outputs.name == 'claude' && github.event_name == 'workflow_dispatch' && inputs.dry_run == true)
        env:
          BACKEND: ${{ steps.backend.outputs.name }}
          DATE: ${{ steps.datetime.outputs.date }}
          HOUR: ${{ steps.datetime.outputs.hour }}
          TIMESTAMP: ${{ steps.datetime.outputs.timestamp }}
          RUN_ID: ${{ github.run_id }}
          RUN_ATTEMPT: ${{ github.run_attempt }}
          DIGEST_FILE: ${{ steps.const.outputs.digest_file }}
          STATUS_FILE: ${{ steps.const.outputs.status_file }}
          SUMMARY_FILE: ${{ steps.const.outputs.summary_file }}
          HEADLINES_FILE: ${{ steps.const.outputs.headlines_file }}
        run: |
          set -euo pipefail
          uv run python scripts/validate_twitter_public_output.py \
            --backend "$BACKEND" \
            --status-file "$STATUS_FILE" \
            --digest-file "$DIGEST_FILE" \
            --summary-file "$SUMMARY_FILE" \
            --headlines-file "$HEADLINES_FILE" \
            --date "$DATE" \
            --hour "$HOUR" \
            --generated-at "$TIMESTAMP" \
            --run-id "$RUN_ID" \
            --run-attempt "$RUN_ATTEMPT"

      - name: Summarize Birdy follow-up telemetry
        if: always() && steps.backend.outputs.skip != 'true'
        run: |
          set -euo pipefail
          LOG="$GITHUB_WORKSPACE/.twitter-input/birdy-tool-log.jsonl"
          if [ ! -s "$LOG" ]; then
            echo "No Birdy follow-up calls recorded."
            exit 0
          fi
          python3 - "$LOG" <<'PY'
          import collections
          import json
          import sys

          rows = []
          with open(sys.argv[1], encoding="utf-8") as handle:
              for line in handle:
                  line = line.strip()
                  if not line:
                      continue
                  try:
                      rows.append(json.loads(line))
                  except json.JSONDecodeError:
                      continue

          by_command = collections.Counter(row.get("command", "unknown") for row in rows)
          blocked = sum(1 for row in rows if row.get("blocked"))
          failures = sum(1 for row in rows if row.get("ok") is False)
          durations = [row.get("duration_ms") for row in rows if isinstance(row.get("duration_ms"), int)]
          print(f"Birdy follow-up calls: {len(rows)}; blocked={blocked}; failures={failures}; commands={dict(by_command)}")
          if durations:
              print(f"Birdy duration ms: avg={sum(durations)//len(durations)} max={max(durations)}")
          PY

      # ── Stop birdy daemon (always, if started) ─────────────────────
      - name: Stop birdy daemon
        if: always() && steps.const.outputs.enable_daemon == 'true'
        run: |
          if [ -z "${BIRDY_DAEMON_PID_PATH:-}" ]; then
            echo "No birdy daemon state exported; nothing to stop."
            exit 0
          fi

          PID_PATH="$BIRDY_DAEMON_PID_PATH"
          LOG_PATH="${BIRDY_DAEMON_LOG_PATH:-}"

          if [ -f "$PID_PATH" ]; then
            PID=$(cat "$PID_PATH")
            if kill -0 "$PID" 2>/dev/null; then
              echo "Stopping daemon PID $PID..."
              kill -TERM "$PID" 2>/dev/null || true
              for attempt in 1 2; do
                sleep 1
                kill -0 "$PID" 2>/dev/null || break
                echo "Waiting for daemon shutdown, attempt ${attempt}/2"
              done
              kill -KILL "$PID" 2>/dev/null || true
            fi
            rm -f "$PID_PATH"
          fi
          if [ -n "$LOG_PATH" ] && [ -f "$LOG_PATH" ]; then
            echo "--- daemon log (last 20 lines) ---"
            tail -20 "$LOG_PATH"
          fi

      # ── claude-tier dry-run fixture (skips push) ───────────────────
      - name: Create dry-run headline fixture (claude tier only)
        if: >-
          steps.backend.outputs.name == 'claude'
          && github.event_name == 'workflow_dispatch'
          && inputs.dry_run == true
        env:
          DATE: ${{ steps.datetime.outputs.date }}
          HOUR: ${{ steps.datetime.outputs.hour }}
          TIMESTAMP: ${{ steps.datetime.outputs.timestamp }}
        run: |
          set -euo pipefail
          mkdir -p research/twitter research/summaries

          cat >> "research/twitter/${DATE}.md" <<EOF
          ## ${HOUR}:00 UTC

          Dry-run fixture for headline alert dedupe.
          EOF

          cat > "research/summaries/${DATE}-twitter-${HOUR}h-summary.txt" <<EOF
          Twitter/X AI Pulse - ${TIMESTAMP}

          Dry-run fixture.
          EOF

          cat > "research/summaries/${DATE}-twitter-${HOUR}h-headlines.json" <<'EOF'
          [
            {
              "headline": "OPENAI CODEX GOES FULL COMPUTER-USE — OPENS BROWSER, CLICKS THROUGH GITHUB AND CLOSES ISSUE WHEN RATE-LIMITED",
              "source": "@steipete",
              "url": "https://x.com/steipete/status/2049035044702843053",
              "category": "model"
            },
            {
              "headline": "DRY RUN ONLY — NEW SYNTHETIC ALERT SHOULD SURVIVE DEDUPE",
              "source": "@dryrun",
              "url": "https://x.com/dryrun/status/999999999999999999",
              "category": "opensource"
            },
            {
              "headline": "NOAM SHAZEER OFFICIALLY JOINS OPENAI, ALTMAN CONFIRMS AFTER A DECADE OF COURTING",
              "source": "@dryrun",
              "url": "https://x.com/dryrun/status/999999999999999998",
              "category": "business"
            }
          ]
          EOF

      # ── claude-tier headline alert prep ────────────────────────────
      - name: Prepare headline alerts for delivery (claude tier)
        if: steps.backend.outputs.name == 'claude'
        env:
          HEADLINES_FILE: ${{ steps.const.outputs.headlines_file }}
          FILTERED_FILE: /tmp/${{ steps.datetime.outputs.date }}-twitter-${{ steps.datetime.outputs.hour }}h-headlines-to-send.json
          HISTORY_FILE: research/summaries/twitter-announced-history.json
          TIMESTAMP: ${{ steps.datetime.outputs.timestamp }}
        run: |
          set -euo pipefail

          mkdir -p research/summaries

          [ -f "$HEADLINES_FILE" ] || echo '[]' > "$HEADLINES_FILE"
          [ -f "$HISTORY_FILE" ] || echo '[]' > "$HISTORY_FILE"

          # No `git pull --rebase` here: the only writer for
          # twitter-announced-history.json is this workflow's own
          # hooker-send step (later in this same job), and the per-backend
          # concurrency group guarantees no parallel instance for the
          # claude tier. The checked-out tree is already authoritative
          # for our dedupe input. Doing a pull here would also fail on
          # the self-hosted runner because this step has no GITHUB_TOKEN
          # in env and the actions/checkout extraheader doesn't reliably
          # survive mid-job.

          uv run python scripts/dedupe_headline_alerts.py filter \
            --headlines-file "$HEADLINES_FILE" \
            --history-file "$HISTORY_FILE" \
            --filtered-file "$FILTERED_FILE" \
            --timestamp "$TIMESTAMP"

      # ── claude-tier agent dedupe gate (steps 1/4: shortlist) ───────
      # The deterministic filter above can't separate true cross-source
      # re-reports from distinct news that merely shares vocabulary in the
      # contested band just below its 0.5 suppress floor. Shortlist the
      # survivors whose nearest prior alert sits in [0.35,0.50) Jaccard so a
      # model can make the final call. Runs on dry-run too (so a dispatch
      # exercises the whole gate); usually shortlists nothing.
      - name: Shortlist near-duplicate headlines (claude tier)
        id: judge_shortlist
        if: steps.backend.outputs.name == 'claude'
        env:
          FILTERED_FILE: /tmp/${{ steps.datetime.outputs.date }}-twitter-${{ steps.datetime.outputs.hour }}h-headlines-to-send.json
          HISTORY_FILE: research/summaries/twitter-announced-history.json
          DOUBTFUL_FILE: /tmp/${{ steps.datetime.outputs.date }}-twitter-${{ steps.datetime.outputs.hour }}h-judge-doubtful.json
        run: |
          set -euo pipefail
          [ -f "$FILTERED_FILE" ] || echo '[]' > "$FILTERED_FILE"
          uv run python scripts/headline_judge.py shortlist \
            --to-send-file "$FILTERED_FILE" \
            --history-file "$HISTORY_FILE" \
            --out-file "$DOUBTFUL_FILE"
          COUNT=$(jq 'length' "$DOUBTFUL_FILE" 2>/dev/null || echo 0)
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"
          echo "Shortlisted $COUNT contested-band headline(s) for the judge."

      # ── primary-tier agent dedupe gate (steps 2/4: Claude adjudicates) ──
      # Final gate: the Claude-backed agent rules on each shortlisted headline vs its <=5
      # nearest priors. Bias is hard toward KEEP — it may only turn a
      # would-be send into a suppress, on a HIGH-confidence duplicate.
      # continue-on-error so a model hiccup fails OPEN (no verdicts -> nothing
      # suppressed). Skipped when the shortlist is empty.
      - name: Adjudicate near-duplicate headlines with Claude (primary tier)
        id: judge_adjudicate
        if: >-
          steps.backend.outputs.name == 'claude'
          && steps.judge_shortlist.outputs.count != '0'
          && steps.judge_shortlist.outputs.count != ''
        continue-on-error: true
        uses: ./.github/actions/agent-run
        with:
          lane: twitter-judge
          claude-code-oauth-token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          fireworks-api-key: ${{ secrets.FIREWORKS_API_KEY }}
          zai-api-key: ${{ secrets.ZAI_API_KEY }}
          claude-args: |
            --model opus --max-turns 12 --allowedTools "Read,Write"
          label: Twitter headline Claude judge
          prompt: |
            You are the final duplicate gate for an AI-news headline alert
            feed. Reason from FIRST PRINCIPLES: judge whether two headlines
            describe the SAME underlying real-world event, NOT whether they
            share words. Do not assume any balance of duplicates vs distinct.

            CARDINAL RULE: when in doubt, KEEP it (verdict "distinct").
            Suppressing a real, new headline is far worse than letting one
            duplicate through. Mark "duplicate" with "high" confidence ONLY
            when you are certain it is the same specific event already sent.

            Work in as few steps as possible: Read one file, then Write one
            file. Use ONLY the Read and Write tools, nothing else.

            Step 1 — Read this input file with the Read tool:
              /tmp/${{ steps.datetime.outputs.date }}-twitter-${{ steps.datetime.outputs.hour }}h-judge-doubtful.json
            It is a JSON array; each entry is
              { "url", "headline", "candidates": [ { "headline", "delivered_at", "url" }, ... ] }
            The candidates are prior ALREADY-SENT alerts that share vocabulary
            with the headline.

            Step 2 — classify each entry against its candidates.
            DUPLICATE (same event already alerted) — only if a candidate is the
            SAME specific event: same action, same primary subject(s), same
            announcement. Paraphrases, reordered facts, refined numbers
            ("$2.9B" vs "$3B" of the same round), or a different account
            reporting the same news ARE duplicates.
            DISTINCT (keep — send it) — if NONE of the candidates is the same
            event. These are NOT duplicates even though they share words:
              - SAME metric/number, DIFFERENT subject (two different companies
                each crossing the same market cap) -> distinct.
              - SAME templated action, DIFFERENT entity (two different
                companies each cutting API pricing) -> distinct.
              - APPENDED FACTS / real progression: a follow-up adding genuinely
                new info (a new number, an official confirmation of a prior
                rumor, a newly-named party) -> distinct. A pure restatement
                with no new info is a duplicate.
              - A different, itself-newsworthy stage of an ongoing story
                (rumor -> official confirmation; priced -> debuted).

            Step 3 — with the Write tool, write your answer to this exact path:
              /tmp/${{ steps.datetime.outputs.date }}-twitter-${{ steps.datetime.outputs.hour }}h-judge-verdicts.json
            Content = a JSON array, exactly one object per input entry:
              { "url": "<the entry's url>", "verdict": "duplicate" | "distinct",
                "confidence": "high" | "medium" | "low",
                "matched_url": "<candidate url if duplicate, else empty string>",
                "reason": "<one short clause>" }
            Key each verdict by the entry's "url" exactly. Use "duplicate" +
            "high" ONLY when certain; any genuine uncertainty -> "distinct".
            Write ONLY the JSON array to that file, then stop.

      # ── claude-tier agent dedupe gate (steps 3/4: apply verdicts) ──
      # Drop only HIGH-confidence duplicates from the send set; fail OPEN if
      # the judge produced no/garbled verdicts. Matches verdicts to headlines
      # by URL, not position. Writes this cycle's suppressions for the alert.
      - name: Apply headline judge verdicts (claude tier)
        id: judge_apply
        if: >-
          steps.backend.outputs.name == 'claude'
          && steps.judge_shortlist.outputs.count != '0'
          && steps.judge_shortlist.outputs.count != ''
        env:
          FILTERED_FILE: /tmp/${{ steps.datetime.outputs.date }}-twitter-${{ steps.datetime.outputs.hour }}h-headlines-to-send.json
          VERDICTS_FILE: /tmp/${{ steps.datetime.outputs.date }}-twitter-${{ steps.datetime.outputs.hour }}h-judge-verdicts.json
          SUPPRESSED_FILE: /tmp/${{ steps.datetime.outputs.date }}-twitter-${{ steps.datetime.outputs.hour }}h-judge-suppressed.json
          TIMESTAMP: ${{ steps.datetime.outputs.timestamp }}
        run: |
          set -euo pipefail
          # Fail open: a skipped/crashed judge step leaves no verdicts file.
          [ -f "$VERDICTS_FILE" ] || echo '[]' > "$VERDICTS_FILE"
          SUMMARY=$(uv run python scripts/headline_judge.py apply \
            --to-send-file "$FILTERED_FILE" \
            --verdicts-file "$VERDICTS_FILE" \
            --out-file "$FILTERED_FILE" \
            --suppressed-file "$SUPPRESSED_FILE" \
            --timestamp "$TIMESTAMP")
          echo "$SUMMARY"
          DROPPED=$(echo "$SUMMARY" | jq -r '.suppressed' 2>/dev/null || echo 0)
          echo "dropped=$DROPPED" >> "$GITHUB_OUTPUT"
          echo "$SUMMARY" | jq -r '.suppressed_headlines[]? | "  🔇 judge suppressed: " + .' || true

      # ── claude-tier agent dedupe gate (steps 4/4: alert on eats) ───
      # The judge enforces immediately with no shadow phase, so every
      # suppression is surfaced to Telegram via hooker — a wrong eat is
      # visible in hours, not buried in a log. Non-blocking.
      - name: Notify on judge suppressions (claude tier)
        if: >-
          steps.backend.outputs.name == 'claude'
          && steps.judge_apply.outputs.dropped != '0'
          && steps.judge_apply.outputs.dropped != ''
          && !(github.event_name == 'workflow_dispatch' && inputs.dry_run == true)
        continue-on-error: true
        env:
          HOOKER_URL: ${{ secrets.HOOKER_URL }}
          HOOKER_TOKEN: ${{ secrets.HOOKER_TOKEN }}
          AUDIT_CHAT_ID: "-1003988951534"
          SUPPRESSED_FILE: /tmp/${{ steps.datetime.outputs.date }}-twitter-${{ steps.datetime.outputs.hour }}h-judge-suppressed.json
        run: |
          set -euo pipefail
          if [ -z "${HOOKER_URL:-}" ] || [ -z "${HOOKER_TOKEN:-}" ]; then
            echo "Hooker credentials missing — skipping judge alert"
            exit 0
          fi
          [ -f "$SUPPRESSED_FILE" ] || exit 0
          COUNT=$(jq 'length' "$SUPPRESSED_FILE" 2>/dev/null || echo 0)
          [ "$COUNT" -lt 1 ] && exit 0
          # One audit message listing each eaten headline + the prior it was
          # judged a duplicate of (clickable) + the judge's reason.
          TEXT=$(jq -r '
            "🔇 <b>Dedupe gate suppressed " + (length|tostring) + " near-duplicate(s)</b>",
            (.[] | "• " + .headline
                   + (if (.matched_url // "") != "" then " — <a href=\"" + .matched_url + "\">prior</a>" else "" end)
                   + (if (.reason // "") != "" then " (" + .reason + ")" else "" end))
          ' "$SUPPRESSED_FILE" | jq -Rs .)
          curl -sS -X POST "${HOOKER_URL}/send" \
            -H "Authorization: Bearer ${HOOKER_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"chat_id\":\"${AUDIT_CHAT_ID}\",\"title\":\"\",\"text\":${TEXT},\"priority\":2,\"tags\":[],\"parse_mode\":\"HTML\"}" \
            && echo "Judge-suppression alert sent ($COUNT)."

      # ── Push the markdown digest + summary (all tiers, not on dry-run) ──
      - name: Clean transient probe files
        if: >-
          steps.backend.outputs.skip != 'true'
          && !(github.event_name == 'workflow_dispatch' && steps.backend.outputs.name == 'claude' && inputs.dry_run == true)
        run: |
          rm -f \
            .probe_test_delete_me.txt \
            .tmp-sandbox-probe.txt \
            research/summaries/_probe.txt

      # Note on push semantics (codex [P2] fix): a `git push` exit-non-zero
      # is treated as a HARD FAILURE here. Previously this step swallowed
      # push errors (auth, non-fast-forward, network) and let downstream
      # Hooker/Telegram steps notify users about content that never
      # actually landed on main. The shared safe-push action handles
      # concurrent main writers with the same rebase/retry behavior used by
      # the other scheduled publishers. Push back to github.ref_name so
      # workflow_dispatch tests on PR branches publish to the PR branch
      # instead of attempting to land generated output on main.
      - name: Push changes
        if: >-
          steps.backend.outputs.skip != 'true'
          && !(github.event_name == 'workflow_dispatch' && steps.backend.outputs.name == 'claude' && inputs.dry_run == true)
        id: push
        uses: ./.github/actions/safe-push
        with:
          branch: ${{ github.ref_name }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          noop-pushed: 'false'

      # Persist the recovery heartbeat before failing the job. This makes the
      # scheduled attempt observable without misreporting analyst failure as a
      # successful "no news" cycle; success()-gated notifications stay skipped.
      - name: Fail recovered Claude cycle
        if: >-
          success()
          && steps.backend.outputs.name == 'claude'
          && steps.recover_claude.outputs.recovered == 'true'
        run: |
          echo "::error::Twitter analyst output was invalid or missing; recovery heartbeat was published."
          exit 1

      # ── Vercel deploy hook (claude tier only) ──────────────────────
      # Vercel's GitHub App webhook should fire on bot pushes too, but
      # if VERCEL_DEPLOY_HOOK is present we belt-and-suspenders it.
      - name: Trigger Vercel deploy (claude tier)
        if: >-
          steps.backend.outputs.name == 'claude'
          && steps.push.outputs.pushed == 'true'
          && !(github.event_name == 'workflow_dispatch' && inputs.dry_run == true)
        env:
          VERCEL_DEPLOY_HOOK: ${{ secrets.VERCEL_DEPLOY_HOOK }}
        run: |
          if [ -n "$VERCEL_DEPLOY_HOOK" ]; then
            curl -fsSL -X POST "$VERCEL_DEPLOY_HOOK" && echo "Vercel deploy hook fired"
          else
            echo "VERCEL_DEPLOY_HOOK not set; relying on Vercel's GitHub auto-deploy"
          fi

      # ── claude-tier dry-run summary (instead of real alerts) ───────
      - name: Dry-run alert summary (claude tier)
        if: >-
          success()
          && steps.backend.outputs.name == 'claude'
          && github.event_name == 'workflow_dispatch'
          && inputs.dry_run == true
        env:
          DATE: ${{ steps.datetime.outputs.date }}
          HOUR: ${{ steps.datetime.outputs.hour }}
        run: |
          set -euo pipefail
          HEADLINES_FILE="/tmp/${DATE}-twitter-${HOUR}h-headlines-to-send.json"
          COUNT=$(jq 'length' "$HEADLINES_FILE" 2>/dev/null || echo 0)
          echo "Dry run: $COUNT headline alerts would be sent after dedupe."
          jq -r '.[]? | "- " + (.headline // "") + " [" + (.url // "") + "]"' "$HEADLINES_FILE" 2>/dev/null || true

      # ── claude-tier Hooker headline blast ──────────────────────────
      - name: Send headline alerts to Hooker (claude tier)
        if: >-
          success()
          && steps.backend.outputs.name == 'claude'
          && !(github.event_name == 'workflow_dispatch' && inputs.dry_run == true)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOOKER_URL: ${{ secrets.HOOKER_URL }}
          HOOKER_TOKEN: ${{ secrets.HOOKER_TOKEN }}
          # JSON array of {chat_id, thread_id?} routes. Each headline is
          # fanned out to every route in a single /send-batch call. A
          # headline counts as "delivered" (and gets recorded in the
          # dedupe ledger) if AT LEAST ONE route accepted it, so a
          # transient failure on one chat doesn't keep re-spamming the
          # working chat forever.
          HOOKER_ROUTES: |
            [
              {"chat_id": "-1003805075491", "thread_id": "5771"},
              {"chat_id": "-1003988951534"}
            ]
          DATE: ${{ steps.datetime.outputs.date }}
          HOUR: ${{ steps.datetime.outputs.hour }}
          HISTORY_FILE: research/summaries/twitter-announced-history.json
          ANNOUNCED_AT: ${{ steps.datetime.outputs.timestamp }}
        run: |
          # Bloomberg-style "Market News Feed" cadence: each headline is
          # fanned out to every chat in HOOKER_ROUTES via a single
          # /send-batch call. Hooker v0.2.0 enforces a per-chat-id mutex
          # so Telegram's 1-msg/sec same-chat limit is honored
          # automatically across the fan-out. Replaces the previous
          # N parallel /send POSTs.

          HEADLINES_FILE="/tmp/${DATE}-twitter-${HOUR}h-headlines-to-send.json"

          if [ ! -f "$HEADLINES_FILE" ]; then
            echo "No headlines file at $HEADLINES_FILE — skipping alerts"
            exit 0
          fi

          COUNT=$(jq 'length' "$HEADLINES_FILE" 2>/dev/null || echo 0)
          if [ "$COUNT" -lt 1 ]; then
            echo "No new headline alerts after dedupe — skipping alerts"
            exit 0
          fi

          if [ -z "$HOOKER_URL" ] || [ -z "$HOOKER_TOKEN" ]; then
            echo "Hooker credentials missing — skipping"
            exit 0
          fi

          NUM_ROUTES=$(echo "$HOOKER_ROUTES" | jq 'length')
          if [ "$NUM_ROUTES" -lt 1 ]; then
            echo "HOOKER_ROUTES is empty — skipping"
            exit 0
          fi

          echo "Sending $COUNT headline alerts × $NUM_ROUTES routes via /send-batch..."

          # Format goal (per user): no title, no tags, no @source line, no
          # raw URL — just the headline + a clickable "link" to the tweet.
          # Hooker server renders HTML, so parse_mode=HTML and the URL is
          # embedded as <a href="...">link</a>.
          #
          # Materialize the valid-message subset BEFORE building the batch
          # so result indices map 1:1 back to headline records when we
          # need to record only the delivered subset.
          VALID_FILE="/tmp/${DATE}-twitter-${HOUR}h-headlines-valid.json"
          jq '[ .[] | select((.headline // "") != "" and (.url // "") != "") ]' \
            "$HEADLINES_FILE" > "$VALID_FILE"

          VALID_COUNT=$(jq 'length' "$VALID_FILE")
          if [ "$VALID_COUNT" -lt 1 ]; then
            echo "No valid messages to send — skipping"
            exit 0
          fi

          # Cartesian product: each headline × each route. Result index i
          # maps back to headline (i / NUM_ROUTES | floor) and route
          # (i % NUM_ROUTES). message_thread_id is omitted entirely when a
          # route has no thread, since Telegram rejects empty/zero threads
          # on chats without forum topics.
          BATCH_PAYLOAD=$(jq \
            --argjson routes "$HOOKER_ROUTES" \
            '{
              messages: [
                .[] as $h |
                $routes[] as $r |
                ({
                  chat_id: $r.chat_id,
                  title: "",
                  text: ($h.headline + " <a href=\"" + $h.url + "\">link</a>"),
                  priority: 3,
                  tags: [],
                  parse_mode: "HTML"
                } | if ($r.thread_id // "") != "" then . + {message_thread_id: $r.thread_id} else . end)
              ]
            }' "$VALID_FILE")

          BATCH_SIZE=$(echo "$BATCH_PAYLOAD" | jq '.messages | length')
          echo "Batch size: $BATCH_SIZE messages ($VALID_COUNT headlines × $NUM_ROUTES routes)"

          RESP=$(curl -sS -w "\nHTTP_STATUS:%{http_code}" \
            -X POST "${HOOKER_URL}/send-batch" \
            -H "Authorization: Bearer ${HOOKER_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "$BATCH_PAYLOAD")

          HTTP=$(echo "$RESP" | grep -oE 'HTTP_STATUS:[0-9]+' | tail -1 | cut -d: -f2)
          BODY="${RESP%HTTP_STATUS:*}"

          echo "Hooker /send-batch HTTP $HTTP"
          echo "$BODY" | jq -c '{delivered, failed, results_count: (.results | length)}' 2>/dev/null || echo "$BODY" | head -3

          if [ "$HTTP" != "200" ]; then
            echo "Batch request failed — body:"
            echo "$BODY" | head -20
            exit 1
          fi

          # Record headlines where AT LEAST ONE route accepted delivery.
          # Group results by headline (index / NUM_ROUTES | floor); a
          # headline's chunk has NUM_ROUTES entries and we want any of
          # them to be ok. This avoids re-spamming working routes when
          # one chat has a transient issue, while still retrying truly
          # un-delivered headlines on the next cycle.
          DELIVERED_FILE="/tmp/${DATE}-twitter-${HOUR}h-headlines-delivered.json"
          echo "$BODY" | jq \
            --slurpfile h "$VALID_FILE" \
            --argjson num_routes "$NUM_ROUTES" \
            '
              ($h[0]) as $headlines |
              ([.results[] | select(.ok == true) | (.index / $num_routes | floor)] | unique) as $delivered_idx |
              [ $delivered_idx[] | $headlines[.] ]
            ' > "$DELIVERED_FILE"

          DELIVERED_COUNT=$(jq 'length' "$DELIVERED_FILE")
          FAILED=$(echo "$BODY" | jq -r '.failed // 0')

          if [ "$DELIVERED_COUNT" -gt 0 ]; then
            uv run python scripts/dedupe_headline_alerts.py record-delivered \
              --delivered-file "$DELIVERED_FILE" \
              --history-file "$HISTORY_FILE" \
              --timestamp "$ANNOUNCED_AT"

            git add "$HISTORY_FILE"
            if git commit -m "Track delivered Twitter headline alerts ${ANNOUNCED_AT}"; then
              AUTH_HEADER=$(printf 'x-access-token:%s' "$GITHUB_TOKEN" | base64 | tr -d '\n')
              git_auth() {
                git -c "http.https://github.com/.extraheader=AUTHORIZATION: basic ${AUTH_HEADER}" "$@"
              }
              # Retry push in case another workflow committed concurrently.
              PUSHED=false
              for attempt in 1 2 3; do
                if git_auth push origin "HEAD:main"; then
                  PUSHED=true
                  break
                fi
                echo "History push attempt $attempt failed; rebasing"
                if ! git_auth pull --rebase origin main; then
                  git rebase --abort 2>/dev/null || true
                  break
                fi
              done
              if [ "$PUSHED" != "true" ]; then
                echo "::warning::Failed to push delivered-alert history after retries; alerts were already sent, continuing"
              fi
            else
              echo "No delivered alert history changes"
            fi
          fi

          if [ "$FAILED" -gt 0 ]; then
            echo "--- Failed messages ---"
            echo "$BODY" | jq -r '.results[] | select(.ok == false) | "  ✗ index=\(.index) error=\(.error // "unknown")"' | head -10
            exit 1
          fi

          echo "Done — batch delivered (delivered=$DELIVERED_COUNT, failed=$FAILED)."

      # ── Comparison-tier Telegram notification ──────────────────────
      - name: Read summary for Telegram (comparison tiers)
        id: summary
        if: >-
          steps.push.outputs.pushed == 'true'
          && contains(fromJSON('["deepseek-claude-code","zai-glm-5p2","deepseek-pi","fireworks-pi","opencode-kimi-k3"]'), steps.backend.outputs.name)
        env:
          SUMMARY_FILE: ${{ steps.const.outputs.summary_file }}
        run: |
          if [ -f "$SUMMARY_FILE" ]; then
            SUMMARY=$(head -c 800 "$SUMMARY_FILE")
            {
              echo "content<<EOF"
              echo "$SUMMARY"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          else
            echo "content=No Twitter summary available" >> "$GITHUB_OUTPUT"
          fi

      # Notify via hooker (relays to Telegram). Replaces the Docker-based
      # appleboy/telegram-action, which fails on the Cloud Run runner.
      # hooker handles the bot token, so this job no longer needs
      # TELEGRAM_BOT_TOKEN / TELEGRAM_CHAT_ID.
      - name: Send notification via hooker (deepseek-claude-code)
        if: >-
          success()
          && steps.push.outputs.pushed == 'true'
          && steps.backend.outputs.name == 'deepseek-claude-code'
          && steps.summary.outputs.content != ''
        continue-on-error: true
        env:
          HOOKER_URL: ${{ secrets.HOOKER_URL }}
          HOOKER_TOKEN: ${{ secrets.HOOKER_TOKEN }}
          SUMMARY: ${{ steps.summary.outputs.content }}
          REPO: ${{ github.repository }}
          DATE: ${{ steps.datetime.outputs.date }}
          GH_RUN_ID: ${{ github.run_id }}
          GH_RUN_ATTEMPT: ${{ github.run_attempt }}
        run: |
          set -euo pipefail
          if [ -z "${HOOKER_URL:-}" ] || [ -z "${HOOKER_TOKEN:-}" ]; then
            echo "Hooker credentials missing — skipping notification"
            exit 0
          fi
          # HTML-escape the untrusted summary before it goes into a
          # parse_mode:"HTML" body. Order matters: escape & first.
          SAFE=$(printf '%s' "$SUMMARY" \
            | sed -e 's/&/\&amp;/g' -e 's/</\&lt;/g' -e 's/>/\&gt;/g')
          REPORT_URL="https://github.com/${REPO}/blob/main/research/twitter-deepseek/${DATE}.md"
          jq -n \
            --arg title "🐦🦌 Twitter/X AI Pulse — DeepSeek v4 Pro Claude Code" \
            --arg text "$SAFE" \
            --arg btn "Full Update on GitHub" \
            --arg url "$REPORT_URL" \
            '{
              title: $title,
              text: $text,
              priority: 3,
              tags: ["ara", "twitter"],
              parse_mode: "HTML",
              reply_markup: { inline_keyboard: [[{ text: $btn, url: $url }]] }
            }' > /tmp/hooker-twitter-deepseek-claude-code.json
          curl -sS --fail-with-body -X POST "${HOOKER_URL%/}/publish/ara-research" \
            -H "Authorization: Bearer ${HOOKER_TOKEN}" \
            -H "Content-Type: application/json" \
            -H "Idempotency-Key: twitter-deepseek-claude-code-${GH_RUN_ID}-${GH_RUN_ATTEMPT}" \
            --data-binary "@/tmp/hooker-twitter-deepseek-claude-code.json"

      - name: Send notification via hooker (zai-glm-5p2)
        if: >-
          success()
          && steps.push.outputs.pushed == 'true'
          && steps.backend.outputs.name == 'zai-glm-5p2'
          && steps.summary.outputs.content != ''
        continue-on-error: true
        env:
          HOOKER_URL: ${{ secrets.HOOKER_URL }}
          HOOKER_TOKEN: ${{ secrets.HOOKER_TOKEN }}
          SUMMARY: ${{ steps.summary.outputs.content }}
          REPO: ${{ github.repository }}
          DATE: ${{ steps.datetime.outputs.date }}
          GH_RUN_ID: ${{ github.run_id }}
          GH_RUN_ATTEMPT: ${{ github.run_attempt }}
        run: |
          set -euo pipefail
          if [ -z "${HOOKER_URL:-}" ] || [ -z "${HOOKER_TOKEN:-}" ]; then
            echo "Hooker credentials missing — skipping notification"
            exit 0
          fi
          SAFE=$(printf '%s' "$SUMMARY" \
            | sed -e 's/&/\&amp;/g' -e 's/</\&lt;/g' -e 's/>/\&gt;/g')
          REPORT_URL="https://github.com/${REPO}/blob/main/research/twitter-zai/${DATE}.md"
          jq -n \
            --arg title "🐦 Twitter/X AI Pulse — Z.ai GLM-5.2" \
            --arg text "$SAFE" \
            --arg btn "Full Update on GitHub" \
            --arg url "$REPORT_URL" \
            '{
              title: $title,
              text: $text,
              priority: 3,
              tags: ["ara", "twitter"],
              parse_mode: "HTML",
              reply_markup: { inline_keyboard: [[{ text: $btn, url: $url }]] }
            }' > /tmp/hooker-twitter-zai-glm-5p2.json
          curl -sS --fail-with-body -X POST "${HOOKER_URL%/}/publish/ara-research" \
            -H "Authorization: Bearer ${HOOKER_TOKEN}" \
            -H "Content-Type: application/json" \
            -H "Idempotency-Key: twitter-zai-glm-5p2-${GH_RUN_ID}-${GH_RUN_ATTEMPT}" \
            --data-binary "@/tmp/hooker-twitter-zai-glm-5p2.json"

      # Notify via hooker (relays to Telegram). Replaces the Docker-based
      # appleboy/telegram-action, which fails on the Cloud Run runner.
      # hooker handles the bot token, so this job no longer needs
      # TELEGRAM_BOT_TOKEN / TELEGRAM_CHAT_ID.
      - name: Send notification via hooker (deepseek-pi)
        if: >-
          success()
          && steps.push.outputs.pushed == 'true'
          && steps.backend.outputs.name == 'deepseek-pi'
          && steps.summary.outputs.content != ''
        continue-on-error: true
        env:
          HOOKER_URL: ${{ secrets.HOOKER_URL }}
          HOOKER_TOKEN: ${{ secrets.HOOKER_TOKEN }}
          SUMMARY: ${{ steps.summary.outputs.content }}
          REPO: ${{ github.repository }}
          DATE: ${{ steps.datetime.outputs.date }}
          GH_RUN_ID: ${{ github.run_id }}
          GH_RUN_ATTEMPT: ${{ github.run_attempt }}
        run: |
          set -euo pipefail
          if [ -z "${HOOKER_URL:-}" ] || [ -z "${HOOKER_TOKEN:-}" ]; then
            echo "Hooker credentials missing — skipping notification"
            exit 0
          fi
          # HTML-escape the untrusted summary before it goes into a
          # parse_mode:"HTML" body. Order matters: escape & first.
          SAFE=$(printf '%s' "$SUMMARY" \
            | sed -e 's/&/\&amp;/g' -e 's/</\&lt;/g' -e 's/>/\&gt;/g')
          REPORT_URL="https://github.com/${REPO}/blob/main/research/twitter-deepseek-pi/${DATE}.md"
          jq -n \
            --arg title "🐦🥧 Twitter/X AI Pulse — pi + DeepSeek (Experimental)" \
            --arg text "$SAFE" \
            --arg btn "Full Update on GitHub" \
            --arg url "$REPORT_URL" \
            '{
              title: $title,
              text: $text,
              priority: 3,
              tags: ["ara", "twitter"],
              parse_mode: "HTML",
              reply_markup: { inline_keyboard: [[{ text: $btn, url: $url }]] }
            }' > /tmp/hooker-twitter-deepseek-pi.json
          curl -sS --fail-with-body -X POST "${HOOKER_URL%/}/publish/ara-research" \
            -H "Authorization: Bearer ${HOOKER_TOKEN}" \
            -H "Content-Type: application/json" \
            -H "Idempotency-Key: twitter-deepseek-pi-${GH_RUN_ID}-${GH_RUN_ATTEMPT}" \
            --data-binary "@/tmp/hooker-twitter-deepseek-pi.json"

      # Notify via hooker for the Fireworks-backed pi comparison lane.
      - name: Send notification via hooker (fireworks-pi)
        if: >-
          success()
          && steps.push.outputs.pushed == 'true'
          && steps.backend.outputs.name == 'fireworks-pi'
          && steps.summary.outputs.content != ''
        continue-on-error: true
        env:
          HOOKER_URL: ${{ secrets.HOOKER_URL }}
          HOOKER_TOKEN: ${{ secrets.HOOKER_TOKEN }}
          SUMMARY: ${{ steps.summary.outputs.content }}
          REPO: ${{ github.repository }}
          DATE: ${{ steps.datetime.outputs.date }}
          GH_RUN_ID: ${{ github.run_id }}
          GH_RUN_ATTEMPT: ${{ github.run_attempt }}
        run: |
          set -euo pipefail
          if [ -z "${HOOKER_URL:-}" ] || [ -z "${HOOKER_TOKEN:-}" ]; then
            echo "Hooker credentials missing — skipping notification"
            exit 0
          fi
          # HTML-escape the untrusted summary before it goes into a
          # parse_mode:"HTML" body. Order matters: escape & first.
          SAFE=$(printf '%s' "$SUMMARY" \
            | sed -e 's/&/\&amp;/g' -e 's/</\&lt;/g' -e 's/>/\&gt;/g')
          REPORT_URL="https://github.com/${REPO}/blob/main/research/twitter-fireworks-pi/${DATE}.md"
          jq -n \
            --arg title "🐦🥧 Twitter/X AI Pulse — pi + Fireworks Kimi K2.6" \
            --arg text "$SAFE" \
            --arg btn "Full Update on GitHub" \
            --arg url "$REPORT_URL" \
            '{
              title: $title,
              text: $text,
              priority: 3,
              tags: ["ara", "twitter"],
              parse_mode: "HTML",
              reply_markup: { inline_keyboard: [[{ text: $btn, url: $url }]] }
            }' > /tmp/hooker-twitter-fireworks-pi.json
          curl -sS --fail-with-body -X POST "${HOOKER_URL%/}/publish/ara-research" \
            -H "Authorization: Bearer ${HOOKER_TOKEN}" \
            -H "Content-Type: application/json" \
            -H "Idempotency-Key: twitter-fireworks-pi-${GH_RUN_ID}-${GH_RUN_ATTEMPT}" \
            --data-binary "@/tmp/hooker-twitter-fireworks-pi.json"

      - name: Send notification via hooker (opencode-kimi-k3)
        if: >-
          success()
          && steps.push.outputs.pushed == 'true'
          && steps.backend.outputs.name == 'opencode-kimi-k3'
          && steps.summary.outputs.content != ''
        continue-on-error: true
        env:
          HOOKER_URL: ${{ secrets.HOOKER_URL }}
          HOOKER_TOKEN: ${{ secrets.HOOKER_TOKEN }}
          SUMMARY: ${{ steps.summary.outputs.content }}
          REPO: ${{ github.repository }}
          DATE: ${{ steps.datetime.outputs.date }}
          GH_RUN_ID: ${{ github.run_id }}
          GH_RUN_ATTEMPT: ${{ github.run_attempt }}
        run: |
          set -euo pipefail
          if [ -z "${HOOKER_URL:-}" ] || [ -z "${HOOKER_TOKEN:-}" ]; then
            echo "Hooker credentials missing — skipping notification"
            exit 0
          fi
          # HTML-escape the untrusted summary before it goes into a
          # parse_mode:"HTML" body. Order matters: escape & first.
          SAFE=$(printf '%s' "$SUMMARY" \
            | sed -e 's/&/\&amp;/g' -e 's/</\&lt;/g' -e 's/>/\&gt;/g')
          REPORT_URL="https://github.com/${REPO}/blob/main/research/twitter-opencode-kimi/${DATE}.md"
          jq -n \
            --arg title "🐦🌙 Twitter/X AI Pulse — opencode + Kimi K3" \
            --arg text "$SAFE" \
            --arg btn "Full Update on GitHub" \
            --arg url "$REPORT_URL" \
            '{
              title: $title,
              text: $text,
              priority: 3,
              tags: ["ara", "twitter"],
              parse_mode: "HTML",
              reply_markup: { inline_keyboard: [[{ text: $btn, url: $url }]] }
            }' > /tmp/hooker-twitter-opencode-kimi.json
          curl -sS --fail-with-body -X POST "${HOOKER_URL%/}/publish/ara-research" \
            -H "Authorization: Bearer ${HOOKER_TOKEN}" \
            -H "Content-Type: application/json" \
            -H "Idempotency-Key: twitter-opencode-kimi-${GH_RUN_ID}-${GH_RUN_ATTEMPT}" \
            --data-binary "@/tmp/hooker-twitter-opencode-kimi.json"

      # ── claude-tier auto-research throttle + topic select + dispatch ─
      # Picks ONE high-signal topic from today's twitter pulse and
      # dispatches generative-research.yml on the self-hosted runner.
      # Throttled to ≤2 dispatches per rolling 24h AND ≥10h between
      # dispatches so this never runs away. Counts every workflow_dispatch
      # event against the budget — manual dispatches reduce the auto budget.
      # All three steps are best-effort: continue-on-error so a selector
      # failure can never break the twitter pipeline.

      - name: Auto-research throttle check (claude tier)
        id: autoresearch_throttle
        if: >-
          steps.backend.outputs.name == 'claude'
          && steps.push.outputs.pushed == 'true'
          && !(github.event_name == 'workflow_dispatch' && inputs.dry_run == true)
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          # Count workflow_dispatch runs of generative-research in last 24h.
          SINCE=$(date -u -d '24 hours ago' '+%Y-%m-%dT%H:%M:%SZ')
          RECENT=$(gh run list --workflow=generative-research.yml \
            --created ">${SINCE}" --limit 20 \
            --json event --jq '[.[] | select(.event == "workflow_dispatch")] | length' \
            2>/dev/null || echo 0)
          # Find the most recent workflow_dispatch.
          LAST_ISO=$(gh run list --workflow=generative-research.yml --limit 20 \
            --json createdAt,event \
            --jq '[.[] | select(.event == "workflow_dispatch")][0].createdAt // empty' \
            2>/dev/null || true)
          [ -z "$LAST_ISO" ] && LAST_ISO="1970-01-01T00:00:00Z"
          LAST_EPOCH=$(date -u -d "$LAST_ISO" +%s 2>/dev/null || echo 0)
          NOW_EPOCH=$(date -u +%s)
          HOURS_SINCE=$(( (NOW_EPOCH - LAST_EPOCH) / 3600 ))
          echo "Recent 24h dispatches: $RECENT (cap 2)"
          echo "Hours since last dispatch: $HOURS_SINCE (min 10)"
          if [ "$RECENT" -ge 2 ] || [ "$HOURS_SINCE" -lt 10 ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Auto-research throttled (recent=$RECENT, hours_since=$HOURS_SINCE)."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "Auto-research budget available — proceeding to topic selection."
          fi

      - name: Auto-research topic selection (primary Claude tier)
        id: autoresearch_select
        if: >-
          steps.backend.outputs.name == 'claude'
          && steps.autoresearch_throttle.outputs.skip == 'false'
        continue-on-error: true
        uses: ./.github/actions/agent-run
        with:
          lane: twitter-autoresearch
          claude-code-oauth-token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          fireworks-api-key: ${{ secrets.FIREWORKS_API_KEY }}
          zai-api-key: ${{ secrets.ZAI_API_KEY }}
          claude-args: |
            --model opus --max-turns 10 --allowedTools "Read,Bash(ls:*),Bash(cat:*),Bash(jq:*),Bash(date:*),Write"
          label: Twitter auto-research Claude selector
          prompt: |
            You select AT MOST ONE topic from today's Twitter AI Pulse to
            dispatch to the generative-research deep pipeline (4500–7000
            word analyst-grade article). Reason from first principles —
            challenge weak claims rather than rubber-stamp them. Be
            conservative: skipping is the default, not the exception. If
            nothing meets the bar, output NO_TOPIC and stop. Better to
            skip than to dispatch a weak topic.

            Step 1 — read today's twitter file for date `${{ steps.datetime.outputs.date }}`:
              cat "research/twitter/${{ steps.datetime.outputs.date }}.md"
            If that path doesn't exist, fall back to the most recent file:
              ls -t research/twitter/*.md | head -1
            Read it.

            Step 2 — read the generative research index to dedupe:
              cat research/generative/index.json | jq '.[-30:]'
            (last 30 entries — covers ~3 weeks of past research)

            Step 3 — pick ONE topic OR reject all. Hard bar for selection:
              - Concrete: named entity (person, model, company, paper) +
                specific verifiable claim + dated primary source
              - Primary-sourced inside the twitter file (the "Evidence"
                bullets cite a primary like an IR page, paper, official
                tweet from a named principal — not commentary)
              - Has a "Watch" list under the story (signals ongoing
                developments worth tracking)
              - Does NOT overlap with anything in the recent index
                (compare by topic / tags / title — be strict)
              - Substantive enough for a 4500–7000 word analyst piece
                (a one-tweet rumour does not qualify, even if dramatic)

            Step 4 — output. Use the Write tool to create
            /tmp/auto-topic.txt.
              - If a topic qualifies: write ONE LINE, ≤140 chars, no
                quotes, no markdown, no leading/trailing whitespace.
                Phrasing should be a researchable, specific topic, e.g.:
                  Nemotron 3 Ultra: NVIDIA's first ~500B model pretrained natively in NVFP4
                  Anthropic's $30B / $900B FT round: what the cap-table now signals about Series F dynamics
              - If NOTHING qualifies: write the literal string NO_TOPIC
                (uppercase, no punctuation, on a single line).

            That is the only output file. Do not commit, do not write
            anything else. The next workflow step parses
            /tmp/auto-topic.txt and dispatches.

      - name: Auto-research dispatch (claude tier)
        if: >-
          steps.backend.outputs.name == 'claude'
          && steps.autoresearch_throttle.outputs.skip == 'false'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          if [ ! -f /tmp/auto-topic.txt ]; then
            echo "::warning::Selector did not write /tmp/auto-topic.txt — skipping dispatch."
            exit 0
          fi
          # Defensive parse: strip CR/LF/quotes, cap length to 200 chars.
          TOPIC=$(head -c 400 /tmp/auto-topic.txt \
            | tr -d '\r\n' \
            | sed -E 's/^["[:space:]]+//; s/["[:space:]]+$//')
          TOPIC=${TOPIC:0:200}
          if [ -z "$TOPIC" ] || [ "$TOPIC" = "NO_TOPIC" ]; then
            echo "Selector returned NO_TOPIC — nothing to dispatch."
            exit 0
          fi
          echo "Dispatching generative-research for: $TOPIC"
          # Backend intentionally omitted: gen-research resolves its default
          # from data/agent-backends.json (generative-research-default lane).
          gh workflow run generative-research.yml \
            -f topic="$TOPIC"
          echo "::notice::Auto-dispatched generative-research: ${TOPIC}"

      # ── Hooker telemetry (all tiers, always) ───────────────────────
      # Telemetry runs on success/failure of the real-work jobs only —
      # skipped matrix entries (those that didn't match the trigger)
      # would otherwise produce noisy "ok"/"unknown" telemetry every
      # cycle. always() still fires for the genuine job's failure mode.
      - name: Publish Hooker workflow telemetry
        if: always() && steps.backend.outputs.skip != 'true'
        uses: ./.github/actions/hooker-telemetry
        with:
          status: ${{ job.status }}
        env:
          HOOKER_URL: ${{ secrets.HOOKER_URL }}
          HOOKER_TOKEN: ${{ secrets.HOOKER_TOKEN }}
