name: Twitter AI News — DeepSeek v4 Pro Agentic (Every 6 Hours)

# Parallel Twitter digestion that uses DeepSeek v4 Pro instead of Claude,
# with agentic browsing — the model is allowed to issue follow-up bird CLI
# queries (capped at 5/run) when a story looks thin in the pre-fetched
# snapshot. Reuses anthropics/claude-code-action@v1 because DeepSeek
# exposes an Anthropic-compatible endpoint at https://api.deepseek.com/anthropic
# — we override ANTHROPIC_BASE_URL / ANTHROPIC_AUTH_TOKEN at the step level
# to redirect Claude Code CLI to DeepSeek.
#
# Required secret: DEEPSEEK_API_KEY (from https://platform.deepseek.com/api_keys)
# Reuses existing secrets: BIRD_AUTH_TOKEN, BIRD_CT0, TELEGRAM_*

on:
  schedule:
    # Run every 6 hours at minute 37 — offset 30min from the nearest Claude
    # run (Claude fires at minute 7 every 3 hours), so neither hits bird
    # CLI at the same time. Slots are 00:37, 06:37, 12:37, 18:37 UTC.
    - cron: '37 */6 * * *'
  workflow_dispatch:

concurrency:
  group: hourly-twitter-deepseek
  cancel-in-progress: true

jobs:
  twitter-news-deepseek:
    runs-on: [self-hosted, Linux]
    permissions:
      contents: write
      actions: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get current datetime
        id: datetime
        run: |
          echo "date=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT
          echo "hour=$(date +'%H')" >> $GITHUB_OUTPUT
          echo "timestamp=$(date +'%Y-%m-%d %H:%M UTC')" >> $GITHUB_OUTPUT

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install bird CLI
        run: npm install -g @steipete/bird

      - name: Fetch tweets from monitored accounts
        env:
          AUTH_TOKEN: ${{ secrets.BIRD_AUTH_TOKEN }}
          CT0: ${{ secrets.BIRD_CT0 }}
        run: |
          mkdir -p /tmp/bird

          # AI Labs & Company accounts
          labs="OpenAI AnthropicAI GoogleAI GoogleDeepMind MistralAI MetaAI CohereAI AI21Labs StabilityAI HuggingFace NVIDIAAIDev"

          # Hyperscalers — top execs and key insiders
          hyperscalers="elonmusk sama demishassabis OfficialLoganK alexalbert__ DrJimFan tszzl"

          # Others — researchers, analysts, specialists, media
          others="karpathy iruletheworldmo AndrewCurran_ fi56622380 jukan05 vitrupo dejavucoder jiratickets SemiAnalysis_ benthompson theinformation GavinSBaker mark_k ns123abc kimmonismus _akhaliq simonw emollick testingcatalog rasbt skirano jackclarkSF ylecun hardmaru JeffDean AravSrinivas deedydas swyx TheAITimeline levelsio steipete mckaywrigley nutlope rauchg amasad geoffreylitt jxnlco danshipper andreasklinger nikitabier tibo_maker marclou shl dharmesh"

          for handle in $labs; do
            echo "Fetching @${handle}..."
            bird user-tweets "@${handle}" -n 20 --json --plain > "/tmp/bird/${handle}.json" 2>/dev/null || echo "[]" > "/tmp/bird/${handle}.json"
          done

          for handle in $hyperscalers; do
            echo "Fetching @${handle}..."
            bird user-tweets "@${handle}" -n 20 --json --plain > "/tmp/bird/${handle}.json" 2>/dev/null || echo "[]" > "/tmp/bird/${handle}.json"
          done

          for handle in $others; do
            echo "Fetching @${handle}..."
            bird user-tweets "@${handle}" -n 20 --json --plain > "/tmp/bird/${handle}.json" 2>/dev/null || echo "[]" > "/tmp/bird/${handle}.json"
          done

      - name: Search for AI news tweets
        env:
          AUTH_TOKEN: ${{ secrets.BIRD_AUTH_TOKEN }}
          CT0: ${{ secrets.BIRD_CT0 }}
        run: |
          # Core AI model & product announcements
          bird search "AI announcement OR new model release OR GPT OR Claude OR Gemini OR Llama" -n 50 --json --plain > /tmp/bird/search-ai.json 2>/dev/null || echo "[]" > /tmp/bird/search-ai.json

          # Breakthroughs and launches
          bird search "AI breakthrough OR AI launch OR AI update OR foundation model" -n 30 --json --plain > /tmp/bird/search-extra.json 2>/dev/null || echo "[]" > /tmp/bird/search-extra.json

          # Research papers and benchmarks
          bird search "AI paper OR machine learning research OR new benchmark OR state of the art SOTA" -n 30 --json --plain > /tmp/bird/search-research.json 2>/dev/null || echo "[]" > /tmp/bird/search-research.json

          # AI infrastructure, chips, and hardware
          bird search "AI chip OR GPU cluster OR AI infrastructure OR NVIDIA H100 OR TPU" -n 20 --json --plain > /tmp/bird/search-infra.json 2>/dev/null || echo "[]" > /tmp/bird/search-infra.json

          # AI policy, safety, and regulation
          bird search "AI regulation OR AI safety OR AI policy OR AI governance OR AI alignment" -n 20 --json --plain > /tmp/bird/search-policy.json 2>/dev/null || echo "[]" > /tmp/bird/search-policy.json

          # AI funding and business
          bird search "AI startup funding OR AI acquisition OR AI valuation OR AI partnership" -n 20 --json --plain > /tmp/bird/search-business.json 2>/dev/null || echo "[]" > /tmp/bird/search-business.json

          # Open source AI and tools
          bird search "open source AI OR open weights OR AI API OR AI developer tools" -n 20 --json --plain > /tmp/bird/search-opensource.json 2>/dev/null || echo "[]" > /tmp/bird/search-opensource.json

      - name: Fetch AI trending news
        env:
          AUTH_TOKEN: ${{ secrets.BIRD_AUTH_TOKEN }}
          CT0: ${{ secrets.BIRD_CT0 }}
        run: |
          bird news --ai-only -n 40 --json --plain > /tmp/bird/news.json 2>/dev/null || echo "[]" > /tmp/bird/news.json

      - name: Process tweets with DeepSeek v4 Pro
        uses: anthropics/claude-code-action@v1
        env:
          # Redirect Claude Code CLI to DeepSeek's Anthropic-compatible endpoint.
          # See https://api-docs.deepseek.com/guides/coding_agents
          ANTHROPIC_BASE_URL: https://api.deepseek.com/anthropic
          ANTHROPIC_AUTH_TOKEN: ${{ secrets.DEEPSEEK_API_KEY }}
          ANTHROPIC_MODEL: deepseek-v4-pro
          ANTHROPIC_DEFAULT_OPUS_MODEL: deepseek-v4-pro
          ANTHROPIC_DEFAULT_SONNET_MODEL: deepseek-v4-pro
          ANTHROPIC_DEFAULT_HAIKU_MODEL: deepseek-v4-flash
          CLAUDE_CODE_SUBAGENT_MODEL: deepseek-v4-flash
          CLAUDE_CODE_EFFORT_LEVEL: max
          # bird CLI auth — needed because the model can now invoke bird
          # via Bash(bird:*) for follow-up queries on stories that look thin
          # in the pre-fetched snapshot.
          AUTH_TOKEN: ${{ secrets.BIRD_AUTH_TOKEN }}
          CT0: ${{ secrets.BIRD_CT0 }}
        with:
          # The action input is required, but ANTHROPIC_AUTH_TOKEN above
          # takes precedence inside Claude Code CLI when ANTHROPIC_BASE_URL
          # is set, so the OAuth token is effectively ignored.
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: |
            --model opus --allowedTools "Read,Write,Edit,Bash(git:*),Bash(bird:*),Bash(curl:*),Bash(jq:*)"
          prompt: |
            You are a senior AI research analyst running on DeepSeek v4 Pro.

            Your job is NOT to summarize tweets one-by-one. It is to identify the small
            number of stories that actually matter from this 6-hour window, develop them
            with corroboration and skepticism, and produce an analyst-grade brief.
            Be sharp, specific, and willing to flag uncertainty. Reason from first
            principles — challenge the premise of viral claims before repeating them.

            TIMESTAMP: ${{ steps.datetime.outputs.timestamp }}
            OUTPUT: research/twitter-deepseek/${{ steps.datetime.outputs.date }}.md

            INPUT — pre-fetched JSON in /tmp/bird/:
            - Individual account feeds (OpenAI.json, sama.json, ~50 handles)
            - search-ai.json, search-extra.json, search-research.json, search-infra.json,
              search-policy.json, search-business.json, search-opensource.json
            - news.json — trending AI news

            TOOLS YOU CAN USE (already in your allowed list):
            - `bird search "query" -n 30 --json --plain` — search live for a story keyword
            - `bird user-tweets "@handle" -n 20 --json --plain` — read a specific account
            - `bird tweet <tweet_id> --json --plain` — fetch one tweet
            - `bird thread <tweet_id> --json --plain` — fetch a full thread
            - `curl -sSL <url>` — fetch a primary source (paper abstract, blog post, official statement)
            - `jq '.[] | select(...)'` — filter the JSON files efficiently
            HARD CAPS: 5 bird follow-up calls + 3 curl fetches per run. Use them on the BIG stories,
            not on every item. Most cycles need 0–2 calls; busy ones up to the cap.

            PROCESS:
            1. Skim the JSON. Most tweets are noise — skip them.
            2. Identify 3–5 MAIN STORIES from this 6-hour window. A main story is something that:
               - Materially changes the AI landscape (model release, big M&A, regulatory action,
                 infrastructure milestone, breaking incident)
               - Has a credible primary source OR multiple independent corroborations
               - Is NEW signal, not recycled commentary on a stale event
            3. For each main story:
               - Use bird/curl to corroborate or fetch primary sources WHEN IT MATTERS
               - Identify contradicting takes, missing context, or red flags
               - Decide verification status: ✓ multi-source / ⚠ single-source / 🚩 unverified
            4. Bucket every other notable item into "Quick hits" — flat, one line each.
            5. Flag anything that's loud-but-shaky in "Skeptic's corner".
            6. End with a "Watch" list — concrete, dated signals to monitor next cycle.

            OUTPUT FORMAT — append to the daily file. If it doesn't exist, start with:
            `# Twitter/X AI Pulse (DeepSeek v4 Pro) — ${{ steps.datetime.outputs.date }}`

            ## ${{ steps.datetime.outputs.hour }}:00 UTC

            **Cycle summary**: [1–2 sentences naming the dominant theme of the window. If quiet, say so.]

            ### Top stories

            #### 1. [One-line thesis — what actually happened and why it matters]
            **Evidence**: [Tight synthesis of the 2–3 strongest sources. Cite numbers, dates, names. Not a list of tweet summaries — a paragraph.]
            - @primary_handle: [specific claim/quote/datum] — https://x.com/handle/status/ID — [N likes / RT if notable]
            - @corroborating_handle: [what they add] — URL
            **Counter / contradicting**: [Pushback, alternative interpretation, missing data. Or "None visible" if genuinely unanimous.]
            **Verification**: ✓ multi-source confirmed / ⚠ single-source / 🚩 unverified — [one-line reason]
            **Watch**: [Concrete signal that would change the picture in next 24h]

            #### 2. [Next story — same structure]
            ...

            ### Quick hits
            - [Concrete item, one line, with @handle and URL. Be specific — numbers, names, dates.]
            - [...]

            ### 🚩 Skeptic's corner
            - [Loud claim that didn't corroborate, with the reason it's flagged. URL.]
            - [Or "None this cycle" if everything checked out.]

            ### Watch list (next 24h)
            - [Dated, concrete signal — e.g. "Anthropic earnings impact in Wednesday Bedrock pricing change"]
            - [...]

            ### Research notes
            - bird/curl calls issued this cycle: [list each one briefly, e.g. "bird search 'spacex xai merger' (corroborate breaking M&A)"]
            - [If you skipped follow-ups, say so: "No follow-ups needed — pre-fetched snapshot was sufficient"]

            If the cycle is genuinely quiet (no main stories), write:
            ## ${{ steps.datetime.outputs.hour }}:00 UTC
            **Cycle summary**: Quiet period — no main stories this window.
            ### Quick hits
            - [Whatever notable items did appear, even if minor]

            CONSTRAINTS:
            - Be specific. "Big funding round" → "$200M Series C, $2B post-money, led by X."
            - Don't recycle hype phrasing. Synthesize.
            - Engagement counts as one input among many — high likes ≠ true.
            - If you cite a primary source, link it. If you fetched a paper, give the title.
            - It's better to write a short honest brief than pad with filler.

            STEP 2 — WRITE TELEGRAM SUMMARY:
            Use Write tool to create: research/summaries/${{ steps.datetime.outputs.date }}-twitter-deepseek-${{ steps.datetime.outputs.hour }}h-summary.txt

            Format (plain text, max 800 chars):
            ```
            Twitter/X AI Pulse (DeepSeek v4 Pro) - ${{ steps.datetime.outputs.timestamp }}

            CYCLE: [1-line theme]

            TOP STORIES:
            • [Story 1 thesis] [✓/⚠/🚩]
            • [Story 2 thesis] [✓/⚠/🚩]
            • [Story 3 thesis] [✓/⚠/🚩]

            WATCH: [1 concrete signal for next 24h]

            Full brief on GitHub.
            ```

            If no main stories, write:
            ```
            Twitter/X AI Pulse (DeepSeek v4 Pro) - ${{ steps.datetime.outputs.timestamp }}

            Quiet cycle — no main stories. See full brief on GitHub for quick hits.
            ```

            After writing both files, commit:
            git add research/twitter-deepseek/ research/summaries/
            git commit -m "Twitter (DeepSeek) update ${{ steps.datetime.outputs.timestamp }}" || echo "No changes"

      - name: Push changes
        id: push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git
          git pull --rebase || true
          if git push; then
            echo "pushed=true" >> $GITHUB_OUTPUT
          else
            echo "pushed=false" >> $GITHUB_OUTPUT
            echo "Nothing to push"
          fi

      - name: Read summary for Telegram
        id: summary
        run: |
          SUMMARY_FILE="research/summaries/${{ steps.datetime.outputs.date }}-twitter-deepseek-${{ steps.datetime.outputs.hour }}h-summary.txt"
          if [ -f "$SUMMARY_FILE" ]; then
            SUMMARY=$(cat "$SUMMARY_FILE" | head -c 800)
            echo "content<<EOF" >> $GITHUB_OUTPUT
            echo "$SUMMARY" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          else
            echo "content=No Twitter (DeepSeek) summary available" >> $GITHUB_OUTPUT
          fi

      - name: Send Telegram notification
        if: success()
        continue-on-error: true
        uses: appleboy/telegram-action@221e6b684967abe813051ee4a37dd61770a83ad3
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          format: markdown
          message: |
            🐦🦌 *Twitter/X AI Pulse — DeepSeek v4 Pro Agentic*

            ${{ steps.summary.outputs.content }}

            📄 [Full Update on GitHub](https://github.com/${{ github.repository }}/blob/main/research/twitter-deepseek/${{ steps.datetime.outputs.date }}.md)
