name: Hyperscaler Model Release Timeline (Every 24 Hours)

on:
  schedule:
    # Run at 06:29 UTC daily
    - cron: '29 6 * * *'
  workflow_dispatch:

concurrency:
  group: model-timeline
  cancel-in-progress: true

jobs:
  model-timeline:
    runs-on: [self-hosted, Linux]
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Get current datetime
        id: datetime
        run: |
          echo "date=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT
          echo "timestamp=$(date +'%Y-%m-%d %H:%M UTC')" >> $GITHUB_OUTPUT
          echo "yesterday=$(date -u -d 'yesterday' +'%Y-%m-%d' 2>/dev/null || date -u -v-1d +'%Y-%m-%d')" >> $GITHUB_OUTPUT

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Setup uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install Python dependencies
        run: uv sync --frozen

      - name: Install bird CLI
        # pinned 2026-05-17; bump manually (Dependabot can't track inline npm -g installs)
        run: npm install -g @steipete/bird@0.8.0

      - name: Fetch tweets from company accounts
        env:
          AUTH_TOKEN: ${{ secrets.BIRD_AUTH_TOKEN }}
          CT0: ${{ secrets.BIRD_CT0 }}
        run: |
          mkdir -p /tmp/bird

          # Company accounts
          companies="OpenAI AnthropicAI GoogleDeepMind GoogleAI MistralAI MetaAI xai NVIDIAAIDev awscloud Apple CohereAI Azure"

          for handle in $companies; do
            echo "Fetching @${handle}..."
            bird user-tweets "@${handle}" -n 20 --json --plain > "/tmp/bird/${handle}.json" 2>/dev/null || echo "[]" > "/tmp/bird/${handle}.json"
          done

      - name: Fetch tweets from key execs
        env:
          AUTH_TOKEN: ${{ secrets.BIRD_AUTH_TOKEN }}
          CT0: ${{ secrets.BIRD_CT0 }}
        run: |
          # Key execs and insiders
          execs="sama demishassabis satyanadella DrJimFan tszzl OfficialLoganK alexalbert__ mustafasuleyman"

          for handle in $execs; do
            echo "Fetching @${handle}..."
            bird user-tweets "@${handle}" -n 20 --json --plain > "/tmp/bird/${handle}.json" 2>/dev/null || echo "[]" > "/tmp/bird/${handle}.json"
          done

      - name: Search for model release tweets
        env:
          AUTH_TOKEN: ${{ secrets.BIRD_AUTH_TOKEN }}
          CT0: ${{ secrets.BIRD_CT0 }}
        run: |
          # Model release announcements
          bird search "new model release OR model launch OR new AI model OR foundation model release" -n 50 --json --plain > /tmp/bird/search-model-release.json 2>/dev/null || echo "[]" > /tmp/bird/search-model-release.json

          # Specific model names
          bird search "GPT-5 OR GPT-4.5 OR Claude 4 OR Gemini 2.5 OR Llama 4 OR Grok 3" -n 40 --json --plain > /tmp/bird/search-model-names.json 2>/dev/null || echo "[]" > /tmp/bird/search-model-names.json

          # Roadmaps and timelines
          bird search "model roadmap OR upcoming model OR model release date OR model announcement" -n 30 --json --plain > /tmp/bird/search-roadmap.json 2>/dev/null || echo "[]" > /tmp/bird/search-roadmap.json

          # Benchmarks and SOTA
          bird search "AI model benchmark OR SOTA OR state of the art new model" -n 20 --json --plain > /tmp/bird/search-benchmark.json 2>/dev/null || echo "[]" > /tmp/bird/search-benchmark.json

      # CRUD agent — maintains the persistent set of tickets at
      # research/models/tickets/<slug>.md instead of regenerating a
      # daily table. The agent reads the schema doc, the existing
      # ticket dir, and the 24h of fresh signal, then decides
      # create / update / close for each candidate event. The
      # validator re-runs at commit time so a malformed ticket
      # never lands. See docs/model-tickets.md for the full schema
      # and dedup protocol.
      # timeout-minutes mirrors the bump made on generative-research.yml
      # after the 2026-05-19 cluster of 45-min wall-clock failures. The
      # CRUD agent does ~20 ticket reads + WebSearch corroborations +
      # validate-loop, which can stretch on heavy news days. 90 min is
      # well clear of observed runs (~10-25 min) without leaving a
      # quietly-hung job to chew runner time forever.
      #
      # continue-on-error keeps the runner alive past a Claude failure
      # so the "Inspect Claude outcome" step below can decide what to
      # surface to job.status (and so hooker-telemetry's `if: always()`
      # step still fires). Without the inspect step, this flag would
      # silently mask timeouts as success — see the inspect step.
      - name: CRUD model tickets via Claude
        id: crud
        timeout-minutes: 90
        continue-on-error: true
        uses: anthropics/claude-code-action@v1
        env:
          DATE_TODAY: ${{ steps.datetime.outputs.date }}
          DATE_YESTERDAY: ${{ steps.datetime.outputs.yesterday }}
          TIMESTAMP: ${{ steps.datetime.outputs.timestamp }}
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: |
            --model opus --max-turns 60 --allowedTools "Read,Write,Edit,Bash(uv:*),Bash(git:*),Bash(ls:*),Bash(cat:*),Bash(grep:*),Bash(jq:*),WebSearch,Task,TodoWrite"
          prompt: |
            You maintain a persistent set of model-release tickets. Each
            ticket tracks one shipping artifact (a model release, a
            partnership, a funding round, a legal action). Your job each
            day: read the existing tickets + the last 24h of signal,
            then CRUD — create, update, or close — as needed.

            DO NOT regenerate or rewrite a daily timeline table. The
            old format is gone. Tickets are the source of truth; a
            *derived* daily-diff is the only `<date>-timeline.md` you
            emit.

            CONTEXT
              TODAY:           $DATE_TODAY
              YESTERDAY:       $DATE_YESTERDAY
              TIMESTAMP:       $TIMESTAMP
              SCHEMA / CONTRACT:  docs/model-tickets.md
              TICKETS DIR:        research/models/tickets/
              RAW SIGNAL:         /tmp/bird/*.json
              VALIDATOR:          scripts/check_model_tickets.py
              DAILY-DIFF TARGET:  research/models/$DATE_TODAY-timeline.md

            STEP 0 — READ THE CONTRACT FIRST.
              `Read docs/model-tickets.md` in full. Internalize the 5-state
              lifecycle (`rumored → in-testing → confirmed → released →
              closed`), the verification field, the slug conventions,
              and especially the CRUD DEDUP PROTOCOL section. The rest
              of this prompt assumes you know it.

            STEP 1 — INVENTORY EXISTING TICKETS.
              `ls research/models/tickets/` to enumerate. For each ticket,
              read its frontmatter (you do NOT need the body for dedup —
              just slug + title + company + model + status + updated_at).
              Build a mental map of `{company, model} -> slug`. Tickets
              whose `status == closed` are read-only — do not modify them.

            STEP 2 — INGEST RAW SIGNAL.
              The bird CLI dropped JSON files at /tmp/bird/*.json. Read
              them. The data is messy and partly redundant; that's
              expected. Use WebSearch sparingly to corroborate or
              clarify a specific claim — not as a general research
              pass. Watch for:
                - Model leaks (GCP / AWS / iOS app / docs URL artifacts)
                - Official announcements (company handles, blogs)
                - Pricing / context / tier reveals
                - Partnership / acquisition / funding news
                - Legal actions and exec moves that affect roadmaps

            STEP 3 — FOR EACH CANDIDATE EVENT, DECIDE.
              Per the CRUD DEDUP PROTOCOL in the contract:
                a) Match against existing tickets by company + artifact.
                b) MATCHED + not closed → UPDATE: append a history entry,
                   bump updated_at, advance status if the lifecycle
                   moved, refresh status_note / expected / sources.
                   Never rewrite older history entries or change slug.
                c) MATCHED + closed → leave alone. If contradiction:
                   create a successor ticket whose body links to the
                   closed one.
                d) NO MATCH → CREATE: pick a slug per conventions, set
                   created_at = updated_at = $DATE_TODAY, status per
                   the strongest evidence, verification honestly,
                   seed history with one entry "Created — <summary>".

            STEP 4 — CLOSURE SWEEP.
              For every non-closed ticket, check the close triggers:
                - released ≥4 weeks ago → `closed_reason: released-and-aged`
                - `unverified` with no fresh corroboration in ≥15 cycles
                  (no history entry in 15+ days) → `closed_reason: stale-rumor-unverified`
                - contradicted by today's signal AND a successor exists
                  → `closed_reason: superseded-by:<slug>`
              When closing: set status=closed, closed_at=$DATE_TODAY,
              closed_reason=<...>, bump updated_at, append a final
              history entry describing the closure.

            STEP 5 — VALIDATE.
              Run `uv run python scripts/check_model_tickets.py`. If it exits
              non-zero, the stderr lists every failure with field and
              reason. Fix in-place and re-run. Iterate until exit 0.
              Do NOT proceed past this step with a failing validator.

            STEP 6 — EMIT THE DAILY-DIFF.
              Write `research/models/$DATE_TODAY-timeline.md` summarizing
              what you just did. Format:

                # Model Timeline — Diff for $DATE_TODAY
                *Generated $TIMESTAMP*

                ## 🆕 Created (<N>)
                - `<slug>` — <company> — <status> — <one-line summary>
                  ([ticket](tickets/<slug>.md))

                ## 🔄 Updated (<N>)
                - `<slug>` — status: <new-status> (<old-status if changed>)
                  - <new history-entry summary>
                  ([ticket](tickets/<slug>.md))

                ## ✅ Closed (<N>)
                - `<slug>` — <closed_reason>

                ## 🌐 No change today (<N>)
                _<count> tickets unchanged_

              If a section has 0 items, omit it entirely (don't write an
              empty "Created (0)"). Order each section alphabetically by
              slug.

            STEP 7 — COMMIT (Bash).
              git add research/models/tickets/ "research/models/$DATE_TODAY-timeline.md"
              git commit -m "Model tickets update $TIMESTAMP" || echo "No changes"

              Do NOT run `git push`. A later workflow step publishes.

            CONSTRAINTS
              - The validator is exact-match on the schema in docs/model-tickets.md.
                Invented fields or out-of-range states get rejected.
              - Slugs are immutable. Renames don't exist. If a title
                changes, update title and add a history entry, keep the
                slug.
              - Never delete a ticket. Closure preserves history.
              - History is append-only. Do not modify earlier entries
                even if they look wrong — fix the title / status_note
                / current state instead.
              - The body is markdown narrative; keep it concise (the
                history field is the audit trail). 3–10 short paragraphs
                is typical.
              - Do not write outside research/models/tickets/ and the
                single daily-diff file in research/models/.

      # Propagate the Claude step's outcome to job.status. With
      # continue-on-error: true on the Claude step, a timeout/error
      # would otherwise resolve to step.conclusion=success and
      # hooker-telemetry would report a green run. exit 1 here lets
      # later `if: always()` steps (telemetry) still fire while flipping
      # job.status to failure when it should be.
      - name: Inspect Claude outcome
        if: always()
        env:
          OUTCOME: ${{ steps.crud.outcome }}
        run: |
          if [ "$OUTCOME" = "failure" ]; then
            echo "::error::Claude CRUD step failed (timeout or error); failing the job so telemetry reports honestly."
            exit 1
          fi
          echo "Claude CRUD step succeeded."

      # Use the shared safe-push composite action (post-PR-#58 algorithm):
      # stash any leftover working-tree state before rebasing, so the
      # rebase cannot fail to start with "cannot rebase: You have unstaged
      # changes". The action exposes `outputs.pushed`, consumed by the
      # Vercel deploy step below. Push failures now propagate as a real
      # job failure (previously the no-retry inline step quietly set
      # pushed=false on real errors).
      # See .github/actions/safe-push/action.yml.
      - name: Push changes
        id: push
        uses: ./.github/actions/safe-push
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      # Vercel's GitHub App webhook should fire on bot pushes too (no
      # cascade-trigger restriction at the webhook layer), but if the
      # VERCEL_DEPLOY_HOOK secret is present we belt-and-suspenders it.
      # Set the secret to a Vercel Project → Settings → Git → Deploy Hooks
      # URL scoped to the `main` branch.
      - name: Trigger Vercel deploy
        if: steps.push.outputs.pushed == 'true'
        env:
          VERCEL_DEPLOY_HOOK: ${{ secrets.VERCEL_DEPLOY_HOOK }}
        run: |
          if [ -n "$VERCEL_DEPLOY_HOOK" ]; then
            curl -fsSL -X POST "$VERCEL_DEPLOY_HOOK" && echo "Vercel deploy hook fired"
          else
            echo "VERCEL_DEPLOY_HOOK not set; relying on Vercel's GitHub auto-deploy"
          fi

      - name: Publish Hooker workflow telemetry
        if: always()
        uses: ./.github/actions/hooker-telemetry
        with:
          status: ${{ job.status }}
        env:
          HOOKER_URL: ${{ secrets.HOOKER_URL }}
          HOOKER_TOKEN: ${{ secrets.HOOKER_TOKEN }}
