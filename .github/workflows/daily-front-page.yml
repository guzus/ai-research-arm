name: Daily Front Page

# Triggered when the Daily AI Digest workflow finishes successfully on main.
# Previously this ran on a 30-minute-delayed cron (`30 0 * * *`), which
# silently no-op'd whenever the Opus-driven digest run exceeded 30 min on
# the self-hosted runner (it gates on the digest file existing — see
# `Check digest exists` below). The workflow_run trigger removes the
# clock-based race entirely. `workflow_dispatch` is retained as a manual
# fallback for backfills.
on:
  workflow_run:
    workflows: ["Daily AI Digest (All Sources)"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: daily-front-page
  cancel-in-progress: true

jobs:
  front-page:
    runs-on: [self-hosted, Linux]
    # Only run when the digest succeeded, OR when a human dispatched us.
    # `workflow_run.conclusion` is empty on workflow_dispatch, so we must
    # explicitly allow that event or the manual fallback silently no-ops.
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    permissions:
      contents: write
      id-token: write

    steps:
      # Provision git-lfs on the runner BEFORE checkout. `actions/checkout@v4`
      # with `lfs: true` shells out to `git lfs` during the checkout phase,
      # so if git-lfs isn't already on PATH the checkout itself fails before
      # any later install step can run. apt-get install doesn't need repo
      # content, so this is safe to run pre-checkout.
      - name: Ensure git-lfs is installed
        run: |
          if ! command -v git-lfs >/dev/null 2>&1; then
            echo "git-lfs not found on runner — installing..."
            sudo apt-get update -qq && sudo apt-get install -y -qq git-lfs
          fi
          git lfs version

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # lfs: true is REQUIRED here because this workflow runs 30 min after
          # daily-digest.yml, which commits today's MP3 through git-lfs. The
          # "Publish digest audio via hooker" step below reads that MP3 and
          # feeds it to ffmpeg — without lfs: true, checkout would hand it a
          # 135-byte pointer file that `[ -f ]` passes but ffmpeg can't decode.
          lfs: true

      # Wire git-lfs smudge/clean filters into THIS worktree's git config so
      # the PNG produced below routes through LFS on commit. `git lfs install`
      # is idempotent; safe to run on every workflow invocation.
      - name: Install git-lfs hooks
        run: git lfs install --local

      - name: Pull latest changes
        # `git pull` after merge will fetch LFS objects automatically because
        # `git lfs install --local` wired the smudge filter. The earlier
        # `lfs: true` on checkout is what guarantees the initial checkout
        # state already has the MP3 hydrated for the publish step below.
        run: git pull origin main || true

      - name: Get current date
        id: date
        run: echo "date=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT

      # Skip if today's digest doesn't exist yet
      - name: Check digest exists
        id: check
        run: |
          DIGEST="research/digest/${{ steps.date.outputs.date }}-digest.md"
          if [ -f "$DIGEST" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "No digest found for ${{ steps.date.outputs.date }}, skipping."
          fi

      - name: Setup Node.js
        if: steps.check.outputs.exists == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      # Install Chromium dependencies and puppeteer
      - name: Install Chromium system dependencies
        if: steps.check.outputs.exists == 'true'
        run: |
          if [ "${{ runner.os }}" = "Linux" ]; then
            sudo apt-get update -qq
            sudo apt-get install -y -qq \
              libnss3 libnspr4 libatk1.0-0 libatk-bridge2.0-0 libcups2 \
              libdrm2 libxkbcommon0 libxcomposite1 libxdamage1 libxrandr2 libgbm1 \
              libpango-1.0-0 libcairo2 libasound2 libxshmfence1 \
              libx11-6 libx11-xcb1 libxcb1 libxext6 libxfixes3 libxi6 \
              libxrender1 libxtst6 libglib2.0-0 libdbus-1-3 \
              fonts-liberation xdg-utils wget > /dev/null 2>&1
          else
            echo "Skipping Linux-only Chromium dependencies on ${{ runner.os }}"
          fi

      - name: Install puppeteer
        if: steps.check.outputs.exists == 'true'
        # pinned 2026-05-17; bump manually (Dependabot can't track inline npm installs)
        run: cd /tmp && npm install puppeteer@25.0.2

      # Claude reads digest and generates newspaper-style HTML
      - name: Generate front page HTML
        if: steps.check.outputs.exists == 'true'
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: |
            --model opus
            --allowedTools "Read,Write,WebSearch,WebFetch,Bash(curl:*),Bash(base64:*),Bash(ls:*),Bash(cat:*)"
          prompt: |
            You are a newspaper layout designer. Read today's AI digest and create a visually stunning
            newspaper-style HTML front page WITH IMAGES.

            STEP 1: Read the digest
            Read: research/digest/${{ steps.date.outputs.date }}-digest.md

            STEP 2: Find relevant images
            For each major story in the digest, use WebSearch to find a relevant image:
            - Company logos (e.g., OpenAI, Google, Anthropic, Meta logos)
            - Product screenshots or announcement images
            - Research paper figures or diagrams
            - Search for "[company/product name] logo png" or "[topic] image"

            Download each image and convert to base64 data URI using Bash:
            ```
            curl -sL "IMAGE_URL" -o /tmp/img1.jpg
            base64 -i /tmp/img1.jpg
            ```
            Then embed as: <img src="data:image/jpeg;base64,..." />

            Aim for 2-4 images total:
            - 1 large image for the lead story (scale to ~400px wide)
            - 1-2 smaller images for secondary stories (~150-200px wide)
            - Company logos or icons where relevant (~60-80px)

            If an image download fails, skip it and continue — the page should still look good without it.

            STEP 3: Write the HTML
            Write a COMPLETE, SELF-CONTAINED HTML file to /tmp/front-page.html
            All images must be embedded as base64 data URIs — no external image URLs.

            NEWSPAPER LAYOUT SPECIFICATION:

            Page dimensions: Design for 1200x1600px viewport (3:4 newspaper ratio).

            MASTHEAD:
            - Title: "THE AI INTELLIGENCER" in large serif font (Georgia or similar)
            - Subtitle: "Your Daily Artificial Intelligence Briefing"
            - Date: "${{ steps.date.outputs.date }}" formatted as "Month Day, Year" (e.g., "March 4, 2026")
            - Volume/Issue number (use day-of-year as issue number)
            - Decorative double-rule lines above and below

            LEAD STORY (~40% of page):
            - Pick the single biggest news item from the digest
            - Large headline in bold serif (28-36px)
            - 2-3 paragraph summary with image floated right or placed above
            - Styled like a broadsheet front page lead

            SECONDARY STORIES (3 columns below lead):
            - Pick 3 important stories from different sections
            - Each gets a headline (18-22px) and 1-2 paragraph summary
            - Include small images or logos where available
            - Use CSS columns or flexbox for the 3-column layout
            - Add thin vertical rules between columns

            KEY NUMBERS SIDEBAR (right side or bottom box):
            - Extract 3-5 notable numbers from the digest (funding amounts, benchmark scores,
              model parameters, user counts, etc.)
            - Display as styled stat boxes with large numbers and labels
            - If no specific numbers in digest, use relevant stats from the stories

            QUOTE OF THE DAY:
            - Pull from the digest's "Quote of the Day" section if available
            - Style with large quotation marks, italic text, attribution
            - If no quote in digest, select the most quotable line from any story

            FOOTER:
            - "Sources: Twitter/X, Hacker News, Reddit, arXiv, RSS Feeds, Bluesky"
            - "Generated by AI Intelligencer Pipeline"
            - Small horizontal rule separator

            STYLING REQUIREMENTS:
            - Background: cream/off-white (#FFF8F0 or similar warm newsprint color)
            - Text: dark charcoal (#1a1a1a), not pure black
            - Headlines: serif font (Georgia, "Times New Roman", serif)
            - Body: serif font for authentic newspaper feel
            - Images: styled with subtle borders or shadows, proper float/positioning
            - Decorative elements: thin rules, ornamental dividers (CSS borders)
            - All CSS inline in a <style> tag, all images as base64 data URIs
            - Professional newspaper typography: proper line-height (1.4-1.6), letter-spacing on masthead
            - Subtle drop caps on lead story first paragraph using CSS ::first-letter
            - Box shadows or borders for the Key Numbers section
            - All content must fit within 1200x1600px without scrolling

            The HTML must be completely self-contained — NO external URLs for fonts, images, or CSS.

      # Screenshot the HTML to PNG
      - name: Screenshot HTML to PNG
        if: steps.check.outputs.exists == 'true'
        run: |
          mkdir -p research/front-page
          node -e "
          const puppeteer = require('/tmp/node_modules/puppeteer');
          (async () => {
            const browser = await puppeteer.launch({
              headless: 'new',
              args: ['--no-sandbox', '--disable-setuid-sandbox']
            });
            const page = await browser.newPage();
            await page.setViewport({ width: 1200, height: 1600, deviceScaleFactor: 2 });
            await page.goto('file:///tmp/front-page.html', { waitUntil: 'networkidle0' });
            await page.screenshot({
              path: 'research/front-page/${{ steps.date.outputs.date }}-front-page.png',
              fullPage: false,
              clip: { x: 0, y: 0, width: 1200, height: 1600 }
            });
            await browser.close();
            console.log('Screenshot saved successfully');
          })();
          "

      # Update README front page image link
      - name: Update README with latest front page
        if: steps.check.outputs.exists == 'true'
        env:
          TODAY: ${{ steps.date.outputs.date }}
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import os

          today = os.environ["TODAY"]
          path = Path("README.md")
          start = "<!-- FRONT_PAGE_START -->"
          end = "<!-- FRONT_PAGE_END -->"
          replacement = f"{start}\n![Today's Front Page](research/front-page/{today}-front-page.png)\n{end}"
          text = path.read_text()
          before, sep, rest = text.partition(start)
          if not sep:
              raise SystemExit("FRONT_PAGE_START marker not found")
          middle, sep2, after = rest.partition(end)
          if not sep2:
              raise SystemExit("FRONT_PAGE_END marker not found")
          path.write_text(before + replacement + after)
          PY

      # Commit and push
      - name: Commit front page
        if: steps.check.outputs.exists == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TODAY: ${{ steps.date.outputs.date }}
        run: |
          # Stage ONLY today's PNG, not the entire research/front-page/ dir.
          # If we staged the whole dir, the LFS clean filter could detect
          # "modifications" on historical PNGs (regular git blobs that now
          # match the *.png filter=lfs rule) and silently convert all 32
          # existing PNGs into LFS pointers in one commit — exactly the
          # "Phase 1 only" violation this PR promises to defer to a manual
          # `git lfs migrate import` runbook.
          git add "research/front-page/${TODAY}-front-page.png" README.md
          git commit -m "Front page ${TODAY}" || echo "Nothing to commit"
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git"
          git pull --rebase || true
          git push || echo "Nothing to push"

      # Publish front page image via hooker (routes to Telegram thread)
      - name: Publish front page via hooker
        if: steps.check.outputs.exists == 'true' && success()
        continue-on-error: true
        env:
          HOOKER_URL: ${{ secrets.HOOKER_URL }}
          HOOKER_TOKEN: ${{ secrets.HOOKER_TOKEN }}
          REPO: ${{ github.repository }}
          TODAY: ${{ steps.date.outputs.date }}
          RUN_ID: ${{ github.run_id }}
        run: |
          PNG="research/front-page/${TODAY}-front-page.png"
          DIGEST_URL="https://github.com/${REPO}/blob/main/research/digest/${TODAY}-digest.md"
          CAPTION="📰 THE AI INTELLIGENCER — ${TODAY}

          Today's front page is ready.

          📄 Full digest: ${DIGEST_URL}"

          # Send as document (not photo) so Telegram doesn't downscale to ~1280px
          curl -sS -X POST "${HOOKER_URL}/publish/front-page/document" \
            -H "Authorization: Bearer ${HOOKER_TOKEN}" \
            -H "Idempotency-Key: front-page-${TODAY}-${RUN_ID}" \
            -F "document=@${PNG}" \
            -F "caption=${CAPTION}" \
            -F "title=AI Intelligencer ${TODAY}" \
            -F "tags=front-page,daily"

      # Convert daily digest MP3 to OGG/Opus and publish as Telegram voice
      # message. Skips cleanly if the audio digest doesn't exist for today
      # (the digest workflow has continue-on-error on its TTS step).
      - name: Publish digest audio via hooker
        if: steps.check.outputs.exists == 'true' && success()
        continue-on-error: true
        env:
          HOOKER_URL: ${{ secrets.HOOKER_URL }}
          HOOKER_TOKEN: ${{ secrets.HOOKER_TOKEN }}
          REPO: ${{ github.repository }}
          TODAY: ${{ steps.date.outputs.date }}
          RUN_ID: ${{ github.run_id }}
        run: |
          MP3="research/audio/${TODAY}-digest.mp3"
          if [ ! -f "$MP3" ]; then
            echo "No audio digest at ${MP3}; skipping voice publish."
            exit 0
          fi

          OGG="/tmp/${TODAY}-digest.ogg"
          # Telegram sendVoice wants OGG/Opus. 24 kbps mono at 48 kHz keeps
          # the file tiny while staying intelligible for speech.
          ffmpeg -y -loglevel error -i "$MP3" \
            -c:a libopus -b:a 24k -ar 48000 -ac 1 \
            "$OGG"

          DIGEST_URL="https://github.com/${REPO}/blob/main/research/digest/${TODAY}-digest.md"
          VOICE_CAPTION="🎙 AI Intelligencer audio — ${TODAY}

          📄 Full digest: ${DIGEST_URL}"

          curl -sS -X POST "${HOOKER_URL}/publish/front-page/voice" \
            -H "Authorization: Bearer ${HOOKER_TOKEN}" \
            -H "Idempotency-Key: front-page-voice-${TODAY}-${RUN_ID}" \
            -F "voice=@${OGG}" \
            -F "caption=${VOICE_CAPTION}" \
            -F "title=AI Intelligencer audio ${TODAY}" \
            -F "tags=front-page,daily,audio"

      - name: Publish Hooker workflow telemetry
        if: always()
        uses: ./.github/actions/hooker-telemetry
        with:
          status: ${{ job.status }}
        env:
          HOOKER_URL: ${{ secrets.HOOKER_URL }}
          HOOKER_TOKEN: ${{ secrets.HOOKER_TOKEN }}
