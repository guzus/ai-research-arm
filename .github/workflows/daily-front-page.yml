name: Daily Front Page

on:
  schedule:
    # Run at 00:30 UTC, 30 minutes after digest
    - cron: '30 0 * * *'
  workflow_dispatch:

concurrency:
  group: daily-front-page
  cancel-in-progress: true

jobs:
  front-page:
    runs-on: self-hosted
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Pull latest changes
        run: git pull origin main || true

      - name: Get current date
        id: date
        run: echo "date=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT

      # Skip if today's digest doesn't exist yet
      - name: Check digest exists
        id: check
        run: |
          DIGEST="research/digest/${{ steps.date.outputs.date }}-digest.md"
          if [ -f "$DIGEST" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "No digest found for ${{ steps.date.outputs.date }}, skipping."
          fi

      # Install Chromium dependencies and puppeteer
      - name: Install Chromium system dependencies
        if: steps.check.outputs.exists == 'true'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            libnss3 libnspr4 libatk1.0-0 libatk-bridge2.0-0 libcups2 \
            libdrm2 libxkbcommon0 libxcomposite1 libxdamage1 libxrandr2 libgbm1 \
            libpango-1.0-0 libcairo2 libasound2 libxshmfence1 \
            libx11-6 libx11-xcb1 libxcb1 libxext6 libxfixes3 libxi6 \
            libxrender1 libxtst6 libglib2.0-0 libdbus-1-3 \
            fonts-liberation xdg-utils wget > /dev/null 2>&1

      - name: Install puppeteer
        if: steps.check.outputs.exists == 'true'
        run: cd /tmp && npm install puppeteer

      # Claude reads digest and generates newspaper-style HTML
      - name: Generate front page HTML
        if: steps.check.outputs.exists == 'true'
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: |
            --model opus
            --allowedTools "Read,Write,WebSearch,WebFetch,Bash"
          prompt: |
            You are a newspaper layout designer. Read today's AI digest and create a visually stunning
            newspaper-style HTML front page WITH IMAGES.

            STEP 1: Read the digest
            Read: research/digest/${{ steps.date.outputs.date }}-digest.md

            STEP 2: Find relevant images
            For each major story in the digest, use WebSearch to find a relevant image:
            - Company logos (e.g., OpenAI, Google, Anthropic, Meta logos)
            - Product screenshots or announcement images
            - Research paper figures or diagrams
            - Search for "[company/product name] logo png" or "[topic] image"

            Download each image and convert to base64 data URI using Bash:
            ```
            curl -sL "IMAGE_URL" -o /tmp/img1.jpg
            base64 -i /tmp/img1.jpg
            ```
            Then embed as: <img src="data:image/jpeg;base64,..." />

            Aim for 2-4 images total:
            - 1 large image for the lead story (scale to ~400px wide)
            - 1-2 smaller images for secondary stories (~150-200px wide)
            - Company logos or icons where relevant (~60-80px)

            If an image download fails, skip it and continue — the page should still look good without it.

            STEP 3: Write the HTML
            Write a COMPLETE, SELF-CONTAINED HTML file to /tmp/front-page.html
            All images must be embedded as base64 data URIs — no external image URLs.

            NEWSPAPER LAYOUT SPECIFICATION:

            Page dimensions: Design for 1200x1600px viewport (3:4 newspaper ratio).

            MASTHEAD:
            - Title: "THE AI INTELLIGENCER" in large serif font (Georgia or similar)
            - Subtitle: "Your Daily Artificial Intelligence Briefing"
            - Date: "${{ steps.date.outputs.date }}" formatted as "Month Day, Year" (e.g., "March 4, 2026")
            - Volume/Issue number (use day-of-year as issue number)
            - Decorative double-rule lines above and below

            LEAD STORY (~40% of page):
            - Pick the single biggest news item from the digest
            - Large headline in bold serif (28-36px)
            - 2-3 paragraph summary with image floated right or placed above
            - Styled like a broadsheet front page lead

            SECONDARY STORIES (3 columns below lead):
            - Pick 3 important stories from different sections
            - Each gets a headline (18-22px) and 1-2 paragraph summary
            - Include small images or logos where available
            - Use CSS columns or flexbox for the 3-column layout
            - Add thin vertical rules between columns

            KEY NUMBERS SIDEBAR (right side or bottom box):
            - Extract 3-5 notable numbers from the digest (funding amounts, benchmark scores,
              model parameters, user counts, etc.)
            - Display as styled stat boxes with large numbers and labels
            - If no specific numbers in digest, use relevant stats from the stories

            QUOTE OF THE DAY:
            - Pull from the digest's "Quote of the Day" section if available
            - Style with large quotation marks, italic text, attribution
            - If no quote in digest, select the most quotable line from any story

            FOOTER:
            - "Sources: Twitter/X, Hacker News, Reddit, arXiv, RSS Feeds, Bluesky"
            - "Generated by AI Intelligencer Pipeline"
            - Small horizontal rule separator

            STYLING REQUIREMENTS:
            - Background: cream/off-white (#FFF8F0 or similar warm newsprint color)
            - Text: dark charcoal (#1a1a1a), not pure black
            - Headlines: serif font (Georgia, "Times New Roman", serif)
            - Body: serif font for authentic newspaper feel
            - Images: styled with subtle borders or shadows, proper float/positioning
            - Decorative elements: thin rules, ornamental dividers (CSS borders)
            - All CSS inline in a <style> tag, all images as base64 data URIs
            - Professional newspaper typography: proper line-height (1.4-1.6), letter-spacing on masthead
            - Subtle drop caps on lead story first paragraph using CSS ::first-letter
            - Box shadows or borders for the Key Numbers section
            - All content must fit within 1200x1600px without scrolling

            The HTML must be completely self-contained — NO external URLs for fonts, images, or CSS.

      # Screenshot the HTML to PNG
      - name: Screenshot HTML to PNG
        if: steps.check.outputs.exists == 'true'
        run: |
          mkdir -p research/front-page
          node -e "
          const puppeteer = require('/tmp/node_modules/puppeteer');
          (async () => {
            const browser = await puppeteer.launch({
              headless: 'new',
              args: ['--no-sandbox', '--disable-setuid-sandbox']
            });
            const page = await browser.newPage();
            await page.setViewport({ width: 1200, height: 1600, deviceScaleFactor: 2 });
            await page.goto('file:///tmp/front-page.html', { waitUntil: 'networkidle0' });
            await page.screenshot({
              path: 'research/front-page/${{ steps.date.outputs.date }}-front-page.png',
              fullPage: false,
              clip: { x: 0, y: 0, width: 1200, height: 1600 }
            });
            await browser.close();
            console.log('Screenshot saved successfully');
          })();
          "

      # Commit and push
      - name: Commit front page
        if: steps.check.outputs.exists == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git add research/front-page/
          git commit -m "Front page ${{ steps.date.outputs.date }}" || echo "Nothing to commit"
          git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git
          git pull --rebase || true
          git push || echo "Nothing to push"

      # Send front page image to Telegram
      - name: Send front page to Telegram
        if: steps.check.outputs.exists == 'true' && success()
        continue-on-error: true
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          REPO: ${{ github.repository }}
          TODAY: ${{ steps.date.outputs.date }}
        run: |
          PNG="research/front-page/${TODAY}-front-page.png"
          DIGEST_URL="https://github.com/${REPO}/blob/main/research/digest/${TODAY}-digest.md"
          CAPTION="📰 THE AI INTELLIGENCER — ${TODAY}

          Today's front page is ready.

          📄 Full digest: ${DIGEST_URL}"

          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendPhoto" \
            -F "chat_id=${TELEGRAM_CHAT_ID}" \
            -F "photo=@${PNG}" \
            -F "caption=${CAPTION}" \
            -F "parse_mode=Markdown"
