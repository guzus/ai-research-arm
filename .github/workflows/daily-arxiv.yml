name: Daily arXiv AI Research

on:
  schedule:
    # Run daily at 06:13 UTC (after arXiv daily update)
    - cron: '13 6 * * *'
  workflow_dispatch:

concurrency:
  group: daily-arxiv
  cancel-in-progress: true

jobs:
  arxiv-research:
    runs-on: [self-hosted, Linux]
    timeout-minutes: 30
    permissions:
      contents: write
      pull-requests: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Get current date
        id: date
        run: |
          echo "date=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT
          echo "yesterday=$(date -d 'yesterday' +'%Y-%m-%d' 2>/dev/null || date -v-1d +'%Y-%m-%d')" >> $GITHUB_OUTPUT

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Create MCP Config for arXiv
        run: |
          cat > /tmp/mcp-config.json << 'EOF'
          {
            "mcpServers": {
              "arxiv": {
                "command": "npx",
                "args": ["-y", "arxiv-mcp-server"]
              }
            }
          }
          EOF

      # Base SHA for the standalone output guard below — captured BEFORE the
      # agent so the guard passes when EITHER the agent or the deterministic
      # fallback committed under research/arxiv/ (mirrors hourly-rss.yml).
      - name: Capture arXiv output base
        id: arxiv-output-base
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      # continue-on-error so a failed agent (provider outage, MCP server
      # unavailable, nothing committed — the composite's internal
      # expected-paths guard fails the step in that case) hands off to the
      # deterministic fallback instead of killing the job.
      - name: Fetch arXiv AI Papers
        id: arxiv-agent
        continue-on-error: true
        uses: ./.github/actions/agent-run
        with:
          backend: fireworks-glm-5p2
          claude-code-oauth-token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          fireworks-api-key: ${{ secrets.FIREWORKS_API_KEY }}
          claude-args: |
            --model opus --mcp-config /tmp/mcp-config.json
            --allowedTools "Read,Write,Edit,Bash(git:*),Bash(curl:*),WebFetch,mcp__arxiv__*"
          expected-paths: |
            research/arxiv/
          allowed-paths: |
            research/arxiv/
            research/summaries/
          label: arXiv Fireworks curator
          prompt: |
            You are an AI research paper curator. Find the most important NEW papers from arXiv.

            DATE: ${{ steps.date.outputs.date }}
            OUTPUT: research/arxiv/${{ steps.date.outputs.date }}-papers.md

            CATEGORIES TO SEARCH:
            - cs.AI (Artificial Intelligence)
            - cs.LG (Machine Learning)
            - cs.CL (Computation and Language / NLP)
            - cs.CV (Computer Vision)
            - cs.NE (Neural and Evolutionary Computing)

            Use arXiv MCP tools:
            - Search for papers submitted in last 24 hours
            - "site:arxiv.org cs.AI" submitted today
            - "site:arxiv.org LLM language model" new

            If the arXiv MCP tools are unavailable or erroring, do NOT give up:
            fetch the arXiv Atom API directly via curl or WebFetch, e.g.
            `curl -sL "https://export.arxiv.org/api/query?search_query=cat:cs.AI+OR+cat:cs.LG+OR+cat:cs.CL+OR+cat:cs.CV+OR+cat:cs.NE&sortBy=submittedDate&sortOrder=descending&max_results=100"`
            and curate from the returned Atom XML instead.

            PRIORITIZE papers about:
            1. New model architectures
            2. Scaling laws and efficiency
            3. Reasoning and agents
            4. Multimodal models
            5. Safety and alignment
            6. Benchmarks and evaluations

            SKIP:
            - Minor incremental improvements
            - Application papers with no novel methods
            - Papers from unknown authors with few citations

            FORMAT:

            # arXiv AI Research - ${{ steps.date.outputs.date }}

            ## Highlights (Top 5 Must-Read)

            ### 1. [Paper Title]
            **Authors**: [names]
            **arXiv**: [link]
            **TL;DR**: [2-3 sentence summary of key contribution]
            **Why it matters**: [1 sentence on significance]

            ## By Category

            ### Language Models & NLP
            | Paper | Authors | Key Finding |
            |-------|---------|-------------|

            ### Computer Vision & Multimodal
            | Paper | Authors | Key Finding |

            ### Agents & Reasoning
            | Paper | Authors | Key Finding |

            ### Safety & Alignment
            | Paper | Authors | Key Finding |

            ### Other Notable
            | Paper | Authors | Key Finding |

            ---
            *Curated from arXiv submissions on ${{ steps.date.outputs.date }}*

            ALSO WRITE A TELEGRAM SUMMARY:
            Use Write tool to create: research/summaries/${{ steps.date.outputs.date }}-arxiv-summary.txt

            Format (plain text, max 800 chars):
            ```
            arXiv Papers - ${{ steps.date.outputs.date }}

            TOP 5 PAPERS:
            • [Paper 1 title - one line TL;DR]
            • [Paper 2 title - one line TL;DR]
            • [Paper 3 title - one line TL;DR]
            • [Paper 4 title - one line TL;DR]
            • [Paper 5 title - one line TL;DR]

            CATEGORIES: [counts by category]

            Full report on GitHub.
            ```

            After writing both files, commit (stage ONLY today's two files;
            do NOT `git add research/`, the LFS clean filter would convert
            historical PNGs/MP3s to LFS pointers in one commit):
            git add research/arxiv/${{ steps.date.outputs.date }}-papers.md research/summaries/${{ steps.date.outputs.date }}-arxiv-summary.txt
            git commit -m "arXiv papers ${{ steps.date.outputs.date }}"

      # Model-free floor: when the agent path failed (or committed nothing —
      # same outcome, via the composite's internal guard), query the arXiv
      # Atom API directly and commit an uncurated per-category listing so the
      # lane never goes silently dark. Mirrors the hourly-rss.yml pattern.
      # Two in-step guards keep a curated listing from being overwritten with
      # the uncurated fallback: a base..HEAD diff (agent committed mid-run,
      # then a later composite step failed) and a HEAD-file check (today's
      # listing already landed in a PREVIOUS run — e.g. a manual re-dispatch
      # on a completed day). In the re-dispatch case nothing new is
      # committed, so require-output below goes red — the honest outcome.
      - name: Deterministic arXiv fallback
        if: steps.arxiv-agent.outcome == 'failure'
        env:
          BASE_SHA: ${{ steps.arxiv-output-base.outputs.sha }}
          DATE: ${{ steps.date.outputs.date }}
        run: |
          set -euo pipefail
          if ! git diff --quiet "${BASE_SHA}..HEAD" -- research/arxiv/; then
            echo "Agent already committed under research/arxiv/ since ${BASE_SHA} — skipping deterministic fallback."
            exit 0
          fi
          if git cat-file -e "HEAD:research/arxiv/${DATE}-papers.md" 2>/dev/null; then
            echo "research/arxiv/${DATE}-papers.md already exists in HEAD (previous run) — skipping deterministic fallback."
            exit 0
          fi
          echo "::warning::arXiv agent path failed; writing deterministic arXiv fallback from the arXiv Atom API."
          python3 scripts/deterministic_arxiv_digest.py \
            --out-dir research/arxiv \
            --date "${{ steps.date.outputs.date }}"
          git add research/arxiv/
          git commit -m "arXiv deterministic fallback ${{ steps.date.outputs.date }}" || echo "No deterministic arXiv changes"

      # Final hard gate: SOMETHING (agent or fallback) must have committed
      # under research/arxiv/ since the pre-agent base SHA.
      - name: Require arXiv output
        uses: ./.github/actions/require-output
        with:
          base-sha: ${{ steps.arxiv-output-base.outputs.sha }}
          expected-paths: |
            research/arxiv/
          label: arXiv workflow output

      # Use the shared safe-push composite action (post-PR-#58 algorithm):
      # stash any leftover working-tree state before rebasing, so the
      # rebase cannot fail to start with "cannot rebase: You have unstaged
      # changes". See .github/actions/safe-push/action.yml.
      - name: Push changes
        uses: ./.github/actions/safe-push
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Read summary for Telegram
        id: summary
        run: |
          SUMMARY_FILE="research/summaries/${{ steps.date.outputs.date }}-arxiv-summary.txt"
          if [ -f "$SUMMARY_FILE" ]; then
            SUMMARY=$(cat "$SUMMARY_FILE" | head -c 800)
            echo "content<<EOF" >> $GITHUB_OUTPUT
            echo "$SUMMARY" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          else
            echo "content=No summary available" >> $GITHUB_OUTPUT
          fi

      # Notify via hooker (relays to Telegram). Replaces the Docker-based
      # appleboy/telegram-action, which fails on the Cloud Run runner.
      # hooker handles the bot token, so this job no longer needs
      # TELEGRAM_BOT_TOKEN / TELEGRAM_CHAT_ID.
      - name: Send notification via hooker
        if: success() && github.event_name == 'workflow_dispatch'
        continue-on-error: true
        env:
          HOOKER_URL: ${{ secrets.HOOKER_URL }}
          HOOKER_TOKEN: ${{ secrets.HOOKER_TOKEN }}
          SUMMARY: ${{ steps.summary.outputs.content }}
          REPO: ${{ github.repository }}
          DATE: ${{ steps.date.outputs.date }}
          GH_RUN_ID: ${{ github.run_id }}
          GH_RUN_ATTEMPT: ${{ github.run_attempt }}
        run: |
          set -euo pipefail
          if [ -z "${HOOKER_URL:-}" ] || [ -z "${HOOKER_TOKEN:-}" ]; then
            echo "Hooker credentials missing — skipping notification"
            exit 0
          fi
          # HTML-escape the untrusted summary before it goes into a
          # parse_mode:"HTML" body. Order matters: escape & first.
          SAFE=$(printf '%s' "$SUMMARY" \
            | sed -e 's/&/\&amp;/g' -e 's/</\&lt;/g' -e 's/>/\&gt;/g')
          REPORT_URL="https://github.com/${REPO}/blob/main/research/arxiv/${DATE}-papers.md"
          jq -n \
            --arg title "📄 arXiv AI Papers" \
            --arg text "$SAFE" \
            --arg btn "Full Report on GitHub" \
            --arg url "$REPORT_URL" \
            '{
              title: $title,
              text: $text,
              priority: 3,
              tags: ["ara", "arxiv"],
              parse_mode: "HTML",
              reply_markup: { inline_keyboard: [[{ text: $btn, url: $url }]] }
            }' > /tmp/hooker-arxiv.json
          curl -sS --fail-with-body -X POST "${HOOKER_URL%/}/publish/ara-research" \
            -H "Authorization: Bearer ${HOOKER_TOKEN}" \
            -H "Content-Type: application/json" \
            -H "Idempotency-Key: arxiv-${GH_RUN_ID}-${GH_RUN_ATTEMPT}" \
            --data-binary "@/tmp/hooker-arxiv.json"

      - name: Publish Hooker workflow telemetry
        if: always()
        uses: ./.github/actions/hooker-telemetry
        with:
          status: ${{ job.status }}
        env:
          HOOKER_URL: ${{ secrets.HOOKER_URL }}
          HOOKER_TOKEN: ${{ secrets.HOOKER_TOKEN }}
