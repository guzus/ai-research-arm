name: CI

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/**'
      - '.github/actions/**'
      - 'dashboard/**'
      - 'scripts/**'
  pull_request:
    paths:
      - '.github/workflows/**'
      - '.github/actions/**'
      - 'dashboard/**'
      - 'scripts/**'
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  actionlint:
    runs-on: [self-hosted, Linux]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Lint GitHub Actions workflows
        uses: raven-actions/actionlint@v2
        with:
          shellcheck: false
          pyflakes: false

  dashboard:
    runs-on: [self-hosted, Linux]
    defaults:
      run:
        working-directory: dashboard
    steps:
      # Provision git-lfs BEFORE checkout — `actions/checkout@v4` with
      # `lfs: true` shells out to `git lfs` during the checkout phase, so
      # if the runner image doesn't already have it the checkout fails
      # before any later install step gets to run. apt-get install needs
      # no repo content, so it's safe to run pre-checkout. Job-level
      # `defaults.run.working-directory: dashboard` doesn't exist yet (no
      # checkout), so override with `working-directory: .`.
      - name: Ensure git-lfs is installed
        working-directory: .
        run: |
          if ! command -v git-lfs >/dev/null 2>&1; then
            echo "git-lfs not found on runner — installing..."
            sudo apt-get update -qq && sudo apt-get install -y -qq git-lfs
          fi
          git lfs version

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # lfs: true is REQUIRED because dashboard/scripts/prebuild.mjs runs
          # cpSync over research/front-page/*.png and research/audio/*.mp3
          # into public/research/. Without LFS hydration, those would be
          # 135-byte pointer files — the build wouldn't fail but the deployed
          # dashboard would serve pointer text instead of images/audio.
          lfs: true

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bunx tsc --noEmit -p tsconfig.json

      - name: Build
        run: bun run build

  python-scripts:
    runs-on: [self-hosted, Linux]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Test Python scripts
        run: python3 -m unittest discover -s scripts -p 'test_*.py'

  hooker-telemetry:
    needs: [actionlint, dashboard, python-scripts]
    if: always()
    runs-on: [self-hosted, Linux]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Derive CI status
        id: ci-status
        env:
          ACTIONLINT: ${{ needs.actionlint.result }}
          DASHBOARD: ${{ needs.dashboard.result }}
          PYTHON_SCRIPTS: ${{ needs.python-scripts.result }}
        run: |
          if [ "$ACTIONLINT" = "success" ] && [ "$DASHBOARD" = "success" ] && [ "$PYTHON_SCRIPTS" = "success" ]; then
            echo "status=success" >> "$GITHUB_OUTPUT"
          else
            echo "status=failure" >> "$GITHUB_OUTPUT"
          fi
          {
            echo "summary<<EOF"
            echo "actionlint: $ACTIONLINT"
            echo "dashboard: $DASHBOARD"
            echo "python-scripts: $PYTHON_SCRIPTS"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Publish Hooker workflow telemetry
        if: always()
        uses: ./.github/actions/hooker-telemetry
        with:
          status: ${{ steps.ci-status.outputs.status }}
          text: ${{ steps.ci-status.outputs.summary }}
          tags: ci
        env:
          HOOKER_URL: ${{ secrets.HOOKER_URL }}
          HOOKER_TOKEN: ${{ secrets.HOOKER_TOKEN }}
