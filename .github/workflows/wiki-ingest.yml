name: LLM Wiki Ingest (After Daily Digest)

# Triggered when the Daily AI Digest workflow finishes successfully on main.
# The wiki ingests ARA's CURATED synthesis (today's digest + the model-release
# tickets), not the raw firehose — so it must run AFTER the digest lands, not
# on an independent clock. A cron offset (e.g. `30 1 * * *`) would re-introduce
# the exact clock-race that bit daily-front-page.yml: on heavy days the
# Opus-driven digest run overruns any fixed offset, and the dependent job
# silently no-ops because the digest file isn't on disk yet. `workflow_run`
# keyed off the digest's completion removes the race entirely.
# `workflow_dispatch` is retained as a manual fallback for backfills.
on:
  workflow_run:
    workflows: ["Daily AI Digest (All Sources)"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: wiki-ingest
  cancel-in-progress: true

jobs:
  wiki-ingest:
    runs-on: [self-hosted, Linux]
    # Only run when the digest succeeded, OR when a human dispatched us.
    # `workflow_run.conclusion` is empty on workflow_dispatch, so we must
    # explicitly allow that event or the manual fallback silently no-ops.
    # A failed/skipped digest leaves no fresh curated input, so we skip.
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    permissions:
      contents: write
      actions: write
      id-token: write

    steps:
      # No `lfs: true`: the wiki lane reads + writes ONLY markdown
      # (research/wiki/**, the digest, the model tickets, the schema doc).
      # None of those match the LFS patterns in .gitattributes (png/jpg/gif/
      # webp/mp3/wav/ogg/mp4/webm/pdf), so LFS hydration would only pull the
      # audio + front-page binaries this agent never touches — wasted
      # bandwidth and a slower checkout. The agent commits only
      # research/wiki/**, so the safe-push composite never stages an
      # LFS-tracked file either; a no-LFS checkout is safe all the way
      # through push.
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Get current datetime
        id: datetime
        run: |
          echo "date=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT
          echo "timestamp=$(date +'%Y-%m-%d %H:%M UTC')" >> $GITHUB_OUTPUT
          echo "yesterday=$(date -u -d 'yesterday' +'%Y-%m-%d' 2>/dev/null || date -u -v-1d +'%Y-%m-%d')" >> $GITHUB_OUTPUT

      # Snapshot HEAD before the agent runs so the deletion guard below can
      # diff exactly the agent's commit (robust whether or not it commits).
      - name: Record base commit
        id: basesha
        run: echo "sha=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT

      - name: Setup uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install Python dependencies
        run: uv sync --frozen

      # Wiki ingest agent — maintains the compounding knowledge base at
      # research/wiki/ as a set of interlinked markdown pages (one per
      # entity / concept / theme). Like the model-timeline CRUD agent, it
      # READS the schema contract (docs/wiki-schema.md) and CRUD/dedups
      # against the existing pages rather than regenerating them. Its input
      # is ARA's CURATED synthesis — today's digest + the model tickets +
      # recent top stories — NOT the raw per-source firehose.
      #
      # timeout-minutes mirrors the bump on 24h-model-timeline.yml /
      # generative-research.yml: a page-by-page CRUD loop with wiki_search
      # dedup lookups, a validate loop, and occasional WebSearch
      # corroboration can stretch on heavy news days. 90 min is well clear
      # of expected runs without leaving a quietly-hung job to chew runner
      # time forever.
      #
      # --max-turns 80 (was 50): the lane is a strict superset of the
      # 24h-model-timeline CRUD loop (which runs at 60). Per significant
      # subject this agent spends ~3+ turns — wiki_search (Bash) -> read the
      # matched page (Read) -> Edit — BEFORE the per-run index.md + log.md
      # writes, the build_wiki_index.py regen, and the
      # "iterate check_wiki until exit 0" validate loop. On a real digest
      # (10-25 KB, a dozen-plus subjects) 50 turns was exhausted mid-pass and
      # the agent died with the SDK error "Reached maximum number of turns
      # (50)" BEFORE STEP 6's commit — so nothing was ever committed and the
      # lane sat frozen at its 2026-05-24 seed (see PR diagnosis). 80 gives
      # the validate-fix loop real headroom while staying well inside the
      # 90-min wall clock; we stop short of generative-research's 120 because
      # this agent only edits short markdown pages (no long-form article) and
      # over-provisioning turns on the ephemeral runner invites runaway/OOM.
      # The prompt now also bounds work per run and commits a valid PARTIAL
      # pass rather than racing the cap to zero with an empty tree.
      #
      # continue-on-error keeps the runner alive past a Claude failure so
      # the "Inspect Claude outcome" step below can decide what to surface
      # to job.status (and so hooker-telemetry's `if: always()` step still
      # fires). Without the inspect step, this flag would silently mask
      # timeouts as success.
      - name: Ingest digest into wiki via Claude
        id: ingest
        timeout-minutes: 90
        continue-on-error: true
        uses: anthropics/claude-code-action@v1
        env:
          DATE_TODAY: ${{ steps.datetime.outputs.date }}
          DATE_YESTERDAY: ${{ steps.datetime.outputs.yesterday }}
          TIMESTAMP: ${{ steps.datetime.outputs.timestamp }}
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: |
            --model opus --max-turns 80 --allowedTools "Read,Write,Edit,Bash(uv:*),Bash(git:*),Bash(ls:*),Bash(cat:*),Bash(grep:*),Bash(jq:*),WebSearch,Task,TodoWrite"
          prompt: |
            You maintain the LLM Wiki: a compounding, interlinked knowledge
            base of markdown pages at research/wiki/. One page per
            significant entity, concept, or theme. Each day you INGEST
            ARA's curated synthesis and CRUD — create, update, or leave —
            the wiki pages accordingly.

            This is NOT a regeneration job and NOT a firehose reader. You
            read the CURATED daily output (the digest + model tickets +
            recent top stories), and you UPDATE existing pages in place far
            more often than you create new ones. Duplicating a page that
            already exists is the primary failure mode — guard against it.

            CONTEXT
              TODAY:           $DATE_TODAY
              YESTERDAY:       $DATE_YESTERDAY
              TIMESTAMP:       $TIMESTAMP
              SCHEMA / CONTRACT:  docs/wiki-schema.md
              WIKI ROOT:          research/wiki/
              WIKI INDEX:         research/wiki/index.md
              WIKI LOG:           research/wiki/log.md
              PAGE DIRS:          research/wiki/{entities,concepts,themes}/
              CURATED INPUT:      research/digest/$DATE_TODAY-digest.md
              MODEL TICKETS:      research/models/tickets/*.md
              SEARCH CLI:         uv run python scripts/wiki_search.py "<query>"
              VALIDATOR:          uv run python scripts/check_wiki.py
              INDEX BUILDER:      uv run python scripts/build_wiki_index.py

            STEP 0 — READ THE CONTRACT FIRST.
              `Read docs/wiki-schema.md` in full. Internalize the page
              schema (frontmatter fields, the entity/concept/theme split,
              slug conventions, how `[[links]]` and `aliases` work, the
              index.md and log.md conventions). The rest of this prompt
              assumes you have followed it. The schema doc is the source of
              truth; if this prompt and the schema ever disagree, the
              schema wins.

            STEP 1 — READ THE CURATED INPUT (NOT THE FIREHOSE).
              Read today's digest at research/digest/$DATE_TODAY-digest.md.
              If that exact file does not exist (the digest can cross
              midnight UTC and land under yesterday's date, or a manual
              dispatch can run on an off-day), `ls research/digest/` and use
              the single most-recent *-digest.md instead. Note the actual
              date you ingested — you will record it in the log entry.

              Then read the recent model tickets: `ls research/models/tickets/`
              and read those whose `updated_at` is recent (today or
              yesterday). These two sources — the digest and the tickets —
              ARE your input. Do NOT crawl research/twitter/, research/rss/,
              research/community/, research/arxiv/, or any other raw-source
              directory; the digest is the curated distillation of those and
              reading them again would re-introduce the noise the digest
              exists to remove. Use WebSearch only sparingly, to disambiguate
              or corroborate a single specific claim — never as a general
              research pass.

            STEP 2 — EXTRACT SIGNIFICANT SUBJECTS (AND BOUND THE SET).
              From the curated input, pull the entities (companies, models,
              people, products), concepts (techniques, architectures,
              benchmarks, ideas), and themes (ongoing storylines, trends)
              that are genuinely significant today. A passing mention is not
              a page. Favor depth on the day's real developments over
              breadth.

              You have a finite turn budget and EACH subject costs several
              turns (search + read + edit). Rank the subjects by significance
              and cap this pass: handle AT MOST the top ~8 subjects (prefer
              updating existing pages — that is cheaper and is the default —
              over minting new ones). The wiki compounds daily; anything you
              skip today gets picked up the next run. Do NOT attempt to cover
              every subject in one pass — that is exactly what exhausted the
              turn budget before the commit and left the lane frozen. A small,
              valid, COMMITTED pass beats an ambitious one that dies with
              nothing on disk.

            TURN-BUDGET DISCIPLINE (read before STEP 3).
              Treat STEP 5b + STEP 6 (regenerate index.json, then commit) as a
              checkpoint you MUST reach with turns to spare — not an
              afterthought. As you work, keep a rough count of turns used. If
              you sense you are running low (e.g. past ~60 turns) before
              you've finished every intended subject, STOP starting new
              subjects, finish whatever page you are mid-edit on, then jump
              straight to STEP 4 → 5 → 5b → 6 and COMMIT what you have.
              Committing a validator-clean partial pass is success; running
              out of turns mid-edit with an uncommitted tree is the failure
              this lane has been hitting. When in doubt, commit early.

            STEP 3 — FOR EACH SUBJECT, SEARCH FIRST, THEN CRUD.
              This is the core dedup discipline. For every subject, BEFORE
              writing anything:
                a) Run `uv run python scripts/wiki_search.py "<name>"` (try
                   the canonical name AND likely aliases). Inspect the hits.
                b) IF a page already covers this subject → UPDATE it in
                   place: fold today's development into the body, add or
                   refine `[[links]]` and `aliases`, and bump `updated_at`
                   to the ingested date per the schema. Do NOT create a
                   second page. Do NOT change its slug.
                c) ONLY IF no existing page covers it → CREATE a new page in
                   the correct subdir (entities/ vs concepts/ vs themes/)
                   with a slug per the schema conventions, full frontmatter,
                   and `[[links]]` to related pages that already exist.
              Maintain bidirectional linking where the schema calls for it.
              Keep page bodies concise and factual.

            STEP 4 — UPDATE INDEX AND APPEND LOG.
              Update research/wiki/index.md so newly created pages are
              listed and the index reflects the current set (follow whatever
              structure the schema/index already uses — do not invent a new
              one). Then APPEND exactly ONE entry to research/wiki/log.md:

                ## [$DATE_TODAY] ingest | <one-line summary of what changed>

              The summary should name the created vs updated pages at a
              glance (e.g. "created 2 (gpt-5-2, foo-bench), updated 4
              (openai, anthropic, ...)"). Append only — never rewrite older
              log entries.

            STEP 5 — VALIDATE.
              Run `uv run python scripts/check_wiki.py`. If it exits
              non-zero, the output lists each failure with the offending
              page and reason. Fix in place and re-run. ITERATE UNTIL EXIT
              0 — do not proceed past a failing validator. Then run
              `uv run python scripts/check_wiki.py --lint` (advisory) and
              fix the easy wins it reports; lint findings are not blocking,
              so use judgment and don't over-invest.

            STEP 5b — REGENERATE THE INDEX JSON.
              Run `uv run python scripts/build_wiki_index.py`. This rebuilds
              research/wiki/index.json — the machine index the dashboard reads
              (page metadata, the slug∪alias resolver, the backlink graph, and
              recent log entries). It is a GENERATED artifact: never hand-edit
              it. CI runs `build_wiki_index.py --check` and fails the build if
              it is stale, so it MUST be regenerated whenever any page changes.

            STEP 6 — COMMIT (Bash).
              git add research/wiki/
              git commit -m "Wiki ingest $DATE_TODAY" || echo "No changes"

              (`git add research/wiki/` includes the regenerated index.json.)
              Do NOT run `git push`. A later workflow step publishes.

              This commit is the WHOLE POINT of the run. Always reach it,
              even after a deliberately bounded/partial pass (see STEP 2 and
              the turn-budget discipline). The only acceptable "No changes"
              outcome is when the digest genuinely contained nothing new for
              the wiki — never because you ran out of turns before getting
              here.

            CONSTRAINTS
              - The validator is the contract enforcer; treat docs/wiki-schema.md
                and scripts/check_wiki.py as authoritative over this prompt.
              - One page per subject. Slugs are immutable — a rename updates
                the title + aliases, never the slug or filename.
              - Canonicalize aggressively. "OpenAI", "open-ai", and "OpenAI /
                Codex" are the SAME entity; "GPT-5.5" is a model, distinct from
                its maker. Pick ONE canonical slug per subject and fold every
                other surface form in as an `alias` on that page — never create
                a near-duplicate. When wiki_search returns a plausible existing
                page, default to updating it and adding the new name as an alias.
              - Never delete a page. Pages compound over time. (A CI guard
                fails the run if this commit deletes any page.)
              - Update-in-place is the default; creation is the exception.
              - Write ONLY under research/wiki/. Do not touch the digest,
                the tickets, the dashboard, or any other research subdir.

      # Propagate the Claude step's outcome to job.status. With
      # continue-on-error: true on the Claude step, a timeout/error would
      # otherwise resolve to step.conclusion=success and hooker-telemetry
      # would report a green run. exit 1 here lets later `if: always()`
      # steps (telemetry) still fire while flipping job.status to failure
      # when it should be.
      - name: Inspect Claude outcome
        if: always()
        env:
          OUTCOME: ${{ steps.ingest.outcome }}
        run: |
          if [ "$OUTCOME" = "failure" ]; then
            echo "::error::Claude wiki-ingest step failed (timeout or error); failing the job so telemetry reports honestly."
            exit 1
          fi
          echo "Claude wiki-ingest step succeeded."

      # Mechanically enforce the "never delete a page" invariant. The prompt
      # says it, but a prompt is not a guarantee. Diff exactly the agent's
      # commit (BASE_SHA..HEAD recorded before the agent ran) for deleted
      # page files; fail before the commit reaches main + Vercel. Slugs are
      # immutable by contract, so a rename is a deletion and is caught too.
      - name: Guard against wiki page deletions
        env:
          BASE_SHA: ${{ steps.basesha.outputs.sha }}
        run: |
          deleted=$(git diff --diff-filter=D --name-only "$BASE_SHA" HEAD -- 'research/wiki/entities' 'research/wiki/concepts' 'research/wiki/themes' 2>/dev/null || true)
          if [ -n "$deleted" ]; then
            echo "::error::wiki ingest deleted page(s) — pages are append-only and slugs immutable by contract:"
            echo "$deleted"
            exit 1
          fi
          echo "No wiki page deletions."

      # Use the shared safe-push composite action (post-PR-#58 algorithm):
      # stash any leftover working-tree state before rebasing, so the rebase
      # cannot fail to start with "cannot rebase: You have unstaged
      # changes". The action exposes `outputs.pushed`, consumed by the
      # Vercel deploy step below. Push failures propagate as a real job
      # failure. See .github/actions/safe-push/action.yml.
      - name: Push changes
        id: push
        uses: ./.github/actions/safe-push
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      # Vercel's GitHub App webhook should fire on bot pushes too, but if the
      # VERCEL_DEPLOY_HOOK secret is present we belt-and-suspenders it.
      # Set the secret to a Vercel Project → Settings → Git → Deploy Hooks
      # URL scoped to the `main` branch.
      - name: Trigger Vercel deploy
        if: steps.push.outputs.pushed == 'true'
        env:
          VERCEL_DEPLOY_HOOK: ${{ secrets.VERCEL_DEPLOY_HOOK }}
        run: |
          if [ -n "$VERCEL_DEPLOY_HOOK" ]; then
            curl -fsSL -X POST "$VERCEL_DEPLOY_HOOK" && echo "Vercel deploy hook fired"
          else
            echo "VERCEL_DEPLOY_HOOK not set; relying on Vercel's GitHub auto-deploy"
          fi

      - name: Publish Hooker workflow telemetry
        if: always()
        uses: ./.github/actions/hooker-telemetry
        with:
          status: ${{ job.status }}
        env:
          HOOKER_URL: ${{ secrets.HOOKER_URL }}
          HOOKER_TOKEN: ${{ secrets.HOOKER_TOKEN }}
