name: Deploy Dashboard to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'dashboard/**'
      - 'research/twitter/**'
      - 'research/models/**'
      - 'research/front-page/**'
      - 'research/digest/**'
      - 'research/audio/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: [self-hosted, Linux]
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        working-directory: dashboard
        run: bun install --frozen-lockfile

      # Copy research data into the Vite public dir
      # so it gets included in the build output as static assets
      - name: Copy research data into public dir
        run: |
          mkdir -p dashboard/public/research
          cp -r research/twitter dashboard/public/research/
          cp -r research/models dashboard/public/research/
          cp -r research/front-page dashboard/public/research/
          [ -d research/digest ] && cp -r research/digest dashboard/public/research/ || true
          [ -d research/audio ]  && cp -r research/audio  dashboard/public/research/ || true

      # Build a manifest of available dates per source so the dashboard can avoid
      # the HEAD-probe storm against missing daily files.
      - name: Generate manifest.json
        run: |
          python3 - <<'PY'
          import json, re
          from pathlib import Path

          base = Path('dashboard/public/research')
          patterns = {
            'twitter':   (base / 'twitter',    re.compile(r'^(\d{4}-\d{2}-\d{2})\.md$')),
            'models':    (base / 'models',     re.compile(r'^(\d{4}-\d{2}-\d{2})-timeline\.md$')),
            'frontpage': (base / 'front-page', re.compile(r'^(\d{4}-\d{2}-\d{2})-front-page\.png$')),
            'today':     (base / 'digest',     re.compile(r'^(\d{4}-\d{2}-\d{2})-digest\.md$')),
            'audio':     (base / 'audio',      re.compile(r'^(\d{4}-\d{2}-\d{2})-digest\.mp3$')),
          }
          manifest = {}
          for key, (dir_, pat) in patterns.items():
              dates = []
              if dir_.exists():
                  for f in dir_.iterdir():
                      m = pat.match(f.name)
                      if m:
                          dates.append(m.group(1))
              manifest[key] = sorted(set(dates))
          (base / 'manifest.json').write_text(json.dumps(manifest, separators=(',', ':')))
          counts = {k: len(v) for k, v in manifest.items()}
          print(f'manifest.json: {counts}')
          PY

      - name: Build
        working-directory: dashboard
        run: bun run build

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dashboard/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
