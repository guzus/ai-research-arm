name: Daily Self-Improvement

on:
  schedule:
    # Weekly, Mondays at 00:17 UTC. Was daily, but the self-improvement loop
    # was a noise generator (≈1/32 PRs merged, the rest stale-open or closed
    # unmerged). Weekly cadence + the stale-PR cleanup step below + a
    # cite-a-concrete-defect-or-output-"no improvements" prompt cut the churn.
    - cron: '17 0 * * 1'
  workflow_dispatch:

concurrency:
  group: daily-improve
  cancel-in-progress: true

jobs:
  self-improve:
    runs-on: [self-hosted, Linux]
    timeout-minutes: 30
    permissions:
      contents: write
      pull-requests: write
      id-token: write
      # Updating workflow files also requires the claude[bot] GitHub App
      # installation to have Workflows: read/write. That App-level permission
      # cannot be granted from this workflow's permissions block.

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Get dates
        id: dates
        run: |
          echo "today=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT
          echo "yesterday=$(date -d 'yesterday' +'%Y-%m-%d' 2>/dev/null || date -v-1d +'%Y-%m-%d')" >> $GITHUB_OUTPUT
          echo "branch=improve/$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT

      # Set authenticated remote URL so Claude's `git push` (inside the
      # sandboxed Bash(git:*) tool) can reach the origin without re-running
      # `git remote set-url` from inside the agent prompt.
      - name: Configure authenticated git remote
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git

      # Close any prior open auto-improvement PRs before opening a new one so
      # stale `improve/*` PRs don't pile up (the loop historically left ~7
      # open at once). Deterministic step, not left to the prompt. Filter by
      # branch PREFIX: `gh pr list --head` is EXACT-match and would match no
      # `improve/<date>` branch. No PR exists for THIS run's branch yet (it's
      # created later by the agent), so this can't close our own.
      - name: Close stale auto-improvement PRs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true
        run: |
          gh pr list --state open --limit 100 --json number,headRefName \
            --jq '.[] | select(.headRefName | startswith("improve/")) | .number' \
          | while read -r n; do
              [ -n "$n" ] && gh pr close "$n" \
                -c "Superseded by this week's self-improvement run." || true
            done

      - name: Analyze and Improve Methodology
        uses: anthropics/claude-code-action@v1
        env:
          # `gh pr create` invoked from the agent prompt needs GH_TOKEN.
          # Without this the agent silently fails at the PR-create step
          # even when Bash(gh:*) is in the allowlist.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: |
            --model opus --allowedTools "Glob,Read,Write,Edit,Bash(git:*),Bash(gh:*),WebSearch"
          prompt: |
            You are an AI research methodology optimizer. Analyze yesterday's output quality and propose improvements.

            TODAY: ${{ steps.dates.outputs.today }}
            YESTERDAY: ${{ steps.dates.outputs.yesterday }}
            BRANCH: ${{ steps.dates.outputs.branch }}

            ## STEP 1: Analyze Yesterday's Output

            Look in the research/ directory for any reports from yesterday (${{ steps.dates.outputs.yesterday }}).
            Check all subdirectories (twitter/, community/, arxiv/, rss/, bluesky/, digest/, etc.).
            Read all relevant files you find.

            Also look in .github/workflows/ and read the current workflow files to understand the methodology.

            ## STEP 2: Identify a CONCRETE, OBSERVED defect

            This loop only earns a PR when it fixes a defect you can SEE in
            yesterday's actual output or in the workflow files — not a
            hypothetical or generic best-practice. For each candidate issue,
            you MUST be able to cite the specific evidence: the file path, the
            empty/duplicated/malformed content, the missing field, the bug in
            the workflow logic. "We could add more sources" with no observed
            gap is NOT a defect.

            Evaluate (and record the concrete evidence for any you flag):
            1. **Coverage gaps**: A topic that clearly broke yesterday and is
               absent from every lane's output — name it and the missing item.
            2. **Data freshness**: A lane whose file is stale/empty vs. its
               cadence — cite the file and timestamp/size.
            3. **Signal vs noise**: Concrete noise in the output (dupes, spam,
               off-topic items) — quote examples.
            4. **Source diversity**: Measurable over-reliance — show the counts.
            5. **Format quality / bugs**: A specific rendering/logic bug — cite
               the line.

            If you cannot cite a concrete observed defect, STOP — go to the
            "No substantive improvement" path in the IMPORTANT section. Do NOT
            manufacture work.

            ## STEP 3: Research Improvements

            Use WebSearch to find:
            - New MCP servers for AI news
            - Better RSS feeds for AI content
            - New AI-focused platforms or communities
            - Best practices for news aggregation
            - Tools other AI researchers use

            Search queries:
            - "best AI news sources 2026"
            - "new MCP servers AI"
            - "AI researcher newsletters RSS"
            - "AI Discord servers news"
            - "AI Telegram channels"

            ## STEP 4: Create Improvement PR

            ONLY proceed if STEP 2 produced at least one concrete, cited
            defect AND you have an actual fix for it. Otherwise skip to the
            "No substantive improvement" path in IMPORTANT — do not open a PR.

            If you have a cited defect and a fix:

            1. Create a new branch:
               git checkout -b ${{ steps.dates.outputs.branch }}

            2. Make changes to workflow files to implement improvements:
               - Add new RSS feeds
               - Add new search queries
               - Improve filtering logic
               - Add new data sources
               - Fix any bugs found

            3. Create a dated improvement note at docs/archive/${{ steps.dates.outputs.today }}-improvements.md documenting:
               - What issues were found
               - What improvements were made
               - Expected impact
               (Do NOT write to repo-root IMPROVEMENTS.md — that path is archived. See CLAUDE.md load-bearing rule #7.)

            4. Commit changes (DO NOT use `git add -A`. The repo uses git-lfs
               for *.png and *.mp3 — `git add -A` would also stage all
               existing historical binaries as LFS pointers, contradicting
               the deferred history-migration plan. Stage only the workflow
               and doc files you actually changed, e.g.:
                 git add .github/workflows/*.yml docs/archive/${{ steps.dates.outputs.today }}-improvements.md
               Or: `git add` with explicit paths for each modified file.):
               git commit -m "Methodology improvements for ${{ steps.dates.outputs.today }}"

            5. Push and create PR:
               git push -u origin ${{ steps.dates.outputs.branch }}

            6. Use gh CLI to create PR:
               gh pr create --title "🔄 Daily Methodology Improvement - ${{ steps.dates.outputs.today }}" \
                 --body "## Auto-generated Improvement PR

               This PR was automatically generated by analyzing yesterday's research output and identifying improvements.

               ### Concrete defect addressed
               [The specific observed defect from STEP 2, WITH its evidence:
               file path + the empty/duplicated/malformed/missing content or
               the buggy workflow line. A PR with no cited defect here is not
               acceptable.]

               ### Changes Made
               [Summary of changes]

               ### Expected Impact
               [How this fixes the cited defect]

               ---
               🤖 Generated by Self-Improvement Workflow"

            ## IMPORTANT

            - A PR REQUIRES a concrete, observed defect cited with evidence
              (file path + the specific bad content/line). No citation → no PR.
            - Do NOT open a PR for hypothetical, generic, or "could add more"
              changes, nor for trivial edits.
            - **No substantive improvement path:** if STEP 2 found no cited
              defect, do NOT create a branch, commit, or PR. Print exactly
              `no improvements` and stop. A clean week with no PR is a SUCCESS,
              not a failure — this loop was previously a noise generator.
            - Be specific about what changed and why; tie every change to the
              cited defect.

      - name: Push changes if on branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CURRENT_BRANCH=$(git branch --show-current)
          if [ "$CURRENT_BRANCH" != "main" ]; then
            git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git
            git push -u origin "$CURRENT_BRANCH"
          fi

      - name: Publish Hooker workflow telemetry
        if: always()
        uses: ./.github/actions/hooker-telemetry
        with:
          status: ${{ job.status }}
        env:
          HOOKER_URL: ${{ secrets.HOOKER_URL }}
          HOOKER_TOKEN: ${{ secrets.HOOKER_TOKEN }}
