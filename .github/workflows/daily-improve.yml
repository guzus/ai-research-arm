name: Daily Self-Improvement

on:
  schedule:
    # Run daily at 00:17 UTC
    - cron: '17 0 * * *'
  workflow_dispatch:

concurrency:
  group: daily-improve
  cancel-in-progress: true

jobs:
  self-improve:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      pull-requests: write
      id-token: write
      # Updating workflow files also requires the claude[bot] GitHub App
      # installation to have Workflows: read/write. That App-level permission
      # cannot be granted from this workflow's permissions block.

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Get dates
        id: dates
        run: |
          echo "today=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT
          echo "yesterday=$(date -d 'yesterday' +'%Y-%m-%d' 2>/dev/null || date -v-1d +'%Y-%m-%d')" >> $GITHUB_OUTPUT
          echo "branch=improve/$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT

      # Set authenticated remote URL so Claude's `git push` (inside the
      # sandboxed Bash(git:*) tool) can reach the origin without re-running
      # `git remote set-url` from inside the agent prompt.
      - name: Configure authenticated git remote
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git

      - name: Analyze and Improve Methodology
        uses: anthropics/claude-code-action@v1
        env:
          # `gh pr create` invoked from the agent prompt needs GH_TOKEN.
          # Without this the agent silently fails at the PR-create step
          # even when Bash(gh:*) is in the allowlist.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: |
            --model opus --allowedTools "Glob,Read,Write,Edit,Bash(git:*),Bash(gh:*),WebSearch"
          prompt: |
            You are an AI research methodology optimizer. Analyze yesterday's output quality and propose improvements.

            TODAY: ${{ steps.dates.outputs.today }}
            YESTERDAY: ${{ steps.dates.outputs.yesterday }}
            BRANCH: ${{ steps.dates.outputs.branch }}

            ## STEP 1: Analyze Yesterday's Output

            Look in the research/ directory for any reports from yesterday (${{ steps.dates.outputs.yesterday }}).
            Check all subdirectories (twitter/, community/, arxiv/, rss/, bluesky/, digest/, etc.).
            Read all relevant files you find.

            Also look in .github/workflows/ and read the current workflow files to understand the methodology.

            ## STEP 2: Identify Issues

            Evaluate:
            1. **Coverage gaps**: Are we missing important AI news sources?
            2. **Data freshness**: Is the data actually real-time?
            3. **Signal vs noise**: Are we filtering effectively?
            4. **Source diversity**: Are we over-relying on certain sources?
            5. **Format quality**: Is the output actionable and readable?

            ## STEP 3: Research Improvements

            Use WebSearch to find:
            - New MCP servers for AI news
            - Better RSS feeds for AI content
            - New AI-focused platforms or communities
            - Best practices for news aggregation
            - Tools other AI researchers use

            Search queries:
            - "best AI news sources 2026"
            - "new MCP servers AI"
            - "AI researcher newsletters RSS"
            - "AI Discord servers news"
            - "AI Telegram channels"

            ## STEP 4: Create Improvement PR

            If you find meaningful improvements:

            1. Create a new branch:
               git checkout -b ${{ steps.dates.outputs.branch }}

            2. Make changes to workflow files to implement improvements:
               - Add new RSS feeds
               - Add new search queries
               - Improve filtering logic
               - Add new data sources
               - Fix any bugs found

            3. Create a dated improvement note at docs/archive/${{ steps.dates.outputs.today }}-improvements.md documenting:
               - What issues were found
               - What improvements were made
               - Expected impact
               (Do NOT write to repo-root IMPROVEMENTS.md — that path is archived. See CLAUDE.md load-bearing rule #7.)

            4. Commit changes (DO NOT use `git add -A`. The repo uses git-lfs
               for *.png and *.mp3 — `git add -A` would also stage all
               existing historical binaries as LFS pointers, contradicting
               the deferred history-migration plan. Stage only the workflow
               and doc files you actually changed, e.g.:
                 git add .github/workflows/*.yml docs/archive/${{ steps.dates.outputs.today }}-improvements.md
               Or: `git add` with explicit paths for each modified file.):
               git commit -m "Methodology improvements for ${{ steps.dates.outputs.today }}"

            5. Push and create PR:
               git push -u origin ${{ steps.dates.outputs.branch }}

            6. Use gh CLI to create PR:
               gh pr create --title "🔄 Daily Methodology Improvement - ${{ steps.dates.outputs.today }}" \
                 --body "## Auto-generated Improvement PR

               This PR was automatically generated by analyzing yesterday's research output and identifying improvements.

               ### Changes Made
               [Summary of changes]

               ### Issues Addressed
               [List of issues found]

               ### New Sources Added
               [Any new data sources]

               ### Expected Impact
               [How this improves research quality]

               ---
               🤖 Generated by Daily Self-Improvement Workflow"

            ## IMPORTANT

            - Only create a PR if there are MEANINGFUL improvements
            - Don't create PRs for trivial changes
            - Focus on improving data quality and coverage
            - If no improvements needed, just log "No improvements identified today"
            - Be specific about what changes were made and why

      - name: Push changes if on branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CURRENT_BRANCH=$(git branch --show-current)
          if [ "$CURRENT_BRANCH" != "main" ]; then
            git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git
            git push -u origin "$CURRENT_BRANCH"
          fi

      - name: Publish Hooker workflow telemetry
        if: always()
        uses: ./.github/actions/hooker-telemetry
        with:
          status: ${{ job.status }}
        env:
          HOOKER_URL: ${{ secrets.HOOKER_URL }}
          HOOKER_TOKEN: ${{ secrets.HOOKER_TOKEN }}
