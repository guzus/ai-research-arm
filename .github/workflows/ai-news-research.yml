name: AI News Research Agent

on:
  schedule:
    # Run every 4 hours
    - cron: '0 */4 * * *'
  workflow_dispatch:
    inputs:
      topics:
        description: 'Specific AI topics to research (comma-separated)'
        required: false
        default: 'AI agents, LLM, Claude, GPT, AI research breakthroughs'

jobs:
  ai-news-research:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get current date
        id: date
        run: echo "date=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT

      - name: Check for MCP API keys
        id: check-keys
        run: |
          if [ -n "${{ secrets.EXA_API_KEY }}" ]; then
            echo "has_exa=true" >> $GITHUB_OUTPUT
          else
            echo "has_exa=false" >> $GITHUB_OUTPUT
          fi

      - name: Create MCP Config (if API keys available)
        if: steps.check-keys.outputs.has_exa == 'true'
        run: |
          cat > /tmp/mcp-config.json << EOF
          {
            "mcpServers": {
              "exa": {
                "command": "npx",
                "args": ["-y", "exa-mcp-server"],
                "env": {
                  "EXA_API_KEY": "${{ secrets.EXA_API_KEY }}"
                }
              }
            }
          }
          EOF

      - name: Run AI News Research with Claude (with MCP)
        if: steps.check-keys.outputs.has_exa == 'true'
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: |
            --mcp-config /tmp/mcp-config.json
            --allowedTools "Read,Write,Edit,Bash(git:*),mcp__exa__web_search_exa,mcp__exa__deep_search_exa"
          prompt: |
            You are an AI research agent. Your task is to search for AI news and save a report.

            REPO: ${{ github.repository }}
            DATE: ${{ steps.date.outputs.date }}

            Topics: ${{ github.event.inputs.topics || 'AI agents, LLM breakthroughs, Claude AI, GPT updates, AI research papers, AI startups, AI regulation, AI safety' }}

            INSTRUCTIONS:
            1. Use the Exa MCP tools (mcp__exa__web_search_exa) to search for recent AI news
            2. Use the Write tool to create a file at: research/${{ steps.date.outputs.date }}-ai-news.md
            3. The file should contain:
               - Header with date
               - Executive Summary
               - Sections: Model Updates, Research, Company News, Tools, Trends
               - For each item: title, summary, source URL, significance
            4. After writing, commit the changes using Bash with git commands:
               git add research/
               git commit -m "Add AI news research for ${{ steps.date.outputs.date }}"

            You MUST write the file and commit it. Do not skip these steps.

      - name: Run AI News Research with Claude (without MCP)
        if: steps.check-keys.outputs.has_exa != 'true'
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: |
            --allowedTools "Read,Write,Edit,Bash(git:*),WebSearch"
          prompt: |
            You are an AI research agent. Your task is to search for AI news and save a report.

            REPO: ${{ github.repository }}
            DATE: ${{ steps.date.outputs.date }}

            Topics: ${{ github.event.inputs.topics || 'AI agents, LLM breakthroughs, Claude AI, GPT updates, AI research papers, AI startups, AI regulation, AI safety' }}

            INSTRUCTIONS:
            1. Use WebSearch to find recent AI news from the past 24-48 hours. Search for:
               - "latest AI news January 2026"
               - "AI model releases 2026"
               - "OpenAI Anthropic Google DeepMind news 2026"
            2. Use the Write tool to create a file at: research/${{ steps.date.outputs.date }}-ai-news.md
            3. The file should contain:
               - Header with date
               - Executive Summary
               - Sections: Model Updates, Research, Company News, Tools, Trends
               - For each item: title, summary, source URL, significance
            4. After writing, commit the changes using Bash with git commands:
               git add research/
               git commit -m "Add AI news research for ${{ steps.date.outputs.date }}"

            You MUST write the file and commit it. Do not skip these steps.

      - name: Push changes
        run: |
          git push || echo "Nothing to push"
