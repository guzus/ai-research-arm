name: AI News Research Agent

on:
  schedule:
    # Run twice daily at 08:23 and 20:23 UTC
    - cron: '23 8,20 * * *'
  workflow_dispatch:
    inputs:
      topics:
        description: 'Specific AI topics to research (comma-separated)'
        required: false
        default: 'AI agents, LLM, Claude, GPT, AI research breakthroughs'

concurrency:
  group: ai-news-research
  cancel-in-progress: true

jobs:
  ai-news-research:
    runs-on: [self-hosted, Linux]
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get current date
        id: date
        run: |
          echo "date=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT
          echo "yesterday=$(date -d 'yesterday' +'%Y-%m-%d' 2>/dev/null || date -v-1d +'%Y-%m-%d')" >> $GITHUB_OUTPUT

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Check for MCP API keys
        id: check-keys
        run: |
          if [ -n "${{ secrets.EXA_API_KEY }}" ]; then
            echo "has_exa=true" >> $GITHUB_OUTPUT
          else
            echo "has_exa=false" >> $GITHUB_OUTPUT
          fi
          if [ -n "${{ secrets.PERPLEXITY_API_KEY }}" ]; then
            echo "has_perplexity=true" >> $GITHUB_OUTPUT
          else
            echo "has_perplexity=false" >> $GITHUB_OUTPUT
          fi

      - name: Create MCP Config (if API keys available)
        if: steps.check-keys.outputs.has_exa == 'true' || steps.check-keys.outputs.has_perplexity == 'true'
        run: |
          cat > /tmp/mcp-config.json << 'EOF'
          {
            "mcpServers": {
          EOF
          
          # Add Exa if available
          if [ "${{ steps.check-keys.outputs.has_exa }}" == "true" ]; then
            cat >> /tmp/mcp-config.json << 'EOF'
              "exa": {
                "command": "npx",
                "args": ["-y", "exa-mcp-server"],
                "env": {
                  "EXA_API_KEY": "${{ secrets.EXA_API_KEY }}"
                }
              }
          EOF
            if [ "${{ steps.check-keys.outputs.has_perplexity }}" == "true" ]; then
              echo "," >> /tmp/mcp-config.json
            fi
          fi
          
          # Add Perplexity if available
          if [ "${{ steps.check-keys.outputs.has_perplexity }}" == "true" ]; then
            cat >> /tmp/mcp-config.json << 'EOF'
              "perplexity": {
                "command": "npx",
                "args": ["-y", "perplexity-mcp"],
                "env": {
                  "PERPLEXITY_API_KEY": "${{ secrets.PERPLEXITY_API_KEY }}"
                }
              }
          EOF
          fi
          
          cat >> /tmp/mcp-config.json << 'EOF'
            }
          }
          EOF
          
          echo "Generated MCP config:"
          cat /tmp/mcp-config.json

      - name: Run AI News Research with Claude (with MCP)
        if: steps.check-keys.outputs.has_exa == 'true' || steps.check-keys.outputs.has_perplexity == 'true'
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: |
            --model opus --mcp-config /tmp/mcp-config.json
            --allowedTools "Read,Write,Edit,Bash(git:*),mcp__exa__*,mcp__perplexity__*"
          prompt: |
            You are an AI news research agent. Find BREAKING NEWS and RECENT ANNOUNCEMENTS only.

            TODAY: ${{ steps.date.outputs.date }}
            YESTERDAY: ${{ steps.date.outputs.yesterday }}
            REPO: ${{ github.repository }}

            STEP 1 - DEDUPLICATION CHECK:
            First, read the previous report(s) to avoid duplicating news:
            - Read: research/${{ steps.date.outputs.yesterday }}-ai-news.md (if exists)
            - Read: research/${{ steps.date.outputs.date }}-ai-news.md (if exists, to append new items)

            Make a mental note of ALL stories already covered. DO NOT include any story that was already reported.

            STEP 2 - SEARCH FOR NEW NEWS:
            Use MCP search tools (Exa, Perplexity) to search for REAL NEWS from last 24-48 hours:
            - Perplexity provides real-time web search with citations
            - Use whichever tools are available to find:
            - OpenAI announcements
            - Anthropic Claude releases
            - Google Gemini updates
            - AI startup funding rounds
            - New AI model releases
            - AI regulation news

            STRICT RECENCY FILTER - Today is ${{ steps.date.outputs.date }}. ONLY include news that:
            - Was published on ${{ steps.date.outputs.date }} or ${{ steps.date.outputs.yesterday }} (LAST 24-48 HOURS ONLY)
            - Has a SPECIFIC publication date that you can verify
            - Is from a CREDIBLE source (TechCrunch, VentureBeat, The Verge, official company blogs, Reuters)
            - Contains CONCRETE information (not speculation)
            - Has REAL URLs
            - WAS NOT ALREADY COVERED in previous reports

            ABSOLUTELY DO NOT include: ANY news older than 48 hours, generic AI explanations, evergreen content, speculation without sources, OR DUPLICATE STORIES from previous reports. If search returns old news, SKIP IT.

            STEP 3 - WRITE REPORT:
            Use Write tool to create: research/${{ steps.date.outputs.date }}-ai-news.md

            Include at the top: "**Note:** For earlier news coverage, see previous reports in this directory."

            Sections: Breaking News, New Model Releases, Funding & Acquisitions, Research Papers, Industry Moves, Regulatory Updates

            STEP 4 - WRITE TELEGRAM SUMMARY:
            After writing the full report, also write a SHORT summary for Telegram notification.
            Use Write tool to create: research/summaries/${{ steps.date.outputs.date }}-summary.txt

            Format (plain text, max 800 chars):
            ```
            AI News - ${{ steps.date.outputs.date }}

            TOP STORIES:
            • [Headline 1 - one line]
            • [Headline 2 - one line]
            • [Headline 3 - one line]

            KEY NUMBERS:
            • [Any funding amounts, user counts, or metrics]

            Full report on GitHub.
            ```

            After writing both files, commit (stage ONLY today's two files;
            do NOT `git add research/`, the LFS clean filter would convert
            historical PNGs/MP3s to LFS pointers in one commit):
            git add research/${{ steps.date.outputs.date }}-ai-news.md research/summaries/${{ steps.date.outputs.date }}-summary.txt
            git commit -m "Add AI news research for ${{ steps.date.outputs.date }}"

            CRITICAL: Write REAL news with actual sources. No placeholder content. NO DUPLICATES from previous reports.

      - name: Run AI News Research with Claude (without MCP)
        if: steps.check-keys.outputs.has_exa != 'true' && steps.check-keys.outputs.has_perplexity != 'true'
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: |
            --model opus --allowedTools "Read,Write,Edit,Bash(git:*),WebSearch"
          prompt: |
            You are an AI news research agent. Find BREAKING NEWS and RECENT ANNOUNCEMENTS only.

            TODAY: ${{ steps.date.outputs.date }}
            YESTERDAY: ${{ steps.date.outputs.yesterday }}
            REPO: ${{ github.repository }}

            STEP 1 - DEDUPLICATION CHECK:
            First, read the previous report(s) to avoid duplicating news:
            - Read: research/${{ steps.date.outputs.yesterday }}-ai-news.md (if exists)
            - Read: research/${{ steps.date.outputs.date }}-ai-news.md (if exists, to append new items)

            Make a mental note of ALL stories already covered. DO NOT include any story that was already reported.

            STEP 2 - SEARCH FOR NEW NEWS:
            Do multiple specific searches to find REAL NEWS from TODAY (${{ steps.date.outputs.date }}) or YESTERDAY (${{ steps.date.outputs.yesterday }}):
            - "OpenAI announcement ${{ steps.date.outputs.date }}"
            - "Anthropic Claude news ${{ steps.date.outputs.date }}"
            - "Google Gemini update ${{ steps.date.outputs.date }}"
            - "AI startup funding ${{ steps.date.outputs.date }}"
            - "AI model release today"
            - "AI news today ${{ steps.date.outputs.date }}"

            Also try yesterday's date if today has few results:
            - "AI breaking news ${{ steps.date.outputs.yesterday }}"

            STRICT RECENCY FILTER - Today is ${{ steps.date.outputs.date }}. ONLY include news that:
            - Was published on ${{ steps.date.outputs.date }} or ${{ steps.date.outputs.yesterday }} (LAST 24-48 HOURS ONLY)
            - Has a SPECIFIC publication date that you can verify
            - Is from a CREDIBLE source (TechCrunch, VentureBeat, The Verge, official company blogs, Reuters, etc.)
            - Contains CONCRETE information (not speculation or opinion)
            - Has REAL URLs that can be verified
            - WAS NOT ALREADY COVERED in previous reports

            ABSOLUTELY DO NOT include:
            - ANY news older than 48 hours (e.g., from January 7, 10, 12 when today is January 18)
            - Generic explanations of what AI is
            - Evergreen content or feature articles without a news hook
            - Speculation without sources
            - Information without specific, recent dates
            - DUPLICATE STORIES from previous reports

            If a search returns old news, SKIP IT. Only report genuinely new stories from today or yesterday.

            STEP 3 - WRITE REPORT:
            Use the Write tool to create: research/${{ steps.date.outputs.date }}-ai-news.md

            ```markdown
            # AI News Report - ${{ steps.date.outputs.date }}

            **Note:** For earlier news coverage, see previous reports in this directory.

            ## Breaking News
            [Most important NEW announcements from last 24 hours - not in previous reports]

            ## New Model Releases
            [Specific model launches with version numbers, capabilities, pricing]

            ## Funding & Acquisitions
            [Startup funding rounds, M&A activity with dollar amounts]

            ## Research Papers
            [Notable papers from arXiv, with specific findings]

            ## Industry Moves
            [Executive changes, partnerships, strategic announcements]

            ## Regulatory Updates
            [Policy changes, government actions]

            ---
            *Sources verified as of ${{ steps.date.outputs.date }}*
            ```

            STEP 4 - WRITE TELEGRAM SUMMARY:
            After writing the full report, also write a SHORT summary for Telegram notification.
            Use Write tool to create: research/summaries/${{ steps.date.outputs.date }}-summary.txt

            Format (plain text, max 800 chars):
            ```
            AI News - ${{ steps.date.outputs.date }}

            TOP STORIES:
            • [Headline 1 - one line]
            • [Headline 2 - one line]
            • [Headline 3 - one line]

            KEY NUMBERS:
            • [Any funding amounts, user counts, or metrics]

            Full report on GitHub.
            ```

            After writing both files, commit (stage ONLY today's two files;
            do NOT `git add research/`, the LFS clean filter would convert
            historical PNGs/MP3s to LFS pointers in one commit):
            git add research/${{ steps.date.outputs.date }}-ai-news.md research/summaries/${{ steps.date.outputs.date }}-summary.txt
            git commit -m "Add AI news research for ${{ steps.date.outputs.date }}"

            CRITICAL: You MUST write a real file with actual news. Do not write placeholder content. NO DUPLICATES from previous reports.

      - name: Push changes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git
          git pull --rebase || true
          git push || echo "Nothing to push"

      - name: Read summary for Telegram
        id: summary
        run: |
          SUMMARY_FILE="research/summaries/${{ steps.date.outputs.date }}-summary.txt"
          if [ -f "$SUMMARY_FILE" ]; then
            # Read summary and escape special chars for GitHub output
            SUMMARY=$(cat "$SUMMARY_FILE" | head -c 800)
            echo "content<<EOF" >> $GITHUB_OUTPUT
            echo "$SUMMARY" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
            echo "has_summary=true" >> $GITHUB_OUTPUT
          else
            echo "has_summary=false" >> $GITHUB_OUTPUT
            echo "content=No summary available" >> $GITHUB_OUTPUT
          fi

      - name: Send Telegram notification
        if: success() && github.event_name == 'workflow_dispatch'
        continue-on-error: true
        uses: appleboy/telegram-action@221e6b684967abe813051ee4a37dd61770a83ad3
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          format: markdown
          message: |
            🔬 *AI News Research Complete*

            ${{ steps.summary.outputs.content }}

            📄 [Full Report on GitHub](https://github.com/${{ github.repository }}/blob/main/research/${{ steps.date.outputs.date }}-ai-news.md)

      - name: Publish Hooker workflow telemetry
        if: always()
        uses: ./.github/actions/hooker-telemetry
        with:
          status: ${{ job.status }}
        env:
          HOOKER_URL: ${{ secrets.HOOKER_URL }}
          HOOKER_TOKEN: ${{ secrets.HOOKER_TOKEN }}
