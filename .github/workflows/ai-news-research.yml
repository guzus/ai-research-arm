name: AI News Research Agent

on:
  schedule:
    # Run every 4 hours
    - cron: '0 */4 * * *'
  workflow_dispatch:
    inputs:
      topics:
        description: 'Specific AI topics to research (comma-separated)'
        required: false
        default: 'AI agents, LLM, Claude, GPT, AI research breakthroughs'

jobs:
  ai-news-research:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get current date
        id: date
        run: echo "date=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT

      - name: Check for MCP API keys
        id: check-keys
        run: |
          if [ -n "${{ secrets.EXA_API_KEY }}" ]; then
            echo "has_exa=true" >> $GITHUB_OUTPUT
          else
            echo "has_exa=false" >> $GITHUB_OUTPUT
          fi

      - name: Create MCP Config (if API keys available)
        if: steps.check-keys.outputs.has_exa == 'true'
        run: |
          cat > /tmp/mcp-config.json << EOF
          {
            "mcpServers": {
              "exa": {
                "command": "npx",
                "args": ["-y", "exa-mcp-server"],
                "env": {
                  "EXA_API_KEY": "${{ secrets.EXA_API_KEY }}"
                }
              }
            }
          }
          EOF

      - name: Run AI News Research with Claude (with MCP)
        if: steps.check-keys.outputs.has_exa == 'true'
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: |
            --mcp-config /tmp/mcp-config.json
            --allowedTools "Read,Write,Edit,Bash(git:*),mcp__exa__web_search_exa,mcp__exa__deep_search_exa"
          prompt: |
            You are an AI news research agent. Find BREAKING NEWS and RECENT ANNOUNCEMENTS only.

            TODAY: ${{ steps.date.outputs.date }}
            REPO: ${{ github.repository }}

            Use Exa MCP tools (mcp__exa__web_search_exa) to search for REAL NEWS from last 24-48 hours:
            - OpenAI announcements
            - Anthropic Claude releases
            - Google Gemini updates
            - AI startup funding rounds
            - New AI model releases
            - AI regulation news

            QUALITY REQUIREMENTS - ONLY include news that:
            - Has a SPECIFIC date (within last 48 hours)
            - Is from a CREDIBLE source (TechCrunch, VentureBeat, The Verge, official company blogs, Reuters)
            - Contains CONCRETE information (not speculation)
            - Has REAL URLs

            DO NOT include: generic AI explanations, old news, speculation without sources.

            REPORT FORMAT - Use Write tool to create: research/${{ steps.date.outputs.date }}-ai-news.md

            Sections: Breaking News, New Model Releases, Funding & Acquisitions, Research Papers, Industry Moves, Regulatory Updates

            After writing, commit:
            git add research/
            git commit -m "Add AI news research for ${{ steps.date.outputs.date }}"

            CRITICAL: Write REAL news with actual sources. No placeholder content.

      - name: Run AI News Research with Claude (without MCP)
        if: steps.check-keys.outputs.has_exa != 'true'
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: |
            --allowedTools "Read,Write,Edit,Bash(git:*),WebSearch"
          prompt: |
            You are an AI news research agent. Find BREAKING NEWS and RECENT ANNOUNCEMENTS only.

            TODAY: ${{ steps.date.outputs.date }}
            REPO: ${{ github.repository }}

            SEARCH REQUIREMENTS:
            Do multiple specific searches to find REAL NEWS from the last 24-48 hours:
            - "OpenAI announcement January 2026"
            - "Anthropic Claude new release 2026"
            - "Google Gemini update January 2026"
            - "AI startup funding January 2026"
            - "new AI model release this week"
            - "AI regulation news January 2026"

            QUALITY REQUIREMENTS - ONLY include news that:
            - Has a SPECIFIC date (within last 48 hours)
            - Is from a CREDIBLE source (TechCrunch, VentureBeat, The Verge, official company blogs, Reuters, etc.)
            - Contains CONCRETE information (not speculation or opinion)
            - Has REAL URLs that can be verified

            DO NOT include:
            - Generic explanations of what AI is
            - Old news or evergreen content
            - Speculation without sources
            - Information without specific dates

            REPORT FORMAT - Use the Write tool to create: research/${{ steps.date.outputs.date }}-ai-news.md

            ```markdown
            # AI News Report - ${{ steps.date.outputs.date }}

            ## Breaking News
            [Most important announcements from last 24 hours]

            ## New Model Releases
            [Specific model launches with version numbers, capabilities, pricing]

            ## Funding & Acquisitions
            [Startup funding rounds, M&A activity with dollar amounts]

            ## Research Papers
            [Notable papers from arXiv, with specific findings]

            ## Industry Moves
            [Executive changes, partnerships, strategic announcements]

            ## Regulatory Updates
            [Policy changes, government actions]

            ---
            *Sources verified as of ${{ steps.date.outputs.date }}*
            ```

            After writing, commit:
            git add research/
            git commit -m "Add AI news research for ${{ steps.date.outputs.date }}"

            CRITICAL: You MUST write a real file with actual news. Do not write placeholder content.

      - name: Push changes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git
          git push || echo "Nothing to push"
