name: AI News Research Agent

on:
  schedule:
    # Run every 4 hours
    - cron: '0 */4 * * *'
  workflow_dispatch:
    inputs:
      topics:
        description: 'Specific AI topics to research (comma-separated)'
        required: false
        default: 'AI agents, LLM, Claude, GPT, AI research breakthroughs'

jobs:
  ai-news-research:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          persist-credentials: true

      - name: Get current date
        id: date
        run: echo "date=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT

      - name: Run AI News Research with Claude
        id: research
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            You are an AI research agent. Your task is to search for the latest AI news and create a report.

            Topics to research: ${{ github.event.inputs.topics || 'AI agents, LLM breakthroughs, Claude AI, GPT updates, AI research papers, AI startups, AI regulation, AI safety' }}

            IMPORTANT: You MUST complete these steps in order:

            Step 1: Use WebSearch to find recent AI news (past 24-48 hours). Search for:
            - "latest AI news January 2026"
            - "AI model releases 2026"
            - "OpenAI Anthropic Google DeepMind news"

            Step 2: After gathering information, use the Write tool to create a markdown file at:
            research/${{ steps.date.outputs.date }}-ai-news.md

            The file MUST contain:
            - A header with today's date
            - Sections for different news categories
            - For each news item: title, summary, source URL, significance

            Step 3: After writing the file, verify it was created by reading it back.

            DO NOT skip Step 2. You MUST write the file.

      - name: Push changes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git
          git add research/
          if ! git diff --staged --quiet; then
            git commit -m "Add AI news research for ${{ steps.date.outputs.date }}"
            git push
          else
            echo "No changes to commit"
          fi
