name: Bluesky AI Researcher Commentary (Daily)

on:
  schedule:
    # Run once daily as a low-maintenance expert-commentary lane. Bluesky is
    # useful for reactions from a small set of AI researchers, not as a core
    # breaking-news firehose, so keep cadence and output volume restrained.
    - cron: '11 10 * * *'
  workflow_dispatch:

concurrency:
  group: bluesky-feed
  cancel-in-progress: true

jobs:
  bluesky-feed:
    runs-on: [self-hosted, Linux]
    timeout-minutes: 15
    permissions:
      contents: write
      pull-requests: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Get current datetime
        id: datetime
        run: |
          echo "date=$(date +'%Y-%m-%d')" >> "$GITHUB_OUTPUT"
          echo "timestamp=$(date +'%Y-%m-%d %H:%M UTC')" >> "$GITHUB_OUTPUT"

      - name: Fetch Bluesky AI Posts
        id: bluesky
        run: |
          set -euo pipefail
          mkdir -p /tmp/bluesky

          # Public keyword search now returns HTTP 403 without an authenticated
          # session. Author feeds remain public, so use a curated AI-source list.
          #
          # Handle hygiene — every handle below was re-verified live via
          # getAuthorFeed on 2026-05-29 (displayName + most-recent post date).
          # Each entry is a real, currently-active AI voice. Handles that
          # resolved to the WRONG person, to an EMPTY feed, or to a long-dormant
          # account were removed (Bluesky reassigns/aliases handles, so an old
          # entry can silently start surfacing a stranger's posts — exactly the
          # "ingesting the wrong Simon Willison" bug this list previously had):
          #   - simonw.bsky.social      -> "Simon Wigzell" (Swedish comics blog),
          #                                NOT Simon Willison. Corrected to the
          #                                custom-domain handle simonwillison.net.
          #   - emilymbender.bsky.social -> now "Sam Cole" (samleecole), wrong person
          #   - mmitchell.bsky.social    -> now "Larry Hunter" (proflhunter), wrong person
          #   - rasbt.bsky.social        -> now "fry69", not Sebastian Raschka
          #   - karpathy.bsky.social     -> last post 2023-05-27 (dormant)
          #   - arankomatsuzaki...       -> last post 2024-12-17 (dormant)
          #   - huggingface / deeplearning / jeremyhoward / swyx / moyix /
          #     schmidhuber .bsky.social -> empty feeds (no posts returned)
          # Re-add any of these only after API-verifying a correct active handle.
          # Added 2026-05-29 (each verified posting within ~3 days): natolambert
          # (post-training/open models), emollick (applied AI), alexhanna
          # (AI policy/ethics), minimaxir (ML engineering).
          # Custom-domain handles (no .bsky.social suffix, e.g. simonwillison.net)
          # are fine: getAuthorFeed resolves the handle to a DID either way, and
          # the slug logic below keeps the full handle string as the filename.
          handles=(
            "yoavgo.bsky.social"
            "hardmaru.bsky.social"
            "simonwillison.net"
            "natolambert.bsky.social"
            "emollick.bsky.social"
            "alexhanna.bsky.social"
            "minimaxir.bsky.social"
          )

          for handle in "${handles[@]}"; do
            slug="${handle%.bsky.social}"
            output="/tmp/bluesky/${slug}.json"
            url="https://public.api.bsky.app/xrpc/app.bsky.feed.getAuthorFeed?actor=${handle}&limit=30&filter=posts_no_replies"
            status="$(curl -sS -L -o "$output" -w "%{http_code}" "$url" || true)"
            echo "${handle}: HTTP ${status}"
            if [ "$status" != "200" ]; then
              printf '{"feed":[]}\n' > "$output"
            fi
            sleep 1
          done

          echo "Bluesky data fetched successfully"

      - name: Copy Bluesky data to working directory
        run: |
          mkdir -p data/bluesky
          cp /tmp/bluesky/*.json data/bluesky/ || echo "No files to copy"
          ls -la data/bluesky/

      # Pre-create the daily file with its title header (idempotent). The
      # agent only ever APPENDS a per-run section to a temp file; a
      # deterministic bash step (below) concatenates it onto this file. This
      # removes the agent's ability to overwrite the day's earlier run —
      # the bug that wiped the 2026-06-14 10:36 UTC snapshot (12 posts,
      # incl. 144/137/95-like items) when the 22:02 UTC run rewrote the file.
      - name: Ensure daily Bluesky file exists
        env:
          DATE: ${{ steps.datetime.outputs.date }}
        run: |
          set -euo pipefail
          mkdir -p research/bluesky .tmp
          FILE="research/bluesky/${DATE}.md"
          if [ ! -f "$FILE" ]; then
            printf '# Bluesky AI Feed - %s\n' "$DATE" > "$FILE"
          fi

      # Base SHA for the output guard below — captured at workflow level
      # (like hourly-rss.yml) rather than via the agent composite's pre-sha
      # output, which is not reliably available when the composite step
      # itself fails.
      - name: Capture Bluesky output base
        id: bluesky-output-base
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      # continue-on-error so a hard agent failure (provider outage, turn-1
      # API error) still reaches the deterministic fallback below. The agent
      # writing nothing while exiting green (the 2026-07-01 failure mode) is
      # caught by the fallback's own file check either way.
      - name: Process Bluesky Feed with GLM-5.2 via Fireworks
        id: bluesky_agent
        continue-on-error: true
        uses: ./.github/actions/agent-run
        with:
          backend: fireworks-glm-5p2
          claude-code-oauth-token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          fireworks-api-key: ${{ secrets.FIREWORKS_API_KEY }}
          claude-args: |
            --model opus --allowedTools "Read,Write,Bash(ls:*)"
          label: Bluesky GLM-5.2 Fireworks curator
          prompt: |
            You are a Bluesky AI expert-commentary curator. Process recent
            posts from a small set of tracked AI researchers and practitioners.

            Treat this lane as supplemental interpretation for the daily digest,
            not as a breaking-news firehose. Prefer posts that add analysis,
            evaluation, practical experience, or expert context that RSS,
            Twitter/X, HN, Reddit, and arXiv are unlikely to supply directly.

            TIMESTAMP: ${{ steps.datetime.outputs.timestamp }}
            DATE: ${{ steps.datetime.outputs.date }}

            ## SOURCE FILES

            Read EVERY `*.json` file in `data/bluesky/` (one per tracked
            account; run `ls data/bluesky/` first to enumerate them). Do NOT
            rely on a hardcoded filename list — the curated handle set changes
            over time (handles get fixed, added, or dropped), so always process
            whatever files are actually present.

            The Bluesky JSON structure is:
            - feed[].post.author.handle (username like "user.bsky.social")
            - feed[].post.author.displayName (display name)
            - feed[].post.record.text (post content)
            - feed[].post.record.createdAt (ISO timestamp)
            - feed[].post.likeCount (likes)
            - feed[].post.repostCount (reposts)
            - feed[].post.uri (post URI for linking)
            - feed[].reason may indicate a repost; skip pure repost entries

            To create a link: https://bsky.app/profile/{handle}/post/{post_id}
            Where post_id is the last segment of the uri (after "app.bsky.feed.post/")

            ## OUTPUT

            Write ONLY your new section for THIS run to the temp file
            `.tmp/bluesky-section.md` using the Write tool. Do NOT read,
            write, or edit anything under `research/bluesky/` — a
            deterministic workflow step deduplicates your section by post
            link and appends it onto the daily file.

            Do NOT include the top-level `# Bluesky AI Feed` title — it
            already exists in the daily file. Write ONLY the timestamped
            section, starting with the `## <timestamp>` heading. Omit any
            category subheading that has no qualifying posts.

            FORMAT of .tmp/bluesky-section.md:
            ```
            ## ${{ steps.datetime.outputs.timestamp }}

            ### Announcements & News
            - **@handle**: "Post excerpt..." - [link] (❤️ likes, 🔄 reposts)

            ### Model Discussions
            - **@handle**: "Post excerpt..." - [link]

            ### Research & Papers
            - **@handle**: "Post excerpt..." - [link]

            ### Notable Researchers
            - **@handle**: "Post excerpt..." - [link]
            ```

            If NO posts qualify after filtering, still write the
            `## ${{ steps.datetime.outputs.timestamp }}` heading followed by
            one line: `_No qualifying posts this cycle._`

            ## OUTPUT BUDGET

            Include at most 8 bullets total. Include at most 3 bullets from any
            single author. If more posts qualify, keep the highest-signal mix:
            concrete model evaluations, launch/postmortem reactions, surprising
            technical notes, governance/policy analysis, and posts with clear
            downstream digest value. Drop generic reactions, jokes, repeated
            Fable/Claude usage anecdotes, and posts already well covered by RSS
            or Twitter/X.

            ## FILTERS

            INCLUDE:
            - Posts from last 48 hours
            - Announcements about AI models, releases
            - Technical discussions
            - Links to papers or blog posts
            - Posts with engagement (>=2 likes OR >=1 repost)

            SKIP:
            - Generic "AI is amazing" posts
            - Spam or promotional content
            - Posts older than 48 hours
            - Low engagement posts
            - Pure reposts where feed[].reason is a repost reason

            ## DO NOT COMMIT

            Do NOT run git. Writing `.tmp/bluesky-section.md` is your only
            output; the workflow appends and commits it deterministically.

      # Model-free floor: when the agent produced no section (hard failure OR
      # exited green without writing the file — the 2026-07-01 failure mode),
      # compose an engagement-ranked section from the staged per-account
      # JSONs so the cycle is never silently dropped. The append step below
      # stays the final backstop and still fails the run if this file is
      # missing after both paths.
      - name: Deterministic Bluesky fallback
        env:
          TIMESTAMP: ${{ steps.datetime.outputs.timestamp }}
        run: |
          set -euo pipefail
          if [ -s .tmp/bluesky-section.md ]; then
            echo "Agent produced .tmp/bluesky-section.md — no fallback needed"
            exit 0
          fi
          echo "::warning::Bluesky agent path produced no section; composing deterministic engagement-ranked fallback from data/bluesky/*.json."
          python3 scripts/deterministic_bluesky_digest.py \
            --input-dir data/bluesky \
            --out .tmp/bluesky-section.md \
            --timestamp "$TIMESTAMP"

      # Append the agent's section onto the daily file and commit. The post
      # step validates that the agent produced a section, removes any post
      # link already present in today's file, enforces the lane's output caps,
      # and only then mutates research/bluesky/. The link dedup is defensive
      # for manual re-runs and retries against the same 48-hour source window.
      - name: Append section to daily file and commit
        env:
          DATE: ${{ steps.datetime.outputs.date }}
          TIMESTAMP: ${{ steps.datetime.outputs.timestamp }}
        run: |
          set -euo pipefail
          FILE="research/bluesky/${DATE}.md"
          SECTION=".tmp/bluesky-section.md"
          FILTERED=".tmp/bluesky-section-deduped.md"
          export FILE SECTION FILTERED
          if [ ! -s "$SECTION" ]; then
            echo "::error::Claude did not produce $SECTION; refusing to silently drop this cycle."
            exit 1
          fi
          # Ensure the title header exists (the pre-step creates it, but be
          # defensive in case the agent never ran).
          if [ ! -f "$FILE" ]; then
            printf '# Bluesky AI Feed - %s\n' "$DATE" > "$FILE"
          fi

          python3 - <<'PY'
          import os
          import re
          import sys
          from collections import Counter

          daily_file = os.environ["FILE"]
          section_file = os.environ["SECTION"]
          filtered_file = os.environ["FILTERED"]
          timestamp = os.environ["TIMESTAMP"]
          link_re = re.compile(r"https://bsky\.app/profile/[^)\s]+")
          author_re = re.compile(r"^\s*-\s+\*\*([^*]+)\*\*")
          max_total = 8
          max_per_author = 3

          seen_links = set()
          if os.path.exists(daily_file):
              with open(daily_file, encoding="utf-8") as handle:
                  for line in handle:
                      seen_links.update(link_re.findall(line))
          had_existing_posts = bool(seen_links)

          with open(section_file, encoding="utf-8") as handle:
              lines = handle.read().splitlines()

          if not any(line.startswith("## ") for line in lines):
              print(f"::error::{section_file} must start with a timestamp section heading.", file=sys.stderr)
              sys.exit(1)

          output = [f"## {timestamp}"]
          current_heading = None
          current_items = []
          author_counts = Counter()
          unique_posts = 0

          def flush_category():
              if current_heading and current_items:
                  output.append("")
                  output.append(current_heading)
                  output.extend(current_items)

          for line in lines:
              if line.startswith("# "):
                  continue
              if line.startswith("## "):
                  continue
              if line.startswith("### "):
                  flush_category()
                  current_heading = line
                  current_items = []
                  continue
              if not line.startswith("- "):
                  continue

              links = link_re.findall(line)
              if links and any(link in seen_links for link in links):
                  continue
              if unique_posts >= max_total:
                  continue
              author_match = author_re.search(line)
              author = author_match.group(1) if author_match else "(unknown)"
              if author_counts[author] >= max_per_author:
                  continue
              current_items.append(line)
              unique_posts += 1
              author_counts[author] += 1
              seen_links.update(links)

          flush_category()

          if unique_posts == 0:
              message = "_No new qualifying posts since the previous snapshot._"
              if not had_existing_posts:
                  message = "_No qualifying posts this cycle._"
              output = [
                  f"## {timestamp}",
                  "",
                  message,
              ]

          with open(filtered_file, "w", encoding="utf-8") as handle:
              handle.write("\n".join(output).rstrip() + "\n")
          PY

          printf '\n' >> "$FILE"
          cat "$FILTERED" >> "$FILE"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add research/bluesky/
          if git diff --cached --quiet; then
            echo "Nothing to commit"
          else
            git commit -m "Bluesky feed ${TIMESTAMP}"
          fi

      - name: Require Bluesky output
        uses: ./.github/actions/require-output
        with:
          base-sha: ${{ steps.bluesky-output-base.outputs.sha }}
          expected-paths: |
            research/bluesky/
          label: Bluesky Fireworks curator

      # Use the shared safe-push composite action (post-PR-#58 algorithm).
      #
      # NOTE: a previous `rm -rf data/bluesky` pre-step is no longer
      # needed here — the composite action stashes untracked files
      # (including data/bluesky) before rebasing via
      # `git stash push --include-untracked`, so they no longer block
      # the rebase from starting. The stash is popped after a clean
      # rebase, restoring data/bluesky into the working tree if anything
      # downstream needs it.
      - name: Push changes
        uses: ./.github/actions/safe-push
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish Hooker workflow telemetry
        if: always()
        uses: ./.github/actions/hooker-telemetry
        with:
          status: ${{ job.status }}
        env:
          HOOKER_URL: ${{ secrets.HOOKER_URL }}
          HOOKER_TOKEN: ${{ secrets.HOOKER_TOKEN }}
