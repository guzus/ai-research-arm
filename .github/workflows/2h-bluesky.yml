name: Bluesky AI Researcher Feed (Twice Daily)

on:
  schedule:
    # Run twice daily (00:11 and 12:11 UTC). A single daily snapshot of a
    # small set of sporadically-posting researchers repeatedly yielded <3
    # posts (the digest flagged "Bluesky: 1 feed snapshot" as the lane's weak
    # point); a second pass roughly doubles candidate posts per day.
    - cron: '11 0,12 * * *'
  workflow_dispatch:

concurrency:
  group: bluesky-feed
  cancel-in-progress: true

jobs:
  bluesky-feed:
    runs-on: [self-hosted, Linux]
    timeout-minutes: 15
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Get current datetime
        id: datetime
        run: |
          echo "date=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT
          echo "timestamp=$(date +'%Y-%m-%d %H:%M UTC')" >> $GITHUB_OUTPUT

      - name: Fetch Bluesky AI Posts
        id: bluesky
        run: |
          set -euo pipefail
          mkdir -p /tmp/bluesky

          # Public keyword search now returns HTTP 403 without an authenticated
          # session. Author feeds remain public, so use a curated AI-source list.
          #
          # Handle hygiene — every handle below was re-verified live via
          # getAuthorFeed on 2026-05-29 (displayName + most-recent post date).
          # Each entry is a real, currently-active AI voice. Handles that
          # resolved to the WRONG person, to an EMPTY feed, or to a long-dormant
          # account were removed (Bluesky reassigns/aliases handles, so an old
          # entry can silently start surfacing a stranger's posts — exactly the
          # "ingesting the wrong Simon Willison" bug this list previously had):
          #   - simonw.bsky.social      -> "Simon Wigzell" (Swedish comics blog),
          #                                NOT Simon Willison. Corrected to the
          #                                custom-domain handle simonwillison.net.
          #   - emilymbender.bsky.social -> now "Sam Cole" (samleecole), wrong person
          #   - mmitchell.bsky.social    -> now "Larry Hunter" (proflhunter), wrong person
          #   - rasbt.bsky.social        -> now "fry69", not Sebastian Raschka
          #   - karpathy.bsky.social     -> last post 2023-05-27 (dormant)
          #   - arankomatsuzaki...       -> last post 2024-12-17 (dormant)
          #   - huggingface / deeplearning / jeremyhoward / swyx / moyix /
          #     schmidhuber .bsky.social -> empty feeds (no posts returned)
          # Re-add any of these only after API-verifying a correct active handle.
          # Added 2026-05-29 (each verified posting within ~3 days): natolambert
          # (post-training/open models), emollick (applied AI), alexhanna
          # (AI policy/ethics), minimaxir (ML engineering).
          # Custom-domain handles (no .bsky.social suffix, e.g. simonwillison.net)
          # are fine: getAuthorFeed resolves the handle to a DID either way, and
          # the slug logic below keeps the full handle string as the filename.
          handles=(
            "yoavgo.bsky.social"
            "hardmaru.bsky.social"
            "simonwillison.net"
            "natolambert.bsky.social"
            "emollick.bsky.social"
            "alexhanna.bsky.social"
            "minimaxir.bsky.social"
          )

          for handle in "${handles[@]}"; do
            slug="${handle%.bsky.social}"
            output="/tmp/bluesky/${slug}.json"
            url="https://public.api.bsky.app/xrpc/app.bsky.feed.getAuthorFeed?actor=${handle}&limit=30&filter=posts_no_replies"
            status="$(curl -sS -L -o "$output" -w "%{http_code}" "$url" || true)"
            echo "${handle}: HTTP ${status}"
            if [ "$status" != "200" ]; then
              printf '{"feed":[]}\n' > "$output"
            fi
            sleep 1
          done

          echo "Bluesky data fetched successfully"

      - name: Copy Bluesky data to working directory
        run: |
          mkdir -p data/bluesky
          cp /tmp/bluesky/*.json data/bluesky/ || echo "No files to copy"
          ls -la data/bluesky/

      # Pre-create the daily file with its title header (idempotent). The
      # agent only ever APPENDS a per-run section to a temp file; a
      # deterministic bash step (below) concatenates it onto this file. This
      # removes the agent's ability to overwrite the day's earlier run —
      # the bug that wiped the 2026-06-14 10:36 UTC snapshot (12 posts,
      # incl. 144/137/95-like items) when the 22:02 UTC run rewrote the file.
      - name: Ensure daily Bluesky file exists
        env:
          DATE: ${{ steps.datetime.outputs.date }}
        run: |
          set -euo pipefail
          mkdir -p research/bluesky
          FILE="research/bluesky/${DATE}.md"
          if [ ! -f "$FILE" ]; then
            printf '# Bluesky AI Feed - %s\n' "$DATE" > "$FILE"
          fi

      - name: Process Bluesky Feed with Claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: |
            --model sonnet --allowedTools "Read,Write,Bash(ls:*)"
          prompt: |
            You are a Bluesky AI feed curator. Process REAL-TIME posts from Bluesky.

            TIMESTAMP: ${{ steps.datetime.outputs.timestamp }}
            DATE: ${{ steps.datetime.outputs.date }}

            ## SOURCE FILES

            Read EVERY `*.json` file in `data/bluesky/` (one per tracked
            account; run `ls data/bluesky/` first to enumerate them). Do NOT
            rely on a hardcoded filename list — the curated handle set changes
            over time (handles get fixed, added, or dropped), so always process
            whatever files are actually present.

            The Bluesky JSON structure is:
            - feed[].post.author.handle (username like "user.bsky.social")
            - feed[].post.author.displayName (display name)
            - feed[].post.record.text (post content)
            - feed[].post.record.createdAt (ISO timestamp)
            - feed[].post.likeCount (likes)
            - feed[].post.repostCount (reposts)
            - feed[].post.uri (post URI for linking)
            - feed[].reason may indicate a repost; skip pure repost entries

            To create a link: https://bsky.app/profile/{handle}/post/{post_id}
            Where post_id is the last segment of the uri (after "app.bsky.feed.post/")

            ## OUTPUT

            Write ONLY your new section for THIS run to the temp file
            `/tmp/bluesky-section.md` using the Write tool. Do NOT read,
            write, or edit anything under `research/bluesky/` — a
            deterministic workflow step appends your section onto the daily
            file, and a second daily run must never clobber the first.

            Do NOT include the top-level `# Bluesky AI Feed` title — it
            already exists in the daily file. Write ONLY the timestamped
            section, starting with the `## <timestamp>` heading. Omit any
            category subheading that has no qualifying posts.

            FORMAT of /tmp/bluesky-section.md:
            ```
            ## ${{ steps.datetime.outputs.timestamp }}

            ### Announcements & News
            - **@handle**: "Post excerpt..." - [link] (❤️ likes, 🔄 reposts)

            ### Model Discussions
            - **@handle**: "Post excerpt..." - [link]

            ### Research & Papers
            - **@handle**: "Post excerpt..." - [link]

            ### Notable Researchers
            - **@handle**: "Post excerpt..." - [link]
            ```

            If NO posts qualify after filtering, still write the
            `## ${{ steps.datetime.outputs.timestamp }}` heading followed by
            one line: `_No qualifying posts this cycle._`

            ## FILTERS

            INCLUDE:
            - Posts from last 48 hours
            - Announcements about AI models, releases
            - Technical discussions
            - Links to papers or blog posts
            - Posts with engagement (>=2 likes OR >=1 repost)

            SKIP:
            - Generic "AI is amazing" posts
            - Spam or promotional content
            - Posts older than 48 hours
            - Low engagement posts
            - Pure reposts where feed[].reason is a repost reason

            ## DO NOT COMMIT

            Do NOT run git. Writing `/tmp/bluesky-section.md` is your only
            output; the workflow appends and commits it deterministically.

      # Append the agent's section onto the daily file and commit. Using a
      # deterministic `cat >>` (mirroring hourly-twitter's section append)
      # guarantees the second daily run accumulates onto the first instead
      # of overwriting it — the twice-daily schedule exists precisely to
      # roughly double candidate posts per day, which an overwrite defeats.
      - name: Append section to daily file and commit
        env:
          DATE: ${{ steps.datetime.outputs.date }}
          TIMESTAMP: ${{ steps.datetime.outputs.timestamp }}
        run: |
          set -euo pipefail
          FILE="research/bluesky/${DATE}.md"
          SECTION="/tmp/bluesky-section.md"
          if [ ! -s "$SECTION" ]; then
            echo "No section produced by the agent; nothing to append."
            exit 0
          fi
          # Ensure the title header exists (the pre-step creates it, but be
          # defensive in case the agent never ran).
          if [ ! -f "$FILE" ]; then
            printf '# Bluesky AI Feed - %s\n' "$DATE" > "$FILE"
          fi
          printf '\n' >> "$FILE"
          cat "$SECTION" >> "$FILE"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add research/bluesky/
          if git diff --cached --quiet; then
            echo "Nothing to commit"
          else
            git commit -m "Bluesky feed ${TIMESTAMP}"
          fi

      # Use the shared safe-push composite action (post-PR-#58 algorithm).
      #
      # NOTE: a previous `rm -rf data/bluesky` pre-step is no longer
      # needed here — the composite action stashes untracked files
      # (including data/bluesky) before rebasing via
      # `git stash push --include-untracked`, so they no longer block
      # the rebase from starting. The stash is popped after a clean
      # rebase, restoring data/bluesky into the working tree if anything
      # downstream needs it.
      - name: Push changes
        uses: ./.github/actions/safe-push
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish Hooker workflow telemetry
        if: always()
        uses: ./.github/actions/hooker-telemetry
        with:
          status: ${{ job.status }}
        env:
          HOOKER_URL: ${{ secrets.HOOKER_URL }}
          HOOKER_TOKEN: ${{ secrets.HOOKER_TOKEN }}
