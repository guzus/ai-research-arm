name: Bluesky AI Researcher Feed (Daily)

on:
  schedule:
    # Run once daily at 00:11 UTC
    - cron: '11 0 * * *'
  workflow_dispatch:

concurrency:
  group: bluesky-feed
  cancel-in-progress: true

jobs:
  bluesky-feed:
    runs-on: [self-hosted, Linux]
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get current datetime
        id: datetime
        run: |
          echo "date=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT
          echo "timestamp=$(date +'%Y-%m-%d %H:%M UTC')" >> $GITHUB_OUTPUT

      - name: Fetch Bluesky AI Posts
        id: bluesky
        run: |
          mkdir -p /tmp/bluesky

          # Bluesky public API - search for AI-related posts
          # Using the public search endpoint (no auth required for public posts)

          # Search for recent AI-related posts
          curl -s "https://public.api.bsky.app/xrpc/app.bsky.feed.searchPosts?q=AI%20announcement&limit=30&sort=latest" \
            > /tmp/bluesky/ai_announcements.json

          sleep 1

          curl -s "https://public.api.bsky.app/xrpc/app.bsky.feed.searchPosts?q=LLM%20release&limit=30&sort=latest" \
            > /tmp/bluesky/llm_releases.json

          sleep 1

          curl -s "https://public.api.bsky.app/xrpc/app.bsky.feed.searchPosts?q=GPT%20Claude%20Gemini&limit=30&sort=latest" \
            > /tmp/bluesky/model_discussions.json

          sleep 1

          curl -s "https://public.api.bsky.app/xrpc/app.bsky.feed.searchPosts?q=machine%20learning%20paper&limit=30&sort=latest" \
            > /tmp/bluesky/ml_papers.json

          sleep 1

          # Get posts from known AI researchers/companies by searching their handles
          curl -s "https://public.api.bsky.app/xrpc/app.bsky.feed.searchPosts?q=from%3Akarpathy.bsky.social&limit=20&sort=latest" \
            > /tmp/bluesky/karpathy.json 2>/dev/null || echo '{"posts":[]}' > /tmp/bluesky/karpathy.json

          echo "Bluesky data fetched successfully"

      - name: Copy Bluesky data to working directory
        run: |
          mkdir -p data/bluesky
          cp /tmp/bluesky/*.json data/bluesky/ || echo "No files to copy"
          ls -la data/bluesky/

      - name: Process Bluesky Feed with Claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: |
            --model opus --allowedTools "Read,Write,Edit,Bash(git:*)"
          prompt: |
            You are a Bluesky AI feed curator. Process REAL-TIME posts from Bluesky.

            TIMESTAMP: ${{ steps.datetime.outputs.timestamp }}
            DATE: ${{ steps.datetime.outputs.date }}

            ## SOURCE FILES

            Read these pre-fetched Bluesky JSON files from data/bluesky/:
            - data/bluesky/ai_announcements.json
            - data/bluesky/llm_releases.json
            - data/bluesky/model_discussions.json
            - data/bluesky/ml_papers.json
            - data/bluesky/karpathy.json

            The Bluesky JSON structure is:
            - posts[].author.handle (username like "user.bsky.social")
            - posts[].author.displayName (display name)
            - posts[].record.text (post content)
            - posts[].record.createdAt (ISO timestamp)
            - posts[].likeCount (likes)
            - posts[].repostCount (reposts)
            - posts[].uri (post URI for linking)

            To create a link: https://bsky.app/profile/{handle}/post/{post_id}
            Where post_id is the last segment of the uri (after "app.bsky.feed.post/")

            ## OUTPUT

            Write to: research/bluesky/${{ steps.datetime.outputs.date }}.md

            FORMAT (append if file exists):
            ```
            # Bluesky AI Feed - ${{ steps.datetime.outputs.date }}

            ## ${{ steps.datetime.outputs.timestamp }}

            ### Announcements & News
            - **@handle**: "Post excerpt..." - [link] (❤️ likes, 🔄 reposts)

            ### Model Discussions
            - **@handle**: "Post excerpt..." - [link]

            ### Research & Papers
            - **@handle**: "Post excerpt..." - [link]

            ### Notable Researchers
            - **@handle**: "Post excerpt..." - [link]
            ```

            ## FILTERS

            INCLUDE:
            - Posts from last 24 hours
            - Announcements about AI models, releases
            - Technical discussions
            - Links to papers or blog posts
            - Posts with engagement (>5 likes)

            SKIP:
            - Generic "AI is amazing" posts
            - Spam or promotional content
            - Posts older than 24 hours
            - Low engagement posts

            ## COMMIT

            After writing:
            git add research/bluesky/
            git commit -m "Bluesky feed ${{ steps.datetime.outputs.timestamp }}"

      - name: Push changes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git
          git pull --rebase || true
          git push || echo "Nothing to push"
