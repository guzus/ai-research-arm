name: Daily AI Digest (All Sources)

on:
  schedule:
    # Run daily at 00:00 UTC
    - cron: '0 0 * * *'
  workflow_dispatch:

concurrency:
  group: daily-digest
  cancel-in-progress: true

jobs:
  daily-digest:
    runs-on: [self-hosted, Linux]
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Pull latest changes
        run: git pull origin main || true

      - name: Get current date
        id: date
        run: echo "date=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Check for API keys
        id: check-keys
        run: |
          if [ -n "${{ secrets.EXA_API_KEY }}" ]; then
            echo "has_exa=true" >> $GITHUB_OUTPUT
          else
            echo "has_exa=false" >> $GITHUB_OUTPUT
          fi
          if [ -n "${{ secrets.PERPLEXITY_API_KEY }}" ]; then
            echo "has_perplexity=true" >> $GITHUB_OUTPUT
          else
            echo "has_perplexity=false" >> $GITHUB_OUTPUT
          fi

      - name: Create MCP Config
        if: steps.check-keys.outputs.has_exa == 'true' || steps.check-keys.outputs.has_perplexity == 'true'
        run: |
          cat > /tmp/mcp-config.json << 'EOF'
          {
            "mcpServers": {
          EOF
          
          # Add Exa if available
          if [ "${{ steps.check-keys.outputs.has_exa }}" == "true" ]; then
            cat >> /tmp/mcp-config.json << 'EOF'
              "exa": {
                "command": "npx",
                "args": ["-y", "exa-mcp-server"],
                "env": {
                  "EXA_API_KEY": "${{ secrets.EXA_API_KEY }}"
                }
              }
          EOF
            if [ "${{ steps.check-keys.outputs.has_perplexity }}" == "true" ]; then
              echo "," >> /tmp/mcp-config.json
            fi
          fi
          
          # Add Perplexity if available
          if [ "${{ steps.check-keys.outputs.has_perplexity }}" == "true" ]; then
            cat >> /tmp/mcp-config.json << 'EOF'
              "perplexity": {
                "command": "npx",
                "args": ["-y", "perplexity-mcp"],
                "env": {
                  "PERPLEXITY_API_KEY": "${{ secrets.PERPLEXITY_API_KEY }}"
                }
              }
          EOF
          fi
          
          cat >> /tmp/mcp-config.json << 'EOF'
            }
          }
          EOF
          
          echo "Generated MCP config:"
          cat /tmp/mcp-config.json

      - name: Synthesize Daily Digest (with MCP tools)
        if: steps.check-keys.outputs.has_exa == 'true' || steps.check-keys.outputs.has_perplexity == 'true'
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: |
            --model opus --mcp-config /tmp/mcp-config.json
            --allowedTools "Glob,Read,Write,Edit,Bash(git:*),mcp__exa__*,mcp__perplexity__*"
          prompt: |
            You are the AI News Editor. Create a comprehensive DAILY DIGEST.

            DATE: ${{ steps.date.outputs.date }}

            STEP 1: Find and read today's source files
            Look in the research/ directory for any reports from today's date (${{ steps.date.outputs.date }}).
            Check subdirectories: twitter/, community/, arxiv/, rss/, bluesky/, and any others.
            Read all relevant files you find.

            STEP 2: Use MCP search tools to fill gaps
            You have access to advanced search tools (Exa, Perplexity) via MCP.
            Use them to search for any major AI news we might have missed today.
            Perplexity tools provide real-time web search with citations.

            STEP 3: Write the digest
            OUTPUT: research/digest/${{ steps.date.outputs.date }}-digest.md

            FORMAT:

            # AI Daily Digest - ${{ steps.date.outputs.date }}

            ## Executive Summary
            [3-5 bullet points of the day's most important developments]

            ## Breaking News
            [Major announcements from companies]

            ## Model Releases & Updates
            [New models, versions, capabilities]

            ## Research Highlights
            [Top papers from arXiv with brief summaries]

            ## Community Buzz
            [What HN and Reddit are discussing]

            ## Funding & Business
            [Investment rounds, acquisitions, partnerships]

            ## Policy & Regulation
            [Government actions, policy changes]

            ## Tools & Resources
            [New tools, frameworks, tutorials worth noting]

            ## Quote of the Day
            [Most insightful tweet or comment]

            ---

            ### Sources
            - Twitter: [count] updates
            - Hacker News: [count] stories
            - Reddit: [count] posts
            - arXiv: [count] papers
            - RSS: [count] articles
            - MCP Search: [results from Exa/Perplexity tools]

            *Generated at ${{ steps.date.outputs.date }} 00:00 UTC*

            STEP 4 - WRITE TELEGRAM SUMMARY:
            After writing the full digest, also write a SHORT summary for Telegram notification.
            Use Write tool to create: research/summaries/${{ steps.date.outputs.date }}-digest-summary.txt

            Format (plain text, max 800 chars):
            ```
            Daily AI Digest - ${{ steps.date.outputs.date }}

            TOP STORIES:
            • [Headline 1]
            • [Headline 2]
            • [Headline 3]

            KEY NUMBERS:
            • [Key metrics from today]

            TRENDING: [Top community topic]

            Full digest on GitHub.
            ```

            After writing both files, commit:
            git add research/
            git commit -m "Daily digest ${{ steps.date.outputs.date }}"

      - name: Synthesize Daily Digest (WebSearch fallback)
        if: steps.check-keys.outputs.has_exa != 'true' && steps.check-keys.outputs.has_perplexity != 'true'
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: |
            --model opus --allowedTools "Glob,Read,Write,Edit,Bash(git:*),WebSearch"
          prompt: |
            You are the AI News Editor. Create a comprehensive DAILY DIGEST.

            DATE: ${{ steps.date.outputs.date }}

            STEP 1: Find and read today's source files
            Look in the research/ directory for any reports from today's date (${{ steps.date.outputs.date }}).
            Check subdirectories: twitter/, community/, arxiv/, rss/, bluesky/, perplexity/, and any others.
            Read all relevant files you find.

            STEP 2: Use WebSearch to fill gaps
            Search for any major AI news from today we might have missed.

            STEP 3: Write the digest
            OUTPUT: research/digest/${{ steps.date.outputs.date }}-digest.md

            FORMAT:

            # AI Daily Digest - ${{ steps.date.outputs.date }}

            ## Executive Summary
            [3-5 bullet points of the day's most important developments]

            ## Breaking News
            [Major announcements from companies]

            ## Model Releases & Updates
            [New models, versions, capabilities]

            ## Research Highlights
            [Top papers from arXiv with brief summaries]

            ## Community Buzz
            [What HN and Reddit are discussing]

            ## Funding & Business
            [Investment rounds, acquisitions, partnerships]

            ## Policy & Regulation
            [Government actions, policy changes]

            ## Tools & Resources
            [New tools, frameworks, tutorials worth noting]

            ## Quote of the Day
            [Most insightful tweet or comment]

            ---

            ### Sources
            - Twitter: [count] updates
            - Hacker News: [count] stories
            - Reddit: [count] posts
            - arXiv: [count] papers
            - RSS: [count] articles
            - MCP Search: [results from Exa/Perplexity tools]

            *Generated at ${{ steps.date.outputs.date }} 00:00 UTC*

            STEP 4 - WRITE TELEGRAM SUMMARY:
            After writing the full digest, also write a SHORT summary for Telegram notification.
            Use Write tool to create: research/summaries/${{ steps.date.outputs.date }}-digest-summary.txt

            Format (plain text, max 800 chars):
            ```
            Daily AI Digest - ${{ steps.date.outputs.date }}

            TOP STORIES:
            • [Headline 1]
            • [Headline 2]
            • [Headline 3]

            KEY NUMBERS:
            • [Key metrics from today]

            TRENDING: [Top community topic]

            Full digest on GitHub.
            ```

            After writing both files, commit:
            git add research/
            git commit -m "Daily digest ${{ steps.date.outputs.date }}"

      - name: Rewrite summary as TBPN-style spoken script (DeepSeek)
        if: success()
        continue-on-error: true
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DATE: ${{ steps.date.outputs.date }}
          SYSTEM_PROMPT: |
            You are writing the daily ARA broadcast — a hosted, conversational AI-news briefing. ARA stands for AI Research Arm. Rewrite the user-supplied daily AI digest as a SPOKEN briefing of about 60 to 90 seconds. Go straight to the news; no warm-up, no welcome speech, no host introduction.

            Rules:
            - Open with JUST the date spelled out naturally (e.g., "Monday, April twenty seventh, twenty twenty six.") — no greeting, no "welcome to" preamble, no "I'm your host", no "this is the ARA broadcast" preamble. The date stands alone as the opening line.
            - Sentence two should land directly on the lead story (e.g., "Anthropic's Mythos model has been breached..." or "Big news at the top: ..."). Get to the substance immediately.
            - NEVER read a date digit-by-digit (no "two zero two six dash zero four dash two seven").
            - Connect items with light conversational glue ("Big news at the top...", "Some quick numbers...", "Trending today...", "Market snapshot..."). Don't overuse — keep it tight.
            - Brand: NEVER mention TBPN, NPR, CNN, or any other publication's name. Do not invent a host name. The "ARA" brand only surfaces in the brief sign-off.
            - Spell out ALL numbers, currency, units, and model versions in spoken form: "$10B" -> "ten billion dollars", "5GW" -> "five gigawatts", "400K" -> "four hundred thousand", "10x" -> "ten times", "GPT-5.5" -> "GPT five point five", "Sonnet 4.5" -> "Sonnet four point five".
            - Replace symbols inline: × -> "times", & -> "and", em-dash -> comma.
            - Drop bullets and markdown — pure prose, complete sentences only.
            - Pronounce proper nouns naturally; leave names like Hunyuan, Bubeck, DeepSeek as written.
            - End with one short sign-off line: "That is your ARA broadcast — full digest on GitHub." Or similar single sentence. No long outro.
            - Output ONLY the spoken script. No preamble, no markdown, no quotation marks wrapping the whole thing.
        run: |
          # The raw summary file uses bullet points, dashes, and shorthand
          # ("$10B", "5GW", "400K", "GPT-5.5", "2026-04-27") that TTS engines
          # mispronounce — observed: "2026-04-27" read as "two zero two six dash
          # zero four dash two seven", "10×" as "tense", "Hunyuan Hy3" as "Inuin
          # GP", "GPT-5.5" as "TT and C". This step asks DeepSeek v4 Flash to
          # rewrite the digest as a hosted, conversational spoken briefing —
          # numbers/dates/units/model names spelled out for natural prosody.
          #
          # Output: research/summaries/<date>-digest-spoken.txt
          # Audio step prefers this file over the raw summary if it exists.

          SUMMARY_FILE="research/summaries/${DATE}-digest-summary.txt"
          SPOKEN_FILE="research/summaries/${DATE}-digest-spoken.txt"

          if [ -z "${DEEPSEEK_API_KEY}" ] || [ ! -f "$SUMMARY_FILE" ]; then
            echo "Skipping spoken-script generation (missing key or summary)"
            exit 0
          fi

          BODY=$(jq -n \
            --arg system "$SYSTEM_PROMPT" \
            --rawfile summary "$SUMMARY_FILE" \
            '{
              model: "deepseek-v4-flash",
              max_tokens: 4000,
              system: $system,
              messages: [{role: "user", content: $summary}]
            }')

          curl -sS -X POST "https://api.deepseek.com/anthropic/v1/messages" \
            -H "Authorization: Bearer ${DEEPSEEK_API_KEY}" \
            -H "anthropic-version: 2023-06-01" \
            -H "Content-Type: application/json" \
            -d "$BODY" -o /tmp/dg-rewrite-resp.json

          # DeepSeek's Anthropic-compat responses sometimes contain raw control
          # chars in thinking blocks that break strict JSON parsers (jq). Use
          # Python with strict=False to be tolerant.
          python3 -c '
          import json, sys
          with open("/tmp/dg-rewrite-resp.json", "rb") as f:
              data = json.loads(f.read(), strict=False)
          for item in data.get("content", []):
              if item.get("type") == "text":
                  sys.stdout.write(item.get("text", "").strip())
                  break
          ' > "$SPOKEN_FILE"

          if [ ! -s "$SPOKEN_FILE" ]; then
            echo "Empty spoken script — DeepSeek may have hit max_tokens with thinking only"
            head -c 400 /tmp/dg-rewrite-resp.json
            rm -f "$SPOKEN_FILE"
            exit 0
          fi

          echo "Wrote $SPOKEN_FILE ($(wc -c < "$SPOKEN_FILE") bytes)"
          git add "$SPOKEN_FILE"
          git commit -m "Spoken script ${DATE} (TBPN-style rewrite, DeepSeek v4 Flash)" || echo "No spoken changes"

      - name: Generate audio digest with Deepgram
        if: success()
        continue-on-error: true
        env:
          DEEPGRAM_API_KEY: ${{ secrets.DEEPGRAM_API_KEY }}
          DATE: ${{ steps.date.outputs.date }}
        run: |
          # Convert the spoken script (or fall back to raw summary) into MP3 via
          # Deepgram Aura-2 TTS. Voice: aura-2-asteria-en (American Female,
          # news-anchor energy). Encoding: 48 kbps mono MP3 at 24 kHz — the
          # highest bit_rate Deepgram permits for MP3 output (per their docs:
          # 8000, 16000, 24000, 32000, 40000, or 48000). Cost is per-character
          # so file size doesn't affect the bill.
          #
          # Regex normalization runs before TTS as a safety net: strips smart
          # quotes / non-breaking hyphens / em-dashes / × / & / bullets that
          # the LLM rewrite step might have left in. Date/currency/unit
          # expansion is the LLM's job — this regex only handles the mechanical
          # symbol-stripping the LLM can't produce naturally in plain text.

          SPOKEN_FILE="research/summaries/${DATE}-digest-spoken.txt"
          SUMMARY_FILE="research/summaries/${DATE}-digest-summary.txt"
          AUDIO_DIR="research/audio"
          AUDIO_FILE="${AUDIO_DIR}/${DATE}-digest.mp3"

          if [ -z "${DEEPGRAM_API_KEY}" ]; then
            echo "DEEPGRAM_API_KEY not configured — skipping audio generation"
            exit 0
          fi

          if [ -f "$SPOKEN_FILE" ]; then
            INPUT_FILE="$SPOKEN_FILE"
            echo "Using TBPN spoken script as TTS input"
          elif [ -f "$SUMMARY_FILE" ]; then
            INPUT_FILE="$SUMMARY_FILE"
            echo "Spoken script missing — falling back to raw summary"
          else
            echo "No input text available — skipping audio generation"
            exit 0
          fi

          mkdir -p "$AUDIO_DIR"

          # Safety-net normalization (handles whatever the LLM didn't, plus
          # symbols the LLM can't fix in plain text).
          NORMALIZED=$(sed -E '
            s/×/ times /g
            s/&/ and /g
            s/—/, /g
            s/–/, /g
            s/‐/-/g
            s/‑/-/g
            s/•/ /g
            s/\xE2\x80\x99/'"'"'/g
            s/\xE2\x80\x98/'"'"'/g
            s/\xE2\x80\x9C/"/g
            s/\xE2\x80\x9D/"/g
          ' "$INPUT_FILE")

          BODY=$(jq -n --arg text "$NORMALIZED" '{text: $text}')

          HTTP=$(curl -sS -w "%{http_code}" -o "$AUDIO_FILE" \
            -X POST "https://api.deepgram.com/v1/speak?model=aura-2-asteria-en&encoding=mp3&bit_rate=48000" \
            -H "Authorization: Token ${DEEPGRAM_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "$BODY")

          if [ "$HTTP" != "200" ]; then
            echo "Deepgram returned HTTP $HTTP — error body:"
            cat "$AUDIO_FILE" || true
            rm -f "$AUDIO_FILE"
            exit 0
          fi

          SIZE=$(wc -c < "$AUDIO_FILE")
          DURATION_S=$((SIZE / 6000))   # 48kbps = 6000 bytes/sec
          echo "Generated $AUDIO_FILE — ${SIZE} bytes (~${DURATION_S}s of audio)"

          git add "$AUDIO_FILE"
          git commit -m "Audio digest ${DATE} (Deepgram aura-2-asteria, 48kbps mono mp3, ${SIZE}b)" || echo "No audio changes to commit"

      - name: Push changes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git
          git pull --rebase || true
          git push || echo "Nothing to push"

      - name: Read summary for Telegram
        id: summary
        run: |
          SUMMARY_FILE="research/summaries/${{ steps.date.outputs.date }}-digest-summary.txt"
          if [ -f "$SUMMARY_FILE" ]; then
            SUMMARY=$(cat "$SUMMARY_FILE" | head -c 800)
            echo "content<<EOF" >> $GITHUB_OUTPUT
            echo "$SUMMARY" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          else
            echo "content=No summary available" >> $GITHUB_OUTPUT
          fi

      - name: Send Telegram notification
        if: success()
        continue-on-error: true
        uses: appleboy/telegram-action@221e6b684967abe813051ee4a37dd61770a83ad3
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          format: markdown
          message: |
            📊 *Daily AI Digest Ready*

            ${{ steps.summary.outputs.content }}

            📄 [Full Digest on GitHub](https://github.com/${{ github.repository }}/blob/main/research/digest/${{ steps.date.outputs.date }}-digest.md)
