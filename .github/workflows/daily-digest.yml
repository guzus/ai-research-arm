name: Daily AI Digest (All Sources)

on:
  schedule:
    # Run daily at 00:00 UTC
    - cron: '0 0 * * *'
  workflow_dispatch:

concurrency:
  group: daily-digest
  cancel-in-progress: true

jobs:
  daily-digest:
    runs-on: [self-hosted, Linux]
    permissions:
      contents: write
      id-token: write

    steps:
      # Provision git-lfs on the runner BEFORE checkout — `actions/checkout@v4`
      # with `lfs: true` shells out to `git lfs` during the checkout phase
      # and fails if it's missing. apt-get install needs no repo content.
      - name: Ensure git-lfs is installed
        run: |
          if ! command -v git-lfs >/dev/null 2>&1; then
            echo "git-lfs not found on runner — installing..."
            sudo apt-get update -qq && sudo apt-get install -y -qq git-lfs
          fi
          git lfs version

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          # lfs: true REQUIRED for safe re-runs. The TTS step has
          # `continue-on-error: true` and `exit 0`s without writing a fresh
          # MP3 if GEMINI_API_KEY is missing or the API fails. The downstream
          # Telegram + Hooker steps then test `[ -f $AUDIO_FILE ]` — a
          # 135-byte LFS pointer passes that check and gets uploaded as
          # "audio". Hydrating on checkout means the on-disk file is always
          # a real MP3 (either the previously-committed one, or the fresh
          # one written by ffmpeg this run).
          lfs: true

      # Wire git-lfs smudge/clean filters into THIS worktree's git config so
      # the MP3 produced by the TTS step below routes through LFS on commit
      # (matches `*.mp3` in .gitattributes). `git lfs install` is idempotent.
      - name: Install git-lfs hooks
        run: git lfs install --local

      - name: Pull latest changes
        run: git pull origin main || true

      - name: Get current date
        id: date
        run: echo "date=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Check for API keys
        id: check-keys
        run: |
          if [ -n "${{ secrets.EXA_API_KEY }}" ]; then
            echo "has_exa=true" >> $GITHUB_OUTPUT
          else
            echo "has_exa=false" >> $GITHUB_OUTPUT
          fi
          if [ -n "${{ secrets.PERPLEXITY_API_KEY }}" ]; then
            echo "has_perplexity=true" >> $GITHUB_OUTPUT
          else
            echo "has_perplexity=false" >> $GITHUB_OUTPUT
          fi

      - name: Create MCP Config
        if: steps.check-keys.outputs.has_exa == 'true' || steps.check-keys.outputs.has_perplexity == 'true'
        run: |
          cat > /tmp/mcp-config.json << 'EOF'
          {
            "mcpServers": {
          EOF
          
          # Add Exa if available
          if [ "${{ steps.check-keys.outputs.has_exa }}" == "true" ]; then
            cat >> /tmp/mcp-config.json << 'EOF'
              "exa": {
                "command": "npx",
                "args": ["-y", "exa-mcp-server"],
                "env": {
                  "EXA_API_KEY": "${{ secrets.EXA_API_KEY }}"
                }
              }
          EOF
            if [ "${{ steps.check-keys.outputs.has_perplexity }}" == "true" ]; then
              echo "," >> /tmp/mcp-config.json
            fi
          fi
          
          # Add Perplexity if available
          if [ "${{ steps.check-keys.outputs.has_perplexity }}" == "true" ]; then
            cat >> /tmp/mcp-config.json << 'EOF'
              "perplexity": {
                "command": "npx",
                "args": ["-y", "perplexity-mcp"],
                "env": {
                  "PERPLEXITY_API_KEY": "${{ secrets.PERPLEXITY_API_KEY }}"
                }
              }
          EOF
          fi
          
          cat >> /tmp/mcp-config.json << 'EOF'
            }
          }
          EOF
          
          echo "Generated MCP config:"
          cat /tmp/mcp-config.json

      - name: Synthesize Daily Digest (with MCP tools)
        if: steps.check-keys.outputs.has_exa == 'true' || steps.check-keys.outputs.has_perplexity == 'true'
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: |
            --model opus --mcp-config /tmp/mcp-config.json
            --allowedTools "Glob,Read,Write,Edit,Bash(git:*),mcp__exa__*,mcp__perplexity__*"
          prompt: |
            You are the AI News Editor. Create a comprehensive DAILY DIGEST.

            DATE: ${{ steps.date.outputs.date }}

            STEP 1: Find and read today's source files
            Look in the research/ directory for any reports from today's date (${{ steps.date.outputs.date }}).
            Check subdirectories: twitter/, community/, arxiv/, rss/, bluesky/, and any others.
            Read all relevant files you find.

            STEP 2: Use MCP search tools to fill gaps
            You have access to advanced search tools (Exa, Perplexity) via MCP.
            Use them to search for any major AI news we might have missed today.
            Perplexity tools provide real-time web search with citations.

            STEP 3: Write the digest
            OUTPUT: research/digest/${{ steps.date.outputs.date }}-digest.md

            FORMAT:

            # AI Daily Digest - ${{ steps.date.outputs.date }}

            ## Executive Summary
            [3-5 bullet points of the day's most important developments]

            ## Breaking News
            [Major announcements from companies]

            ## Model Releases & Updates
            [New models, versions, capabilities]

            ## Research Highlights
            [Top papers from arXiv with brief summaries]

            ## Community Buzz
            [What HN and Reddit are discussing]

            ## Funding & Business
            [Investment rounds, acquisitions, partnerships]

            ## Policy & Regulation
            [Government actions, policy changes]

            ## Tools & Resources
            [New tools, frameworks, tutorials worth noting]

            ## Quote of the Day
            [Most insightful tweet or comment]

            ---

            ### Sources
            - Twitter: [count] updates
            - Hacker News: [count] stories
            - Reddit: [count] posts
            - arXiv: [count] papers
            - RSS: [count] articles
            - MCP Search: [results from Exa/Perplexity tools]

            *Generated at ${{ steps.date.outputs.date }} 00:00 UTC*

            STEP 4 - WRITE TELEGRAM SUMMARY:
            After writing the full digest, also write a SHORT summary for Telegram notification.
            Use Write tool to create: research/summaries/${{ steps.date.outputs.date }}-digest-summary.txt

            Format (plain text, max 800 chars):
            ```
            Daily AI Digest - ${{ steps.date.outputs.date }}

            TOP STORIES:
            • [Headline 1]
            • [Headline 2]
            • [Headline 3]

            KEY NUMBERS:
            • [Key metrics from today]

            TRENDING: [Top community topic]

            Full digest on GitHub.
            ```

            After writing both files, commit (ONLY today's two files — do
            NOT `git add research/`, because the LFS clean filter would
            silently convert all existing historical PNGs/MP3s to LFS
            pointers in one commit):
            git add research/digest/${{ steps.date.outputs.date }}-digest.md research/summaries/${{ steps.date.outputs.date }}-digest-summary.txt
            git commit -m "Daily digest ${{ steps.date.outputs.date }}"

      - name: Synthesize Daily Digest (WebSearch fallback)
        if: steps.check-keys.outputs.has_exa != 'true' && steps.check-keys.outputs.has_perplexity != 'true'
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: |
            --model opus --allowedTools "Glob,Read,Write,Edit,Bash(git:*),WebSearch"
          prompt: |
            You are the AI News Editor. Create a comprehensive DAILY DIGEST.

            DATE: ${{ steps.date.outputs.date }}

            STEP 1: Find and read today's source files
            Look in the research/ directory for any reports from today's date (${{ steps.date.outputs.date }}).
            Check subdirectories: twitter/, community/, arxiv/, rss/, bluesky/, perplexity/, and any others.
            Read all relevant files you find.

            STEP 2: Use WebSearch to fill gaps
            Search for any major AI news from today we might have missed.

            STEP 3: Write the digest
            OUTPUT: research/digest/${{ steps.date.outputs.date }}-digest.md

            FORMAT:

            # AI Daily Digest - ${{ steps.date.outputs.date }}

            ## Executive Summary
            [3-5 bullet points of the day's most important developments]

            ## Breaking News
            [Major announcements from companies]

            ## Model Releases & Updates
            [New models, versions, capabilities]

            ## Research Highlights
            [Top papers from arXiv with brief summaries]

            ## Community Buzz
            [What HN and Reddit are discussing]

            ## Funding & Business
            [Investment rounds, acquisitions, partnerships]

            ## Policy & Regulation
            [Government actions, policy changes]

            ## Tools & Resources
            [New tools, frameworks, tutorials worth noting]

            ## Quote of the Day
            [Most insightful tweet or comment]

            ---

            ### Sources
            - Twitter: [count] updates
            - Hacker News: [count] stories
            - Reddit: [count] posts
            - arXiv: [count] papers
            - RSS: [count] articles
            - MCP Search: [results from Exa/Perplexity tools]

            *Generated at ${{ steps.date.outputs.date }} 00:00 UTC*

            STEP 4 - WRITE TELEGRAM SUMMARY:
            After writing the full digest, also write a SHORT summary for Telegram notification.
            Use Write tool to create: research/summaries/${{ steps.date.outputs.date }}-digest-summary.txt

            Format (plain text, max 800 chars):
            ```
            Daily AI Digest - ${{ steps.date.outputs.date }}

            TOP STORIES:
            • [Headline 1]
            • [Headline 2]
            • [Headline 3]

            KEY NUMBERS:
            • [Key metrics from today]

            TRENDING: [Top community topic]

            Full digest on GitHub.
            ```

            After writing both files, commit (ONLY today's two files — do
            NOT `git add research/`, because the LFS clean filter would
            silently convert all existing historical PNGs/MP3s to LFS
            pointers in one commit):
            git add research/digest/${{ steps.date.outputs.date }}-digest.md research/summaries/${{ steps.date.outputs.date }}-digest-summary.txt
            git commit -m "Daily digest ${{ steps.date.outputs.date }}"

      - name: Rewrite summary as ARA spoken script (Claude Sonnet)
        if: success()
        continue-on-error: true
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: |
            --model sonnet --allowedTools "Read,Write,Edit,Bash(git:*)"
          prompt: |
            You are writing the daily ARA broadcast — a TWO-HOST AI-news podcast
            with banter between Speaker 1 (anchor, deep voice) and Speaker 2
            (co-host, energetic voice). ARA stands for AI Research Arm. Read the
            digest summary, rewrite it as a TWO-HOST SPOKEN briefing of about 60
            to 90 seconds, and write the result to disk. Go straight to the news;
            no warm-up, no host introductions, no "welcome to" preamble.

            INPUT: research/summaries/${{ steps.date.outputs.date }}-digest-summary.txt
            OUTPUT: research/summaries/${{ steps.date.outputs.date }}-digest-spoken.txt

            STEP 1 — Read the input file. If it doesn't exist or is empty, exit cleanly.

            STEP 2 — Compose the two-host briefing under these rules:

            FORMAT (mandatory):
            - EVERY line begins with `Speaker 1:` or `Speaker 2:` followed by their
              dialogue. No exceptions, no narrator lines, no parentheticals.
            - Open with `Speaker 1:` saying ONLY the date naturally (e.g.,
              "Speaker 1: Monday, April twenty-eighth, twenty twenty-six.").
            - `Speaker 2:` picks up the lead story immediately — no "welcome",
              no host introductions.
            - Alternate speakers naturally as if they're handing off — Speaker 1
              anchors transitions ("Some quick numbers...", "On the policy front..."),
              Speaker 2 brings energy on big stories and reactions ("That's the
              first time we've seen...", "Worth noting that...").
            - Aim for 8 to 14 total lines across both speakers. Tight banter beats
              long monologues. Each line is a complete sentence or two — not just
              acknowledgement noises.
            - End with `Speaker 1:` (or `Speaker 2:`) delivering one short sign-off
              line: "That is your ARA broadcast — full digest on GitHub." or
              similar single sentence. No long outro.

            CONTENT RULES (apply to whichever speaker's line):
            - NEVER read a date digit-by-digit ("two zero two six dash zero four
              dash two seven" is forbidden).
            - Brand: NEVER mention TBPN, NPR, CNN, or any other publication. Do
              not invent host names — speakers stay anonymous. "ARA" only surfaces
              in the brief sign-off.
            - Spell out ALL numbers, currency, units, model versions in spoken form:
              "$10B" -> "ten billion dollars", "5GW" -> "five gigawatts", "400K" ->
              "four hundred thousand", "10x" -> "ten times", "GPT-5.5" -> "GPT five
              point five", "Sonnet 4.5" -> "Sonnet four point five".
            - Replace symbols inline: × -> "times", & -> "and", em-dash -> comma.
            - Drop bullets and markdown — pure prose, complete sentences only.
            - Pronounce proper nouns naturally; leave names like Hunyuan, Bubeck,
              DeepSeek as written.

            STEP 2b — INLINE AUDIO TAGS for podcast-style prosody. The TTS engine
            downstream is Gemini 3.1 Flash TTS, which honors these inline. Use
            them SPARINGLY (3 to 6 total per briefing) on the highest-impact moments:
            - `[high_energy]` once or twice — usually on Speaker 2's lead-story
              line or a major reveal.
            - `[emphasis]TEXT[/emphasis]` around the top 2 to 3 numbers/dollars
              of the whole briefing. Example: "[emphasis] one hundred fifty
              billion dollars [/emphasis]".
            - `[dramatic_pause]` 0 to 1 times before a punchline.
            Tags go INSIDE a Speaker line, not on their own line. Do NOT tag every
            number. Tags should feel like the host emphasizing the moments that matter.

            STEP 3 — Use the Write tool to save the spoken script. The file must
            contain ONLY `Speaker N:` prefixed lines (and audio tags inline). No
            preamble, no markdown fences, no quotation marks wrapping anything,
            no narrator lines. Save to:
            research/summaries/${{ steps.date.outputs.date }}-digest-spoken.txt

            STEP 4 — Commit:
            git add research/summaries/${{ steps.date.outputs.date }}-digest-spoken.txt
            git commit -m "Spoken script ${{ steps.date.outputs.date }} (ARA two-host, Claude Sonnet rewrite)" || echo "No changes"

      - name: Generate audio digest with Gemini 3.1 Flash TTS
        if: success()
        continue-on-error: true
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          DATE: ${{ steps.date.outputs.date }}
        run: |
          # Replaces Deepgram Aura-2 with Gemini 3.1 Flash TTS Preview. Why:
          # Gemini honors inline audio tags ([high_energy], [emphasis]X[/emphasis],
          # [dramatic_pause]) that the Sonnet rewrite step now emits — true
          # podcast-style prosody control vs Deepgram's fixed-personality voices.
          #
          # Voice: Kore (firm, female, podcast-fit). Other tested options:
          #   Charon (deep, informative, masculine), Puck (energetic, masculine).
          # Returns base64 PCM (audio/l16; rate=24000; channels=1) — convert via
          # ffmpeg to 48 kbps mono MP3 to match the rest of the pipeline.
          #
          # Symbol normalization still runs as a safety net for anything the LLM
          # might have left in (× & smart quotes etc.) — but NOT touching the
          # square-bracket audio tags, which Gemini needs intact.

          SPOKEN_FILE="research/summaries/${DATE}-digest-spoken.txt"
          SUMMARY_FILE="research/summaries/${DATE}-digest-summary.txt"
          AUDIO_DIR="research/audio"
          AUDIO_FILE="${AUDIO_DIR}/${DATE}-digest.mp3"
          PCM_FILE="/tmp/gemini-${DATE}.pcm"

          if [ -z "${GEMINI_API_KEY}" ]; then
            echo "GEMINI_API_KEY not configured — skipping audio generation"
            exit 0
          fi

          if ! command -v ffmpeg >/dev/null 2>&1; then
            echo "ffmpeg not found on runner — attempting install..."
            sudo apt-get update -qq && sudo apt-get install -y -qq ffmpeg || {
              echo "Could not install ffmpeg — skipping audio generation"
              exit 0
            }
          fi

          if [ -f "$SPOKEN_FILE" ]; then
            INPUT_FILE="$SPOKEN_FILE"
            echo "Using ARA spoken script (with inline Gemini audio tags) as TTS input"
          elif [ -f "$SUMMARY_FILE" ]; then
            INPUT_FILE="$SUMMARY_FILE"
            echo "Spoken script missing — falling back to raw summary (no audio tags)"
          else
            echo "No input text available — skipping audio generation"
            exit 0
          fi

          mkdir -p "$AUDIO_DIR"

          # Safety-net normalization. Same as before but PRESERVES square-bracket
          # audio tags ([high_energy], [emphasis], [/emphasis], [dramatic_pause]).
          NORMALIZED=$(sed -E '
            s/×/ times /g
            s/&/ and /g
            s/—/, /g
            s/–/, /g
            s/‐/-/g
            s/‑/-/g
            s/•/ /g
            s/\xE2\x80\x99/'"'"'/g
            s/\xE2\x80\x98/'"'"'/g
            s/\xE2\x80\x9C/"/g
            s/\xE2\x80\x9D/"/g
          ' "$INPUT_FILE")

          # Two-host config: Speaker 1 = Charon (deep, informative anchor),
          # Speaker 2 = Puck (energetic, conversational co-host). The Sonnet
          # rewrite step labels every line "Speaker 1:" / "Speaker 2:" so Gemini
          # routes each line to the right voice. Audio tags work in either
          # single- or multi-speaker mode.
          BODY=$(jq -n --arg text "$NORMALIZED" '{
            contents: [{parts: [{text: $text}]}],
            generationConfig: {
              responseModalities: ["AUDIO"],
              speechConfig: {
                multiSpeakerVoiceConfig: {
                  speakerVoiceConfigs: [
                    {speaker: "Speaker 1", voiceConfig: {prebuiltVoiceConfig: {voiceName: "Charon"}}},
                    {speaker: "Speaker 2", voiceConfig: {prebuiltVoiceConfig: {voiceName: "Puck"}}}
                  ]
                }
              }
            }
          }')

          HTTP=$(curl -sS -w "%{http_code}" -o /tmp/gemini-resp.json \
            -X POST "https://generativelanguage.googleapis.com/v1beta/models/gemini-3.1-flash-tts-preview:generateContent?key=${GEMINI_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "$BODY")

          if [ "$HTTP" != "200" ]; then
            echo "Gemini TTS returned HTTP $HTTP — error body:"
            cat /tmp/gemini-resp.json | head -50
            exit 0
          fi

          # Extract base64 PCM payload
          B64=$(jq -r '.candidates[0].content.parts[0].inlineData.data // ""' /tmp/gemini-resp.json)
          if [ -z "$B64" ]; then
            echo "Gemini returned no audio data — response:"
            jq 'del(.candidates[0].content.parts[0].inlineData.data)' /tmp/gemini-resp.json | head -40
            exit 0
          fi

          echo "$B64" | base64 --decode > "$PCM_FILE"
          PCM_SIZE=$(wc -c < "$PCM_FILE")
          echo "Decoded ${PCM_SIZE} bytes of PCM (24kHz mono 16-bit)"

          # PCM (s16le, 24kHz, mono) → MP3 48kbps mono
          ffmpeg -hide_banner -loglevel error -y \
            -f s16le -ar 24000 -ac 1 -i "$PCM_FILE" \
            -codec:a libmp3lame -b:a 48k -ac 1 \
            "$AUDIO_FILE"
          rm -f "$PCM_FILE"

          if [ ! -s "$AUDIO_FILE" ]; then
            echo "ffmpeg produced empty mp3 — bailing"
            rm -f "$AUDIO_FILE"
            exit 0
          fi

          SIZE=$(wc -c < "$AUDIO_FILE")
          DURATION_S=$((SIZE / 6000))   # 48kbps = 6000 bytes/sec
          echo "Generated $AUDIO_FILE — ${SIZE} bytes (~${DURATION_S}s of audio)"

          git add "$AUDIO_FILE"
          git commit -m "Audio digest ${DATE} (Gemini 3.1 TTS two-host: Charon+Puck, mp3 ${SIZE}b)" || echo "No audio changes to commit"

      - name: Push changes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git
          git pull --rebase || true
          git push || echo "Nothing to push"

      - name: Send Telegram notification (audio + caption)
        if: success()
        continue-on-error: true
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DATE: ${{ steps.date.outputs.date }}
          REPO: ${{ github.repository }}
        run: |
          # Send the ARA broadcast MP3 to Telegram via sendAudio so it appears
          # as a music/audio bubble with a play button. Caption carries the
          # text summary + GitHub link, all in one message. Falls back to
          # sendMessage (text only) if audio is missing.
          # Replaces the previous appleboy/telegram-action text-only step.

          AUDIO_FILE="research/audio/${DATE}-digest.mp3"
          SUMMARY_FILE="research/summaries/${DATE}-digest-summary.txt"
          DIGEST_URL="https://github.com/${REPO}/blob/main/research/digest/${DATE}-digest.md"

          if [ -z "$TELEGRAM_BOT_TOKEN" ] || [ -z "$TELEGRAM_CHAT_ID" ]; then
            echo "Telegram credentials missing — skipping notification"
            exit 0
          fi

          # Telegram caption max is 1024 chars (with parse_mode). Reserve ~120
          # for the title + footer link, leaving ~700 for the summary body.
          if [ -f "$SUMMARY_FILE" ]; then
            SUMMARY_BODY=$(head -c 700 "$SUMMARY_FILE")
          else
            SUMMARY_BODY="No summary available."
          fi

          CAPTION=$(printf '🎙️ *ARA broadcast — %s*\n\n%s\n\n📄 [Full digest](%s)' \
            "$DATE" "$SUMMARY_BODY" "$DIGEST_URL")

          if [ -f "$AUDIO_FILE" ]; then
            echo "Sending sendAudio to Telegram bot (CHAT_ID redacted) with $AUDIO_FILE ($(wc -c < "$AUDIO_FILE") bytes)..."
            HTTP=$(curl -sS -w "%{http_code}" -o /tmp/tg-resp.json \
              -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendAudio" \
              -F "chat_id=${TELEGRAM_CHAT_ID}" \
              -F "audio=@${AUDIO_FILE}" \
              -F "title=ARA broadcast ${DATE}" \
              -F "performer=AI Research Arm" \
              -F "parse_mode=Markdown" \
              -F "caption=${CAPTION}")

            # Log the full response body always — Telegram can return HTTP 200
            # with `{"ok":false}` for things like markdown parse errors or chat
            # permission issues, which previously failed silently.
            echo "Telegram sendAudio response (HTTP $HTTP):"
            cat /tmp/tg-resp.json
            echo ""

            OK=$(jq -r '.ok // false' /tmp/tg-resp.json 2>/dev/null || echo false)
            if [ "$HTTP" != "200" ] || [ "$OK" != "true" ]; then
              echo "sendAudio failed — falling back to text-only sendMessage..."
              curl -sS -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
                --data-urlencode "chat_id=${TELEGRAM_CHAT_ID}" \
                --data-urlencode "text=${CAPTION}" \
                -d "parse_mode=Markdown" \
                -d "disable_web_page_preview=true" >/dev/null
            else
              # Confirm what chat the message landed in (helps diagnose
              # "audio went somewhere I'm not watching" failures).
              CHAT_TYPE=$(jq -r '.result.chat.type // "?"' /tmp/tg-resp.json)
              CHAT_TITLE=$(jq -r '.result.chat.title // .result.chat.first_name // "?"' /tmp/tg-resp.json)
              MSG_ID=$(jq -r '.result.message_id // "?"' /tmp/tg-resp.json)
              echo "Telegram sendAudio OK — message_id=$MSG_ID, chat type=$CHAT_TYPE, title=\"$CHAT_TITLE\""
            fi
          else
            echo "No audio file at $AUDIO_FILE — sending text-only sendMessage"
            curl -sS -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              --data-urlencode "chat_id=${TELEGRAM_CHAT_ID}" \
              --data-urlencode "text=${CAPTION}" \
              -d "parse_mode=Markdown" \
              -d "disable_web_page_preview=true" >/dev/null
          fi

      - name: Send audio to Hooker (parallel delivery channel)
        if: success()
        continue-on-error: true
        env:
          HOOKER_URL: ${{ secrets.HOOKER_URL }}
          HOOKER_TOKEN: ${{ secrets.HOOKER_TOKEN }}
          DATE: ${{ steps.date.outputs.date }}
          REPO: ${{ github.repository }}
        run: |
          # Parallel delivery: post the ARA broadcast MP3 to hooker.guzus.xyz,
          # which forwards it to whatever Telegram channel hooker is configured
          # for. The user watches the hooker channel; the direct Telegram bot
          # above goes to a different chat. Same audio reaches both.

          AUDIO_FILE="research/audio/${DATE}-digest.mp3"
          SUMMARY_FILE="research/summaries/${DATE}-digest-summary.txt"
          DIGEST_URL="https://github.com/${REPO}/blob/main/research/digest/${DATE}-digest.md"

          if [ -z "$HOOKER_URL" ] || [ -z "$HOOKER_TOKEN" ]; then
            echo "Hooker credentials missing — skipping hooker delivery"
            exit 0
          fi

          if [ ! -f "$AUDIO_FILE" ]; then
            echo "No audio file — skipping hooker delivery"
            exit 0
          fi

          if [ -f "$SUMMARY_FILE" ]; then
            SUMMARY_BODY=$(head -c 700 "$SUMMARY_FILE")
          else
            SUMMARY_BODY=""
          fi

          # Hooker caption max is 1000 chars by default (Telegram document caption ≤1024).
          CAPTION=$(printf '🎙️ ARA broadcast — %s\n\n%s\n\n📄 Full digest: %s' \
            "$DATE" "$SUMMARY_BODY" "$DIGEST_URL")

          echo "Sending audio to Hooker (topic=ai-research)..."
          HTTP=$(curl -sS -w "%{http_code}" -o /tmp/hooker-resp.json \
            -X POST "${HOOKER_URL}/publish/ai-research/document" \
            -H "Authorization: Bearer ${HOOKER_TOKEN}" \
            -F "document=@${AUDIO_FILE}" \
            -F "caption=${CAPTION}" \
            -F "title=ARA broadcast ${DATE}" \
            -F "priority=3" \
            -F "tags=ai-research,audio,daily-digest" \
            -F "parse_mode=Markdown")

          echo "Hooker response (HTTP $HTTP):"
          cat /tmp/hooker-resp.json
          echo ""

      - name: Publish Hooker workflow telemetry
        if: always()
        uses: ./.github/actions/hooker-telemetry
        with:
          status: ${{ job.status }}
        env:
          HOOKER_URL: ${{ secrets.HOOKER_URL }}
          HOOKER_TOKEN: ${{ secrets.HOOKER_TOKEN }}
