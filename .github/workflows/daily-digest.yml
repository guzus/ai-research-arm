name: Daily AI Digest (All Sources)

on:
  schedule:
    # Run daily at 00:00 UTC
    - cron: '0 0 * * *'
  workflow_dispatch:

concurrency:
  group: daily-digest
  cancel-in-progress: true

jobs:
  daily-digest:
    runs-on: [self-hosted, Linux]
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Pull latest changes
        run: git pull origin main || true

      - name: Get current date
        id: date
        run: echo "date=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Check for API keys
        id: check-keys
        run: |
          if [ -n "${{ secrets.EXA_API_KEY }}" ]; then
            echo "has_exa=true" >> $GITHUB_OUTPUT
          else
            echo "has_exa=false" >> $GITHUB_OUTPUT
          fi
          if [ -n "${{ secrets.PERPLEXITY_API_KEY }}" ]; then
            echo "has_perplexity=true" >> $GITHUB_OUTPUT
          else
            echo "has_perplexity=false" >> $GITHUB_OUTPUT
          fi

      - name: Create MCP Config
        if: steps.check-keys.outputs.has_exa == 'true' || steps.check-keys.outputs.has_perplexity == 'true'
        run: |
          cat > /tmp/mcp-config.json << 'EOF'
          {
            "mcpServers": {
          EOF
          
          # Add Exa if available
          if [ "${{ steps.check-keys.outputs.has_exa }}" == "true" ]; then
            cat >> /tmp/mcp-config.json << 'EOF'
              "exa": {
                "command": "npx",
                "args": ["-y", "exa-mcp-server"],
                "env": {
                  "EXA_API_KEY": "${{ secrets.EXA_API_KEY }}"
                }
              }
          EOF
            if [ "${{ steps.check-keys.outputs.has_perplexity }}" == "true" ]; then
              echo "," >> /tmp/mcp-config.json
            fi
          fi
          
          # Add Perplexity if available
          if [ "${{ steps.check-keys.outputs.has_perplexity }}" == "true" ]; then
            cat >> /tmp/mcp-config.json << 'EOF'
              "perplexity": {
                "command": "npx",
                "args": ["-y", "perplexity-mcp"],
                "env": {
                  "PERPLEXITY_API_KEY": "${{ secrets.PERPLEXITY_API_KEY }}"
                }
              }
          EOF
          fi
          
          cat >> /tmp/mcp-config.json << 'EOF'
            }
          }
          EOF
          
          echo "Generated MCP config:"
          cat /tmp/mcp-config.json

      - name: Synthesize Daily Digest (with MCP tools)
        if: steps.check-keys.outputs.has_exa == 'true' || steps.check-keys.outputs.has_perplexity == 'true'
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: |
            --model opus --mcp-config /tmp/mcp-config.json
            --allowedTools "Glob,Read,Write,Edit,Bash(git:*),mcp__exa__*,mcp__perplexity__*"
          prompt: |
            You are the AI News Editor. Create a comprehensive DAILY DIGEST.

            DATE: ${{ steps.date.outputs.date }}

            STEP 1: Find and read today's source files
            Look in the research/ directory for any reports from today's date (${{ steps.date.outputs.date }}).
            Check subdirectories: twitter/, community/, arxiv/, rss/, bluesky/, and any others.
            Read all relevant files you find.

            STEP 2: Use MCP search tools to fill gaps
            You have access to advanced search tools (Exa, Perplexity) via MCP.
            Use them to search for any major AI news we might have missed today.
            Perplexity tools provide real-time web search with citations.

            STEP 3: Write the digest
            OUTPUT: research/digest/${{ steps.date.outputs.date }}-digest.md

            FORMAT:

            # AI Daily Digest - ${{ steps.date.outputs.date }}

            ## Executive Summary
            [3-5 bullet points of the day's most important developments]

            ## Breaking News
            [Major announcements from companies]

            ## Model Releases & Updates
            [New models, versions, capabilities]

            ## Research Highlights
            [Top papers from arXiv with brief summaries]

            ## Community Buzz
            [What HN and Reddit are discussing]

            ## Funding & Business
            [Investment rounds, acquisitions, partnerships]

            ## Policy & Regulation
            [Government actions, policy changes]

            ## Tools & Resources
            [New tools, frameworks, tutorials worth noting]

            ## Quote of the Day
            [Most insightful tweet or comment]

            ---

            ### Sources
            - Twitter: [count] updates
            - Hacker News: [count] stories
            - Reddit: [count] posts
            - arXiv: [count] papers
            - RSS: [count] articles
            - MCP Search: [results from Exa/Perplexity tools]

            *Generated at ${{ steps.date.outputs.date }} 00:00 UTC*

            STEP 4 - WRITE TELEGRAM SUMMARY:
            After writing the full digest, also write a SHORT summary for Telegram notification.
            Use Write tool to create: research/summaries/${{ steps.date.outputs.date }}-digest-summary.txt

            Format (plain text, max 800 chars):
            ```
            Daily AI Digest - ${{ steps.date.outputs.date }}

            TOP STORIES:
            • [Headline 1]
            • [Headline 2]
            • [Headline 3]

            KEY NUMBERS:
            • [Key metrics from today]

            TRENDING: [Top community topic]

            Full digest on GitHub.
            ```

            After writing both files, commit:
            git add research/
            git commit -m "Daily digest ${{ steps.date.outputs.date }}"

      - name: Synthesize Daily Digest (WebSearch fallback)
        if: steps.check-keys.outputs.has_exa != 'true' && steps.check-keys.outputs.has_perplexity != 'true'
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: |
            --model opus --allowedTools "Glob,Read,Write,Edit,Bash(git:*),WebSearch"
          prompt: |
            You are the AI News Editor. Create a comprehensive DAILY DIGEST.

            DATE: ${{ steps.date.outputs.date }}

            STEP 1: Find and read today's source files
            Look in the research/ directory for any reports from today's date (${{ steps.date.outputs.date }}).
            Check subdirectories: twitter/, community/, arxiv/, rss/, bluesky/, perplexity/, and any others.
            Read all relevant files you find.

            STEP 2: Use WebSearch to fill gaps
            Search for any major AI news from today we might have missed.

            STEP 3: Write the digest
            OUTPUT: research/digest/${{ steps.date.outputs.date }}-digest.md

            FORMAT:

            # AI Daily Digest - ${{ steps.date.outputs.date }}

            ## Executive Summary
            [3-5 bullet points of the day's most important developments]

            ## Breaking News
            [Major announcements from companies]

            ## Model Releases & Updates
            [New models, versions, capabilities]

            ## Research Highlights
            [Top papers from arXiv with brief summaries]

            ## Community Buzz
            [What HN and Reddit are discussing]

            ## Funding & Business
            [Investment rounds, acquisitions, partnerships]

            ## Policy & Regulation
            [Government actions, policy changes]

            ## Tools & Resources
            [New tools, frameworks, tutorials worth noting]

            ## Quote of the Day
            [Most insightful tweet or comment]

            ---

            ### Sources
            - Twitter: [count] updates
            - Hacker News: [count] stories
            - Reddit: [count] posts
            - arXiv: [count] papers
            - RSS: [count] articles
            - MCP Search: [results from Exa/Perplexity tools]

            *Generated at ${{ steps.date.outputs.date }} 00:00 UTC*

            STEP 4 - WRITE TELEGRAM SUMMARY:
            After writing the full digest, also write a SHORT summary for Telegram notification.
            Use Write tool to create: research/summaries/${{ steps.date.outputs.date }}-digest-summary.txt

            Format (plain text, max 800 chars):
            ```
            Daily AI Digest - ${{ steps.date.outputs.date }}

            TOP STORIES:
            • [Headline 1]
            • [Headline 2]
            • [Headline 3]

            KEY NUMBERS:
            • [Key metrics from today]

            TRENDING: [Top community topic]

            Full digest on GitHub.
            ```

            After writing both files, commit:
            git add research/
            git commit -m "Daily digest ${{ steps.date.outputs.date }}"

      - name: Rewrite summary as ARA spoken script (Claude Sonnet)
        if: success()
        continue-on-error: true
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: |
            --model sonnet --allowedTools "Read,Write,Edit,Bash(git:*)"
          prompt: |
            You are writing the daily ARA broadcast — a hosted, conversational AI-news
            briefing. ARA stands for AI Research Arm. Read the digest summary, rewrite it
            as a SPOKEN briefing of about 60 to 90 seconds, and write the result to disk.
            Go straight to the news; no warm-up, no welcome speech, no host introduction.

            INPUT: research/summaries/${{ steps.date.outputs.date }}-digest-summary.txt
            OUTPUT: research/summaries/${{ steps.date.outputs.date }}-digest-spoken.txt

            STEP 1 — Read the input file. If it doesn't exist or is empty, exit cleanly.

            STEP 2 — Compose the spoken briefing under these rules:
            - Open with JUST the date spelled out naturally (e.g., "Monday, April twenty
              seventh, twenty twenty six.") — no greeting, no "welcome to" preamble, no
              "I'm your host", no "this is the ARA broadcast". The date stands alone as
              the opening line.
            - Sentence two lands directly on the lead story (e.g., "Anthropic's Mythos
              model has been breached..." or "Big news at the top: ..."). Substance immediately.
            - NEVER read a date digit-by-digit ("two zero two six dash zero four dash two
              seven" is forbidden).
            - Connect items with light conversational glue ("Big news at the top...",
              "Some quick numbers...", "Trending today...", "Market snapshot..."). Keep tight.
            - Brand: NEVER mention TBPN, NPR, CNN, or any other publication's name. Do not
              invent a host name. The "ARA" brand only surfaces in the brief sign-off.
            - Spell out ALL numbers, currency, units, and model versions in spoken form:
              "$10B" -> "ten billion dollars", "5GW" -> "five gigawatts", "400K" ->
              "four hundred thousand", "10x" -> "ten times", "GPT-5.5" -> "GPT five point
              five", "Sonnet 4.5" -> "Sonnet four point five".
            - Replace symbols inline: × -> "times", & -> "and", em-dash -> comma.
            - Drop bullets and markdown — pure prose, complete sentences only.
            - Pronounce proper nouns naturally; leave names like Hunyuan, Bubeck, DeepSeek
              as written. Use IPA-style hints only if a name is widely mispronounced.
            - End with one short sign-off line: "That is your ARA broadcast — full digest
              on GitHub." or similar single sentence. No long outro.

            STEP 3 — Use the Write tool to save the spoken script (and ONLY the script
            text, no preamble, no markdown fences, no quotation marks wrapping the whole
            thing) to:
            research/summaries/${{ steps.date.outputs.date }}-digest-spoken.txt

            STEP 4 — Commit:
            git add research/summaries/${{ steps.date.outputs.date }}-digest-spoken.txt
            git commit -m "Spoken script ${{ steps.date.outputs.date }} (ARA, Claude Sonnet rewrite)" || echo "No changes"

      - name: Generate audio digest with Deepgram
        if: success()
        continue-on-error: true
        env:
          DEEPGRAM_API_KEY: ${{ secrets.DEEPGRAM_API_KEY }}
          DATE: ${{ steps.date.outputs.date }}
        run: |
          # Convert the spoken script (or fall back to raw summary) into MP3 via
          # Deepgram Aura-2 TTS. Voice: aura-2-asteria-en (American Female,
          # news-anchor energy). Encoding: 48 kbps mono MP3 at 24 kHz — the
          # highest bit_rate Deepgram permits for MP3 output (per their docs:
          # 8000, 16000, 24000, 32000, 40000, or 48000). Cost is per-character
          # so file size doesn't affect the bill.
          #
          # Regex normalization runs before TTS as a safety net: strips smart
          # quotes / non-breaking hyphens / em-dashes / × / & / bullets that
          # the LLM rewrite step might have left in. Date/currency/unit
          # expansion is the LLM's job — this regex only handles the mechanical
          # symbol-stripping the LLM can't produce naturally in plain text.

          SPOKEN_FILE="research/summaries/${DATE}-digest-spoken.txt"
          SUMMARY_FILE="research/summaries/${DATE}-digest-summary.txt"
          AUDIO_DIR="research/audio"
          AUDIO_FILE="${AUDIO_DIR}/${DATE}-digest.mp3"

          if [ -z "${DEEPGRAM_API_KEY}" ]; then
            echo "DEEPGRAM_API_KEY not configured — skipping audio generation"
            exit 0
          fi

          if [ -f "$SPOKEN_FILE" ]; then
            INPUT_FILE="$SPOKEN_FILE"
            echo "Using TBPN spoken script as TTS input"
          elif [ -f "$SUMMARY_FILE" ]; then
            INPUT_FILE="$SUMMARY_FILE"
            echo "Spoken script missing — falling back to raw summary"
          else
            echo "No input text available — skipping audio generation"
            exit 0
          fi

          mkdir -p "$AUDIO_DIR"

          # Safety-net normalization (handles whatever the LLM didn't, plus
          # symbols the LLM can't fix in plain text).
          NORMALIZED=$(sed -E '
            s/×/ times /g
            s/&/ and /g
            s/—/, /g
            s/–/, /g
            s/‐/-/g
            s/‑/-/g
            s/•/ /g
            s/\xE2\x80\x99/'"'"'/g
            s/\xE2\x80\x98/'"'"'/g
            s/\xE2\x80\x9C/"/g
            s/\xE2\x80\x9D/"/g
          ' "$INPUT_FILE")

          BODY=$(jq -n --arg text "$NORMALIZED" '{text: $text}')

          HTTP=$(curl -sS -w "%{http_code}" -o "$AUDIO_FILE" \
            -X POST "https://api.deepgram.com/v1/speak?model=aura-2-asteria-en&encoding=mp3&bit_rate=48000" \
            -H "Authorization: Token ${DEEPGRAM_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "$BODY")

          if [ "$HTTP" != "200" ]; then
            echo "Deepgram returned HTTP $HTTP — error body:"
            cat "$AUDIO_FILE" || true
            rm -f "$AUDIO_FILE"
            exit 0
          fi

          SIZE=$(wc -c < "$AUDIO_FILE")
          DURATION_S=$((SIZE / 6000))   # 48kbps = 6000 bytes/sec
          echo "Generated $AUDIO_FILE — ${SIZE} bytes (~${DURATION_S}s of audio)"

          git add "$AUDIO_FILE"
          git commit -m "Audio digest ${DATE} (Deepgram aura-2-asteria, 48kbps mono mp3, ${SIZE}b)" || echo "No audio changes to commit"

      - name: Push changes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git
          git pull --rebase || true
          git push || echo "Nothing to push"

      - name: Send Telegram notification (audio + caption)
        if: success()
        continue-on-error: true
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DATE: ${{ steps.date.outputs.date }}
          REPO: ${{ github.repository }}
        run: |
          # Send the ARA broadcast MP3 to Telegram via sendAudio so it appears
          # as a music/audio bubble with a play button. Caption carries the
          # text summary + GitHub link, all in one message. Falls back to
          # sendMessage (text only) if audio is missing.
          # Replaces the previous appleboy/telegram-action text-only step.

          AUDIO_FILE="research/audio/${DATE}-digest.mp3"
          SUMMARY_FILE="research/summaries/${DATE}-digest-summary.txt"
          DIGEST_URL="https://github.com/${REPO}/blob/main/research/digest/${DATE}-digest.md"

          if [ -z "$TELEGRAM_BOT_TOKEN" ] || [ -z "$TELEGRAM_CHAT_ID" ]; then
            echo "Telegram credentials missing — skipping notification"
            exit 0
          fi

          # Telegram caption max is 1024 chars (with parse_mode). Reserve ~120
          # for the title + footer link, leaving ~700 for the summary body.
          if [ -f "$SUMMARY_FILE" ]; then
            SUMMARY_BODY=$(head -c 700 "$SUMMARY_FILE")
          else
            SUMMARY_BODY="No summary available."
          fi

          CAPTION=$(printf '🎙️ *ARA broadcast — %s*\n\n%s\n\n📄 [Full digest](%s)' \
            "$DATE" "$SUMMARY_BODY" "$DIGEST_URL")

          if [ -f "$AUDIO_FILE" ]; then
            echo "Sending sendAudio with $AUDIO_FILE ($(wc -c < "$AUDIO_FILE") bytes)..."
            HTTP=$(curl -sS -w "%{http_code}" -o /tmp/tg-resp.json \
              -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendAudio" \
              -F "chat_id=${TELEGRAM_CHAT_ID}" \
              -F "audio=@${AUDIO_FILE}" \
              -F "title=ARA broadcast ${DATE}" \
              -F "performer=AI Research Arm" \
              -F "parse_mode=Markdown" \
              -F "caption=${CAPTION}")

            if [ "$HTTP" != "200" ]; then
              echo "Telegram sendAudio returned HTTP $HTTP — body:"
              cat /tmp/tg-resp.json
              echo ""
              echo "Falling back to text-only sendMessage..."
              curl -sS -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
                --data-urlencode "chat_id=${TELEGRAM_CHAT_ID}" \
                --data-urlencode "text=${CAPTION}" \
                -d "parse_mode=Markdown" \
                -d "disable_web_page_preview=true" >/dev/null
            else
              echo "Telegram sendAudio OK"
            fi
          else
            echo "No audio file at $AUDIO_FILE — sending text-only sendMessage"
            curl -sS -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              --data-urlencode "chat_id=${TELEGRAM_CHAT_ID}" \
              --data-urlencode "text=${CAPTION}" \
              -d "parse_mode=Markdown" \
              -d "disable_web_page_preview=true" >/dev/null
          fi
