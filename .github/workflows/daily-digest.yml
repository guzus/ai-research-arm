name: Daily AI Digest (All Sources)

on:
  schedule:
    # Run daily at 00:00 UTC
    - cron: '0 0 * * *'
  # No inputs: the deterministic fallback below is always-on (it fires
  # whenever the agent leaves today's digest missing or sub-floor, on
  # schedule and dispatch alike), so the old emergency-only
  # allow_deterministic_fallback opt-in is gone.
  workflow_dispatch:

concurrency:
  group: daily-digest
  cancel-in-progress: true

jobs:
  daily-digest:
    runs-on: [self-hosted, Linux]
    # Cap the 3 sequential Opus synthesis steps so a wedged agent can't pin a
    # Cloud Run worker for GitHub's 6h default. 60 is the whole-job budget; a
    # genuinely heavy run that overruns times out loudly (freshness catches it).
    timeout-minutes: 60
    permissions:
      contents: write
      pull-requests: write
      id-token: write

    steps:
      # Provision git-lfs on the runner BEFORE checkout — `actions/checkout@v4`
      # with `lfs: true` shells out to `git lfs` during the checkout phase
      # and fails if it's missing. apt-get install needs no repo content.
      - name: Ensure git-lfs is installed
        run: |
          if ! command -v git-lfs >/dev/null 2>&1; then
            echo "git-lfs not found on runner — installing..."
            sudo apt-get update -qq && sudo apt-get install -y -qq git-lfs
          fi
          git lfs version

      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          # lfs: false because mp3s no longer live in LFS (moved to S3 in
          # May 2026; *.mp3 dropped from LFS in .gitattributes). The mp3 in
          # the working tree at checkout is a 0-byte stub from the previous
          # commit. The TTS step overwrites it with real audio; Telegram +
          # Hooker steps below test `[ -s ]` (non-empty) instead of `[ -f ]`,
          # so a 0-byte stub correctly falls back to text-only send. Then
          # the Truncate step zeroes the file again for the next stub commit.
          lfs: false

      # Wire git-lfs smudge/clean filters into THIS worktree's git config so
      # the MP3 produced by the TTS step below routes through LFS on commit
      # (matches `*.mp3` in .gitattributes). `git lfs install` is idempotent.
      - name: Install git-lfs hooks
        run: git lfs install --local

      - name: Pull latest changes
        run: git pull origin main || true

      - name: Get current date
        id: date
        run: echo "date=$(date +'%Y-%m-%d')" >> "$GITHUB_OUTPUT"

      # Base SHA for the standalone output guard below — captured AFTER the
      # pull and BEFORE the synthesis agents, so the guard proves a fresh
      # digest commit came from the agent path or the deterministic
      # fallback.
      - name: Capture digest output base
        id: digest-output-base
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Check for API keys
        id: check-keys
        run: |
          {
            if [ -n "${{ secrets.EXA_API_KEY }}" ]; then
              echo "has_exa=true"
            else
              echo "has_exa=false"
            fi
            if [ -n "${{ secrets.PERPLEXITY_API_KEY }}" ]; then
              echo "has_perplexity=true"
            else
              echo "has_perplexity=false"
            fi
          } >> "$GITHUB_OUTPUT"
          # Surface the silent path switch: with neither key configured the
          # digest runs on the local-source prompt with NO external MCP
          # search. That is a materially thinner digest, so say it loudly
          # (the final telemetry step reports it too).
          if [ -z "${{ secrets.EXA_API_KEY }}" ] && [ -z "${{ secrets.PERPLEXITY_API_KEY }}" ]; then
            echo "::warning::EXA_API_KEY and PERPLEXITY_API_KEY are both unset — digest is running the local-source path with no external MCP search."
          fi

      - name: Create MCP Config
        if: steps.check-keys.outputs.has_exa == 'true' || steps.check-keys.outputs.has_perplexity == 'true'
        run: |
          cat > /tmp/mcp-config.json << 'EOF'
          {
            "mcpServers": {
          EOF
          
          # Add Exa if available
          if [ "${{ steps.check-keys.outputs.has_exa }}" == "true" ]; then
            cat >> /tmp/mcp-config.json << 'EOF'
              "exa": {
                "command": "npx",
                "args": ["-y", "exa-mcp-server"],
                "env": {
                  "EXA_API_KEY": "${{ secrets.EXA_API_KEY }}"
                }
              }
          EOF
            if [ "${{ steps.check-keys.outputs.has_perplexity }}" == "true" ]; then
              echo "," >> /tmp/mcp-config.json
            fi
          fi
          
          # Add Perplexity if available
          if [ "${{ steps.check-keys.outputs.has_perplexity }}" == "true" ]; then
            cat >> /tmp/mcp-config.json << 'EOF'
              "perplexity": {
                "command": "npx",
                "args": ["-y", "perplexity-mcp"],
                "env": {
                  "PERPLEXITY_API_KEY": "${{ secrets.PERPLEXITY_API_KEY }}"
                }
              }
          EOF
          fi
          
          cat >> /tmp/mcp-config.json << 'EOF'
            }
          }
          EOF
          
          echo "Generated MCP config with servers:"
          [ "${{ steps.check-keys.outputs.has_exa }}" = "true" ] && echo "exa"
          [ "${{ steps.check-keys.outputs.has_perplexity }}" = "true" ] && echo "perplexity"

      # continue-on-error on both synthesis paths: a failed agent (provider
      # outage, turn-1 API error, nothing committed — the composite's internal
      # expected-paths guard fails the step in that case) hands off to the
      # content-floor check, the ALWAYS-ON deterministic fallback, and the
      # final output guard below. The fallback keeps a rescued run green on
      # purpose (wiki-ingest + front-page trigger on workflow_run SUCCESS)
      # and its Telegram alert step announces every actual rescue, so a
      # model-free digest never ships silently.
      - name: Synthesize Daily Digest (with MCP tools)
        id: digest-agent-mcp
        if: steps.check-keys.outputs.has_exa == 'true' || steps.check-keys.outputs.has_perplexity == 'true'
        continue-on-error: true
        uses: ./.github/actions/agent-run
        with:
          lane: digest-synthesis
          claude-code-oauth-token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          fireworks-api-key: ${{ secrets.FIREWORKS_API_KEY }}
          zai-api-key: ${{ secrets.ZAI_API_KEY }}
          claude-args: |
            --model opus --mcp-config /tmp/mcp-config.json
            --allowedTools "Glob,Read,Write,Edit,Bash(git:*),Bash(jq:*),Bash(python3:*),Bash(test:*),Bash(ls:*),Bash(cat:*),Bash(head:*),Bash(wc:*),Bash(mkdir:*),Bash(rg:*),Bash(printf:*),Bash(touch:*),mcp__exa__*,mcp__perplexity__*"
          expected-paths: |
            research/digest/
            research/summaries/
          label: Daily digest Claude synthesizer
          prompt: |
            You are the AI News Editor. Create a comprehensive DAILY DIGEST.

            DATE: ${{ steps.date.outputs.date }}

            STEP 1: Find and read today's source files
            Look in the research/ directory for any reports from today's date (${{ steps.date.outputs.date }}).
            Check subdirectories: twitter/, community/, arxiv/, rss/, bluesky/, blogs/, youtube/, and any others.
            Read all relevant files you find.

            STEP 2: Use MCP search tools to fill gaps
            You have access to advanced search tools (Exa, Perplexity) via MCP.
            Use them to search for any major AI news we might have missed today.
            Perplexity tools provide real-time web search with citations.

            STEP 3: Write the digest
            OUTPUT: research/digest/${{ steps.date.outputs.date }}-digest.md

            FORMAT:

            # AI Daily Digest - ${{ steps.date.outputs.date }}

            ## Executive Summary
            [3-5 bullet points of the day's most important developments]

            ## Breaking News
            [Major announcements from companies]

            ## Model Releases & Updates
            [New models, versions, capabilities]

            ## Research Highlights
            [Top papers from arXiv with brief summaries]

            ## Community Buzz
            [What HN and Reddit are discussing]

            ## Funding & Business
            [Investment rounds, acquisitions, partnerships]

            ## Policy & Regulation
            [Government actions, policy changes]

            ## Tools & Resources
            [New tools, frameworks, tutorials worth noting]

            ## Quote of the Day
            [Most insightful tweet or comment]

            ---

            ### Sources
            - Twitter: [count] updates
            - Hacker News: [count] stories
            - Reddit: [count] posts
            - arXiv: [count] papers
            - RSS: [count] articles
            - Expert Blogs: [count] posts
            - YouTube: [count] videos
            - MCP Search: [results from Exa/Perplexity tools]

            *Generated at ${{ steps.date.outputs.date }} 00:00 UTC*

            STEP 4 - WRITE TELEGRAM SUMMARY:
            After writing the full digest, also write a SHORT summary for Telegram notification.
            Use Write tool to create: research/summaries/${{ steps.date.outputs.date }}-digest-summary.txt

            Format (plain text, max 800 chars):
            ```
            Daily AI Digest - ${{ steps.date.outputs.date }}

            TOP STORIES:
            • [Headline 1]
            • [Headline 2]
            • [Headline 3]

            KEY NUMBERS:
            • [Key metrics from today]

            TRENDING: [Top community topic]

            Full digest on GitHub.
            ```

            After writing both files, commit (ONLY today's two files — do
            NOT `git add research/`, because the LFS clean filter would
            silently convert all existing historical PNGs/MP3s to LFS
            pointers in one commit):
            git add research/digest/${{ steps.date.outputs.date }}-digest.md research/summaries/${{ steps.date.outputs.date }}-digest-summary.txt
            git commit -m "Daily digest ${{ steps.date.outputs.date }}"

            HARD RULES
            - Use tool calls to write the files. Do NOT merely respond in
              chat — a digest that exists only in your reply is a failed run.
            - If a tool call is denied, retry with an allowed tool
              immediately. The allowed local read/parse path includes Read,
              Glob, cat, ls, head, jq, python3, and rg.
            - Before finishing, run `git status --short` and confirm
              research/digest/${{ steps.date.outputs.date }}-digest.md is
              committed. If it is not committed, commit it before your final
              response.
            - Commit ONLY today's digest and summary files — never
              `git add research/` (the LFS clean filter would rewrite
              historical media into pointers).

      - name: Synthesize Daily Digest (local-source fallback)
        id: digest-agent-local
        if: steps.check-keys.outputs.has_exa != 'true' && steps.check-keys.outputs.has_perplexity != 'true'
        continue-on-error: true
        uses: ./.github/actions/agent-run
        with:
          lane: digest-synthesis-fallback
          claude-code-oauth-token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          fireworks-api-key: ${{ secrets.FIREWORKS_API_KEY }}
          zai-api-key: ${{ secrets.ZAI_API_KEY }}
          claude-args: |
            --model opus --allowedTools "Glob,Read,Write,Edit,Bash(git:*),Bash(jq:*),Bash(python3:*),Bash(test:*),Bash(ls:*),Bash(cat:*),Bash(head:*),Bash(wc:*),Bash(mkdir:*),Bash(rg:*),Bash(printf:*),Bash(touch:*)"
          expected-paths: |
            research/digest/
            research/summaries/
          label: Daily digest Claude local-source synthesizer
          prompt: |
            You are the AI News Editor. Create a comprehensive DAILY DIGEST.

            DATE: ${{ steps.date.outputs.date }}

            STEP 1: Find and read today's source files
            Look in the research/ directory for any reports from today's date (${{ steps.date.outputs.date }}).
            Check subdirectories: twitter/, community/, arxiv/, rss/, bluesky/, blogs/, youtube/, perplexity/, and any others.
            Read all relevant files you find.

            STEP 2: Identify gaps from local sources
            In this fallback path, no external MCP search provider is
            configured. Do not use WebSearch. Synthesize from the local source
            files only, and call out uncertainty when coverage is thin.

            STEP 3: Write the digest
            OUTPUT: research/digest/${{ steps.date.outputs.date }}-digest.md

            FORMAT:

            # AI Daily Digest - ${{ steps.date.outputs.date }}

            ## Executive Summary
            [3-5 bullet points of the day's most important developments]

            ## Breaking News
            [Major announcements from companies]

            ## Model Releases & Updates
            [New models, versions, capabilities]

            ## Research Highlights
            [Top papers from arXiv with brief summaries]

            ## Community Buzz
            [What HN and Reddit are discussing]

            ## Funding & Business
            [Investment rounds, acquisitions, partnerships]

            ## Policy & Regulation
            [Government actions, policy changes]

            ## Tools & Resources
            [New tools, frameworks, tutorials worth noting]

            ## Quote of the Day
            [Most insightful tweet or comment]

            ---

            ### Sources
            - Twitter: [count] updates
            - Hacker News: [count] stories
            - Reddit: [count] posts
            - arXiv: [count] papers
            - RSS: [count] articles
            - Expert Blogs: [count] posts
            - YouTube: [count] videos
            - MCP Search: [results from Exa/Perplexity tools]

            *Generated at ${{ steps.date.outputs.date }} 00:00 UTC*

            STEP 4 - WRITE TELEGRAM SUMMARY:
            After writing the full digest, also write a SHORT summary for Telegram notification.
            Use Write tool to create: research/summaries/${{ steps.date.outputs.date }}-digest-summary.txt

            Format (plain text, max 800 chars):
            ```
            Daily AI Digest - ${{ steps.date.outputs.date }}

            TOP STORIES:
            • [Headline 1]
            • [Headline 2]
            • [Headline 3]

            KEY NUMBERS:
            • [Key metrics from today]

            TRENDING: [Top community topic]

            Full digest on GitHub.
            ```

            After writing both files, commit (ONLY today's two files — do
            NOT `git add research/`, because the LFS clean filter would
            silently convert all existing historical PNGs/MP3s to LFS
            pointers in one commit):
            git add research/digest/${{ steps.date.outputs.date }}-digest.md research/summaries/${{ steps.date.outputs.date }}-digest-summary.txt
            git commit -m "Daily digest ${{ steps.date.outputs.date }}"

            HARD RULES
            - Use tool calls to write the files. Do NOT merely respond in
              chat — a digest that exists only in your reply is a failed run.
            - If a tool call is denied, retry with an allowed tool
              immediately. The allowed local read/parse path includes Read,
              Glob, cat, ls, head, jq, python3, and rg.
            - Before finishing, run `git status --short` and confirm
              research/digest/${{ steps.date.outputs.date }}-digest.md is
              committed. If it is not committed, commit it before your final
              response.
            - Commit ONLY today's digest and summary files — never
              `git add research/` (the LFS clean filter would rewrite
              historical media into pointers).

      # Content floor on the AGENT's digest. Catches both "agent failed /
      # committed nothing" (file missing) and "agent committed a template
      # shell" (sub-floor bytes/sections, unexpanded placeholders) — the
      # latter previously stayed green. The verdict routes recovery and the
      # always-on deterministic fallback below; it never fails the job
      # itself.
      - name: Check digest content floor
        id: digest-floor
        run: |
          set -euo pipefail
          if python3 scripts/check_digest_content.py \
              --file "research/digest/${{ steps.date.outputs.date }}-digest.md" \
              --min-bytes 4000 --min-sections 3; then
            echo "ok=true" >> "$GITHUB_OUTPUT"
          else
            echo "ok=false" >> "$GITHUB_OUTPUT"
          fi

      # Recovery for validated-but-uncommitted agent output. The floor reads
      # the WORKING TREE while require-output checks base..HEAD COMMITS, so
      # an agent that wrote a floor-passing digest but died before its git
      # commit (mid-run tool/API error) would otherwise strand the content:
      # floor ok → fallback skipped → require-output red → wiki-ingest/
      # front-page starve. Commit exactly this workflow's expected output
      # paths (research/digest/ + research/summaries/ — both are .md/.txt/
      # .json only, no LFS-filtered media). On a clean tree (re-dispatch on
      # a healthy day) this is a no-op, so the fallback's overwrite
      # protection and honest-red semantics are unchanged.
      - name: Commit recovered agent digest output
        if: steps.digest-floor.outputs.ok == 'true'
        env:
          DATE: ${{ steps.date.outputs.date }}
        run: |
          set -euo pipefail
          if [ -z "$(git status --porcelain -- research/digest/ research/summaries/)" ]; then
            echo "No uncommitted digest-lane changes — nothing to recover."
            exit 0
          fi
          echo "::notice::Floor-passing digest output found uncommitted in the working tree (agent likely died before its commit step); committing it."
          git add research/digest/ research/summaries/
          git commit -m "Daily digest ${DATE} (recovered uncommitted agent output)" || echo "No recovered digest changes"

      - name: Check for fresh digest output
        id: digest-output-diff
        run: |
          set -euo pipefail
          if git diff --quiet "${{ steps.digest-output-base.outputs.sha }}..HEAD" -- research/digest/; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      # ALWAYS-ON model-free fallback (mirrors the twitter lane's recovery
      # chain). A red digest run starves the workflow_run dependents
      # (wiki-ingest and front-page trigger only on SUCCESS) — gating this
      # step behind a manual opt-in (PR #302) cost four straight scheduled
      # runs 07-09..07-12 while the agent path was broken. It now fires
      # whenever the agent left today's digest missing or sub-floor, on
      # schedule and dispatch alike; the alert step below announces every
      # actual rescue on Telegram, so a model-free digest can never ship
      # silently (the concern #302 addressed by staying red). Overwrite
      # protection lives inside: when the floor PASSED (a good digest is
      # already committed and this run merely added nothing new — e.g. a
      # re-dispatch or worker-loss re-run on an already-published day) it
      # declines to compose rather than replace agent prose with the
      # mechanical dump, and the require-output gate below still calls that
      # run honestly red.
      - name: Deterministic digest fallback
        id: digest-fallback
        if: ${{ steps.digest-floor.outputs.ok != 'true' || steps.digest-output-diff.outputs.changed != 'true' }}
        env:
          DATE: ${{ steps.date.outputs.date }}
          FLOOR_OK: ${{ steps.digest-floor.outputs.ok }}
        run: |
          set -euo pipefail
          DIGEST_FILE="research/digest/${DATE}-digest.md"
          SUMMARY_FILE="research/summaries/${DATE}-digest-summary.txt"
          if [ "$FLOOR_OK" = "true" ]; then
            # Floor passed → today's digest content is fine and already
            # committed (the recovery step above commits floor-passing tree
            # output); we are only here because no FRESH commit landed since
            # the base SHA. Never clobber agent prose with the dump.
            echo "::notice::Floor-passing digest for ${DATE} is already committed — declining deterministic overwrite; the require-output gate decides the run verdict."
            echo "used=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "::warning::Digest agent produced no usable digest for ${DATE} (missing or sub-floor) — composing deterministic model-free digest from committed lane artifacts."
          python3 scripts/deterministic_daily_digest.py \
            --research-dir research \
            --date "$DATE" \
            --out "$DIGEST_FILE" \
            --summary-out "$SUMMARY_FILE"
          git add "$DIGEST_FILE" "$SUMMARY_FILE"
          git commit -m "Daily digest deterministic fallback ${DATE}" || echo "No deterministic digest changes"
          echo "used=true" >> "$GITHUB_OUTPUT"

      # Loud pairing for the always-on fallback: a fallback-rescued run stays
      # GREEN on purpose (the workflow_run dependents must fire), which makes
      # it silent by default — silence is how the broken agent path hid for
      # six days (07-02 → 07-08). Announce every actual rescue. Alerts must
      # never fail the job (Load-bearing rule 4 style).
      - name: Alert deterministic fallback publication via Telegram
        if: steps.digest-fallback.outcome == 'success' && steps.digest-fallback.outputs.used == 'true'
        continue-on-error: true
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DATE: ${{ steps.date.outputs.date }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ -z "$TELEGRAM_BOT_TOKEN" ] || [ -z "$TELEGRAM_CHAT_ID" ]; then
            echo "Telegram credentials missing — skipping fallback-used alert"
            exit 0
          fi
          TEXT="⚠️ Daily digest ${DATE} published via DETERMINISTIC fallback (model-free) — the digest agent produced no usable digest. wiki-ingest/front-page will run on fallback content. Investigate the agent path: ${RUN_URL}"
          curl -sS -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${TELEGRAM_CHAT_ID}" \
            --data-urlencode "text=${TEXT}" \
            -d "disable_web_page_preview=true" >/dev/null \
            || echo "Telegram fallback-used alert send failed"

      # Final hard gate: the agent path (or the deterministic fallback) must
      # have committed the digest since the pre-agent base SHA.
      # research/digest/ only — a summary-only commit must not count.
      - name: Require digest output
        uses: ./.github/actions/require-output
        with:
          base-sha: ${{ steps.digest-output-base.outputs.sha }}
          expected-paths: |
            research/digest/
          label: Daily digest workflow output

      - name: Rewrite summary as ARA spoken script (Claude)
        if: success()
        continue-on-error: true
        uses: ./.github/actions/agent-run
        with:
          lane: digest-audio-script
          claude-code-oauth-token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          fireworks-api-key: ${{ secrets.FIREWORKS_API_KEY }}
          zai-api-key: ${{ secrets.ZAI_API_KEY }}
          claude-args: |
            --model opus --allowedTools "Read,Write,Edit,Bash(git:*),Bash(jq:*),Bash(python3:*),Bash(test:*),Bash(ls:*),Bash(cat:*),Bash(head:*),Bash(wc:*),Bash(mkdir:*),Bash(rg:*),Bash(printf:*),Bash(touch:*)"
          expected-paths: |
            research/summaries/
          label: Digest spoken-script Claude rewrite
          prompt: |
            You are writing the daily ARA broadcast — a TWO-HOST AI-news podcast
            with banter between Speaker 1 (anchor, deep voice) and Speaker 2
            (co-host, energetic voice). ARA stands for AI Research Arm. Read the
            digest summary, rewrite it as a TWO-HOST SPOKEN briefing of about 60
            to 90 seconds, and write the result to disk. Go straight to the news;
            no warm-up, no host introductions, no "welcome to" preamble.

            INPUT: research/summaries/${{ steps.date.outputs.date }}-digest-summary.txt
            OUTPUT: research/summaries/${{ steps.date.outputs.date }}-digest-spoken.txt

            STEP 1 — Read the input file. If it doesn't exist or is empty, exit cleanly.

            STEP 2 — Compose the two-host briefing under these rules:

            FORMAT (mandatory):
            - EVERY line begins with `Speaker 1:` or `Speaker 2:` followed by their
              dialogue. No exceptions, no narrator lines, no parentheticals.
            - Open with `Speaker 1:` saying ONLY the date naturally (e.g.,
              "Speaker 1: Monday, April twenty-eighth, twenty twenty-six.").
            - `Speaker 2:` picks up the lead story immediately — no "welcome",
              no host introductions.
            - Alternate speakers naturally as if they're handing off — Speaker 1
              anchors transitions ("Some quick numbers...", "On the policy front..."),
              Speaker 2 brings energy on big stories and reactions ("That's the
              first time we've seen...", "Worth noting that...").
            - Aim for 8 to 14 total lines across both speakers. Tight banter beats
              long monologues. Each line is a complete sentence or two — not just
              acknowledgement noises.
            - End with `Speaker 1:` (or `Speaker 2:`) delivering one short sign-off
              line: "That is your ARA broadcast — full digest on GitHub." or
              similar single sentence. No long outro.

            CONTENT RULES (apply to whichever speaker's line):
            - NEVER read a date digit-by-digit ("two zero two six dash zero four
              dash two seven" is forbidden).
            - Brand: NEVER mention TBPN, NPR, CNN, or any other publication. Do
              not invent host names — speakers stay anonymous. "ARA" only surfaces
              in the brief sign-off.
            - Spell out ALL numbers, currency, units, model versions in spoken form:
              "$10B" -> "ten billion dollars", "5GW" -> "five gigawatts", "400K" ->
              "four hundred thousand", "10x" -> "ten times", "GPT-5.5" -> "GPT five
              point five", "Sonnet 4.5" -> "Sonnet four point five".
            - Replace symbols inline: × -> "times", & -> "and", em-dash -> comma.
            - Drop bullets and markdown — pure prose, complete sentences only.
            - Pronounce proper nouns naturally; leave names like Hunyuan, Bubeck,
              DeepSeek as written.

            STEP 2b — INLINE AUDIO TAGS for podcast-style prosody. The TTS engine
            downstream is Gemini 3.1 Flash TTS, which honors these inline. Use
            them SPARINGLY (3 to 6 total per briefing) on the highest-impact moments:
            - `[high_energy]` once or twice — usually on Speaker 2's lead-story
              line or a major reveal.
            - `[emphasis]TEXT[/emphasis]` around the top 2 to 3 numbers/dollars
              of the whole briefing. Example: "[emphasis] one hundred fifty
              billion dollars [/emphasis]".
            - `[dramatic_pause]` 0 to 1 times before a punchline.
            Tags go INSIDE a Speaker line, not on their own line. Do NOT tag every
            number. Tags should feel like the host emphasizing the moments that matter.

            STEP 3 — Use the Write tool to save the spoken script. The file must
            contain ONLY `Speaker N:` prefixed lines (and audio tags inline). No
            preamble, no markdown fences, no quotation marks wrapping anything,
            no narrator lines. Save to:
            research/summaries/${{ steps.date.outputs.date }}-digest-spoken.txt

            STEP 4 — Commit:
            git add research/summaries/${{ steps.date.outputs.date }}-digest-spoken.txt
            git commit -m "Spoken script ${{ steps.date.outputs.date }} (ARA two-host Claude rewrite)" || echo "No changes"

      - name: Generate audio digest with Gemini 3.1 Flash TTS
        if: success()
        continue-on-error: true
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          DATE: ${{ steps.date.outputs.date }}
        run: |
          # Replaces Deepgram Aura-2 with Gemini 3.1 Flash TTS Preview. Why:
          # Gemini honors inline audio tags ([high_energy], [emphasis]X[/emphasis],
          # [dramatic_pause]) that the Sonnet rewrite step now emits — true
          # podcast-style prosody control vs Deepgram's fixed-personality voices.
          #
          # Voice: Kore (firm, female, podcast-fit). Other tested options:
          #   Charon (deep, informative, masculine), Puck (energetic, masculine).
          # Returns base64 PCM (audio/l16; rate=24000; channels=1) — convert via
          # ffmpeg to 48 kbps mono MP3 to match the rest of the pipeline.
          #
          # Symbol normalization still runs as a safety net for anything the LLM
          # might have left in (× & smart quotes etc.) — but NOT touching the
          # square-bracket audio tags, which Gemini needs intact.

          SPOKEN_FILE="research/summaries/${DATE}-digest-spoken.txt"
          SUMMARY_FILE="research/summaries/${DATE}-digest-summary.txt"
          AUDIO_DIR="research/audio"
          AUDIO_FILE="${AUDIO_DIR}/${DATE}-digest.mp3"
          PCM_FILE="/tmp/gemini-${DATE}.pcm"

          if [ -z "${GEMINI_API_KEY}" ]; then
            echo "GEMINI_API_KEY not configured — skipping audio generation"
            exit 0
          fi

          if ! command -v ffmpeg >/dev/null 2>&1; then
            echo "ffmpeg not found on runner — attempting install..."
            if ! { sudo apt-get update -qq && sudo apt-get install -y -qq ffmpeg; }; then
              echo "Could not install ffmpeg — skipping audio generation"
              exit 0
            fi
          fi

          if [ -f "$SPOKEN_FILE" ]; then
            INPUT_FILE="$SPOKEN_FILE"
            echo "Using ARA spoken script (with inline Gemini audio tags) as TTS input"
          elif [ -f "$SUMMARY_FILE" ]; then
            INPUT_FILE="$SUMMARY_FILE"
            echo "Spoken script missing — falling back to raw summary (no audio tags)"
          else
            echo "No input text available — skipping audio generation"
            exit 0
          fi

          mkdir -p "$AUDIO_DIR"

          # Safety-net normalization. Same as before but PRESERVES square-bracket
          # audio tags ([high_energy], [emphasis], [/emphasis], [dramatic_pause]).
          NORMALIZED=$(sed -E '
            s/×/ times /g
            s/&/ and /g
            s/—/, /g
            s/–/, /g
            s/‐/-/g
            s/‑/-/g
            s/•/ /g
            s/\xE2\x80\x99/'"'"'/g
            s/\xE2\x80\x98/'"'"'/g
            s/\xE2\x80\x9C/"/g
            s/\xE2\x80\x9D/"/g
          ' "$INPUT_FILE")

          # Two-host config: Speaker 1 = Charon (deep, informative anchor),
          # Speaker 2 = Puck (energetic, conversational co-host). The Sonnet
          # rewrite step labels every line "Speaker 1:" / "Speaker 2:" so Gemini
          # routes each line to the right voice. Audio tags work in either
          # single- or multi-speaker mode.
          BODY=$(jq -n --arg text "$NORMALIZED" '{
            contents: [{parts: [{text: $text}]}],
            generationConfig: {
              responseModalities: ["AUDIO"],
              speechConfig: {
                multiSpeakerVoiceConfig: {
                  speakerVoiceConfigs: [
                    {speaker: "Speaker 1", voiceConfig: {prebuiltVoiceConfig: {voiceName: "Charon"}}},
                    {speaker: "Speaker 2", voiceConfig: {prebuiltVoiceConfig: {voiceName: "Puck"}}}
                  ]
                }
              }
            }
          }')

          HTTP=$(curl -sS -w "%{http_code}" -o /tmp/gemini-resp.json \
            -X POST "https://generativelanguage.googleapis.com/v1beta/models/gemini-3.1-flash-tts-preview:generateContent?key=${GEMINI_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "$BODY")

          if [ "$HTTP" != "200" ]; then
            echo "Gemini TTS returned HTTP $HTTP — error body:"
            cat /tmp/gemini-resp.json | head -50
            exit 0
          fi

          # Extract base64 PCM payload
          B64=$(jq -r '.candidates[0].content.parts[0].inlineData.data // ""' /tmp/gemini-resp.json)
          if [ -z "$B64" ]; then
            echo "Gemini returned no audio data — response:"
            jq 'del(.candidates[0].content.parts[0].inlineData.data)' /tmp/gemini-resp.json | head -40
            exit 0
          fi

          echo "$B64" | base64 --decode > "$PCM_FILE"
          PCM_SIZE=$(wc -c < "$PCM_FILE")
          echo "Decoded ${PCM_SIZE} bytes of PCM (24kHz mono 16-bit)"

          # PCM (s16le, 24kHz, mono) → MP3 48kbps mono
          ffmpeg -hide_banner -loglevel error -y \
            -f s16le -ar 24000 -ac 1 -i "$PCM_FILE" \
            -codec:a libmp3lame -b:a 48k -ac 1 \
            "$AUDIO_FILE"
          rm -f "$PCM_FILE"

          if [ ! -s "$AUDIO_FILE" ]; then
            echo "ffmpeg produced empty mp3 — bailing"
            rm -f "$AUDIO_FILE"
            exit 0
          fi

          SIZE=$(wc -c < "$AUDIO_FILE")
          DURATION_S=$((SIZE / 6000))   # 48kbps = 6000 bytes/sec
          echo "Generated $AUDIO_FILE — ${SIZE} bytes (~${DURATION_S}s of audio)"

          # mp3 stays on disk for Telegram+Hooker delivery below. S3 upload
          # + truncate to 0-byte stub + commit happen in later steps.

      - name: Upload audio digest to S3
        if: success()
        continue-on-error: true
        env:
          DATE: ${{ steps.date.outputs.date }}
          AWS_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_ACCESS_KEY }}
          AWS_REGION: us-east-1
          S3_ENDPOINT_URL: ${{ secrets.S3_ENDPOINT_URL }}
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
        run: |
          AUDIO_FILE="research/audio/${DATE}-digest.mp3"
          if [ ! -s "$AUDIO_FILE" ]; then
            echo "No audio file at $AUDIO_FILE — skipping S3"
            exit 0
          fi
          if [ -z "$AWS_ACCESS_KEY_ID" ] || [ -z "$S3_ENDPOINT_URL" ] || [ -z "$S3_BUCKET" ]; then
            echo "S3 credentials missing — skipping S3 upload"
            exit 0
          fi
          aws s3 cp "$AUDIO_FILE" "s3://${S3_BUCKET}/audio/${DATE}-digest.mp3" \
            --endpoint-url "$S3_ENDPOINT_URL" \
            --content-type audio/mpeg \
            --no-progress
          echo "Uploaded $AUDIO_FILE -> s3://${S3_BUCKET}/audio/${DATE}-digest.mp3"

      # Use the shared safe-push composite action (post-PR-#58 algorithm):
      # stash any leftover working-tree state before rebasing, so the
      # rebase cannot fail to start with "cannot rebase: You have unstaged
      # changes". Push failures now propagate (previously silently swallowed
      # by `git push || echo "Nothing to push"`).
      # See .github/actions/safe-push/action.yml.
      - name: Push changes
        uses: ./.github/actions/safe-push
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Send Telegram notification (audio + caption)
        if: success()
        continue-on-error: true
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DATE: ${{ steps.date.outputs.date }}
          REPO: ${{ github.repository }}
        run: |
          # Send the ARA broadcast MP3 to Telegram via sendAudio so it appears
          # as a music/audio bubble with a play button. Caption carries the
          # text summary + GitHub link, all in one message. Falls back to
          # sendMessage (text only) if audio is missing.
          # Replaces the previous appleboy/telegram-action text-only step.

          AUDIO_FILE="research/audio/${DATE}-digest.mp3"
          SUMMARY_FILE="research/summaries/${DATE}-digest-summary.txt"
          DIGEST_URL="https://github.com/${REPO}/blob/main/research/digest/${DATE}-digest.md"

          if [ -z "$TELEGRAM_BOT_TOKEN" ] || [ -z "$TELEGRAM_CHAT_ID" ]; then
            echo "Telegram credentials missing — skipping notification"
            exit 0
          fi

          # Telegram caption max is 1024 chars (with parse_mode). Reserve ~120
          # for the title + footer link, leaving ~700 for the summary body.
          if [ -f "$SUMMARY_FILE" ]; then
            SUMMARY_BODY=$(head -c 700 "$SUMMARY_FILE")
          else
            SUMMARY_BODY="No summary available."
          fi

          CAPTION=$(printf '🎙️ *ARA broadcast — %s*\n\n%s\n\n📄 [Full digest](%s)' \
            "$DATE" "$SUMMARY_BODY" "$DIGEST_URL")

          if [ -s "$AUDIO_FILE" ]; then
            echo "Sending sendAudio to Telegram bot (CHAT_ID redacted) with $AUDIO_FILE ($(wc -c < "$AUDIO_FILE") bytes)..."
            HTTP=$(curl -sS -w "%{http_code}" -o /tmp/tg-resp.json \
              -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendAudio" \
              -F "chat_id=${TELEGRAM_CHAT_ID}" \
              -F "audio=@${AUDIO_FILE}" \
              -F "title=ARA broadcast ${DATE}" \
              -F "performer=AI Research Arm" \
              -F "parse_mode=Markdown" \
              -F "caption=${CAPTION}")

            # Log the full response body always — Telegram can return HTTP 200
            # with `{"ok":false}` for things like markdown parse errors or chat
            # permission issues, which previously failed silently.
            echo "Telegram sendAudio response (HTTP $HTTP):"
            cat /tmp/tg-resp.json
            echo ""

            OK=$(jq -r '.ok // false' /tmp/tg-resp.json 2>/dev/null || echo false)
            if [ "$HTTP" != "200" ] || [ "$OK" != "true" ]; then
              echo "sendAudio failed — falling back to text-only sendMessage..."
              curl -sS -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
                --data-urlencode "chat_id=${TELEGRAM_CHAT_ID}" \
                --data-urlencode "text=${CAPTION}" \
                -d "parse_mode=Markdown" \
                -d "disable_web_page_preview=true" >/dev/null
            else
              # Confirm what chat the message landed in (helps diagnose
              # "audio went somewhere I'm not watching" failures).
              CHAT_TYPE=$(jq -r '.result.chat.type // "?"' /tmp/tg-resp.json)
              CHAT_TITLE=$(jq -r '.result.chat.title // .result.chat.first_name // "?"' /tmp/tg-resp.json)
              MSG_ID=$(jq -r '.result.message_id // "?"' /tmp/tg-resp.json)
              echo "Telegram sendAudio OK — message_id=$MSG_ID, chat type=$CHAT_TYPE, title=\"$CHAT_TITLE\""
            fi
          else
            echo "No audio file at $AUDIO_FILE — sending text-only sendMessage"
            curl -sS -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              --data-urlencode "chat_id=${TELEGRAM_CHAT_ID}" \
              --data-urlencode "text=${CAPTION}" \
              -d "parse_mode=Markdown" \
              -d "disable_web_page_preview=true" >/dev/null
          fi

      - name: Send audio to Hooker (parallel delivery channel)
        if: success()
        continue-on-error: true
        env:
          HOOKER_URL: ${{ secrets.HOOKER_URL }}
          HOOKER_TOKEN: ${{ secrets.HOOKER_TOKEN }}
          DATE: ${{ steps.date.outputs.date }}
          REPO: ${{ github.repository }}
        run: |
          # Parallel delivery: post the ARA broadcast MP3 to hooker.guzus.xyz,
          # which forwards it to whatever Telegram channel hooker is configured
          # for. The user watches the hooker channel; the direct Telegram bot
          # above goes to a different chat. Same audio reaches both.

          AUDIO_FILE="research/audio/${DATE}-digest.mp3"
          SUMMARY_FILE="research/summaries/${DATE}-digest-summary.txt"
          DIGEST_URL="https://github.com/${REPO}/blob/main/research/digest/${DATE}-digest.md"

          if [ -z "$HOOKER_URL" ] || [ -z "$HOOKER_TOKEN" ]; then
            echo "Hooker credentials missing — skipping hooker delivery"
            exit 0
          fi

          if [ ! -s "$AUDIO_FILE" ]; then
            echo "No audio file (or 0-byte stub) — skipping hooker delivery"
            exit 0
          fi

          if [ -f "$SUMMARY_FILE" ]; then
            SUMMARY_BODY=$(head -c 700 "$SUMMARY_FILE")
          else
            SUMMARY_BODY=""
          fi

          # Hooker caption max is 1000 chars by default (Telegram document caption ≤1024).
          CAPTION=$(printf '🎙️ ARA broadcast — %s\n\n%s\n\n📄 Full digest: %s' \
            "$DATE" "$SUMMARY_BODY" "$DIGEST_URL")

          echo "Sending audio to Hooker (topic=ai-research)..."
          HTTP=$(curl -sS -w "%{http_code}" -o /tmp/hooker-resp.json \
            -X POST "${HOOKER_URL}/publish/ai-research/document" \
            -H "Authorization: Bearer ${HOOKER_TOKEN}" \
            -F "document=@${AUDIO_FILE}" \
            -F "caption=${CAPTION}" \
            -F "title=ARA broadcast ${DATE}" \
            -F "priority=3" \
            -F "tags=ai-research,audio,daily-digest" \
            -F "parse_mode=Markdown")

          echo "Hooker response (HTTP $HTTP):"
          cat /tmp/hooker-resp.json
          echo ""

      - name: Truncate audio mp3 to 0-byte stub + commit
        if: success()
        continue-on-error: true
        env:
          DATE: ${{ steps.date.outputs.date }}
        run: |
          # Audio lives on S3 now. The mp3 in git is a 0-byte stub so the
          # dashboard's prebuild manifest pipeline (which scans research/audio/
          # for date-matching files) keeps surfacing this date in the manifest.
          AUDIO_FILE="research/audio/${DATE}-digest.mp3"
          if [ -f "$AUDIO_FILE" ]; then
            : > "$AUDIO_FILE"
            git add "$AUDIO_FILE"
            git commit -m "Audio digest ${DATE} stub (mp3 lives on S3)" || echo "No changes"
          fi

      - name: Push audio stub
        if: success()
        uses: ./.github/actions/safe-push
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      # A failed digest run silently starves wiki-ingest and front-page
      # (both gate on workflow_run conclusion == success). Say so on
      # Telegram instead of failing quietly. Never blocks the job.
      - name: Alert digest failure via Telegram
        if: failure()
        continue-on-error: true
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DATE: ${{ steps.date.outputs.date }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ -z "$TELEGRAM_BOT_TOKEN" ] || [ -z "$TELEGRAM_CHAT_ID" ]; then
            echo "Telegram credentials missing — skipping failure alert"
            exit 0
          fi
          TEXT="❌ Daily digest run FAILED for ${DATE}. wiki-ingest and front-page will skip this cycle. Check the run logs: ${RUN_URL}"
          curl -sS -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${TELEGRAM_CHAT_ID}" \
            --data-urlencode "text=${TEXT}" \
            -d "disable_web_page_preview=true" >/dev/null \
            || echo "Telegram failure alert send failed"

      - name: Publish Hooker workflow telemetry
        if: always()
        uses: ./.github/actions/hooker-telemetry
        with:
          status: ${{ job.status }}
          text: "search-providers exa=${{ steps.check-keys.outputs.has_exa }} perplexity=${{ steps.check-keys.outputs.has_perplexity }}; digest-floor ok=${{ steps.digest-floor.outputs.ok }}; deterministic-fallback=${{ steps.digest-fallback.outcome }} used=${{ steps.digest-fallback.outputs.used || 'false' }}"
        env:
          HOOKER_URL: ${{ secrets.HOOKER_URL }}
          HOOKER_TOKEN: ${{ secrets.HOOKER_TOKEN }}
