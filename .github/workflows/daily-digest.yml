name: Daily AI Digest (All Sources)

on:
  schedule:
    # Run daily at 11 PM UTC (end of day synthesis)
    - cron: '0 23 * * *'
  workflow_dispatch:

jobs:
  daily-digest:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Pull latest changes
        run: git pull origin main || true

      - name: Get current date
        id: date
        run: echo "date=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT

      - name: Check for API keys
        id: check-keys
        run: |
          if [ -n "${{ secrets.EXA_API_KEY }}" ]; then
            echo "has_exa=true" >> $GITHUB_OUTPUT
          else
            echo "has_exa=false" >> $GITHUB_OUTPUT
          fi
          if [ -n "${{ secrets.PERPLEXITY_API_KEY }}" ]; then
            echo "has_perplexity=true" >> $GITHUB_OUTPUT
          else
            echo "has_perplexity=false" >> $GITHUB_OUTPUT
          fi

      - name: Create MCP Config
        if: steps.check-keys.outputs.has_exa == 'true' || steps.check-keys.outputs.has_perplexity == 'true'
        run: |
          cat > /tmp/mcp-config.json << 'EOF'
          {
            "mcpServers": {
          EOF
          
          # Add Exa if available
          if [ "${{ steps.check-keys.outputs.has_exa }}" == "true" ]; then
            cat >> /tmp/mcp-config.json << 'EOF'
              "exa": {
                "command": "npx",
                "args": ["-y", "exa-mcp-server"],
                "env": {
                  "EXA_API_KEY": "${{ secrets.EXA_API_KEY }}"
                }
              }
          EOF
            if [ "${{ steps.check-keys.outputs.has_perplexity }}" == "true" ]; then
              echo "," >> /tmp/mcp-config.json
            fi
          fi
          
          # Add Perplexity if available
          if [ "${{ steps.check-keys.outputs.has_perplexity }}" == "true" ]; then
            cat >> /tmp/mcp-config.json << 'EOF'
              "perplexity": {
                "command": "npx",
                "args": ["-y", "perplexity-mcp"],
                "env": {
                  "PERPLEXITY_API_KEY": "${{ secrets.PERPLEXITY_API_KEY }}"
                }
              }
          EOF
          fi
          
          cat >> /tmp/mcp-config.json << 'EOF'
            }
          }
          EOF
          
          echo "Generated MCP config:"
          cat /tmp/mcp-config.json

      - name: Synthesize Daily Digest (with MCP tools)
        if: steps.check-keys.outputs.has_exa == 'true' || steps.check-keys.outputs.has_perplexity == 'true'
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: |
            --mcp-config /tmp/mcp-config.json
            --allowedTools "Read,Write,Edit,Bash(git:*),mcp__exa__*,mcp__perplexity__*"
          prompt: |
            You are the AI News Editor. Create a comprehensive DAILY DIGEST.

            DATE: ${{ steps.date.outputs.date }}

            STEP 1: Read all today's source files
            - research/twitter/${{ steps.date.outputs.date }}.md (if exists)
            - research/community/${{ steps.date.outputs.date }}-hn.md (if exists)
            - research/community/${{ steps.date.outputs.date }}-reddit.md (if exists)
            - research/arxiv/${{ steps.date.outputs.date }}-papers.md (if exists)
            - research/rss/${{ steps.date.outputs.date }}.md (if exists)

            STEP 2: Use MCP search tools to fill gaps
            You have access to advanced search tools (Exa, Perplexity) via MCP.
            Use them to search for any major AI news we might have missed today.
            Perplexity tools provide real-time web search with citations.

            STEP 3: Write the digest
            OUTPUT: research/digest/${{ steps.date.outputs.date }}-digest.md

            FORMAT:

            # AI Daily Digest - ${{ steps.date.outputs.date }}

            ## Executive Summary
            [3-5 bullet points of the day's most important developments]

            ## Breaking News
            [Major announcements from companies]

            ## Model Releases & Updates
            [New models, versions, capabilities]

            ## Research Highlights
            [Top papers from arXiv with brief summaries]

            ## Community Buzz
            [What HN and Reddit are discussing]

            ## Funding & Business
            [Investment rounds, acquisitions, partnerships]

            ## Policy & Regulation
            [Government actions, policy changes]

            ## Tools & Resources
            [New tools, frameworks, tutorials worth noting]

            ## Quote of the Day
            [Most insightful tweet or comment]

            ---

            ### Sources
            - Twitter: [count] updates
            - Hacker News: [count] stories
            - Reddit: [count] posts
            - arXiv: [count] papers
            - RSS: [count] articles
            - MCP Search: [results from Exa/Perplexity tools]

            *Generated at ${{ steps.date.outputs.date }} 23:00 UTC*

            After writing, commit:
            git add research/digest/
            git commit -m "Daily digest ${{ steps.date.outputs.date }}"

      - name: Synthesize Daily Digest (WebSearch fallback)
        if: steps.check-keys.outputs.has_exa != 'true'
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: |
            --allowedTools "Read,Write,Edit,Bash(git:*),WebSearch"
          prompt: |
            You are the AI News Editor. Create a comprehensive DAILY DIGEST.

            DATE: ${{ steps.date.outputs.date }}

            STEP 1: Read all today's source files
            - research/twitter/${{ steps.date.outputs.date }}.md (if exists)
            - research/community/${{ steps.date.outputs.date }}-hn.md (if exists)
            - research/community/${{ steps.date.outputs.date }}-reddit.md (if exists)
            - research/arxiv/${{ steps.date.outputs.date }}-papers.md (if exists)
            - research/perplexity/${{ steps.date.outputs.date }}.md (if exists)
            - research/rss/${{ steps.date.outputs.date }}.md (if exists)

            STEP 2: Use WebSearch to fill gaps
            Search for any major AI news from today we might have missed.

            STEP 3: Write the digest
            OUTPUT: research/digest/${{ steps.date.outputs.date }}-digest.md

            FORMAT:

            # AI Daily Digest - ${{ steps.date.outputs.date }}

            ## Executive Summary
            [3-5 bullet points of the day's most important developments]

            ## Breaking News
            [Major announcements from companies]

            ## Model Releases & Updates
            [New models, versions, capabilities]

            ## Research Highlights
            [Top papers from arXiv with brief summaries]

            ## Community Buzz
            [What HN and Reddit are discussing]

            ## Funding & Business
            [Investment rounds, acquisitions, partnerships]

            ## Policy & Regulation
            [Government actions, policy changes]

            ## Tools & Resources
            [New tools, frameworks, tutorials worth noting]

            ## Quote of the Day
            [Most insightful tweet or comment]

            ---

            ### Sources
            - Twitter: [count] updates
            - Hacker News: [count] stories
            - Reddit: [count] posts
            - arXiv: [count] papers
            - RSS: [count] articles
            - MCP Search: [results from Exa/Perplexity tools]

            *Generated at ${{ steps.date.outputs.date }} 23:00 UTC*

            After writing, commit:
            git add research/digest/
            git commit -m "Daily digest ${{ steps.date.outputs.date }}"

      - name: Push changes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git
          git push || echo "Nothing to push"

      - name: Send Telegram notification
        if: success() && secrets.TELEGRAM_BOT_TOKEN != ''
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          format: markdown
          message: |
            📊 *Daily AI Digest Ready*

            📅 Date: ${{ steps.date.outputs.date }}
            ✅ Status: Success

            📄 Digest: [View on GitHub](https://github.com/${{ github.repository }}/blob/main/research/digest/${{ steps.date.outputs.date }}-digest.md)

            🔗 [Workflow Run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})
