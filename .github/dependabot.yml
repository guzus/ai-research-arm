# Dependabot configuration — weekly automated dependency bump PRs.
#
# Scope notes:
# - github-actions: scans .github/workflows/*.yml for `uses:` action refs.
#   Bumps things like actions/checkout@v4, anthropics/claude-code-action@v1.
# - uv: scans pyproject.toml and uv.lock at repo root. Bumps pyyaml
#   (required) and yfinance (optional `stock` extra used by stock_prices.py).
# - bun (/dashboard): scans dashboard/package.json + bun.lock. bun is the
#   dashboard's package manager — CI and Vercel both install with
#   `bun install --frozen-lockfile`. Bumps dompurify, marked, typescript,
#   vite. (Was `npm`, which only updated the orphaned package-lock.json and
#   left bun.lock stale, so every dashboard PR failed the frozen bun-lockfile
#   check and was dead-on-arrival; `bun` updates bun.lock directly.)
#
# What Dependabot CAN'T see and must be bumped manually:
# - Inline `npm install -g <pkg>` in workflow run: blocks (bird, pi-coding-agent).
# - Inline `npm install <pkg>` in workflow run: blocks (puppeteer in
#   daily-front-page.yml).
# These are version-pinned in the workflow YAML — re-check the pins monthly
# and bump in the same PR you'd merge a Dependabot suggestion in.
version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: UTC
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(actions)"

  - package-ecosystem: uv
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: UTC
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(uv)"

  - package-ecosystem: bun
    directory: /dashboard
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: UTC
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(bun)"
